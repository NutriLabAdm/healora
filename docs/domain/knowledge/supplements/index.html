<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#2d3436;height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.header{padding:12px 16px 10px;background:#fff;border-bottom:1px solid #dfe6e9;flex-shrink:0}
.h-top{display:flex;justify-content:space-between;align-items:center}
h1{font-size:20px;font-weight:700}.subtitle{color:#636e72;font-size:12px}
.stats{display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:#636e72}
.stats span{background:#dfe6e9;padding:1px 8px;border-radius:8px}
/* moved below */
#search{flex:1;min-width:140px;padding:8px 12px;border:2px solid #dfe6e9;border-radius:8px;font-size:13px;outline:none;transition:.2s}
#search:focus{border-color:#6c5ce7}
.controls{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.ctrl-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:#636e72;font-weight:600;white-space:nowrap;min-width:72px;letter-spacing:.3px}
.filter-group{display:flex;gap:3px;flex-wrap:wrap}
/* type filters - purple pastel */
.filter-btn{padding:3px 7px;border:1.5px solid #d5caff;border-radius:14px;background:#f7f4ff;cursor:pointer;font-size:10px;transition:.15s;white-space:nowrap;color:#5b4a8a}
.filter-btn:hover{border-color:#b8a9e6;background:#ede6ff}
.filter-btn.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
/* scenario filters - green pastel */
.scenario-btn{padding:3px 7px;border:1.5px solid #b8e6d9;border-radius:14px;background:#edfaf5;cursor:pointer;font-size:10px;transition:.15s;white-space:nowrap;color:#2d7a66;display:inline-flex;align-items:center;gap:2px}
.scenario-btn:hover{border-color:#7ed5ba;background:#d5f5ea}
.scenario-btn.active{background:#00b894;color:#fff;border-color:#00b894}
.scenario-btn svg{width:11px;height:11px;fill:currentColor;flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.grid-wrap{flex:1;overflow-y:auto;padding:8px;transition:.3s}
.grid-wrap.with-detail{flex:0 0 36%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.card{background:#fff;border-radius:8px;padding:8px 10px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer;border-left:3px solid #dfe6e9}
.card:hover{box-shadow:0 2px 6px rgba(0,0,0,.1)}.card.selected{box-shadow:0 0 0 2px #6c5ce7,0 2px 8px rgba(108,92,231,.3);border-left-color:#6c5ce7!important;transform:scale(1.02)}
.card.hidden{display:none}
.card-title{font-size:12px;font-weight:600;line-height:1.2;margin-bottom:2px;word-break:break-word}
.card-meta{font-size:10px;color:#636e72;line-height:1.2}
.card-meta strong{color:#2d3436;font-weight:600}
.card-folder{display:inline-block;font-size:9px;padding:0 5px;border-radius:4px;margin-top:2px}
.folder-stim{background:#ffeaa7;color:#6c4f00}.folder-ton{background:#81ecec;color:#006266}
.folder-sed{background:#dfe6e9;color:#2d3436}.folder-energy{background:#fdcb6e;color:#6c4f00}
.folder-sleep{background:#a29bfe;color:#1a0066}.folder-gi{background:#55efc4;color:#004d33}
mark{background:#ffeaa7;padding:0 2px;border-radius:2px}
.detail-wrap{flex:0 0 0;overflow:hidden;transition:.3s;border-left:1px solid #dfe6e9;background:#fff;display:flex;flex-direction:column}
.detail-wrap.open{flex:0 0 64%}
.detail-bar{display:flex;align-items:center;padding:6px 12px;background:#f8f9fa;border-bottom:1px solid #eee;flex-shrink:0;gap:8px}
.detail-bar .dt-title{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-close{border:none;background:#fff;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#636e72;flex-shrink:0;border:1px solid #dfe6e9}
.detail-close:hover{background:#f5f6fa;color:#2d3436}
.detail-inner{flex:1;overflow-y:auto;padding:14px 20px;font-size:14px}
.detail-inner h1{font-size:20px;margin-bottom:4px}
.detail-inner h2{font-size:16px;margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid #eee}
.detail-inner h3{font-size:14px;margin:10px 0 4px}
.detail-inner p{margin:4px 0;line-height:1.5}
.detail-inner ul,.detail-inner ol{margin:4px 0;padding-left:18px}
.detail-inner li{margin:2px 0;line-height:1.4}
.detail-inner table{font-size:12px;border-collapse:collapse;width:100%;margin:6px 0}
.detail-inner th,.detail-inner td{border:1px solid #dfe6e9;padding:4px 8px;text-align:left}
.detail-inner th{background:#f5f6fa;font-weight:600}
.detail-inner blockquote{border-left:3px solid #6c5ce7;margin:6px 0;padding:6px 12px;background:#f8f7ff;border-radius:4px;font-size:13px}
.detail-inner blockquote p{margin:0}.detail-inner strong{font-weight:600}
.detail-inner code{background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:13px}
.detail-inner a{color:#6c5ce7}
@media(max-width:700px){
  .main{flex-direction:column}
  .grid-wrap.with-detail{flex:0 0 auto;max-height:30vh;overflow-y:auto}
  .detail-wrap.open{flex:1 1 auto;overflow-y:auto;min-height:0}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px}
  .card{padding:6px 8px}.card-title{font-size:11px}
  .h-top{flex-wrap:wrap;gap:4px}
}</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="h-top">
      <div><h1>Библиотека БАД <a href="https://healora.ru/supplements" target="_blank" style="color:#d63031;text-decoration:none;font-weight:400;font-size:13px;margin-left:6px">healora.ru/supplements</a></h1><div class="subtitle">Каталог добавок, адаптогенов, фитотерапии</div></div>
      <div class="stats"><span id="total-count">0</span><span id="visible-count">0</span></div>
    </div>
    <div class="controls">
      <input id="search" type="text" placeholder="Поиск..." oninput="filter()">
      <div class="ctrl-row">
        <span class="ctrl-label">Тип воздействия</span>
        <div class="filter-group" id="folder-filters"><button class="filter-btn active" data-folder="all" onclick="setFolder(this,'all')">Все</button></div>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">Сценарии</span>
        <div class="filter-group" id="scenario-filters">
          <button class="scenario-btn active" data-scenario="all" onclick="setScenario(this,'all')">Все</button>
          <button class="scenario-btn" data-scenario="стресс" onclick="setScenario(this,'стресс')"><svg viewBox="0 0 16 16"><path d="M8 14s-4-3-6-5.5A3.5 3.5 0 0 1 8 4.5 3.5 3.5 0 0 1 14 8.5C12 11 8 14 8 14z"/></svg>Стресс</button>
          <button class="scenario-btn" data-scenario="энергия" onclick="setScenario(this,'энергия')"><svg viewBox="0 0 16 16"><path d="M7 1L2 9h4v6l5-8H7V1z"/></svg>Энергия</button>
          <button class="scenario-btn" data-scenario="перелет" onclick="setScenario(this,'перелет')"><svg viewBox="0 0 16 16"><path d="M1 10l4-1 3-7 3 7 4 1-3 2-4-1-4 1-3-2z"/></svg>Перелёт</button>
          <button class="scenario-btn" data-scenario="иммунитет" onclick="setScenario(this,'иммунитет')"><svg viewBox="0 0 16 16"><path d="M8 1L2 3v5c0 4 6 7 6 7s6-3 6-7V3L8 1z"/></svg>Иммунитет</button>
          <button class="scenario-btn" data-scenario="жкт" onclick="setScenario(this,'жкт')"><svg viewBox="0 0 16 16"><path d="M2 5c0-1 1-2 3-2h6c2 0 3 1 3 2v3c0 1-1 2-3 2H8L6 13V9H5c-2 0-3-1-3-2V5z"/></svg>ЖКТ</button>
          <button class="scenario-btn" data-scenario="суставы" onclick="setScenario(this,'суставы')"><svg viewBox="0 0 16 16"><path d="M5 3a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4zM4 7l1 5h6l1-5"/></svg>Суставы</button>
          <button class="scenario-btn" data-scenario="спорт" onclick="setScenario(this,'спорт')"><svg viewBox="0 0 16 16"><path d="M1 6h2v4H1V6zm3-1h1v6H4V5zm3-1h2v8H7V4zm3 1h1v6h-1V5zm3 1h2v4h-2V6z"/></svg>Спорт</button>
          <button class="scenario-btn" data-scenario="красота" onclick="setScenario(this,'красота')"><svg viewBox="0 0 16 16"><path d="M8 1l2 4 4 .5-3 3L12 13l-4-2-4 2 1-4.5-3-3L6 5z"/></svg>Красота</button>
        </div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="grid-wrap" id="grid-wrap"><div class="grid" id="grid"></div></div>
    <div class="detail-wrap" id="detail-wrap">
      <div class="detail-bar"><button class="detail-close" onclick="closeDetail()">×</button><span class="dt-title" id="dt-title"></span></div>
      <div class="detail-inner" id="detail-inner"></div>
    </div>
  </div>
</div>

const mdContents=[`# 5-HTP (5-Гидрокситриптофан)

**Категория:** БАД / Аминокислота (метаболит)  
**Тип:** Предшественник серотонина (прямой)  
**Основное действующее вещество:** 5-гидрокси-L-триптофан (5-HTP)  
**Синонимы:** 5-HTP, 5-гидрокситриптофан, окситриптан, Griffonia simplicifolia (экстракт), L-5-HTP

## Что это такое

5-HTP (5-гидрокситриптофан) — прямой метаболит L-триптофана и непосредственный предшественник серотонина. В отличие от триптофана, 5-HTP минует лимитирующую стадию (гидроксилирование триптофана ферментом TPH2), что делает его более эффективным для повышения уровня серотонина в ЦНС. Получают из семян африканского растения Griffonia simplicifolia (70–98% чистота). Применяется для улучшения настроения, сна, снижения тревожности, контроля аппетита и мигрени.

## Внешний вид

Белый или почти белый кристаллический порошок, без запаха, слегка горьковатый. Капсулы — белые/бежевые (растительные или желатиновые) с белым порошком. Таблетки — белые, покрытые оболочкой.

## Метаболический цикл

- **Всасывание:** быстрое и полное в тонком кишечнике (натрий-зависимый транспорт через B⁰AT1, SLC6A19). В отличие от триптофана, не требует транспортёра LAT1 для входа в мозг — проникает через ГЭБ путём пассивной диффузии и через транспортер больших аминокислот (LAT1) с меньшей конкуренцией. Cmax через 30–90 мин.
- **Метаболизм:** 5-HTP → серотонин (декарбоксилаза ароматических аминокислот, AADC, с кофактором PLP/витамин B6). Основной метаболизм — в печени и лёгких (70% декарбоксилируется до серотонина периферически, что может вызывать тошноту). Периферический серотонин → MAO-A → 5-HIAA (5-гидроксииндолуксусная кислота, выводится с мочой).
- **Распределение:** равномерное. В ЦНС — 5–15% от принятой дозы (основная часть декарбоксилируется на периферии). Серотонин — не проникает через ГЭБ (синтезируется локально из 5-HTP).
- **Выведение:** T½ 2–4 ч. 5-HIAA — почки (активная канальцевая секреция). 50–70% принятой дозы выводится как 5-HIAA в течение 24 ч.
- **Особенность:** карбидопа (ингибитор периферической AADC) повышает доступность 5-HTP для мозга в 2–3 раза, но требуется контроль врача. Витамин B6 — обязательный кофактор, но высокие дозы B6 (>50 мг) могут усиливать периферическое превращение → тошнота.

## Механизмы действия

- **Предшественник серотонина** — непосредственный (минует TPH2, лимитирующую стадию)
- **Повышение серотонина в ЦНС** — улучшение настроения, снижение тревоги
- **Субстрат AADC** (декарбоксилаза ароматических аминокислот) → 5-HT
- **Предшественник мелатонина** — через серотонин → N-ацетилсеротонин → мелатонин
- **Регуляция аппетита** — серотониновый контроль насыщения (гипоталамус)
- **Регуляция цикла сна** — нормализация REM-фазы и архитектуры сна
- **Подавление болевой импульсации** — тригеминальная система (мигрень)
- **Снижение импульсивности** — префронтальная кора (5-HT2A рецепторы)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Депрессия (лёгкая/умеренная) | 1A | Сравним с СИОЗС при мягких формах |
| Бессонница (засыпание) | 1A | Улучшение засыпания, увеличение REM |
| Тревожность (в т.ч. панические атаки) | 1B | Снижение паники, тревоги |
| Мигрень (профилактика) | 1B | Снижение частоты на 30–50% |
| Фибромиалгия | 1B | Снижение боли, улучшение сна |
| Контроль аппетита (ожирение) | 2A | Снижение углеводной тяги |
| ПМС (дисфория) | 2A | Снижение раздражительности |

## Топ-5 продуктов, в которых содержится

В пищевых продуктах практически не содержится (метаболит, не аминокислота из пищи). Источник: семена Griffonia simplicifolia (африканское растение, до 20% 5-HTP в семенах). Ничтожные следы — в некоторых ферментированных продуктах. Аналог из пищи: триптофан из индейки, курицы, яиц (→ 5-HTP эндогенный).

## Особенности приёма

- **Стандартная дозировка:** 50–300 мг/день (в 1–2 приёма)
- **Оптимальная:** 50–100 мг × 2–3 р/день (утро + вечер) или 150–200 мг перед сном
- **Начало:** 50 мг/день × 1 неделя → увеличение на 50 мг каждую неделю
- **Начало действия:** 30–60 мин (субъективно), 2–4 недели для клинического эффекта
- **Курс:** 8–12 недель, перерыв 1–2 недели
- **Приём с карбидопой:** только под контролем врача (↑ биодоступность в мозг в 2–3 раза)
- **Тошнота:** наиболее частый побочный эффект (30–50% в начале). Снижается при приёме с едой, медленном титровании, комбинации с имбирем (100–200 мг)
- **Разделение с белками:** в отличие от триптофана, не конкурирует с ВСАА (не требует углеводов)
- **Совместимость с B6:** витамин B6 — кофактор AADC (10–25 мг/день)

## Противопоказания

- Совместный приём с СИОЗС/СИОЗСН/ИМАО/трициклическими антидепрессантами (риск серотонинового синдрома — без контроля врача)
- Беременность, лактация (категорически недостаточно данных)
- Карциноидный синдром (теоретический риск)
- Тяжёлая гипертония (может повышать АД через периферический серотонин)
- Печёночная недостаточность (нарушение метаболизма серотонина)
- Эозинофилия (теоретический риск по аналогии с триптофаном)
- Дефицит AADC (нарушение превращения)

## Форма приема и порядок

Капсулы (50–100–200 мг), таблетки. Начинать с 50 мг/день, титровать до 100–200 мг 1–3 р/день. Для сна — 100–200 мг за 30–60 мин до сна. Для настроения — 50–100 мг утром и днём. Для аппетита — 100–200 мг за 30 мин до еды. Принимать с едой (снижение тошноты). Курс 8–12 недель. Обязательно сочетать с витамином B6 (10–25 мг). Не сочетать с антидепрессантами без врача. При тошноте — добавить имбирь 100–200 мг.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин B6 (P-5-P) | Кофактор AADC — дозозависимое усиление |
| ++ | Имбирь | Снижение тошноты (5-HT3 антагонизм) |
| ++ | Магний глицинат | Синергия расслабления + серотониновый путь |
| ++ | L-теанин | Дополнение GABA/серотонинового пути |
| + | Мелатонин | Синергия сна (5-HTP → серотонин → мелатонин) |
| ± | Карбидопа | Увеличение доставки 5-HTP в мозг (только под контролем) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | СИОЗС/СИОЗСН | Риск серотонинового синдрома |
| +++ | ИМАО | Риск серотонинового синдрома (критично) |
| ++ | Алкоголь | Антагонизм + риск серотонинового синдрома |
| ++ | Триптофан | Суммация → избыток серотонина |
| ++ | Зверобой | Суммация → серотониновый синдром |
| + | Кофеин | Может усиливать тревогу (антагонизм с серотонином) |

## Научные факты

- Мета-анализ (2020): 5-HTP (150–300 мг/день) достоверно снижает депрессию по шкале Гамильтона (HAM-D) на 5.7 балла по сравнению с плацебо (p<0.001). Сравним с флуоксетином при лёгкой депрессии (Cochrane Database Syst Rev. 2020;1:CD003198).
- Мета-анализ (2019): 5-HTP снижает частоту мигрени на 38% (RR 0.62, 95% CI 0.48-0.80) при дозе 200–400 мг/день (Cephalalgia. 2019;39(6):770-780).
- РКИ (2018): 5-HTP 200 мг вечером: улучшение засыпания на 15 мин, увеличение REM-фазы на 12%, субъективное качество сна (PSQI) −2.1 балла (J Psychopharmacol. 2018;32(5):578-586).
- РКИ (2017): тошнота при приёме 5-HTP — 32% на 100 мг, 48% на 300 мг. Приём с имбирём (100 мг) снижает тошноту до 12% (Altern Med Rev. 2017;15(1):46-53).
- Мета-анализ (2016): 5-HTP + карбидопа (21 когорта) — повышение 5-HIAA в ЦСЖ на 150%, но не рекомендован без врачебного контроля из-за профиля безопасности (J Neural Transm. 2016;123(10):1167-78).

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **5-HTP — «прямой путь» к серотонину.** Отличие от триптофана: минует лимитирующую стадию — эффективнее для ЦНС, но с риском тошноты (30–50%). Правило №1: начинайте с 50 мг и титруйте медленно (+50 мг в неделю). Правило №2: принимайте с имбирём (снижает тошноту в 3–4 раза). Правило №3: обязательно с витамином B6 (10–25 мг как P-5-P). Ключевое ПРЕДУПРЕЖДЕНИЕ: НЕЛЬЗЯ с антидепрессантами (СИОЗС, ИМАО) — риск серотонинового синдрома. Курс — 8–12 недель, перерыв 1–2 недели. Для сна — 100–200 мг перед сном. Для настроения — 50–100 мг утром.

`# Адаптогены (Adaptogens — общая концепция)

**Категория:** БАД / Адаптогены / Стресс  
**Тип:** Растительные и природные вещества, повышающие неспецифическую резистентность  
**Основные представители:** Родиола розовая, ашваганда, женьшень, элеутерококк, рейши, лимонник, аралия, левзея, тулси, пассифлора  
**Синонимы:** Adaptogens, адаптогенные растения, природные антистресс-средства, «вакцины от стресса»

## Что это такое

Адаптогены — природные вещества (преимущественно растительного происхождения), которые повышают неспецифическую резистентность организма к стрессовым факторам любой природы (физическим, химическим, биологическим, психоэмоциональным). Термин введён Н.В. Лазаревым в 1947 году. Ключевая особенность: адаптогены не имеют специфического действия — они работают вне зависимости от природы стресса. Повышают устойчивость организма, нормализуют гипоталамо-гипофизарно-надпочечниковую ось (ГГН-ось) и балансируют выброс кортизола, адреналина и норадреналина. Могут давать непредсказуемые реакции при неправильном подборе (три типа: стимулирующие, тонизирующие, седативные).

## Внешний вид

Разнообразен: сухие корни/корневища (женьшень, родиола, элеутерококк), капсулы/таблетки (стандартизированные экстракты), настойки/жидкие экстракты (спиртовые/водные), порошки (грибы рейши, маточное молочко)

## Метаболический цикл

- **Всасывание:** экстрактивные вещества (витанолиды/салидрозиды/элеутерозиды/гинзенозиды/валепотриаты) всасываются в тонком кишечнике. Биодоступность большинства адаптогенных соединений ограничена (<15%) из-за активного эффлюкса (P-гликопротеин).
- **Метаболизм:** первичное прохождение через печень — фаза I (CYP3A4, CYP2C9) и фаза II (глюкуронирование, сульфатирование). Большинство метаболитов теряют адаптогенную активность.
- **Распределение:** активные формы связываются с белками плазмы (80–90%), проникают через ГЭБ (частично для липофильных агликонов).
- **Выведение:** преимущественно через желчь с калом (>70%), частично почками (10–20%).
- **Особенность:** курсовой эффект (2–4 недели) необходим для накопления клинически значимой концентрации.

## Механизмы действия

- **Модуляция ГГН-оси** — регуляция выброса кортизола, ДГЭА
- **Активация защитных систем** — HSP70, Nrf2, FOXO
- **Баланс симпатики/парасимпатики** — в зависимости от типа адаптогена
- **Повышение уровня ДГЭА** — при истощении надпочечников
- **Повышение стрессоустойчивости** — не отсутствие реакции, а скорость восстановления
- **Стимуляция нейротрофинов** — BDNF, NGF
- **Антиоксидантное** — активация системы глутатиона
- **Улучшение транспорта кислорода** — увеличение эритроцитов
- **Модуляция иммунитета** — NK-клетки, цитокины
- **Inverted U-эффект** — стимулируют при низком тонусе, успокаивают при высоком

## Классификация адаптогенов

| Тип | Действие | Представители | Когда выбирать |
|-----|----------|---------------|----------------|
| **Стимулирующие** | Возбуждают ЦНС, тонизируют | Женьшень, элеутерококк, аралия, левзея | Низкий кортизол, упадок сил, апатия |
| **Тонизирующие** | Балансируют, мягко тонизируют | Рейши, маточное молочко, мумие | Хронический стресс, истощение |
| **Седативные** | Расслабляют, успокаивают | Валериана, тулси, пассифлора | Высокий кортизол, тревога, бессонница |
| **Универсальные** | Адаптогены «широкого спектра» | Родиола розовая, ашваганда | Любое состояние |

## Принципы подбора

- **Высокий кортизол + тревожность + бессонница + тиреотоксикоз** → только седативные адаптогены + тонизирующие (осторожно)
- **Низкий кортизол + апатия + упадок сил** → стимулирующие адаптогены
- **Неизвестное состояние / универсальный выбор** → родиола розовая (универсальный адаптоген)
- **Активационная терапия** — разные дозировки каждый день (1 → 3 → 10 капель) для предотвращения адаптации
- **Нельзя только стимулировать или только расслаблять** — держать баланс симпатикус/парасимпатикус

## Топ-5 продуктов, в которых содержится

Адаптогены не содержатся в продуктах питания как таковые. Основные растительные источники: корень женьшеня (красный азиатский — Panax ginseng), корень родиолы розовой (Rhodiola rosea — «золотой корень»), корень ашваганды (Withania somnifera — «индийский женьшень»), корень элеутерококка (Eleutherococcus senticosus — «сибирский женьшень»), гриб рейши (Ganoderma lucidum — «гриб бессмертия»), лимонник (Schisandra chinensis), тулси/базилик священный (Ocimum sanctum)

## Особенности приёма

- **Стимулирующие:** первая половина дня (утро, до 14:00)
- **Седативные:** вечер/на ночь
- **Универсальные (родиола):** утро/день (универсальное тонизирование)
- **Курс:** 4–8 недель, затем перерыв 2–4 недели (предотвращение толерантности)
- **Дозировка:** начинать с минимальной, увеличивать постепенно
- **Активационная терапия:** ротация дозировок для предотвращения привыкания
- **Сердечно-сосудистые:** стимулирующие адаптогены могут повышать давление — осторожно
- **При АИЗ:** родиола — универсально; пасленовые (ашваганда) — с осторожностью (аутоиммунный протокол)

## Противопоказания

- Тяжёлая артериальная гипертензия (стимулирующие)
- Беременность, лактация (большинство адаптогенов — ограниченные данные)
- Аутоиммунные заболевания в активной фазе (стимулирующие — с осторожностью)
- Тиреотоксикоз (стимулирующие — противопоказаны)
- Бессонница (стимулирующие — принимать только в первой половине дня)

## Форма приема и порядок

Настойки/жидкие экстракты (капли, дозировка по каплям), капсулы/таблетки (стандартизированные экстракты), чаи/отвары (корни), порошки (грибы). Стимулирующие — утром; седативные — вечером; универсальные — утром/днём. Начинать с минимальной дозы, повышать постепенно. Курс до 8 недель, перерыв 2–4 недели. Ротация адаптогенов для предотвращения толерантности.

| Ранг | Вещество | Эффект |

| +++ | Магний глицинат | Синергия антистресс (разные механизмы) |

| + | Стимуляторы (кофеин, эфедрин) | Избыточная активация при высоком кортизоле |

## Научные факты

- Понятие «адаптоген» введено Н.В. Лазаревым в 1947 г. (АМН СССР).
- Критерии адаптогена (Brekhman, 1968): (1) неспецифическая резистентность, (2) нормализация вне зависимости от направления патологии, (3) безопасность/отсутствие нарушения нормальных функций.
- Мета-анализ (2020): адаптогены (родиола, ашваганда) достоверно снижают уровень стресса и кортизола (SMD −0.45, p<0.001).
- Систематический обзор (2018): ашваганда снижает кортизол на 23–30% у пациентов с хроническим стрессом.

## Лайфхак для пользователя (Nutrition Tip)

> 🛡️ **Адаптогены — «вакцины от стресса».** Ключевое: не отсутствие реакции на стресс, а скорость восстановления. Три правила: (1) сначала определите состояние (высокий или низкий кортизол?), (2) выберите тип (стимулятор/седатив/универсальный), (3) не бойтесь ротации и активационной терапии. Если не знаете, с чего начать — родиола розовая. Не сочетайте стимулирующие адаптогены вечером — гарантированная бессонница.

`# Гинкго билоба (Ginkgo biloba)

**Категория:** БАД / Ноотроп / Вазоактивное  
**Тип:** Реликтовое растение (Ginkgopsida)  
**Основное действующее вещество:** Гинкголиды A/B/C (битерпены, 5–10%), билобалид (сесквитерпен, 2–5%), флавоноидные гликозиды (кверцетин, кемпферол, изорамнетин — 22–27%), проантоцианидины  
**Синонимы:** Ginkgo biloba, гинкго двулопастной, «живое ископаемое», EGb 761 (стандартизированный экстракт), Ginkgo, Tanakan, Bilobil, Мемоплант

## Что это такое

Гинкго билоба — уникальное реликтовое дерево, существующее более 200 млн лет. Стандартизированный экстракт листьев гинкго (EGb 761) — один из наиболее изученных фитопрепаратов в мире (более 800 РКИ, 40+ мета-анализов). EGb 761 содержит 22–27% флавоноидных гликозидов и 5–7% терпеновых лактонов (гинкголиды A/B/C, билобалид). Основное действие: улучшение мозгового кровообращения, нейропротекция, ноотропное (память, фокус), антиоксидантное, антиагрегантное. Применяется при когнитивных нарушениях (возрастных, сосудистых), деменции, тиннитусе, головокружении, тревоге, нейропатии.

## Внешний вид

Листья — вееровидные, двулопастные, зелёные (летом) / жёлтые (осенью). Экстракт (EGb 761) — жёлто-коричневый порошок, горький вкус. Капсулы/таблетки — стандартизированный экстракт (40–120 мг EGb 761). Жидкий экстракт — коричневая жидкость.

## Метаболический цикл

- **Всасывание:** флавоноидные гликозиды — гидролиз β-глюкозидазой микробиоты до агликонов в толстой кишке, затем пассивная диффузия. Гинкголиды A/B/C — быстрое всасывание в тонкой кишке (пассивная диффузия), Cmax через 1–2 ч. Билобалид — всасывание через 1–2 ч. Биодоступность гинкголидов 60–80%, билобалида 70–90%.
- **Метаболизм:** гинкголиды — минимальный метаболизм (выводятся в неизменённом виде). Билобалид — гидроксилирование (CYP3A4, CYP2C9). Флавоноиды — глюкуронирование (UGT1A1, UGT1A9) и сульфатирование в печени и энтероцитах. Деметилирование (COMT).
- **Распределение:** гинкголиды — Vd ~1–2 л/кг, связь с белками 50–60%. Проникновение через ГЭБ: гинкголид B — 30–40%, билобалид — 50–60%, флавоноиды — <5% (метаболиты — до 10%). Накопление в мозге (гинкголид B — в 2–3 раза выше плазменного).
- **Выведение:** T½ гинкголидов A/B 3–5 ч, гинкголида C 6–8 ч, билобалида 4–6 ч. Преимущественно почками (60–80% в неизменённом виде — гинкголиды), с калом (15–25%).
- **Особенность:** гинкголиды — уникальные антагонисты PAF (фактора активации тромбоцитов). Билобалид — нейропротектор через ГЭБ (накопление в мозге). Стандартизация EGb 761 критична — не все экстракты равноценны.

## Механизмы действия

- **Антагонист PAF** — гинкголиды A/B/C блокируют PAF-рецепторы (антиагрегантное, противовоспалительное)
- **Улучшение мозгового кровотока** — вазодилатация (эндотелий-зависимая, NO-опосредованная)
- **Антиоксидантное** — флавоноиды (нейтрализация ROS, хелатирование Fe²⁺/Cu²⁺)
- **Нейропротекторное** — защита митохондрий, снижение апоптоза нейронов
- **Повышение ацетилхолина** — ингибирование AChE (частично, 10–20%)
- **Повышение дофамина и серотонина** — модуляция нейротрансмиссии
- **Улучшение микроциркуляции** — снижение вязкости крови, улучшение деформируемости эритроцитов
- **Снижение кортизола** — модуляция HPA-оси (через GABA-ергические механизмы)
- **Противовоспалительное** — ингибирование NF-κB, снижение IL-6, TNF-α
- **Улучшение памяти** — нейрогенез гиппокампа, повышение BDNF

`# Готу кола (Centella asiatica, Gotu Kola)

**Категория:** БАД / Ноотроп / Адаптоген  
**Тип:** Растение (Apiaceae) / Венопротекторное / Когнитивное  
**Основное действующее вещество:** Тритерпеновые сапонины (азиатикозид 30–40%, мадекассозид 20–30%, азиатиковая кислота, мадекассиковая кислота)  
**Синонимы:** Centella asiatica, gotu kola, центелла азиатская, готу кола, «тигровая трава», индийский щитолистник, брахми (в аюрведе — смешивают с бакопой)

## Что это такое

Готу кола (Centella asiatica) — многолетнее травянистое растение семейства Apiaceae, произрастающее в тропических и субтропических регионах Азии (Индия, Шри-Ланка, Индонезия, Китай). Одно из важнейших растений аюрведы (используется более 2000 лет как «трава памяти»). Содержит уникальные тритерпеновые сапонины (азиатикозид, мадекассозид) с ноотропным, анксиолитическим, венопротекторным, противовоспалительным и ранозаживляющим действием. Основное применение: когнитивные нарушения (улучшение памяти, фокус), тревога, хроническая венозная недостаточность, заживление ран и рубцов.

## Внешний вид

Листья — зелёные, почковидные/щитовидные, с пальчатым жилкованием, на длинных черешках. Порошок — зелёный. Капсулы/таблетки — стандартизированный экстракт (азиатикозид 8–20%, тритерпены 40–80%). Крем/мазь — для местного применения. Жидкий экстракт — коричнево-зелёная жидкость.

## Метаболический цикл

- **Всасывание:** тритерпеновые сапонины (азиатикозид, мадекассозид) всасываются в тонкой кишке (пассивная диффузия, липофильны). Биодоступность — 20–35% (частичное расщепление ферментами ЖКТ). Cmax азиатикозида через 1–2 ч, мадекассозида через 2–3 ч. Фосфатидилхолиновая форма повышает биодоступность в 2–3 раза.
- **Метаболизм:** азиатикозид → азиатиковая кислота (гидролиз C6H12O6). Мадекассозид → мадекассиковая кислота. Далее — CYP-опосредованное окисление (CYP3A4, CYP2C9) и конъюгация с глюкуронидом (UGT1A1, UGT1A9). Основные метаболиты — азиатиковая и мадекассиковая кислоты (более стабильны, чем сапонины).
- **Распределение:** Vd ~1–2 л/кг. Связывание с альбумином 70–80%. Азиатикозид проникает через ГЭБ (30–40% от плазменного уровня) — накопление в гиппокампе и коре. Мадекассозид — в соединительной ткани, сосудистой стенке.
- **Выведение:** T½ азиатикозида 4–6 ч, мадекассозида 6–8 ч. Преимущественно с калом (50–60%) и с мочой (30–40%).
- **Особенность:** курсовой приём (4–8 недель) обязателен для накопления гликозидов в ЦНС. Для ноотропного эффекта — высокая доза (500–1000 мг/день), для венопротекторного — средняя (200–400 мг/день).

## Механизмы действия

- **Повышение BDNF** — нейропластичность, нейрогенез в гиппокампе
- **Антиоксидантное** — нейтрализация ROS, повышение глутатиона (азиатикозид)
- **Анксиолитическое** — модуляция GABA-ергической системы (не бензодиазепиновый сайт)
- **Противовоспалительное** — ингибирование NF-κB, снижение TNF-α, IL-6, IL-1β
- **Улучшение памяти** — повышение ацетилхолина (ингибирование AChE, частично)
- **Венопротекторное** — укрепление сосудистой стенки, снижение проницаемости капилляров
- **Стимуляция синтеза коллагена** — фибробласты → заживление ран, рубцы
- **Улучшение микроциркуляции** — эндотелий-зависимая вазодилатация
- **Снижение кортизола** — модуляция HPA-оси (через GABA)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Когнитивные нарушения (память, фокус) | 1A | Улучшение памяти (SMD +0.52, 95% CI 0.28-0.76) |
| Тревожность (лёгкая/умеренная) | 1B | Снижение тревоги (HAM-A −3.2 балла) |
| Хроническая венозная недостаточность | 1A | Снижение отёков, тяжести в ногах |
| Заживление ран (местно + внутрь) | 1A | Ускорение эпителизации на 30% |
| Рубцы (келоидные/гипертрофические) | 1A | снижение объёма рубцов на 40% |
| Утомляемость (умственная) | 1B | Повышение фокуса, снижение ментальной усталости |
| Стресс (хронический) | 1B | Снижение кортизола, улучшение адаптации |
| Возрастное когнитивное снижение | 2A | Профилактика нейродегенерации |

## Топ-5 продуктов, в которых содержится

Готу кола (Centella asiatica) — трава, экстракт. В смесях с бакопой (Bacopa monnieri) — «Брахми» в аюрведе. Кремы/мази (Madecassol, Centella asiatica extract — ранозаживляющие). Чай с готу кола. Свежие листья — в салатах (Юго-Восточная Азия).

## Особенности приёма

- **Стандартная дозировка:** 200–1000 мг/день (экстракт 40–80% тритерпенов), 2–6 г/день (порошок листьев)
- **Оптимальная:** 500–750 мг/день (2 приёма, утро + день, не вечером)
- **Форма:** капсулы/таблетки (экстракт), порошок, чай (2–4 г × 2 р/день), жидкий экстракт (1:2, 30–60 капель), крем/мазь (местно)
- **Начало действия:** 30–60 мин (субъективно), 4–8 недель (ноотропный эффект)
- **Курс:** 8–12 недель, перерыв 2 недели
- **Для памяти:** 500–750 мг/день утром + днём (не вечером — может тонизировать)
- **Для тревоги:** 400–600 мг/день в 2 приёма
- **Для вен:** 200–400 мг/день курсом 8 недель
- **Ограничение:** НЕ путать с бакопой (Bacopa monnieri) — оба называются «брахми», но разные растения

## Противопоказания

- Беременность (азиатикозид — утеротонический in vitro, клинически не подтверждён)
- Лактация (ограниченные данные)
- Заболевания печени (высокие дозы — риск гепатотоксичности, редкие случаи)
- Гипертония (очень высокие дозы >1000 мг/день могут повышать АД)
- Предоперационно (за 2 недели — потенцирование анестетиков)
- Аллергия на растения Apiaceae (сельдерей, петрушка, морковь)

## Форма приема и порядок

Капсулы (300–500 мг экстракта 40–80% тритерпенов 2 р/день), порошок (2–4 г × 2 р/день), чай (2–4 г × 2 р/день), жидкий экстракт (30–60 капель 2–3 р/день). Принимать утром и днём (не вечером — тонизирует). Для памяти — 500–750 мг/день курсом 8–12 недель. Для вен — 200–400 мг/день. Для заживления — крем местно + капсулы внутрь. Курс 8–12 недель. Перерыв 2 недели.

## Научные факты

- Мета-анализ (2021): готу кола (500–750 мг/день, 8–12 недель) достоверно улучшает когнитивные функции по шкале MMSE (+2.3 балла, SMD +0.52, 95% CI 0.28-0.76) у лиц с лёгкими когнитивными нарушениями (J Ethnopharmacol. 2021;271:113876).

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Готу кола — «тигровая трава» для мозга и сосудов.** Уникальность: одновременно ноотроп (BDNF, память), анксиолитик (GABA) и венопротектор (коллаген, капилляры). Главное правило: НЕ путать с бакопой — оба «брахми», но готу кола больше для сосудов/памяти, а бакопа для ацетилхолина/фокуса (лучшая комбинация — вместе). Дозировка для мозга: 500–750 мг/день (40–80% тритерпенов), 8–12 недель. Принимать утром/днём (не вечером — тонизирует). Для вен: 200–400 мг/день. Местно — крем для рубцов. Важно: курсовой приём обязателен (4–8 недель для накопления в ЦНС).

`# Хмель (Humulus lupulus, Hops)

**Категория:** БАД / Фитотерапия  
**Тип:** Седативное / Снотворное / Спазмолитическое  
**Основное действующее вещество:** Горькие кислоты (гумулон, лупулон 15–30%), эфирное масло (мирцен, β-кариофиллен, гумулен 1–3%), флавоноиды (ксантогумол, 8-пренилнарингенин — 8-PN), полифенолы  
**Синонимы:** Humulus lupulus, hops, хмель обыкновенный, хмелевые шишки, «пивной цвет», лупулин

## Что это такое

Хмель (Humulus lupulus) — многолетнее вьющееся растение семейства Cannabaceae. Женские соцветия (шишки хмеля) используются в пивоварении и медицине более 1000 лет. Главное седативное действие обусловлено флавонoidом 8-пренилнарингенином (8-PN) — фитоэстрогеном и агонистом GABA-A рецепторов. Комиссия E и ESCOP признают хмель при беспокойстве, тревожности и нарушениях сна. Ключевое преимущество — синергия с валерианой (классическая комбинация). Флавоноиды хмеля (ксантогумол, 8-PN) также обладают противовоспалительным, антиоксидантным и метаболическим действием.

## Внешний вид

Шишки хмеля — жёлто-зелёные, яйцевидные, с чешуйками и жёлтым порошком (лупулин — железистые волоски). Порошок — жёлто-коричневый, с сильным характерным горьким запахом. Капсулы/таблетки — стандартизированный экстракт (8-PN 0.1–2%, горькие кислоты 10–20%). Чай — шишки хмеля (отвар).

## Метаболический цикл

- **Всасывание:** 8-PN (ключевое седативное соединение) всасывается в тонкой кишке (пассивная диффузия, липофилен). Cmax 8-PN через 1–3 ч. Биодоступность 30–50% (частичное глюкуронирование в энтероцитах). Ксантогумол — Cmax через 1.5 ч, биодоступность <20% (интенсивный метаболизм).
- **Метаболизм:** 8-PN — глюкуронирование/сульфатирование в печени (UGT1A1, UGT1A9, UGT2B7) и энтероцитах. Ксантогумол — метилирование (COMT), восстановление, глюкуронирование. Горькие кислоты (гумулон, лупулон) — CYP2C9, CYP3A4. Кишечно-печёночная рециркуляция.
- **Распределение:** 8-PN — Vd ~2–3 л/кг, связь с альбумином 90%. Ксантогумол — связывание с альбумином 85%. 8-PN проникает через ГЭБ (15–20% от плазменного). Ксантогумол — накопление в простате и молочной железе.
- **Выведение:** T½ 8-PN 4–6 ч, ксантогумола 2–4 ч. Преимущественно с калом (60–70%) и с мочой (20–30%).
- **Особенность:** 8-PN — фитоэстроген с селективностью к ERβ (в 10 раз выше, чем к ERα). Это объясняет как седативное, так и гормон-модулирующее действие. Пивоваренный хмель теряет часть 8-PN при обработке.

## Механизмы действия

- **Агонист GABA-A рецептора** — 8-PN связывается с бензодиазепиновым сайтом (независимо от валерианы)
- **Агонист мелатониновых рецепторов MT1/MT2** — 8-PN (прямое действие на циркадный ритм)
- **Фитоэстроген** — селективный агонист ERβ (не ERα) — модуляция гормонального фона
- **Противовоспалительное** — ингибирование NF-κB, ЦОГ-2 (ксантогумол)
- **Антиоксидантное** — нейтрализация ROS (полифенолы, горькие кислоты)
- **Снижение кортизола** — модуляция HPA-оси
- **Спазмолитическое** — расслабление гладкой мускулатуры
- **Антимикробное** — горькие кислоты (гумулон, лупулон) против Грам+ бактерий
- **Метаболическое** — улучшение чувствительности к инсулину (ксантогумол)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Бессонница (засыпание) | 1A | Улучшение засыпания (синергия с валерианой) |
| Беспокойство (нервное возбуждение) | 1A | Седация без снотворного эффекта |
| Тревожность (лёгкая) | 1B | Снижение тревоги |
| Климактерические симптомы (приливы, тревога) | 1B | Снижение приливов на 30–40% (8-PN как фитоэстроген) |
| ПМС (раздражительность) | 2A | Снижение нервозности, улучшение сна |
| СРК (спастический) | 2A | Спазмолитическое + седативное |

## Топ-5 продуктов, в которых содержится

Хмель (шишки) — чай, экстракт, капсулы. Хмель в составе успокаивающих сборов (валериана + хмель + мелисса). Пиво (содержит ксантогумол, 8-PN — в следовых количествах, не терапевтических). Квас (нефильтрованный — шишки хмеля). Безалкогольное пиво (содержит ксантогумол, следы 8-PN).

## Особенности приёма

- **Стандартная дозировка:** 300–600 мг/день (экстракт 1–2% 8-PN), 1–3 г/день (шишки, отвар)
- **Оптимальная:** 300–500 мг экстракта за 30–60 мин до сна (или 2 р/день — утро/вечер)
- **Форма:** чай (1–2 г шишек на 200 мл, отвар 10–15 мин, 2–3 р/день), капсулы (экстракт), настойка (1:5, 30–60 капель)
- **Начало действия:** 30–60 мин (субъективно), 3–7 дней (курсовой эффект)

- **Для сна:** комбинация с валерианой (классика) — 300 мг хмеля + 500 мг валерианы
- **Для климакса:** 300–500 мг/день экстракта (8-PN 0.5–2%) — длительно (8–12 недель)
- **Особенность:** хмель ЧУВСТВИТЕЛЕН к нагреву — отвар не кипятить, настаивать при 80–90°C

## Противопоказания

- Беременность (фитоэстроген — теоретический риск)
- Лактация (ограниченные данные)
- Эстроген-зависимые опухоли (8-PN — ERβ агонист, но данные противоречивы — консультация онколога)
- Депрессия (большие дозы могут усиливать — есть редкие сообщения)
- Седативные/снотворные препараты (суммация)
- Аллергия на растения Cannabaceae

## Форма приема и порядок

Чай/отвар (1–2 г шишек на 200 мл, залить 80–90°C, 10–15 мин, 2–3 р/день), капсулы (300–500 мг экстракта 1–2% 8-PN), настойка (30–60 капель 2–3 р/день). Для сна — за 30–60 мин до сна. Для сна — обязательно с валерианой (синергия). Для климакса — курсом 8–12 недель. Для тревоги — 2 р/день (утро + вечер). Курс 4–8 недель.

`# L-теанин (L-Theanine)

**Категория:** БАД / Аминокислота  
**Тип:** Аналог глутамина (чайная аминокислота)  
**Основное действующее вещество:** γ-глутамилэтиламид (L-Теанин)

## Что это такое

L-теанин — уникальная аминокислота, содержащаяся преимущественно в листьях зелёного чая (Camellia sinensis). Составляет 50–60% всех аминокислот чая. В отличие от кофеина (тоже есть в чае, но в меньшем количестве), теанин оказывает расслабляющее действие без седации — «спокойное бодрствование» (alpha-wave induction). Может давать как тонизирующий (утром), так и расслабляющий (вечером) эффект в зависимости от времени приёма.

Белый кристаллический порошок, характерный сладковатый вкус с оттенком умами (глутаматный вкус); капсулы — белые желатиновые с белым порошком

- **Всасывание:** активный транспорт в тонком кишечнике через натрий-зависимые транспортеры аминокислот (B⁰AT1, SLC6A19). Максимум в плазме через 30–60 мин. Конкуренция с другими аминокислотами (ВСАА, тирозин) за транспорт.
- **Метаболизм:** первичное прохождение через печень (частично). L-теанин метаболизируется до глутаминовой кислоты и этиламина.
- **Распределение:** преодоление ГЭБ через LAT1 (транспортер больших нейтральных аминокислот) — конкуренция с ВСАА определяет скорость поступления в мозг.
- **Выведение:** почечная экскреция (канальцевая реабсорбция — 95%).
- **Особенность:** углеводный перекус перед приёмом повышает транспорт в мозг (инсулин → снижение ВСАА).

## Механизмы действия

- **Модуляция нейромедиаторов** — повышение GABA, серотонина и дофамина
- **Стимуляция альфа-волн мозга** — состояние «спокойного бодрствования» (на ЭЭГ)
- **Антагонист NMDA-рецептора** — снижение избыточного возбуждения (глутамат)
- **Повышение BDNF** — нейропротекция, нейропластичность
- **Снижение кортизола** — модуляция стрессового ответа

- **Улучшение когниций** — фокус + расслабление (без седации)

| Когнитивные нарушения (фокус/внимание) | 1B | Улучшение концентрации |
| СДВГ (в комплексной) | 2A | Улучшение внимания + снижение возбудимости |
| Постковидный синдром (нейровоспаление) | 2B | Нейропротекция, BDNF |

Зелёный чай (Matcha — в 3–5 раз больше теанина, чем обычный зелёный чай), зелёный чай (Gyokuro, Sencha — японские сорта), белый чай, улун, чёрный чай (меньше — из-за ферментации)

`# Магний глицинат (Magnesium Glycinate)

**Категория:** БАД / Минерал  
**Тип:** Хелатная форма магния (Mg + глицин)  
**Основное действующее вещество:** Магния бисглицинат (Mg + 2 молекулы глицина)  
**Синонимы:** Magnesium glycinate, магний бисглицинат, магний хелатный (глицинат), Mg-глицинат  

## Что это такое

Магний глицинат — хелатная форма магния, связанная с аминокислотой глицином. Считается наиболее биодоступной и хорошо переносимой формой магния. Глицин (аминокислота с собственным седативным эффектом) усиливает успокаивающее действие магния. Магний глицинат — препарат выбора при тревожности, бессоннице, стрессе, мышечных спазмах и дефиците магния. Дозировка в пересчёте на элементарный магний: 400–1200 мг/день.

## Внешний вид

Белый кристаллический порошок, без запаха; капсулы — белые/прозрачные с белым порошком внутри; таблетки — белые

## Метаболический цикл

- **Диссоциация:** в желудке хелат Mg-глицин распадается под действием HCl ↔ Mg²⁺ + глицин (pH-зависимо, оптимум pH 2–4).
- **Всасывание:** Mg²⁺ — пассивный (парацеллюлярный) и активный (TRPM6/7) транспорт в тонкой кишке. Хелатная форма повышает абсорбцию на 20–30% (избегая конкурентных каналов). Глицин — через транспортеры GlyT1.
- **Распределение:** Mg²⁺ — 30–50% в костях, 60% внутриклеточно, <1% в плазме. Транспорт через ГЭБ — ограничен (через MagT1). Глицин — системно, через ГЭБ.
- **Выведение:** Mg²⁺ — почки (фильтрация, 70–80% реабсорбируется в петле Генле), 3–5% кал. Глицин — почечный порог (канальцевая реабсорбция).
- **Особенность:** хелатная форма минимизирует слабительный эффект (не создаёт осмотического градиента в толстой кишке).

## Механизмы действия

- **Антагонист NMDA-рецептора** — блокирует избыточное возбуждение (Mg²⁺)
- **Агонист GABA-A рецептора** — потенцирует тормозные сигналы
- **Блокада адреналиновых рецепторов** — снижение действия адреналина и норадреналина
- **Снижение уровня кортизола** — нормализация стрессового ответа
- **Глицин** — дополнительный седативный эффект (ГАМК-ергическое действие)
- **Регуляция кальциевых каналов** — предотвращение избыточного входа Ca²⁺ в клетку
- **Миорелаксант** — снижение нервно-мышечной возбудимости
- **Участие в синтезе нейромедиаторов** — серотонин, дофамин

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Тревожность, стресс | 1A | Доказанный anxiolytic эффект |
| Бессонница | 1B | Улучшение засыпания, качества сна |
| Дефицит магния | 1A | Восполнение + лучшая переносимость |
| Мышечные спазмы/судороги | 1A | Миорелаксация |
| Панические атаки (в комплексной) | 2A | Снижение реактивности |
| Синдром хронической усталости | 2A | Энергетический метаболизм |
| Мигрень (профилактика) | 1B | Снижение частоты приступов |
| СДВГ (в комплексной) | 2A | Улучшение концентрации + сна |

## Топ-5 продуктов, в которых содержится

Не содержится в продуктах в виде глицината (это хелатная форма). Пищевые источники магния: тыквенные семечки (рекордсмен), миндаль, шпинат, кешью, тёмный шоколад (≥75%). Источники глицина: костный бульон, желатин, холодец, куриная кожа, бобовые

## Особенности приёма

- **Дозировка:** 400–1200 мг/день (в пересчёте на элементарный магний)
- **Стандартная:** 200–400 мг × 2 р/день (утро/вечер) или 400–800 мг на ночь
- **Биодоступность:** 30–40% (лучшая среди всех форм магния)
- **Переносимость:** не слабит в отличие от цитрата/оксида
- **Курс:** 8–12 недель (длительно, с контролем уровня Mg)
- **Время:** вечер/на ночь (седативный эффект)
- **При тонизирующем эффекте глицина:** возможен дефицит цинка или нарушение метилирования

## Противопоказания

- Тяжёлая почечная недостаточность (клиренс креатинина < 30 мл/мин)
- Миастения
- Атриовентрикулярная блокада
- Оксалаты в моче (высокие дозы глицина — с осторожностью)

## Форма приема и порядок

Капсулы/таблетки (400–1200 мг/день элементарного Mg). Принимать вечером за 30–60 мин до сна. Возможен приём 2 раза в день (утро + вечер) при выраженной тревожности. Курс: 8–12 недель. При тонизирующем эффекте — проверить Zn, метилирование, заменить на магний цитрат или малат. Не требует запивания большим количеством воды (в отличие от цитрата).

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин B6 | Кофактор всасывания Mg + синтез GABA |
| +++ | Таурин | Синергия кардио- и нейропротекции |
| ++ | Валериана | Усиление седативного (Mg + GABA + валереновая кислота) |
| ++ | L-теанин | Синергия расслабления (разные механизмы) |
| + | Цинк | Кофактор для GABA-ергической системы |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Фитиновая кислота (злаки, бобовые) | Снижает всасывание Mg |
| ++ | Кальций (высокие дозы) | Конкуренция за всасывание |
| ++ | Алкоголь | Увеличивает экскрецию Mg |
| + | Диуретики (тиазидные) | Увеличивают потерю Mg с мочой |
| + | ИПП (длительно) | Снижают всасывание Mg |

## Научные факты

- Мета-анализ (2017): магний достоверно снижает субъективный уровень стресса и тревоги (шкала DASS −1.3 балла, p<0.01).
- РКИ (2019): магний глицинат (500 мг/день) улучшает засыпание на 17 мин (p=0.02) и снижает кортизол утром на 15%.
- Мета-анализ (2020): магний снижает частоту мигреней на 25% (500 мг/день магния цитрата/глицината).

## Лайфхак для пользователя (Nutrition Tip)

> 💜 **Магний глицинат — «антистресс-форма» магния.** В отличие от цитрата (слабит) и оксида (слабая биодоступность), глицинат — лучший выбор для нервной системы. Глицин в составе усиливает седативный эффект. Доза: 400–800 мг на ночь. Если глицин бодрит (редко) — заменить на магний цитрат или малат. Курс 8–12 недель. Не сочетать с фитиновой кислотой (злаки, бобы).

## Ссылки

1. Boyle NB, et al. The effects of magnesium supplementation on subjective anxiety and stress—a systematic review. Nutrients. 2017;9(5):429.
2. Mah JG, et al. The effect of magnesium supplementation on sleep quality: a systematic review and meta-analysis. J Sleep Res. 2021;30(5):e13346.
3. Held K, et al. Oral Mg supplementation reverses age-related neuroendocrine and sleep changes. J Clin Endocrinol Metab. 2002;87(12):5335-5339.

`# Мелатонин (Melatonin)

**Категория:** БАД / Гормон / Регулятор сна  
**Тип:** Нейрогормон эпифиза  
**Основное действующее вещество:** N-ацетил-5-метокситриптамин  
**Синонимы:** Melatonin, мелатонин, 5-метокси-N-ацетилтриптамин, гормон сна  

## Что это такое

Мелатонин — эндогенный гормон эпифиза (шишковидной железы), регулирующий циркадные ритмы и цикл «сон-бодрствование». Синтезируется из серотонина в тёмное время суток (пик 02:00–04:00). В виде БАД используется для коррекции нарушений сна, джетлага, сменной работы и циркадных дисритмий. Кроме регуляции сна, обладает противовоспалительным, антиоксидантным, иммуномодулирующим и гормоностабилизирующим действием. С возрастом (после 40 лет) продукция мелатонина снижается.

## Внешний вид

Таблетки/капсулы от белого до светло-жёлтого цвета, капли (жидкий раствор), жевательные таблетки, спрей (сублингвальный). Биодоступность: сублингвальный/жидкий > капсулы > таблетки

## Метаболический цикл

- **Синтез (эндогенный):** триптофан → 5-HTP → серотонин → N-ацетилсеротонин → мелатонин (фермент AANAT — лимитирующая стадия). Пик синтеза 02:00–04:00 в эпифизе. Свет подавляет AANAT → снижение мелатонина.
- **Всасывание (экзогенный):** быстрое всасывание в ЖКТ, Cmax через 30–60 мин. Сублингвальная форма — биодоступность выше на 30–40%.
- **Метаболизм:** печень (CYP1A2) → 6-гидроксимелатонин → конъюгация с сульфатом/глюкуронидом.
- **Распределение:** Vd ~1 л/кг, связь с альбумином 70%. Не накапливается в тканях.
- **Выведение:** T½ 30–60 мин. Почки (90% как 6-сульфатоксимелатонин).
- **Особенность:** быстрый клиренс — короткое окно действия (4–6 ч). Пролонгированные формы замедляют высвобождение.

## Механизмы действия

- **Агонист MT1/MT2 рецепторов** — ядра супрахиазматического ядра → циркадная регуляция
- **Снижение латентного периода сна** — ускорение засыпания
- **Улучшение качества сна** — увеличение медленноволновых стадий
- **Синхронизация циркадных ритмов** — подстройка под световой режим
- **Регуляция иммунного ответа** — снижение воспалительных цитокинов
- **Антиоксидантное** — прямая нейтрализация свободных радикалов
- **Гормональная регуляция** — модуляция гонадотропинов (лютеинизирующий/фолликулостимулирующий)
- **Снижение кортизола** — нормализация стрессового ответа (высокие дозы)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Бессонница (засыпание) | 1A | Сокращение времени засыпания на 10–20 мин |
| Джетлаг (смена часовых поясов) | 1A | Ускорение адаптации |
| Сменная работа | 1B | Улучшение дневного сна |
| Циркадные нарушения (слепота, задержка фазы сна) | 1A | Синхронизация |
| Противовоспалительное (как дополнение) | 2A | Снижение CRP, IL-6 |
| Нейропротекция | 2A | Антиоксидантная защита мозга |
| Мигрень (профилактика) | 1B | Снижение частоты приступов |
| Возрастное снижение мелатонина | 1B | Восстановление цикла |
| Герпес/опоясывающий лишай (в комплексной) | 2B | Иммуномодуляция |

## Топ-5 продуктов, в которых содержится

Не содержится в значимых количествах в продуктах (гормон эндогенный). Пищевые источники триптофана (предшественник мелатонина): вишня (особенно терпкая — Montmorency — содержит натуральный мелатонин), грецкие орехи, миндаль, бананы, овёс. Продукты, богатые триптофаном (→ серотонин → мелатонин): индейка, яйца, молоко, сыр, семена тыквы

## Особенности приёма

- **Стандартная дозировка:** 0.5–5 мг за 30–60 мин до сна
- **Оптимальная:** 0.5–1 мг (низкие дозы = физиологические)
- **Высокие дозы (> 5 мг):** только под контролем врача (могут вызывать сонливость днём, головную боль)
- **Форма:** быстродействующая (засыпание), пролонгированная (поддержание сна)
- **Курс:** 4–8 недель (с перерывом). Не дольше 13 недель непрерывно
- **Важно:** не является снотворным — только «сигнал» ко сну
- **Сублингвальная форма:** быстрее, выше биодоступность
- **Дети:** с осторожностью (только под контролем педиатра, при подтверждённом дефиците)

## Противопоказания

- Аутоиммунные заболевания (активная фаза — мелатонин стимулирует иммунитет)
- Беременность, лактация
- Эпилепсия (с осторожностью)
- Депрессия (может усиливать)
- Лейкемия/лимфома (теоретический риск)
- Дети до 3 лет (без назначения врача)

## Форма приема и порядок

Таблетки/капсулы (быстродействующие или пролонгированные), капли, спрей сублингвальный. Принимать за 30–60 мин до сна. Начинать с минимальной дозы (0.5–1 мг), при необходимости увеличивать до 3–5 мг. Не принимать натощак (лучше после ужина). Избегать яркого света и синих экранов после приёма. Курс: 4–8 недель, перерыв 1–2 недели.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Валериана | Синергия засыпания (разные механизмы) |
| +++ | Магний глицинат | Усиление расслабления + регуляция сна |
| ++ | L-теанин | Дополнение при тревожном сне |
| ++ | Витамин B6 | Кофактор синтеза мелатонина (из триптофана) |
| + | Цинк | Кофактор синтеза мелатонина |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Яркий свет/синий спектр (экраны) | Подавляют эндогенный синтез мелатонина |
| +++ | Алкоголь | Снижает эффективность мелатонина |
| ++ | Кофеин | Антагонист (блокирует аденозиновые рецепторы) |
| ++ | Бета-блокаторы | Снижают эндогенную продукцию мелатонина |
| ++ | НПВС (ибупрофен, аспирин) | Подавляют синтез эндогенного мелатонина |

## Научные факты

- Мета-анализ (2021): мелатонин сокращает время засыпания на 12 мин (p<0.001) и улучшает качество сна (PSQI −1.1 балла).
- Мета-анализ (2020): мелатонин снижает уровень CRP на 25% (противовоспалительный эффект).
- РКИ (2019): низкие дозы мелатонина (0.5–1 мг) эффективнее высоких (5 мг) при возрастной бессоннице.
- Мета-анализ (2018): мелатонин безопасен при курсе до 13 недель (побочные эффекты сравнимые с плацебо).

## Лайфхак для пользователя (Nutrition Tip)

> 🌙 **Мелатонин — «сигнал» ко сну, а не снотворное.** Ключевое правило: низкие дозы (0.5–1 мг) = физиологические, высокие > 5 мг = фармакологические. Начинайте с 0.5–1 мг за 60 мин до сна. Выключайте яркий свет и экраны за 1–2 часа до приёма. Курс 4–8 недель, перерыв обязателен. Вишня и грецкие орехи — природные источники. Исключить при аутоиммунных в активной фазе.

`# Мелисса (Melissa officinalis, Lemon Balm)

**Категория:** БАД / Фитотерапия  
**Тип:** Седативное / Анксиолитическое / Спазмолитическое / Адаптоген  
**Основное действующее вещество:** Розмариновая кислота (3–6% сухой массы), эфирное масло (цитраль, цитронеллаль, β-кариофиллен), флавоноиды (лютеолин, апигенин), тритерпены (урсоловая, олеаноловая кислоты)  
**Синонимы:** Melissa officinalis, lemon balm, мелисса лимонная, лимонная мята, Mellisa (лат.), пчелиная трава, сердечная трава

## Что это такое

Мелисса (Melissa officinalis) — многолетнее травянистое растение семейства Lamiaceae (яснотковые). Одна из наиболее изученных лекарственных трав Европы и Ближнего Востока. Применяется более 2000 лет (Авиценна, Диоскорид, Парацельс) для успокоения нервов, улучшения сна и пищеварения. Содержит рекордное количество розмариновой кислоты среди всех растений (до 6% сухой массы). Основные эффекты: анксиолитическое, седативное, спазмолитическое, противовирусное (HSV-1), карминативное (ветрогонное), ноотропное (улучшение памяти), антиоксидантное.

## Внешний вид

Листья — зелёные, яйцевидные, с зазубренным краем, с характерным лимонным запахом (цитраль). Свежие — ярко-зелёные, мягкие. Сухие — тёмно-зелёные, ломкие. Порошок — зелёный. Капсулы/таблетки — стандартизированный экстракт (розмариновая кислота 5–15%). Чай — нарезанные листья с лимонным ароматом.

## Метаболический цикл

- **Всасывание:** розмариновая кислота (RA) — частичное всасывание в тонкой кишке (20–40%), большая часть достигает толстой кишки. Цитраль — быстрое всасывание (пассивная диффузия, липофилен), Cmax через 1–2 ч. Флавоноиды (лютеолин, апигенин) — глюкуронирование в энтероцитах, биодоступность <10%.
- **Метаболизм:** RA → ферментация микробиотой → кофейная и 3,4-дигидроксифенилмолочная кислоты → фенилпропионовые метаболиты. Цитраль → окисление до метаболитов (CYP2B6, CYP2C19). Лютеолин/апигенин → глюкуронирование/сульфатирование в печени (UGT1A1, UGT1A9). Кишечно-печёночная рециркуляция RA.
- **Распределение:** связывание с альбумином — RA 85%, цитраль 90%. RA-метаболиты — 10–15% через ГЭБ (достаточно для нейропротекции). Флавоноиды — накопление в печени и слизистой ЖКТ.
- **Выведение:** T½ RA 1–2 ч, цитраля 2–4 ч. Преимущественно с мочой (50–60% как конъюгаты) и калом (30–40%).
- **Особенность:** чайная форма мелиссы (водный настой) экстрагирует преимущественно гидрофильные флавоноиды и фенольные кислоты. Для системного анксиолитического/седативного эффекта — стандартизированный экстракт (5–15% RA) или сочетание с жирной пищей.

## Механизмы действия

- **Агонист GABA-A рецептора** — розмариновая кислота и флавоноиды (апигенин) связываются с бензодиазепиновым сайтом
- **Ингибирование ГАМК-трансаминазы** — повышение эндогенного GABA
- **Антиоксидантное** — RA (нейтрализация ROS, хелатирование Fe²⁺)
- **Противовоспалительное** — ингибирование NF-κB, ЦОГ-2, 5-ЛОГ (через RA)
- **Противовирусное** — ингибирование HSV-1 (цитраль, RA) — блокирует проникновение вируса
- **Спазмолитическое** — расслабление гладкой мускулатуры (через холинолитический и папавериноподобный механизмы)
- **Ноотропное** — улучшение памяти, повышение холинергической передачи
- **Тиреостатическое** — ингибирование TPO (снижение Т3/Т4 при гипертиреозе — in vitro)
- **Карминативное** — снижение газообразования, вздутия

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Тревожность (лёгкая/умеренная) | 1A | Снижение тревоги (HAM-A −4.5 балла) |
| Бессонница (засыпание) | 1A | Улучшение засыпания, качества сна |
| Стресс (хронический) | 1A | Снижение кортизола, субъективного стресса |
| Герпес (HSV-1, местно/внутрь) | 1A | Крем — сокращение заживления на 3–5 дней |
| СРК (синдром раздражённого кишечника) | 1B | Снижение боли, вздутия (спазмолитическое) |
| Когнитивные нарушения (память, фокус) | 1B | Улучшение памяти (высокие дозы RA) |
| Диспепсия (функциональная) | 1B | Снижение вздутия, тяжести |
| ПМС (раздражительность) | 2A | Снижение нервозности |
| Тиреотоксикоз (лёгкий — в комплексной) | 2B | Снижение Т3/Т4 (тиреостатическое) |

## Топ-5 продуктов, в которых содержится

Мелисса (свежие/сухие листья, чай) — основной источник. Розмарин, шалфей, мята перечная — содержат розмариновую кислоту, но в меньших количествах. Чай с мелиссой, лимонная вода со свежими листьями, экстракты в составе успокаивающих сборов (Нервофлукс, Персен). Эфирное масло мелиссы (Fales lemon balm oil — часто фальсифицируется лимонником/цитронеллой).

## Особенности приёма

- **Стандартная дозировка:** 300–900 мг/день (экстракт 5–15% RA), 2–6 г/день (сухие листья, чай)
- **Оптимальная:** 500–800 мг/день (экстракт) или 3–4 чашки чая (6–8 г листьев)
- **Форма:** чай (2–3 г листьев, 10–15 мин, 3 р/день), капсулы/таблетки (экстракт), настойка (1:5, 30–60 капель 3 р/день), свежие листья (5–10 листьев в чай/салат)
- **Начало действия:** 30–60 мин (чай), 1–2 недели (капсулы — курсовой эффект)
- **Курс:** 4–12 недель (безопасен длительно)
- **Для сна:** чай мелиссы + валериана (синергия) за 30–60 мин до сна
- **Для стресса:** 2–3 чашки чая в течение дня или экстракт 500 мг × 2 р/день
- **Для ЖКТ:** чай после еды или между едой
- **Особенность:** чайная форма — мягче, экстракт — сильнее. Не вызывает привыкания

## Противопоказания

- Гипотиреоз (тиреостатическое действие — ограничить высокие дозы)
- Беременность, лактация (чайные дозы — OK, высокие дозы экстракта — ограниченные данные)
- Глаукома (теоретический холинолитический эффект высоких доз)
- Аллергия на растения семейства Lamiaceae
- Приём седативных/снотворных (суммация — требуется коррекция дозы)

## Форма приема и порядок

Чай (2–3 г сухих листьев на 200 мл кипятка, 10–15 мин настаивания под крышкой, 3 р/день), капсулы (300–500 мг экстракта 5–15% RA, 1–2 р/день), настойка (1:5, 30–60 капель 3 р/день). Для стресса/тревоги — регулярный приём 2–3 р/день. Для сна — чай за 30–60 мин до сна (желательно с валерианой). Для ЖКТ — чай после еды. Для герпеса — крем с экстрактом мелиссы местно + чай внутрь. Курс 4–12 недель. Безопасна длительно.

## Научные факты

- Мета-анализ (2021): мелисса (500–800 мг/день, 4–8 недель) достоверно снижает тревогу по HAM-A на 4.5 балла (SMD −0.71, 95% CI −1.12 to −0.30) и улучшает сон (PSQI −2.1 балла) (Phytother Res. 2021;35(10):5423-5434).
- РКИ (2020): мелисса (600 мг/день, 15% RA, 8 недель) снижает кортизол слюны на 16% (p=0.02) и улучшает субъективный стресс (PSS-10, −4.2 балла, p=0.008) (Nutrients. 2020;12(3):723).

> 🌿 **Мелисса — «успокаивающий лимон» для нервов и живота.** Работает через 4 механизма: (1) GABA-ергическое (как валериана, но мягче), (2) снижение кортизола (−16%), (3) спазмолитическое (боль/вздутие), (4) противовирусное (герпес). Главные формы: свежие листья (в чай/салат — 5–10 листьев), чай (2 г × 3 р/день — золотой стандарт), экстракт (500 мг × 2 р/день — клинический эффект). Вечером — мелисса + валериана (за час до сна). При стрессе — 3 чашки в день течения. При герпесе — крем + чай внутрь. Безопасна длительно (до 12 недель и более). Не вызывает привыкания.

`# Миоинозитол (Myo-Inositol)

**Категория:** БАД / Витаминоподобное вещество  
**Тип:** Инозитол (циклический полиол, псевдовитамин группы B)  
**Основное действующее вещество:** Миоинозитол (цис-1,2,3,5-транс-4,6-циклогексангексол)  
**Синонимы:** Myo-inositol, инозитол, витамин B8, мезоинозитол, инозит  

## Что это такое

Миоинозитол — наиболее распространённый стереоизомер инозитола (из 9 возможных). Ранее известен как «витамин B8», хотя официально не признан витамином. Участвует в передаче сигнала инсулина (вторичные мессенджеры — фосфоинозитиды), метаболизме липидов и нейромедиации. В психиатрии и неврологии — модулятор серотониновых и ГАМК-рецепторов. Применяется при панических атаках, тревожности, стрессe, а также при СПКЯ (синдром поликистозных яичников), аменорее и других гормональных нарушениях. Не имеет прямого седативного эффекта — действует через нормализацию нейротрансмиссии.

## Внешний вид

Белый кристаллический порошок, сладковатый на вкус (около 50% сладости сахара), хорошо растворим в воде

## Метаболический цикл

- **Всасывание:** натрий-зависимый транспортер SMIT1/2 в тонком кишечнике (SLC5A3/SLC5A11). Cmax через 2–4 ч. Линейная кинетика до 12 г/день.
- **Распределение:** накапливается в тканях с высоким метаболизмом (мозг (5–10 мМ), печень, почки, яичники). Проникает через ГЭБ через SMIT1. Внутриклеточно — пул свободного инозитола и фосфоинозитидов (PI, PIP2, IP3).
- **Метаболизм:** изомеризация (мио- → D-хиро-инозитол) через эпимеразу (инсулин-зависимая). Включение в фосфоинозитидный цикл (IP3/DAG → сигнализация инсулина).
- **Выведение:** почки — фильтрация, канальцевая реабсорбция (порог ~0.3 ммоль/л). T½ 4–5 ч.
- **Особенность:** при СПКЯ — нарушение превращения мио → D-хиро-инозитол (снижена эпимеразная активность), поэтому требуется комбинация 40:1.

## Механизмы действия

- **Вторичный мессенджер** — участвует в сигнальном каскаде инсулина (IP3, DAG)
- **Повышение доступности серотонина** — модуляция 5-HT рецепторов
- **ГАМК-ергическое действие** — мягкая модуляция GABA-A рецепторов
- **Снижение тревожности** — уменьшение панических реакций
- **Снижение проявлений стресса** — без прямого седативного эффекта
- **Регуляция стероидогенеза** — влияние на гормональный фон
- **Улучшение чувствительности к инсулину** — основной механизм при СПКЯ
- **Липидный обмен** — снижение триглицеридов

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Панические атаки | 1B | Снижение частоты и интенсивности |
| Тревожность (генерализованная) | 1B | Мягкое anxiolytic действие |
| СПКЯ (синдром поликистозных яичников) | 1A | Восстановление овуляции, снижение инсулина |
| Метаболический синдром | 1B | Улучшение чувствительности к инсулину |
| Стресс (хронический) | 2A | Нормализация стрессового ответа |
| Аменорея/олигоменорея | 1B | Восстановление цикла |
| Депрессия (в комплексной) | 2A | Дополнение к основной терапии |
| Обсессивно-компульсивное расстройство | 2A | Снижение симптомов |

## Топ-5 продуктов, в которых содержится

Канталупа (дыня) — самый богатый источник, цитрусовые (апельсин, грейпфрут, лимон — мякоть и кожура), бобовые (нут, фасоль, чечевица), цельные злаки (овёс, пшеница, отруби), орехи (миндаль, грецкие), печень говяжья

## Особенности приёма

- **Стандартная дозировка:** 2000–4000 мг/день (разделить на 2 приёма)
- **При панических атаках:** до 12–18 г/день (под контролем врача)
- **При СПКЯ:** 4000 мг/день (в сочетании с D-хиро-инозитолом в соотношении 40:1)
- **Курс:** 8–12 недель (длительно при хронических состояниях)
- **Время:** любое (нет седативного эффекта)
- **Форма:** порошок (растворить в воде), капсулы (500–1000 мг)

## Противопоказания

- Индивидуальная непереносимость
- Беременность (безопасность не установлена — только по назначению врача)

## Форма приема и порядок

Порошок (растворить в воде, чае, смузи — 2000–4000 мг/день), капсулы (500–1000 мг × 2–3 р/день). Принимать независимо от еды. При панических атаках — до 12–18 г/день с постепенным повышением (под контролем). Можно в любое время. Курс: 8 недель и более. При СПКЯ — в комбинации с D-хиро-инозитолом.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | D-хиро-инозитол | Синергия при СПКЯ (соотношение 40:1 мио: DCI) |
| ++ | Магний глицинат | Синергия снижения тревожности |
| ++ | Витамин D | Синергия гормональной регуляции |
| + | Хром | Синергия чувствительности к инсулину |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Кофеин (высокие дозы) | Снижает уровень инозитола |
| ++ | Алкоголь | Снижает всасывание и утилизацию |
| + | Антибиотики (длительно) | Дисбиоз → снижение синтеза инозитола |

## Научные факты

- РКИ (2018): миоинозитол (12 г/день) снижает частоту панических атак на 50% через 8 недель (шкала PAS, p<0.01).
- Мета-анализ (2020): миоинозитол достоверно снижает уровень инсулина натощак и HOMA-IR при СПКЯ.
- Исследование (2019): миоинозитол + D-хиро-инозитол эффективнее метформина при СПКЯ (восстановление овуляции 65% vs 48%).

## Лайфхак для пользователя (Nutrition Tip)

> 🍈 **Миоинозитол — «успокаивающий без сонливости» для нервной системы и ключ для СПКЯ.** В отличие от валерианы и мелатонина, не вызывает сонливости — можно принимать в любое время. Идеален при панических атаках (до 12 г/день). Для СПКЯ — 4 г/день с D-хиро-инозитолом. Не имеет привыкания, можно длительно. Богатейший природный источник — дыня канталупа.

## Ссылки

1. Palatnik A, et al. Double-blind, controlled, crossover trial of inositol versus fluvoxamine for the treatment of panic disorder. J Clin Psychopharmacol. 2001;21(3):335-339.
2. Benjamin J, et al. Inositol in the treatment of psychiatric disorders: a systematic review. Eur Neuropsychopharmacol. 2012;22(1):12-22.
3. Galazis N, et al. Myo-inositol and D-chiro-inositol in polycystic ovary syndrome: a systematic review and meta-analysis. Gynecol Endocrinol. 2012;28(12):949-956.
4. Genazzani AD, et al. Myo-inositol and D-chiro-inositol in PCOS: a randomized controlled trial. Gynecol Endocrinol. 2018;34(8):669-673.
5. Mukai T, et al. Inositol and its derivatives in the management of metabolic syndrome: a systematic review. Nutrients. 2019;11(8):1798.

`# Триптофан (L-Tryptophan)

**Категория:** БАД / Незаменимая аминокислота  
**Тип:** Предшественник серотонина и мелатонина  
**Основное действующее вещество:** L-2-амино-3-(1H-индол-3-ил)пропановая кислота (L-Tryptophan)  
**Синонимы:** L-Tryptophan, L-триптофан, триптофан, 5-HTP (метаболит)

## Что это такое

L-триптофан — незаменимая аминокислота, которая не синтезируется в организме человека и должна поступать с пищей. Является предшественником серотонина («гормон счастья»), мелатонина (гормон сна) и ниацина (витамин B3). Метаболический каскад: триптофан → 5-HTP (5-гидрокситриптофан) → серотонин → мелатонин. Ключевая роль — регуляция настроения, сна и аппетита. В виде БАД используется для улучшения сна, настроения, снижения тревожности и контроля аппетита.

## Внешний вид

Белый или белый с желтоватым оттенком кристаллический порошок, без запаха, слабо горьковатый вкус. Капсулы/таблетки — белые, желатиновые или растительные.

## Метаболический цикл

- **Всасывание:** активный транспорт в тонком кишечнике через натрий-зависимые транспортеры аминокислот (B⁰AT1, SLC6A19). Максимум в плазме через 30–60 мин. Конкуренция с другими аминокислотами (ВСАА, тирозин) за транспорт.
- **Метаболизм:** первичное прохождение через печень (частично). триптофан метаболизируется до 5-HTP и кинуренина.
- **Распределение:** преодоление ГЭБ через LAT1 (транспортер больших нейтральных аминокислот) — конкуренция с ВСАА определяет скорость поступления в мозг.
- **Выведение:** почечная экскреция (канальцевая реабсорбция — 95%).
- **Особенность:** углеводный перекус перед приёмом повышает транспорт в мозг (инсулин → снижение ВСАА).

## Механизмы действия

- **Предшественник серотонина** — лимитирующая стадия синтеза серотонина в ЦНС
- **Предшественник мелатонина** — через серотонин → N-ацетилсеротонин → мелатонин
- **Снижение кортизола** — модуляция ГГН-оси, снижение стрессового ответа
- **Регуляция аппетита** — серотониновый контроль центров насыщения в гипоталамусе
- **Улучшение когниций** — через серотониновую нейротрансмиссию (настроение, память)
- **Синтез NAD+** — через кинурениновый путь → ниацин (витамин B3)
- **Иммуномодуляция** — регуляция Th1/Th2 через кинурениновый путь

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Бессонница (засыпание и качество сна) | 1A | Улучшение засыпания, увеличение общей продолжительности сна |
| Тревожность (лёгкая/умеренная) | 1B | Снижение тревоги (через серотонин) |
| Депрессия (лёгкая/умеренная, в комбинации) | 1B | Потенцирование антидепрессантов (СИОЗС) |
| ПМС (предменструальный синдром) | 1B | Снижение раздражительности, улучшение настроения |
| Контроль аппетита (переедание) | 2A | Снижение углеводной тяги, насыщение |
| Хронический стресс | 2A | Нормализация кортизола |
| Мигрень (профилактика) | 2B | Снижение частоты (через серотониновый путь) |

## Топ-5 продуктов, в которых содержится

Индейка (350 мг/100 г), курица (250 мг/100 г), лосось (250 мг/100 г), яйца (200 мг/100 г), семена тыквы (180 мг/100 г). Другие источники: твёрдый сыр (150 мг/100 г), овёс (120 мг/100 г), бананы (60 мг/100 г), молоко (40 мг/100 г), орехи (грецкие, миндаль).

## Особенности приёма

- **Стандартная дозировка:** 500–2000 мг/день
- **Оптимальная:** 500–1000 мг за 30–60 мин до сна (натощак или с лёгким углеводным перекусом)
- **Усиление всасывания:** приём с углеводами (инсулиновый ответ снижает конкуренцию с другими аминокислотами за транспорт через ГЭБ)
- **Улучшение транспорта в мозг:** углеводы → инсулин → снижение ВСАА в крови → больше триптофана в мозг
- **Комбинация с витамином B6:** кофактор превращения 5-HTP → серотонин
- **Начало действия:** 30–60 мин (субъективно), 1–2 недели для клинического эффекта
- **Курс:** 4–12 недель, перерыв 1–2 недели
- **Форма:** L-триптофан (не 5-HTP для длительного приёма — мягче, физиологичнее)
- **Отличие от 5-HTP:** 5-HTP — прямой метаболит, минует лимитирующую стадию, но имеет более узкое окно безопасности

## Противопоказания

- Совместный приём с СИОЗС/СИОЗСН/ИМАО (риск серотонинового синдрома — без контроля врача)
- Эозинофилия-миалгия синдром (крайне редко, описана при загрязнённом триптофане в 1989 г.)
- Беременность, лактация (ограниченные данные)
- Печёночная недостаточность (нарушение метаболизма триптофана)
- Склеродермия (теоретический риск — кинурениновый путь)

## Форма приема и порядок

Капсулы/таблетки (500–1000 мг), порошок (растворить в воде — горьковатый вкус). Принимать за 30–60 мин до сна, натощак или с лёгким углеводным перекусом (фрукт, крекер). Для улучшения сна — вечером. Для настроения — утром/днём (но может вызывать сонливость). Курс 4–12 недель, перерыв 1–2 недели. Важно: не сочетать с антидепрессантами без контроля врача.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин B6 | Кофактор: 5-HTP → серотонин (усиление эффекта триптофана) |
| +++ | Углеводы (приём вместе) | Инсулиновый ответ → транспорт триптофана в мозг |
| ++ | Магний глицинат | Усиление расслабления + серотониновый путь |
| ++ | Мелатонин | Синергия сна (триптофан → серотонин → мелатонин) |
| + | L-теанин | Дополнение GABA/серотонинового пути |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Высокобелковая пища (ВСАА) | Конкуренция за транспорт через ГЭБ (снижение доставки в мозг) |
| +++ | СИОЗС/СИОЗСН | Риск серотонинового синдрома (в комбинации — только под контролем врача) |
| ++ | Алкоголь | Снижает всасывание триптофана + нарушает метаболизм |
| ++ | Кофеин | Снижает серотониновый эффект (через аденозин) |
| + | Глюкокортикоиды | Усиление кинуренинового пути → снижение серотонина |

## Научные факты

- Мета-анализ (2021): L-триптофан (1 г/день) улучшает засыпание и увеличивает общую продолжительность сна у лиц с лёгкой бессонницей (Sleep Med Rev. 2021;57:101471).
- РКИ (2019): 500 мг L-триптофана вечером снижают тревогу и улучшают настроение на 15% (GDA-6 шкала) у здоровых добровольцев (Nutrients. 2019;11(9):2075).
- Мета-анализ (2018): добавление L-триптофана к антидепрессантам (СИОЗС) улучшает ответ на терапию на 23% у пациентов с БДР (J Affect Disord. 2018;237:79-87).
- РКИ (2016): приём углеводов + триптофан повышает транспорт триптофана в мозг на 40% по сравнению с приёмом натощак (Am J Clin Nutr. 2016;103(5):1228-34).
- Когортное исследование (2022): диета с высоким содержанием триптофана ассоциирована со снижением риска депрессии на 17% (OR 0.83, 95% CI 0.71-0.97) (BMC Psychiatry. 2022;22:369).

## Лайфхак для пользователя (Nutrition Tip)

> 🥜 **Триптофан — «сырьё» для серотонина и мелатонина.** Главный трюк: принимайте триптофан с углеводами (банан, крекер, хлебец), а не с белком. Инсулин открывает «зелёный свет» триптофану в мозг. Дозировка: 500–1000 мг за час до сна. Из еды — индейка, курица, яйца, семена тыквы. Не сочетать с антидепрессантами без врача. Витамин B6 — обязательный кофактор (проверьте уровень). Для курса до 12 недель — L-триптофан (не 5-HTP) безопаснее и физиологичнее.

## Ссылки

1. Sutanto CN, et al. The effect of L-tryptophan on sleep and mood: a systematic review and meta-analysis. Sleep Med Rev. 2021;57:101471.
2. Kikuchi AM, et al. Effects of L-tryptophan on sleep and mood in healthy adults: a randomized controlled trial. Nutrients. 2019;11(9):2075.
3. Ghadirivasfi M, et al. Efficacy of L-tryptophan augmentation in major depressive disorder: a systematic review and meta-analysis. J Affect Disord. 2018;237:79-87.
4. Fernstrom JD, et al. Utilization of amino acids for neurotransmitter synthesis: the tryptophan story. Am J Clin Nutr. 2016;103(5):1228-34.
5. Lindseth G, et al. The effects of dietary tryptophan on affective disorders. BMC Psychiatry. 2022;22:369.
6. Richard DM, et al. L-Tryptophan: basic metabolic functions, behavioral research and therapeutic indications. Int J Tryptophan Res. 2009;2:45-60.

`# Алоэ вера (Aloe vera, Aloe barbadensis)

**Категория:** Растительное средство  
**Тип:** Нутрицевтик / Заживление слизистых  
**Основная форма:** Сок алоэ вера (внутренний гель листа)  
**Синонимы:** Aloe vera gel, сок алоэ  

## Что это такое

Алоэ вера — суккулентное растение, внутренний гель листьев которого используется в гастроэнтерологии как противовоспалительное, заживляющее и слизистое средство. В паре с солодкой DGL — компонент выбора в острый период.

## Внешний вид

Мясистые сочные листья — зелёные с восковым налётом, шиповатые по краям; внутренняя часть — прозрачный гель (слизь)

## Метаболический цикл

- **Всасывание:** ацеманнан, антрахиноны и полисахариды алоэ всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня агликонов.

## Механизмы действия

- **Горечь** — стимулирует пищеварение и желчеотток
- **Слизеобразующее действие** — обволакивает и защищает слизистую
- **Противовоспалительное** — снижает воспаление на всём протяжении ЖКТ
- **Ускоряет заживление** — язв, эрозий
- **Угнетает рост H. pylori**
- **Нормализует стул** — работает с запорами
- **Нормализует кислотность** желудочного сока

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| ГЭРБ, рефлюкс-эзофагит | Смягчает и заживляет слизистую глотки и пищевода |
| Язвенная болезнь | Ускоряет заживление |
| Гастрит (гиперацидный) | Нормализует кислотность |
| Запоры | Улучшает перистальтику |
| Воспалительные заболевания ЖКТ | Снимает воспаление |
| Эрадикация H. pylori | Угнетает рост |

## Особенности приёма

- **Курсовой препарат** — не для постоянного применения
- **Сочетание с солодкой DGL** — оптимальная пара при необходимости заживить слизистую + снять воспаление
- **После приёма не пить и не есть 1 час** — чтобы сок алоэ остался на слизистой пищевода
- **Потенциальный побочный эффект:** изжога (из-за горечи) — начинать с малых доз

⚠️ **Важно:** это не домашнее растение на холодильнике, а специально приготовленная форма алоэ вера (внутренний гель листа, очищенный от алоина).

## Форма приема и порядок

Гель алоэ вера (напиток/сок), капсулы (гель — 500–2000 мг/день), листья свежие (для местного применения), крем/мазь. Форма: гель (внутренняя мякоть) — для ЖКТ; латекс (жёлтый сок под корой) — слабительное (не путать!). Курс: 4–8 недель

## Противопоказания

- Индивидуальная непереносимость
- Беременность (стимулирует перистальтику → риск гипертонуса матки)
- Кишечная непроходимость
- Воспалительные заболевания в острой фазе (обострение)


## Топ-5 продуктов, в которых содержится

Лист алоэ вера — мякоть (свежая, для смузи), сок/напиток алоэ вера (магазинный), желатин с алоэ, десерты с алоэ (кубики), салаты с алоэ (азиатская кухня)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Солодка DGL | Усиление заживления слизистой (гель + слизь) |
| ++ | L-глютамин | Синергия регенерации эпителия |
| ++ | Пробиотики | Пребиотическое действие алоэ (ацеманнан) + пробиотики |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |

| ++ | Антикоагулянты | Потенцирование (алоэ содержит антрахиноны) |
| ++ | Диуретики | Усиление потери калия (при приёме латекса алоэ) |
| + | ГКС | Суммирование гипокалиемии (латекс) |
| + | Слабительные | Суммирование слабительного эффекта (антрахиноны) |

## Лайфхак для пользователя (Nutrition Tip)

> 🌵 **Сок алоэ вера — первая помощь при ГЭРБ.** Пьёте, и час ничего не едите — сок остаётся на слизистой пищевода, заживляя её. Не путайте с домашним растением! Только очищенный гель алоэ вера. После приёма возможна изжога — начинайте с малых доз.
