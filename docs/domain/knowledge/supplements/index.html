`# Артишок (Artichoke, Cynara cardunculus / Cynara scolymus)

**Категория:** БАД / Желчегонное / Гепатопротектор  
**Тип:** Фитотерапия  
**Основное действующее вещество:** Цинарин, хлорогеновая кислота, лютеолин  
**Синонимы:** Cynara, артишок посевной, артишок испанский  

## Что это такое

Экстракт листьев артишока (Cynara scolymus) — одно из основных желчегонных и гепатопротекторных средств фитотерапии. Основные активные компоненты: цинарин (фенольное соединение), хлорогеновая кислота, флавоноиды (лютеолин). Традиционно используется при диспепсии, ДЖВП, поддержке печени.

## Внешний вид

Растение: соцветия (корзинки) — зелёные, чешуйчатые; съедобная часть — мясистое цветоложе и основания чешуй. Экстракт — коричневый порошок/таблетки

## Метаболический цикл

- **Всасывание:** цинарин, хлорогеновая кислота и лютеолин всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня агликонов.

## Механизмы действия

- **Желчегонное** — стимуляция секреции жёлчи гепатоцитами (цинарин)
- **Спазмолитическое** — расслабление сфинктера Одди
- **Гепатопротекторное** — антиоксидантная защита гепатоцитов
- **Гиполипидемическое** — снижение синтеза холестерина (ингибирование HMG-CoA редуктазы)
- **Противовоспалительное** — снижение IL-6, TNF-α (лютеолин)
- **Пребиотическое** — стимуляция роста бифидобактерий (инулин)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Функциональная диспепсия | 1А | Уменьшает боль, тяжесть, тошноту |
| Дискинезия жёлчевыводящих путей | 1B | Улучшает отток жёлчи |
| НАЖБП | 2A | Снижение стеатоза (в сочетании с диетой) |
| Гиперхолестеринемия | 1B | Снижает общий холестерин на 10–15% |
| СРК (с запорами) | 2B | Улучшение моторики (желчегонное) |
| Псориаз (в комплексной терапии) | 2B | Уменьшает кожные проявления |
| Детокс-поддержка печени | 2B | Защита от токсинов |

## Особенности приёма

- **Стандартизация:** минимум 2–5% цинарина
- **Дозировка:** 300–600 мг сухого экстракта (6:1) или 1–2 г листьев × 3 р/день
- **Форма:** таблетки, капсулы, настойка, чай
- **Приём:** 3 раза/день за 30 мин до еды (желчегонное действие)
- **Курс:** 4–8 недель

## Форма приема и порядок

Капсулы/таблетки (300–600 мг экстракта 6:1, стандартизация 2–5% цинарина), настойка, чай, кофе (с артишоком). Принимать за 30 мин до еды (желчегонное). Курс: 4–8 недель. Ротация каждые 2 мес.

## Противопоказания

- Желчнокаменная болезнь с обострением
- Острый холецистит
- Обтурация жёлчных протоков
- Тяжёлая печёночная недостаточность
- Аллергия на растения семейства сложноцветных
- Беременность (только по назначению врача)


## Топ-5 продуктов, в которых содержится

Соцветия артишока (свежие, консервированные, запечённые), чай из листьев артишока, кофе с экстрактом артишока, артишок в салатах (итальянская кухня), артишоковая паста (закуска)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Расторопша (силимарин) | Синергия гепатопротекции + желчегонное |
| ++ | Куркума | Усиление противовоспалительного и желчегонного |
| ++ | Одуванчик | Дополнительное желчегонное и гепатопротекторное |
| ++ | Пробиотики | Пребиотик (инулин артишока) → микробиом |
| ++ | Пищеварительные ферменты | Синергия переваривания жиров (желчь + липаза) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антикоагулянты (варфарин) | Возможно усиление эффекта (теоретически) |
| + | ИПП | Снижение pH-зависимого желчегонного эффекта |
| + | Желчегонные (другие) | Суммирование → риск дискинезии при камнях |

## Отличие от расторопши

| Свойство | Артишок | Расторопша |
|----------|---------|-------------|
| Основной механизм | Желчегонное | Мембраностабилизация |
| Основной компонент | Цинарин, хлорогеновая кислота | Силибин |
| Действие на стеатоз | +++ | ++ |
| Холестерин | Снижает | Слабо |
| Антидот при отравлениях | − | +++ (силибин) |

## Научные факты

- Мета-анализ (2021): артишок достоверно улучшает симптомы функциональной диспепсии (RR 1.89 по сравнению с плацебо).
- РКИ (2018): экстракт артишока (320 мг/день) снижает общий холестерин на 12% и ЛПНП на 15% через 12 недель.
- Исследование (2016): артишок + расторопша эффективнее монотерапии при НАЖБП (снижение АЛТ, АСТ на 30–40%).

## Лайфхак для пользователя (Nutrition Tip)

> 🥬 **Артишок — «желчегонный ключ».** Если у вас тяжесть после еды (особенно жирной), запоры, тошнота — попробуйте артишок за 30 мин до еды. Курс 4–8 недель. Работает синергично с расторопшей (печень+желчь). Не применять при камнях в жёлчном пузыре (только после УЗИ!).

## Ссылки

1. Bundy R, et al. Artichoke leaf extract (Cynara scolymus) reduces plasma cholesterol in otherwise healthy hypercholesterolemic adults: a randomized, double-blind placebo-controlled trial. Phytomedicine. 2008;15(9):668-675.
2. Holtmann G, et al. Efficacy of artichoke leaf extract in the treatment of patients with functional dyspepsia: a systematic review and meta-analysis. Aliment Pharmacol Ther. 2021;53(8):874-884.
3. Wider B, et al. Artichoke leaf extract for treating hypercholesterolaemia. Cochrane Database Syst Rev. 2009;(4):CD003396.
4. Salem MB, et al. Artichoke (Cynara scolymus) extract in nonalcoholic fatty liver disease: a randomized controlled trial. Eur J Gastroenterol Hepatol. 2016;28(8):931-937.

`# Шлемник байкальский (Scutellaria baicalensis)

**Категория:** Лекарственное растение  
**Тип:** Фитотерапия / Противовоспалительное / Антиполипозное  
**Основное действующее вещество:** Байкалин, вогонин, скутеллареин (флавоноиды)  
**Синонимы:** Baikal skullcap, Chinese skullcap, Huang Qin  

## Что это такое

Шлемник байкальский — многолетнее растение, произрастающее в Сибири и на Дальнем Востоке. В традиционной китайской медицине используется как противовоспалительное, противоаллергическое и противоопухолевое средство. Специфический интерес — профилактика полипоза ЖКТ.

## Внешний вид

Шлемник байкальский (Scutellaria baicalensis) — сухие корни желтовато-коричневого цвета; экстракт — коричневый порошок

## Метаболический цикл

- **Всасывание:** байкалин, вогонин и скутеллареин всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Байкалин деконъюгируется микробиотой до байкалеина (активная форма). Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня агликонов.

## Механизмы действия

- **Снижает уровень воспалительных цитокинов** — системное противовоспалительное действие
- **Снижает иммуноглобулин E (IgE)** — препятствует всасыванию аллергенов в кишечнике
- **Улучшает всасывание метильных форм B12 и B9** — особенно актуально при нарушении фолатного цикла
- **Препятствует разрастанию полипов** и перерождению полипов в злокачественные образования
- **Предотвращает рецидив полипов** после удаления
- **Не даёт опухоли «договориться» с микробиомом** для синтеза кобаламина (B12), необходимого для роста

## Показания (ЖКТ)

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Полипоз желудка/кишечника | Высокая | Предотвращает рост и рецидивы |
| Состояние после удаления полипов | Высокая | Профилактика рецидива |
| Аллергические реакции со стороны ЖКТ | Хорошая | Снижает IgE |
| Нарушение фолатного цикла / дефицит B12 | Умеренная | Улучшает всасывание метил-форм |
| Высокий уровень B12 (настороженность) | Профилактическая | Снижает риск опухолевой пролиферации |

## Особенности приёма

- **Форма:** чай (сборы алтайских трав), капсулы, экстракт
- **Дозировка:** по инструкции производителя
- **Курс:** 4–8 недель

## Форма приема и порядок

Капсулы/таблетки (250–500 мг, стандартизированные 50–90% байкалина), экстракт корня (порошок), настойка (1:5), чай (корень). Курс: 8–12 недель. Принимать с едой

## Противопоказания

- Индивидуальная непереносимость
- Беременность, лактация (недостаточно данных)


## Топ-5 продуктов, в которых содержится

Шлемник байкальский (Scutellaria baicalensis) — корень; не содержится в обычных продуктах питания. Является лекарственным растением китайской медицины (Huang Qin)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Куркумин | Синергия противовоспалительного (NF-κB + STAT3) |
| +++ | Кверцетин | Синергия противовоспалительного и антиоксидантного |
| +++ | Пробиотики | Байкалин метаболизируется микробиотой → байкалеин (активная форма) |
| ++ | Расторопша | Гепатопротекция (разные механизмы) |
| ++ | Берберин | Синергия антимикробного и метаболического действия |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антикоагулянты | Потенцирование (байкалеин ингибирует агрегацию тромбоцитов) |
| ++ | Иммуносупрессоры | Ослабление (шлемник стимулирует иммунитет) |
| + | Гепатотоксичные препараты | Снижение токсичности (гепатопротектор) |
| + | Седативные | Усиление (байкалеин — агонист GABA-A) |

## Ключевое предупреждение

При высоких дозах фолата и витамина B12 есть риск стимуляции роста полипов, если они уже есть. Шлемник Байкальский — агент, который препятствует разрастанию полипов и не даёт опухоли договориться с микробиомом для синтеза B12.

## Лайфхак для пользователя (Nutrition Tip)

> 🍵 **Шлемник байкальский — природный защитник от полипов.** Если у клиента есть полипы ЖКТ (или они были удалены), шлемник байкальский + чага — первая линия фитотерапии. Также полезен при высоком уровне B12 (риск опухолевой пролиферации). Можно приобрести в алтайских травяных сборах.

1. Li C, et al. Baicalin in gastrointestinal diseases: a review of current knowledge. J Ethnopharmacol. 2021;269:113688.
2. Zhang XW, et al. Scutellaria baicalensis and its constituents in colorectal cancer: a review. World J Gastroenterol. 2013;19(46):8600-8611.

`# Берберин (Berberine)

**Категория:** БАД / Алкалоид  
**Тип:** Изохинолиновый алкалоид  
**Основное действующее вещество:** Берберин хлорид  
**Синонимы:** Berberis vulgaris (барбарис), Coptis chinensis, Hydrastis canadensis  

## Что это такое

Берберин — природный алкалоид из корней и коры барбариса (Berberis vulgaris), коптиса китайского и гидрастиса канадского. Один из наиболее изученных природных соединений с антимикробным, противовоспалительным и метаболическим действием. По эффективности при метаболическом синдроме сопоставим с метформином.

## Внешний вид

Ярко-жёлтый кристаллический порошок (алкалоид) — окрашивает всё в жёлтый цвет; капсулы с жёлтым порошком

## Метаболический цикл

- **Всасывание:** крайне низкое (<5% в неизменённом виде). В тонкой кишке — через пассивную диффузию и активный транспорт (OCT/OCTN). Активный эффлюкс (P-gp, BCRP) ограничивает абсорбцию.
- **Метаболизм:** первичное восстановление дигидроберберина в печени (CYP2D6, CYP1A2, CYP3A4). Деметилирование. Далее глюкуронирование/сульфатирование. Кишечно-печёночная рециркуляция — активна в кишечнике (антимикробное действие в просвете).
- **Распределение:** Vd — большой (>100 л), накопление в печени и мышцах. Через ГЭБ — ограниченно.
- **Выведение:** T½ 7–12 ч. Преимущественно с калом (>85%) и частично почками.
- **Особенность:** низкая системная биодоступность — основное действие обусловлено кишечным метаболизмом (антимикробное, модуляция микробиома) и активными метаболитами.

## Механизмы действия (ЖКТ + детокс + метаболизм)

- **Антимикробное** — широкий спектр (бактерии, грибки, простейшие)
- **Ингибирование роста H. pylori** — подавление уреазы и адгезии
- **Модуляция микробиома** — снижение Firmicutes/Bacteroidetes ratio
- **Укрепление плотных контактов** — снижение кишечной проницаемости
- **Противовоспалительное** — ингибирование NF-κB, снижение IL-6, IL-8
- **Улучшение инсулинорезистентности** — AMPK-активация
- **Гиполипидемическое** — снижение холестерина и триглицеридов
- **Гепатопротекторное** — снижение стеатоза печени
- **Антиоксидантное** — активация Nrf2
- **Регуляция моторики ЖКТ** — антидиарейное (при СРК-Д)

## Показания (ЖКТ + метаболизм в фокусе)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Сахарный диабет 2 типа | 1А | Снижает HbA1c на 0.5–1% |
| Метаболический синдром | 1А | Снижение глюкозы, липидов, ИМТ |
| Инфекционная диарея | 1A | Уменьшает длительность диареи |
| H. pylori (в схеме эрадикации) | 1B | Увеличивает эффективность на 15–25% |
| СРК с диареей | 2B | Уменьшает частоту стула |
| НАЖБП | 1B | Снижение стеатоза, трансаминаз |
| Бактериальный/грибковый overgrowth (SIBO/СИБР) | 2B | Антимикробное |
| Дислипидемия | 1А | Снижение LDL на 15–25% |

## Особенности приёма

- **Стандартная дозировка:** 500 мг × 2–3 р/день
- **Курс:** 8–12 недель (перерыв 2–4 недели между курсами)
- **Приём:** с едой (уменьшает побочные эффекты со стороны ЖКТ)
- **Биодоступность:** низкая (0.5–1%), но активные метаболиты (дигидроберберин) и кишечная ферментация
- **Усиление всасывания:** с жирами или в фитосомной форме

## Форма приема и порядок

Капсулы (500 мг × 2–3 р/день с едой). Курс: 8–12 недель, перерыв 2–4 недели между курсами. Принимать с едой (уменьшает ЖКТ-побочные). Для усиления всасывания — с жирами или в фитосомной форме. Не при беременности

## Противопоказания

- Беременность и лактация (может влиять на билирубин новорождённого)
- Глюкозо-6-фосфатдегидрогеназная недостаточность (риск гемолиза)
- Артериальная гипотензия (осторожно)
- Приём цитохром P450-метаболизируемых препаратов (CYP2D6, CYP3A4)


## Топ-5 продуктов, в которых содержится

Барбарис (Berberis vulgaris) — ягоды (свежие, сушёные, сок), корень барбариса, гидрастис (Hydrastis canadensis — золототысячник), коптис китайский (Coptis chinensis), магония падуболистная (Mahonia aquifolium)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Пробиотики | Синергия: антимикробное (berberine) + восстановление (пробиотики) |
| ++ | Псиллиум (клетчатка) | Усиление гиполипидемического эффекта |
| ++ | NAC | Синергия детокс-защиты (печень + антиоксиданты) |
| ++ | Альфа-липоевая кислота | Усиление метаболического эффекта (AMPK + Nrf2) |
| ++ | Куркумин | Синергия противовоспалительного (NF-κB + AMPK) |
| + | Цинк | Дополнение антимикробного действия (Zn + berberine) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | CYP3A4/2D6 субстраты (статины, бензодиазепины) | Повышение уровня препаратов (ингибирование CYP) |
| ++ | Антигипертензивные | Потенцирование гипотензии |
| ++ | Антибиотики (доксициклин, азитромицин) | Конкуренция за транспортёры — не одновременно |
| ++ | Циклоспорин | Повышение нефротоксичности (теоретически) |
| + | Грейпфрут | Ингибирование CYP3A4 — усиление эффекта и токсичности |

## Научные факты

- Мета-анализ (2019): берберин снижает HbA1c на 0.61% и глюкозу натощак на 0.87 ммоль/л (уровень 1A, 27 РКИ, n=2569).
- Мета-анализ (2020): берберин снижает LDL на 20–25 мг/дл (уровень 1A).
- РКИ (2021): берберин + пробиотики эффективнее монотерапии при H. pylori — эрадикация 82% vs 65%.
- Берберин сопоставим с метформином по эффективности при СД2 (прямое сравнение), но уступает по удобству (3 раза/день) и переносимости (ЖКТ-побочные).

## Лайфхак для пользователя (Nutrition Tip)

> 🟡 **Берберин — «метформин природы».** Доказан при СД2, метаболическом синдроме, НАЖБП, SIBO. Отличие от метформина — есть антимикробный эффект и прямое действие на микробиом. Нельзя при беременности. Безопасный курс — 8–12 недель, потом перерыв 2–4 недели. Антимикробная активность берберина сильнее всего против грамположительных бактерий и H. pylori.

## Ссылки

`# Бетаин (Betaine, Trimethylglycine, TMG)

**Категория:** Аминокислота (производное)  
**Тип:** Нутрицевтик / Метильный донор / Пищеварение  
**Основные формы:** Бетаин HCl, бетаин ангидрид (TMG)  
**Синонимы:** Триметилглицин, TMG, бетаин HCl  

## Что это такое

Бетаин — производное аминокислоты глицина с тремя метильными группами. В контексте ЖКТ имеет два применения: как **донор метильных групп** (бетаин ангидрид/TMG) и как **источник соляной кислоты** (бетаин HCl — для повышения кислотности желудка).

## Внешний вид

Белый кристаллический порошок (бетаин HCl) — гигроскопичный, с кисловатым вкусом; бетаин без HCl — сладковатый

## Метаболический цикл

- **Всасывание:** быстрое и полное в тонком кишечнике (натрий-хлор-зависимый транспортер BGT1, SLC6A12). Cmax через 30–60 мин.
- **Метаболизм:** донор метильных групп (→ метионин → S-аденозилметионин/SAMe → гомоцистеин → метионин). Метилирование — ключевая функция (эпигенетика, синтез карнитина, креатина). Альтернативный путь: окисление до диметилглицина (бетаин-гомоцистеин-метилтрансфераза, BHMT).
- **Распределение:** внутриклеточно (печень, почки). В плазме — минимально (регулируемый уровень).
- **Выведение:** T½ ~14 ч. Почечная экскреция (канальцевая реабсорбция — до 98%). Избыток (диетический) выводится с мочой.
- **Особенность:** двойное действие — осмопротектор (клетки мозгового вещества почек) + метаболический донор метила. При избытке — риск повышения холестерина (через SAMe).

## Механизмы действия

- **Донор метильных групп** — участвует в цикле метилирования (гомоцистеин → метионин)
- **Осмопротектор** — защищает клетки от осмотического стресса
- **Бетаин HCl** — временно повышает кислотность желудочного сока (при гипоацидности)
- **Пребиотик** — в форме свекольного кваса работает как пребиотик
- **Улучшает усвоение железа** (за счёт повышения кислотности)

## Показания

| Показание | Форма | Эффективность |
|-----------|-------|---------------|
| Гипоацидность / гипохлоргидрия | HCl | Временная, только после заживления слизистой |
| Нарушение метилирования (высокий гомоцистеин) | TMG | Хорошая |
| Нарушение усвоения железа | HCl | Условная (за счёт кислотности) |
| Дисбиоз | В пище (квас) | Пребиотическое действие |

## Особенности приёма

- **Бетаин HCl** — только после заживления слизистой! При гипоацидности — начинать с малых доз
- **При появлении дискомфорта** — отменить, поддержать слизистую, пройти доп. диагностику
- **Пищевые источники:** свёкла (свекольный сок, квас), шпинат, цельнозерновые

## Форма приема и порядок

Капсулы (бетаин HCl 500–650 мг + пепсин), порошок. Принимать в начале еды. Курс: только при недостаточности желудочной кислоты. Начинать с 1 капсулы, увеличивать до появления чувства тепла. Противопоказан при гастрите/язве

## Противопоказания

- Активная язва желудка
- Эрозивный гастрит (обострение)
- ГЭРБ (может усилить рефлюкс)
- Приём ингибиторов протонной помпы (бессмысленно)
- Гиперацидность


## Топ-5 продуктов, в которых содержится

Свёкла (самый богатый источник бетаина), шпинат, киноа, цельнозерновой хлеб, морепродукты

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Панкреатин/пищеварительные ферменты | Восстановление кислотности → активация пепсина + ферментов |
| ++ | L-глютамин | Синергия восстановления слизистой (кислота — барьер) |
| ++ | Солодка DGL | Защита слизистой при восстановлении кислотности |
| + | Цинк-L-карнозин | Мембранная защита при повышенной кислотности |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | ИПП (омепразол, пантопразол) | Противоположное действие (ИПП снижают, бетаин повышает кислотность) |
| +++ | Антациды | Нейтрализация эффекта бетаина |
| ++ | Н2-гистаминоблокаторы | Ослабление эффекта бетаина |
| ++ | НПВС | Риск повреждения слизистой при гиперацидности |

## Ключевое предупреждение

Бетаин HCl используется **только** после работы со слизистыми и снижения воспаления. Если начать с кислотности при изъязвлённой слизистой — будет болезненно и вредно.

## Лайфхак для пользователя (Nutrition Tip)

> 🧪 **Бетаин HCl — не для всех!** Только при подтверждённой гипоацидности и ТОЛЬКО после заживления слизистой. Свекольный квас — безопасная альтернатива для мягкой стимуляции пищеварения с пребиотическим эффектом. Не пить уксус натощак — лучше использовать лимонную воду через трубочку.

## Ссылки

1. Craig SAS. Betaine in human nutrition. Am J Clin Nutr. 2004;80(3):539-549.
2. Yancy WS, et al. Effects of pH modulation with betaine HCl on gastric acidity. BMC Gastroenterol. 2012;12:89.

`# Костный бульон, желатин, коллаген (Bone broth, Gelatin, Collagen)

**Категория:** Пищевой продукт / Нутрицевтик  
**Тип:** Заживление слизистых / Источник аминокислот  
**Основные действующие вещества:** Глицин, глутамин, пролин, гидроксипролин  

## Что это такое

Костный бульон — отвар из костей, хрящей и соединительной ткани животных. Содержит желатин (денатурированный коллаген), глицин, глутамин и другие аминокислоты, необходимые для восстановления слизистой ЖКТ.

## Внешний вид

Жидкость — от золотистого до янтарного цвета (в зависимости от костей и времени варки); при охлаждении образует гелеобразную массу (желатин)

## Метаболический цикл

- **Всасывание:** гидролизованные коллагеновые пептиды (глицин, пролин, гидроксипролин) всасываются в тонкой кишке через дипептидил-транспортеры (PEPT1/2, SLC15A1). Cmax гидроксипролина через 1–2 ч.
- **Распределение:** гидроксипролин — маркер доставки коллагена в соединительную ткань. Глицин — системно, через ГЭБ (транспортер GlyT1). Минералы (Ca, Mg, P) — ионный транспорт.
- **Метаболизм:** аминокислоты — включение в пул эндогенного коллагена (фибробласты, остеобласты). Глицин — участие в синтезе глутатиона и гема.
- **Выведение:** избыток аминокислот — дезаминирование в печени → мочевина → почки. T½ гидроксипролина 4–6 ч.
- **Особенность:** гидроксипролин в крови — косвенный биомаркер поступления коллагена. Усвоение улучшается при совместном приёме с витамином C.

## Механизмы действия

- **Даёт глицин** — противовоспалительная аминокислота, улучшает качество сна
- **Даёт глутамин** — топливо для энтероцитов
- **Содержит коллаген/желатин** — субстрат для соединительной ткани
- **Укрепляет слизистую** — делает её более «жирной» и эластичной
- **Поддерживает целостность эпителиального барьера**

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| Повышенная кишечная проницаемость | Укрепляет барьер |
| Восстановление после болезни | Глутамин + глицин |
| Дефицит белка / аминокислот | Дополнительный источник |
| Заживление слизистой | Субстрат для регенерации |

## Особенности приёма

- **Домашний бульон:** варить кости (говяжьи/куриные) 8–24 ч с овощами и травами
- **Желатин (порошок):** 10–15 г/сут, растворить в воде или бульоне
- **Коллаген (гидролизованный):** 10–20 г/сут, хорошо растворяется в холодной воде
- Для веганов/вегетарианцев — альтернатива: аминокислоты по отдельности

## Форма приема и порядок

Бульон (пить тёплым, 200–300 мл/день), порошок (коллагеновый — растворить в воде/супе), кубики (заморозка). Варить: 12–24 часа (говяжьи), 6–12 часов (куриные) с добавлением уксуса. Принимать натощак или с едой. Курс: длительно

## Противопоказания

- **Гистаминовая непереносимость** — длительная варка костей повышает содержание гистамина
- **Индивидуальная непереносимость** (редко)
- **При gout (подагре)** — пурины могут усугубить


## Топ-5 продуктов, в которых содержится

Говяжьи кости (суставные, мозговые), куриные кости/лапки, рыбий скелет (головы, хребты), свиные ножки/хвосты, бараньи кости

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | L-глютамин | Синергия заживления (глицин+пролин+глютамин) |
| ++ | Колострум | IGF-1 + глицин — синергия регенерации |
| ++ | Цинк-L-карнозин | Мембрана + коллаген — синергия восстановления |
| ++ | Пробиотики | Восстановление микробиома + барьера |
| ++ | Витамин C | Кофактор синтеза коллагена (гидроксилирование пролина/лизина) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Алкоголь | Снижает синтез коллагена и регенерацию |
| ++ | ГКС | Катаболическое действие — разрушение коллагена |
| + | Оксалаты (шпинат, щавель) | Связывание кальция из костного бульона |

## Лайфхак для пользователя (Nutrition Tip)

> 🍲 **Костный бульон — «суп для кишечника».** Глицин, глутамин и коллаген в одной тарелке. Варить минимум 8 часов. При гистаминовой непереносимости — ограничить (длительная варка накапливает гистамин). Альтернатива: гидролизованный коллаген + глутамин по отдельности.

## Ссылки

1. Oh M, et al. Anti-inflammatory effects of bone broth in healthy adults. Food Sci Biotechnol. 2021;30(7):957-964.
2. Clark K, et al. Collagen supplementation for gut health: a narrative review. Nutrients. 2020;12(12):3678.

`# Босвеллия (Boswellia)

**Категория:** Растительный экстракт  
**Тип:** Нутрицевтик / Противовоспалительное  
**Основное действующее вещество:** Босвеллиевые кислоты (6-босвеллиевая, ацетил-бета-босвеллиевая, 11-кето-бета-босвеллиевая)  
**Синонимы:** Ладан, Boswellia serrata, Indian frankincense  
**Лекарственный аналог:** НПВС (по противовоспалительному эффекту)

## Что это такое

Босвеллия — смолистый экстракт из деревьев рода Boswellia. Известна с древних времён как противовоспалительное и обезболивающее средство. Химическая структура босвеллиевых кислот похожа на структуру стероидов, но механизм действия принципиально иной.

## Внешний вид

Смолистое вещество (ладан) — янтарно-жёлтые или зеленоватые куски неправильной формы, с бальзамическим запахом


## Метаболический цикл

- **Всасывание:** босвеллиевые кислоты всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня босвеллиевых кислот.

## Механизмы действия

- **Ингибирует 5-липоксигеназу (5-ЛОГ)** — селективно блокирует фермент, отвечающий за выработку лейкотриенов (ключевых медиаторов воспаления)
- **Модулирует факторы роста, белки и рецепторы** — влияет на активность генов
- **Стимулирует гибель раковых клеток** и останавливает их клеточный цикл
- **Глушит сигнал выживания и метастазирования** нежелательных клеток
- **Влияет на множество мишеней** — ферменты, рецепторы, факторы транскрипции

## Показания (доказанные)

| Система | Показание | Эффективность |
|---------|-----------|---------------|
| **ЖКТ** | Воспалительные заболевания кишечника (болезнь Крона, язвенный колит) | Высокая |
| **ЖКТ** | Хронический колит, диарея | Восстанавливает моторику |
| **Суставы** | Артрит, остеоартроз | Изменяет состав синовиальной жидкости |
| **Дыхательная** | Астма, ХОБЛ, бронхит | Снижает лейкотриен-опосредованное воспаление |
| **Неврология** | Нейровоспаление (постковид, Альцгеймер, Паркинсон) | Снижает прогрессирование |
| **Метаболизм** | Сахарный диабет, атеросклероз | Снижает глюкозу, липиды, креатинин |
| **Репродукция** | Мужская фертильность | Улучшает качество спермы |
| **Когнитивная** | Память и обучаемость | Увеличивает объём долговременной и краткосрочной памяти |
| **Печень** | Болезни печени | Гепатопротекторный эффект |

## Особенности приёма

- **Дозировка:** 375–500 мг/сут (средняя). Менее 100 мг/сут — смысла нет
- **Принимать во время еды**
- **Курс:** длительный, но желательно делать перерывы
- **Оценка качества:** продукты оцениваются по концентрации босвеллиевых кислот

## Форма приема и порядок

Капсулы/таблетки (стандартизированные 30–65% босвеллиевых кислот), смола (для наружного применения), экстракт в масле. Принимать с едой. Курс: 8–12 недель

## Противопоказания и меры предосторожности

- Индивидуальная непереносимость
- Беременность и лактация (недостаточно данных)
- Одновременный приём с НПВС — разносить в течение дня (может уменьшать эффективность НПВС)


## Топ-5 продуктов, в которых содержится

Смола ладанного дерева (Boswellia serrata) — как пряность и жевательная смола, БАД (не содержится в обычных продуктах питания)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |

| +++ | Куркумин | Синергия противовоспалительного действия (разные пути: 5-LOX + COX) |

| Ранг | Вещество | Эффект |

- Клиенты с нарушением липидного обмена

## Научные факты

- Босвеллиевые кислоты моделируют множество клеточных мишеней — ферменты, факторы роста, рецепторы.
- Исследование на мышах с дефицитом аполипопротеина E: босвеллия подавляет провоспалительные агенты.

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Босвеллия — природный ингибитор лейкотриенов.** Если у клиента сочетание астмы/аллергии + воспаление ЖКТ, босвеллия — препарат выбора. Работает медленно (2–3 недели до эффекта), доза менее 100 мг/сут не имеет смысла.

`# Лопух (Burdock, Arctium lappa)

**Категория:** БАД / Фитотерапия  
**Тип:** Горечь / Противовоспалительное / Желчегонное  
**Основное действующее вещество:** Арктигенин, арктиин, инулин, полиацетилены, фенольные кислоты (хлорогеновая, кофейная)  
**Синонимы:** Burdock, корень лопуха, Arctium lappa, репейник, лопух большой  

## Что это такое

Лопух большой (Arctium lappa) — традиционное растение, используемое в медицине многих культур. Корень лопуха — одна из главных «горечей» для стимуляции пищеварения, обладает желчегонным, противовоспалительным, мочегонным и гепатопротекторным действием. Богат инулином (пребиотик), арктигенином (лигнан с противоопухолевой активностью), полиацетиленами (противомикробное). Известен способностью снижать тягу к сладкому.

Корень: длинный (30–60 см), коричневый снаружи, белый/бежевый внутри, мясистый. Сухой корень — серовато-коричневые кусочки; настойка — коричневая жидкость

## Метаболический цикл

- **Всасывание:** арктигенин, арктиин, полиацетилены и фенольные кислоты лопуха всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Арктиин гидролизуется до арктигенина (активная форма). Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня агликонов.

## Механизмы действия

- **Желчегонное** — стимуляция секреции желчи
- **Гепатопротекторное** — защита и восстановление клеток печени
- **Противовоспалительное** — ингибирование NF-κB, снижение IL-6, TNF-α
- **Мочегонное** — выведение избытка жидкости
- **Спазмолитическое** — расслабление гладкой мускулатуры ЖКТ
- **Снижение тяги к сладкому** — через горечь и регуляцию аппетита
- **Пребиотическое** — инулин → питание для микробиоты
- **Антимикробное** — полиацетилены против бактерий и грибков
- **Антиоксидантное** — хлорогеновая и кофейная кислоты
- **Детокс-поддержка** — стимуляция выделительных систем (печень+почки)

| Тяга к сладкому | 2A | Горечь → снижение аппетита |
| Хронические воспаления ЖКТ | 2B | Противовоспалительное |
| Метеоризм | 2B | Спазмолитическое + ветрогонное |
| Детокс-поддержка | 2B | Гепато+нефропротекция |
| Кожные заболевания (акне, экзема) | 2B | Очищение крови + противовоспалительное |

Чай/отвар (1 ст.л. корня на стакан воды, кипятить 10 мин), капсулы (300–500 мг × 2–3 р/день), настойка (1:5), корень свежий (для салата, варки, жарки). Принимать за 20–30 мин до еды. Курс: 4–8 недель

Корень лопуха (свежий — варёный/жареный как овощ, маринованный), чай из корня лопуха (японская кухня — гобо-чай), лопух в салатах (молодые листья, очищенный корень), корень лопуха в супах (корейская/японская кухня), корень лопуха в травяных сборах

`# Бутират / Масляная кислота (Butyrate, Sodium Butyrate)

**Категория:** БАД / Короткоцепочечная жирная кислота  
**Тип:** Постбиотик / Энергия для колоноцитов  
**Основное действующее вещество:** Масляная кислота (C4:0) в форме натриевой/кальциевой/магниевой соли  
**Синонимы:** Бутират натрия, трибутирин, масляная кислота, butyric acid  

## Что это такое

Бутират (масляная кислота) — короткоцепочечная жирная кислота (КЦЖК), продуцируемая микробиотой толстой кишки при ферментации пищевых волокон. Главный источник энергии для колоноцитов (70–80% их энергетических потребностей). Ключевой регулятор барьерной функции и иммунного гомеостаза кишечника.

## Внешний вид

Белый кристаллический порошок (натрия/кальция/магния бутират) с характерным запахом масляной кислоты (прогорклое масло); трибутирин — маслянистая жидкость в капсулах

## Метаболический цикл

- **Эндогенная продукция:** ферментация пищевых волокон микробиотой толстой кишки (Clostridium, Faecalibacterium, Roseburia). Субстраты: резистентный крахмал, пектин, инулин, β-глюкан. Продукция: 20–30 мМ в просвете толстой кишки (физиологическая норма).
- **Всасывание (экзогенный):** в форме Na/Ca/Mg-бутирата — пассивная диффузия через стенку кишки (капсулы с кишечнорастворимой оболочкой — доставка в толстую кишку). Трибутирин (пролекарство) — гидролиз липазой в тонкой кишке.
- **Метаболизм:** 70–80% — β-окисление в колоноцитах (энергия). 10–20% — в печени (кетогенез). 5–10% — в мышцах. Активация GPR109A/GPR43 рецепторов.
- **Распределение:** локально в толстой кишке (ключевое действие). Системно — <5% от произведённого.
- **Выведение:** CO₂ (дыхание), минимально — кал (<5% при здоровом микробиоме).
- **Особенность:** эффективная доза — ≥4 г/день трибутирина или ≥1.5 г/день Na-бутирата. Трибутирин предпочтительнее — высвобождает 3 молекулы бутирата на 1 молекулу трибутирина.

## Механизмы действия

- **Энергия для колоноцитов** — основной субстрат β-окисления в толстой кишке
- **Укрепление плотных контактов** — повышение экспрессии ZO-1, окклюдина, клаудина
- **Ингибирование гистондеацетилазы (HDAC)** — эпигенетическая регуляция
- **Противовоспалительное** — активация GPR109A → регуляция Treg
- **Снижение проницаемости** — уменьшение транслокации липополисахаридов
- **Регуляция моторики** — стимуляция транзита (через 5-HT3)
- **Пребиотическое действие** — стимуляция роста бактероидов и фирмикутов
- **Антиканцерогенное** — индукция апоптоза в раковых клетках толстой кишки

## Показания (ЖКТ + метаболизм)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Воспалительные заболевания кишечника (ВЗК) | 1B | Уменьшает воспаление (в клизмах) |
| Синдром раздражённого кишечника (СРК) | 1B | Снижает боль, вздутие |
| Синдром повышенной проницаемости | 1B | Укрепляет барьер |
| Дивертикулёз (профилактика) | 2B | Противовоспалительное |
| SIBO (после антибиотиков) | 2B | Восстановление среды |
| Антибиотик-ассоциированная диарея | 2B | Восстановление после AAD |
| Метаболический синдром | 1B | Снижение воспаления, улучшение инсулинорезистентности |

## Особенности приёма

- **Формы:** бутират натрия, трибутирин, бутират кальция/магния
- **Трибутирин** — эффективнее обычного бутирата (не разрушается желудочным соком)
- **Дозировка:** 200–500 мг × 2–3 р/день (в пересчёте на бутират)
- **Курс:** 8–12 недель (дляхронических состояний — до 24 недель)
- **Приём:** с едой
- **Хранение:** у некоторых форм — в холодильнике

## Форма приема и порядок

Капсулы (200–500 мг бутирата × 2–3 р/день), трибутирин (лучшая форма — не разрушается в желудке), порошок. Принимать с едой. Курс: 8–12 недель (до 24). Некоторые формы требуют хранения в холодильнике. Не разжёвывать капсулы

## Противопоказания

- Индивидуальная непереносимость
- Беременность (безопасность не установлена для высоких доз)


## Топ-5 продуктов, в которых содержится

`# Календула лекарственная (Calendula officinalis)

**Категория:** Лекарственное растение  
**Тип:** Фитотерапия / Горечь / Противовоспалительное  
**Основное действующее вещество:** Календен, флавоноиды, каротиноиды  
**Синонимы:** Ноготки, Marigold  

## Что это такое

Календула — лекарственное растение, используемое в гастроэнтерологии как горечь (стимулятор пищеварения), противовоспалительное и спазмолитическое средство. Специфическое применение — купирование горечи во рту при рефлюксе и желчегонной терапии.

## Внешний вид

Календула (Calendula officinalis — ноготки) — ярко-оранжевые или жёлтые соцветия-корзинки; сухие лепестки — оранжево-жёлтые, с лёгким ароматом

## Метаболический цикл

- **Всасывание:** календен, флавоноиды и каротиноиды календулы всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).
- **Распределение:** связывание с альбумином (>90%). Ограниченное проникновение через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>85%), частично почками.
- **Особенность:** курсовой приём (2–4 недели) необходим для накопления клинически значимого уровня агликонов.

## Механизмы действия

- **Горечь** — стимулирует желчеотток и пищеварение
- **Убирает горечь во рту** — эффективна при ретроградном забросе желчи и ГЭРБ
- **Противовоспалительное**
- **Спазмолитическое**
- **Антисептическое**

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| Горечь во рту (рефлюкс, желчегонная терапия) | Выраженный |
| ГЭРБ, рефлюкс-эзофагит | Убирает симптом горечи |
| Эрадикация H. pylori (горечь от антибиотиков) | Убирает неприятный привкус (особенно амоксициллина) |
| Диспепсия | Стимулирует пищеварение |
| Заброс желчи | Нормализует направление перистальтики |

## Особенности приёма

- **Форма:** чай, настойка, капсулы
- **Сочетание:** при желчегонной терапии календула предотвращает заброс желчи вверх
- При эрадикации H. pylori убирает горький привкус антибиотиков

## Форма приема и порядок

Чай (1–2 ч.л. на чашку), настойка (1:5 — 20–30 капель × 3 р/день), капсулы/таблетки (300–500 мг), масляный экстракт (для местного применения), крем/мазь. Курс: 4–8 недель. Внутрь: до или между едой

## Противопоказания

- Индивидуальная непереносимость
- Аллергия к растениям семейства Asteraceae


## Топ-5 продуктов, в которых содержится

Цветки календулы (сухие для чая), лепестки свежие (салат, украшение блюд), настойка календулы (спиртовая), масло календулы (для заправки салатов или местного), календула в травяных сборах

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Ромашка | Синергия противовоспалительного и заживляющего |
| ++ | Алоэ вера | Усиление заживления слизистых (регенерация) |
| ++ | Солодка DGL | Синергия заживления (календула — регенерация, DGL — слизь) |
| ++ | Тысячелистник | Синергия противовоспалительного и кровоостанавливающего |
| + | Вяз ржавый | Обволакивающее + заживляющее (ЖКТ) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антикоагулянты | Теоретическое потенцирование (содержит кумарины) |
| ++ | Иммуносупрессоры | Теоретическое ослабление (иммуностимуляция) |
| + | Седативные | Усиление (только при высоких дозах) |

## Лайфхак для пользователя (Nutrition Tip)

> 🌸 **Горечь во рту после антибиотиков или желчегонных средств — заварите календулу.** Она не только убирает неприятный привкус, но и предотвращает заброс желчи вверх. Особенно актуально при эрадикации хеликобактера (амоксициллин даёт горький привкус).

2. Khalid KA, et al. Effect of abiotic factors on growth and bioactive compounds of Calendula officinalis. J Med Plants Res. 2014;8(4):196-202.

`# Чага (Inonotus obliquus)

Чага — стерильная форма берёзового гриба (трутовика скошенного). Растёт на берёзах в умеренном климате. Традиционно используется в России и Северной Европе как противовоспалительное, гастропротекторное и иммуномодулирующее средство. Наиболее типичный для России натуральный противовоспалительный агент.

Чёрные наросты неправильной формы на стволах берёз — твёрдые, бугристые; внутренняя часть — коричнево-бурая с белыми прожилками

- **Всасывание:** полисахариды, бетулин, меланины и тритерпеноиды чаги всасываются в тонком кишечнике. Биодоступность лимитирована низкой растворимостью в воде и активным эффлюксом (P-gp).
- **Метаболизм:** интенсивный метаболизм первой фазы — глюкуронирование (UGT1A1, UGT1A8) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты).

## Механизмы действия

- **Влияет на основные медиаторы воспаления** — простагландины, лейкотриены, оксид азота
- **Стимулирует созревание лейкоцитов** — повышает продукцию иммуноглобулинов

- **Сдерживает рост и деление нежелательных клеток** (в желудке и кишечнике)

Порошок (заваривать как чай — 1 ч.л. на чашку), капсулы/таблетки (500 мг), экстракт жидкий (спиртовой/водный), настой (заваривать 6–12 часов). Термостойка. Курс: 4–8 недель

## Противопоказания

- Индивидуальная непереносимость / повышенная чувствительность к берёзовому грибу
- Аллергия на берёзу (поллиноз)

Берёзовый гриб (чага) — только природный источник; продукт питания: отвар/настой, чай из чаги, добавляется в кофейные смеси, экстракты (не содержится в обычных продуктах)

`# Ромашка аптечная (Chamomilla recutita, Matricaria chamomilla)

**Категория:** Лекарственное растение  
**Тип:** Фитотерапия / Противовоспалительное / Спазмолитик  
**Основное действующее вещество:** Хамазулен, бисаболол, флавоноиды  
**Синонимы:** Matricaria chamomilla, German chamomile  

## Что это такое

Ромашка аптечная — одно из самых изученных лекарственных растений. В контексте ЖКТ используется как противовоспалительное, антисептическое и спазмолитическое средство. Относится к категории фитокомплексов, большинство из которых обладают тем или иным противовоспалительным эффектом.

## Внешний вид

Ромашка аптечная (Matricaria recutita) — мелкие соцветия-корзинки с белыми лепестками и жёлтой выпуклой серединой; сухие цветки — рассыпные, с сильным ароматом

## Метаболический цикл

- **Всасывание:** флавоноиды (апигенин, лютеолин) и терпеноиды всасываются в тонком кишечнике. Биодоступность лимитирована (10–20%) из-за глюкуронирования в энтероцитах и активного эффлюкса (P-gp).
- **Метаболизм:** фаза II — глюкуронирование (UGT1A1, UGT1A9) и сульфатирование в энтероцитах и печени. Частичная деметилирование (CYP1A2). Кишечно-печёночная рециркуляция деконъюгированных форм.

- **Особенность:** чай/водный настой обеспечивает достаточную концентрацию флавоноидов для местного действия в ЖКТ. Системное действие требует стандартизированных экстрактов.

## Механизмы действия

- **Антисептик** — полоскания, внутреннее применение
- **Спазмолитик** — снимает спазмы в желчном пузыре, желудке, кишечнике
- **Противовоспалительное** — снижает медиаторы воспаления
- **Ветрогонное** — уменьшает газообразование

Чай (1–2 ч.л. цветков на чашку кипятка, настоять 5–10 мин), капсулы/таблетки (200–400 мг), экстракт жидкий, настойка (1:5), масло эфирное (для ароматерапии). Курс: 4–8 недель. Принимать до еды (пищеварение) или на ночь (сон)

- Индивидуальная непереносимость
- Аллергия к растениям семейства Asteraceae (амброзия, хризантемы — возможна перекрёстная реакция)

Чай из ромашки (цветки сухие), ромашка в травяных сборах, жидкие экстракты ромашки (добавка в напитки), ромашковый сироп, ромашка в составе лимонадов и смузи

### Комплименты (синергисты)

`# Колострум (Bovine Colostrum)

**Категория:** БАД / Иммунная поддержка / ЖКТ  
**Тип:** Молочный секрет (первые 24–48 ч после родов)  
**Основные компоненты:** IgG (25–40%), лактоферрин, лизоцим, IGF-1, TGF-β, пролин-богатые полипептиды (PRP)  
**Синонимы:** Молозиво, коровье молозиво, colostrum, bovine colostrum  

## Что это такое

Колострум (молозиво) — первое молоко коровы, вырабатываемое в первые 24–48 часов после отёла. Содержит высокие концентрации иммуноглобулинов (IgG), антимикробных белков (лактоферрин, лизоцим), факторов роста (IGF-1, TGF-β) и цитокинов. Биологическая роль — передача пассивного иммунитета новорождённому.

## Внешний вид

Порошок — светло-кремовый или желтоватый, со слабым молочным запахом; капсулы — с таким же порошком; жидкий — непрозрачная желтоватая жидкость

## Метаболический цикл

- **Всасывание:** иммуноглобулины (IgG) — частично выживают в кислой среде желудка (буферная ёмкость молозива). В тонкой кишке — FcRn-транспортер (неонатальный Fc-рецептор) обеспечивает трансцитоз IgG через эпителий. Лактоферрин — через LRP-рецепторы. Факторы роста (IGF-1, TGF-β) — PEPT1-транспорт. Лизоцим — пассивная диффузия.
- **Распределение:** IgG — системно (Vd 5–8 л). Лактоферрин — печень, костный мозг. IGF-1 — связывание с IGFBP (белки-носители). TGF-β — локально в слизистой ЖКТ.
- **Метаболизм:** протеолиз в ЖКТ (часть разрушается до пептидов), пептиды — участие в иммунной модуляции. Лактоферрин — хелатирование Fe³⁺ в кишечнике. IGF-1 — частично метаболизируется печенью.
- **Выведение:** T½ IgG ~21–28 дней (циркулирующих). T½ лактоферрина ~10–12 ч в ЖКТ. Фрагменты — почечная экскреция.
- **Особенность:** для максимальной сохранности иммуноглобулинов — принимать натощак, не смешивать с кислыми напитками (pH <5 денатурирует IgG). Липосомальная форма повышает биодоступность на 60–80%.

## Механизмы действия (ЖКТ + иммунитет)

- **Иммуноглобулины** — нейтрализация патогенов в просвете кишечника
- **Лактоферрин** — хелатирование железа (лишение патогенов), антибактериальное
- **Лизоцим** — ферментативное разрушение клеточных стенок бактерий
- **Факторы роста (IGF-1, TGF-β)** — пролиферация и регенерация эпителия
- **Укрепление плотных контактов** — снижение кишечной проницаемости
- **Противовоспалительное** — TGF-β, модуляция Th1/Th2 баланса
- **Антиоксидантное** — глутатионпероксидаза, супероксиддисмутаза
- **Пребиотическое** — стимуляция роста Bifidobacterium

## Показания (ЖКТ в фокусе)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
 |Синдром повышенной проницаемости | 1B | Снижение проницаемости на 30–50% |
| Спортивная гастроэнтеропатия | 1B | Профилактика повреждения ЖКТ |
| Инфекционная диарея | 1B | Снижает длительность |
| H. pylori | 2B | Ингибиция адгезии (in vitro/in vivo) |
| ВЗК (лёгкой/умеренной формы) | 2B | Дополнение к терапии |
| Антибиотик-ассоциированная диарея | 2B | Профилактика |
| Восстановление после ротавируса | 1B | Снижает длительность на 1–2 дня |

- **Дозировка:** 2000–5000 мг/день (терапевтическая); 500–1000 мг/день (профилактическая)
- **Курс:** 4–12 недель (проницаемость), 2–4 недели (инфекции)
- **Приём:** натощак за 30–60 мин до еды (иммуноглобулины + всасывание)
- **Форма:** порошок, капсулы

- **Выбор:** только от сертифицированных пастбищных коров (BSE-free, гормоны-free)

## Форма приема и порядок

Порошок (мерная ложка — 2000–5000 мг/день), капсулы (500 мг). Принимать натощак за 30–60 мин до еды. Курс: 4–12 недель (проницаемость), 2–4 нед (инфекции). Не разогревать выше 40°C — денатурация IgG. Выбирать BSE-free сертифицированных коров

- Аллергия на коровье молоко (казеин/лактоза — малые количества, но риск)

- Беременность (безопасность — IGF-1 теоретически может влиять на плод)


## Топ-5 продуктов, в которых содержится

Молозиво коровье (Colostrum) — только в виде БАД. Не содержится в обычных продуктах питания (молозиво не продаётся в магазинах как продукт питания)

`# Куркумин (Curcumin)

**Категория:** Полифенол  
**Тип:** Нутрицевтик / Противовоспалительное  
**Основное действующее вещество:** Куркуминоиды  
**Синонимы:** Куркума, Turmeric, E100  
**Лекарственный аналог:** Ингибиторы циклооксигеназы (НПВС)

## Что это такое

Куркумин — основной полифенол корня куркумы (Curcuma longa). Определяет жёлто-оранжевый цвет пряности. Ключевое применение в контексте ЖКТ — противовоспалительное, желчегонное, антиоксидантное средство.

## Внешний вид

Ярко-жёлтый/оранжевый порошок (куркуминоиды) — кристаллический, плохо растворим в воде, растворим в жирах и органических растворителях

## Метаболический цикл

- **Всасывание:** крайне низкая биодоступность (<1% в неизменённом виде). В тонкой кишке: частично пассивная диффузия (липофильный). Интенсивное пресистемное глюкуронирование/сульфатирование в энтероцитах.
- **Метаболизм:** кишечно-печёночная рециркуляция. Восстановление до тетрагидрокуркумина, гексагидрокуркумина (CYP). Конъюгация с глюкуронидом (UGT1A1, UGT1A8, UGT1A10). Активные метаболиты (тетрагидрокуркумин) — более стабильны.
- **Распределение:** Vd — ограничен (<1 л/кг). Связывание с альбумином >99%. Накопление в печени, толстой кишке. Через ГЭБ — минимально.
- **Выведение:** T½ 1–2 ч (неизменённый). Метаболиты — до 8 ч. Преимущественно с калом (>90%), частично с мочой.
- **Особенность:** ключевое условие эффективности — повышение биодоступности (пиперин +2000%, липидные формы, фитосомы, наночастицы). Без усилителей — только местное действие в ЖКТ.

## Механизмы действия

- **Ингибирует ЦОГ и ЛОГ** — циклооксигеназу и липоксигеназу, ключевые ферменты синтеза воспалительных медиаторов
- **Стимулирует желчеотток** — по силе желчегонного эффекта примерно равен Силимарину
- **Антиоксидант** — активность выше, чем у витамина E, почти на порядок. Повышает активность СОД и глутатионпероксидазы
- **Снижает гликацию** — антиэйдж-эффект
- **Защищает гепатоциты** — снижает перекисное окисление липидов и высвобождение цитохрома C
- **Антимикробная активность** — задерживается в толстом кишечнике, снижает рост патогенной флоры

## Показания (ЖКТ)

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Функциональная диспепсия | Сравнима с Омепразолом (RCT) | 28–56 дней приёма |
| Нарушение желчеоттока | Хорошая | Стимулирует сократительную способность ЖП |
| Синдром избыточного бактериального роста (СИБР) | Умеренная | Санирование + улучшение моторики |
| Воспалительные заболевания кишечника (ВЗК) | Поддерживающая | Язвенный колит, болезнь Крона |
| Низкоуровневое воспаление | Хорошая | Снижение цитокинов |

## Особенности приёма

- **Начинать с малых доз** — чтобы избежать желудочного дискомфорта
- **С чёрным перцем (пиперин)** — повышает всасывание в 20 раз
- **Натощак или перед едой** — голод улучшает абсорбцию
- **Запивать жиросодержащим** — бульон, молоко, масло (куркумин жирорастворим)
- **Не принимать на ночь** — может бодрить. Оптимально — первая половина дня
- **Накапливается в тканях** — первые 10 дней идёт насыщение, далее дозу можно корректировать
- **Курс** — точного ограничения нет, можно несколько месяцев, но лучше делать перерывы (предотвращение адаптации рецепторов)
- **Разносить с лекарствами** — на 3–4 часа (куркумин может препятствовать усвоению других средств)

## Форма приема и порядок

Капсулы/таблетки (стандартизированные 95% куркуминоидов), порошок, экстракт в масле, липосомальная форма, фитосомная форма с фосфатидилхолином. Принимать с жирной пищей и чёрным перцем (пиперин). Курс: 8–12 недель, перерыв 2–4 недели

## Противопоказания и меры предосторожности

| Противопоказание | Пояснение |
|------------------|-----------|
| **Плохая свёртываемость крови / антикоагулянты** | Куркумин обладает антитромбоцитарным свойством. Отмена за 2 нед до любой операции (вплоть до удаления зуба) |

| **Камни в желчном пузыре / обструкция** | Стимулирует сокращение ЖП → боль |
| **Оксалатные камни в почках** | Влияет на метаболизм оксалатов |
| **Беременность, лактация** | Не рекомендуется |
| **Сахарный диабет** | Усиливает действие сахароснижающих — требуется коррекция дозы |
| **Аллергия на куркуму** | Индивидуальная непереносимость |


## Топ-5 продуктов, в которых содержится

Корень куркумы (молотая — 2–3% куркумина), свежий корень куркумы, карри (в составе), куркума в составе пряных смесей, напитки с куркумой (golden milk)

`# Одуванчик (Dandelion, Taraxacum officinale)

**Категория:** БАД / Фитотерапия  
**Тип:** Горечь / Желчегонное / Мочегонное  
**Основное действующее вещество:** Тараксацин, тараксацерин, инулин, сесквитерпеновые лактоны, фенольные кислоты  
**Синонимы:** Dandelion, корень одуванчика, Taraxacum, одуванчик лекарственный  

## Что это такое

Одуванчик лекарственный (Taraxacum officinale) — одно из наиболее известных желчегонных и детоксицирующих растений. Все части растения (корень, листья, цветы) обладают лечебными свойствами. Корень — желчегонное, гепатопротекторное, слабительное. Листья — мочегонное (калийсберегающее). Цветы — противовоспалительное. Одуванчик также известен как источник горечи для стимуляции пищеварения.

## Внешний вид

Растение: корень — коричневый, мясистый, длинный (15–30 см); листья — зелёные, зубчатые; цветы — ярко-жёлтые корзинки. Сухой корень — серовато-коричневые кусочки

`# Солодка деглицирризированная (DGL, Deglycyrrhizinated Licorice)

**Тип:** Нутрицевтик / Заживление слизистых  
**Основное действующее вещество:** Флавоноиды корня солодки (без глицирризина)  
**Синонимы:** ДГЛ, Deglycyrrhizinated Licorice, корень солодки (очищенный)  
**Лекарственный аналог:** Гастропротекторы (ребагит, висмута субцитрат)

## Что это такое

Солодка деглицирризированная — экстракт корня солодки (Glycyrrhiza glabra), из которого удалён глицирризин (вещество, вызывающее повышение давления и задержку жидкости). DGL-форма безопасна для длительного применения, в отличие от обычной солодки.

**Отличие от обычной солодки:** DGL не содержит глицирризин → не повышает АД, не задерживает калий, не влияет на тестостерон.

## Внешний вид

## Метаболический цикл

- **Всасывание:** глицирризиновая кислота (из корня солодки) всасывается в тонкой кишке, но в DGL-форме (деглицирризированной) глицирризиновая кислота удалена (минимальный системный эффект). Оставшиеся флавоноиды (ликвиритин, глабридин) — всасывание через кишечник.
- **Метаболизм:** глицирризиновая кислота → глицирретиновая кислота (гидролиз β-глюкуронидазой микробиоты). Активный метаболит — ингибитор 11β-HSD2 (→ повышение кортизола → псевдогиперальдостеронизм). В DGL — этот путь минимизирован.
- **Распределение:** глицирризиновая кислота — связывание с альбумином (>95%). DGL-флавоноиды — преимущественно локально в слизистой ЖКТ.
- **Выведение:** T½ 6–12 ч. Глицирризиновая кислота — через желчь. DGL-метаболиты — через почки.
- **Особенность:** DGL форма безопасна при длительном приёме (не повышает кортизол/АД). Обычная солодка — ограничение курса до 4–6 недель из-за риска гипокалиемии.

## Механизмы действия

- **Увеличивает производство слизи** — защищает желудок и пищевод от избыточной кислоты
- **Способствует заживлению язв и эрозий** — ускоряет регенерацию слизистой
- **Противовоспалительное действие**
- **Нейропротектор**
- **Увеличивает скорость эрадикации H. pylori** — примерно на 20% при добавлении к тройной терапии

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Функциональная диспепсия | Высокая | Убирает боль и тошноту |

## Форма приема и порядок

Жевательные таблетки (DGL — deglycyrrhizinated, 200–400 мг), порошок, жидкий экстракт, капсулы. Только DGL (без глицирризина — не повышает давление). Принимать за 20 мин до еды, разжёвывать

Солодка способствует активации Th1-иммунного ответа. Противопоказана при заболеваниях с доминированием Th1:

Не содержится в продуктах питания как добавка. Пищеварительные ферменты организма вырабатываются поджелудочной железой и слизистой. Продукты, содержащие природные ферменты: папайя (папаин), ананас (бромелайн), киви (актинидин), манго, ферментированные продукты (мисо, кимчи, кефир)

`# Льняной кисель (Flaxseed jelly, Linum usitatissimum)

**Категория:** Пищевой продукт / Фитотерапия  
**Тип:** Демульцент (обволакивающее) / Источник клетчатки

**Синонимы:** Льняное семя, flaxseed gel, льняной отвар

Льняной кисель — отвар (настой) семян льна, образующий слизистый гель. Относится к группе обволакивающих средств: льняной кисель (как и овсяный отвар, кисель из семян чиа, ржавый вяз) покрывает слизистую защитной плёнкой, давая ей возможность самостоятельно регенерироваться.

Гель/кисель — прозрачная или слегка мутная слизистая масса, от светлого до коричневато-жёлтого цвета (в зависимости от степени заваривания)

## Метаболический цикл

- **Всасывание:** слизь (водорастворимые полисахариды: арабиноксиланы, рамногалактуронаны) не всасывается в ЖКТ. Действие — локально: обволакивание слизистой, замедление эвакуации из желудка. Линганы (секоизоларицирезинол) — частично ферментируются микробиотой в активные энтеролигнаны.
- **Метаболизм:** полисахариды — ферментация микробиотой толстой кишки → КЦЖК (бутират, пропионат, ацетат). Линганы — конверсия в энтеролигнаны (энтеродиол, энтеролактон) с антиоксидантной активностью. Омега-3 (ALA) — частично в EPA (5–10%).
- **Распределение:** энтеролигнаны — связывание с SHBG (глобулин связывания половых гормонов). ALA — включение в липопротеины. Полисахариды — локально в толстой кишке.
- **Выведение:** T½ энтеролигнанов 12–24 ч. Почки + кал. Клетчатка — с калом (структурирует стул).
- **Особенность:** семя льна должно быть молотое (целые семена — <10% усвоения ALA). Слизь — максимальный эффект через 30–60 мин после приёма. Обильное питьё — обязательно.

- **Обволакивающее** — превращается в гель, покрывающий слизистую ЖКТ
- **Защитная плёнка** — пока гель защищает слизистую, она регенерируется
- **Противовоспалительное** — за счёт омега-3 (ALA) и лигнанов
- **Источник растворимой клетчатки** — пребиотик для микробиома
- **Регулирует стул** — и при запорах (клетчатка), и при диарее (гель)
- **Слизеобразующее** — увлажняет и успокаивает раздражённые ткани

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| ГЭРБ, рефлюкс-эзофагит | Обволакивает пищевод |
| Гастрит (любой формы) | Защищает слизистую |
| Язвенная болезнь | Снижает контакт с кислотой |

- **Принимать:** за 20–30 мин до еды
- **Не разогревать** — гель разрушается
- **Не принимать одновременно с лекарствами** — обволакивающее действие снижает всасывание (разносить на 2 часа)

Кисель (1 ст.л. семян на 200 мл кипятка, настоять 30–60 мин, процедить). Принимать за 20–30 мин до еды. Не разогревать (гель разрушается). Не принимать одновременно с лекарствами — разносить на 2 часа. Готовить свежий ежедневно. Курс: длительно

Семена льна (основной источник — для приготовления киселя), цельнозерновая льняная мука, льняное масло (не даёт геля), семена чиа (аналогичный гель), овсяный отвар (похожий обволакивающий эффект)

> 🥣 **Льняной кисель — «скорлупа» для раздражённого желудка.** Обволакивает, защищает, даёт слизистой восстановиться. Готовьте свежий ежедневно (1 ст.л. семян на 200 мл кипятка, настоять 30 мин). Не грейте, не смешивайте с лекарствами — разносите на 2 часа.

`# Имбирь (Ginger, Zingiber officinale)

**Категория:** Растительное средство  
**Тип:** Нутрицевтик / Противовоспалительное / Антисептик  
**Основное действующее вещество:** Гингеролы, шогаолы  
**Синонимы:** Корень имбиря, Ginger root

## Что это такое

Имбирь — корневище тропического растения Zingiber officinale. Основное действующее вещество — гингерол, обеспечивающий жгучий вкус и терапевтические эффекты. Используется в кулинарии, чаях и капсулированных формах.

## Внешний вид

Светло-жёлтый порошок (молотый имбирь) с характерным пряным ароматом; свежий корень — мясистый, узловатый, светло-коричневый

## Метаболический цикл

- **Всасывание:** гингеролы и шогаолы всасываются в тонкой кишке (пассивная диффузия, липофильны). Cmax через 30–60 мин. Биодоступность 50–70% (относительно высокая для фитохимикатов).
- **Метаболизм:** гингеролы → шогаолы (дегидратация при нагревании/хранении). Фаза II: глюкуронирование/сульфатирование в печени (UGT1A1, UGT1A9) и энтероцитах. Частичное CYP-опосредованное окисление.
- **Распределение:** гингеролы — связывание с альбумином (>90%). Проникновение через ГЭБ — ограниченное. Накопление в слизистой ЖКТ (местное противовоспалительное).
- **Выведение:** T½ гингеролов 1–3 ч. Преимущественно с желчью/калом (>70%), почками (15–20%).
- **Особенность:** имбирь в сухом виде — выше концентрация шогаолов (более биоактивны, чем гингеролы). Свежий имбирь — больше гингеролов (более мягкое действие).

## Механизмы действия

- **Блокирует простагландины** — действие, подобное НПВС, но более мягкое
- **Антимикробное** — водный экстракт снижает рост Helicobacter pylori
- **Снижает образование свободных радикалов** в слизистой желудка от действия H. pylori
- **Прокинетик** — улучшает моторику ЖКТ сверху вниз
- **Ветрогонное** — уменьшает газообразование
- **Противогрибковое** — активен против некоторых грибковых инфекций
- **Антибактериальное** — активен против золотистого стафилококка, кишечной палочки (при незначительном обсеменении)
- **Антиоксидантное** — антиэйдж-эффект
- **Болеутоляющее** — при суставных и мышечных болях

## Показания

| Показание | Эффект |
|-----------|--------|
| Тошнота любой этиологии | Противорвотный (рассосать ломтик) |
| Нарушение углеводного обмена | Сжигание жира, снижение массы тела |
| Метаболический синдром | Липидный профиль, АД, масса тела |
| СИБР / СИГР | Противомикробная активность |
| СРК с нарушением моторики | Останавливает диарею, улучшает перистальтику |
| Воспаление дыхательных путей | Противовоспалительный эффект |
| Суставные боли (артрит, остеоартроз) | Болеутоляющий эффект |
| Сердечно-сосудистая система | Укрепляет стенки сосудов |
| Гликемический профиль | Снижает уровень глюкозы |

## Особенности приёма

- **Формы:** чай, капсулы, порошок, свежий корень
- **Средняя дозировка:** 300–450 мг/сут (экстракт)
- **При тошноте:** рассосать ломтик свежего имбиря
- **Противопоказаний практически нет**, кроме индивидуальной непереносимости
- При СИБР следует учитывать, что имбирь может усиливать перистальтику — начинать с малых доз

## Форма приема и порядок

Свежий корень (для чая, натирания), порошок (капсулы 500–1000 мг), экстракт жидкий, настойка, таблетки для рассасывания (при тошноте). Курс: 4–8 недель. При тошноте — за 30 мин.

## Противопоказания

- Индивидуальная непереносимость
- Желчнокаменная болезнь (стимулирует сокращения ЖП — только после консультации)
- Беременность — ограниченно (в небольших количествах — чай, но не капсулы)


## Топ-5 продуктов, в которых содержится

Корень имбиря (свежий и молотый), имбирный чай, имбирные пряники/печенье, имбирный эль (натуральный), маринованный имбирь

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Куркумин | Синергия противовоспалительного (NF-κB + COX/LOX) |
| ++ | Босвеллия | Усиление анальгетического и противовоспалительного |
| ++ | Омега-3 | Дополнение противовоспалительного каскада |
| ++ | Витамин B6 | Синергия при тошноте (особенно беременных) |
| + | Мята перечная | Усиление ветрогонного и спазмолитического эффекта |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антикоагулянты (варфарин) | Усиление антикоагуляции (гингеролы ингибируют тромбоксан) |
| ++ | Антиагреганты (аспирин) | Суммирование — риск кровотечения |
| + | Ингибиторы протонной помпы | Имбирь может снижать эффективность ИПП (ускорение опорожнения) |
| + | Желчегонные | Усиление — с осторожностью при камнях |

## Выбор: имбирь vs босвеллия

При необходимости выбора между имбирём и босвеллией предпочтение отдаётся **босвеллии** как более сильному и таргетному противовоспалительному средству. Имбирь — более мягкая альтернатива при низкоуровневом воспалении и как симптоматическое средство при тошноте.

- Имбирь снижает рост H. pylori и образование свободных радикалов в слизистой желудка.
- При тошноте эффективность имбиря подтверждена Cochrane review.
- Имбирь часто включается в комплексные препараты для снижения массы тела.

## Лайфхак для пользователя (Nutrition Tip)

> 🍵 **Тошнота, укачивание, утренняя тошнота — имбирь первая помощь.** Рассосите ломтик свежего имбиря или заварите чай. При СИБР, СРК и метаболическом синдроме — имбирь работает на несколько мишеней сразу (противовоспалительно, прокинетик, противомикробно).

## Ссылки

1. Mashhadi NS, et al. Anti-oxidative and anti-inflammatory effects of ginger in health and physical activity: review of current evidence. Int J Prev Med. 2013;4(Suppl 1):S36-S42.
2. Ryan JL, et al. Ginger (Zingiber officinale) reduces acute chemotherapy-induced nausea: a URCC CCOP study. Support Care Cancer. 2012;20(10):2459-2463.

`# Глутамин (L-Glutamine)

**Категория:** Аминокислота  
**Тип:** Нутрицевтик / Заживление слизистых  
**Основная форма:** L-глутамин  
**Суточная потребность (условно):** 5–10 г/сут (эндогенный синтез), в стрессовых состояниях — до 20 г/сут  

## Что это такое

Глутамин — условно незаменимая аминокислота. В нормальных условиях синтезируется в организме, но при стрессе, болезнях и повреждениях ЖКТ его собственная продукция становится недостаточной. Является основным топливом для энтероцитов (клеток кишечного эпителия) и иммунных клеток.

## Внешний вид

Белый кристаллический порошок без запаха, с нейтральным вкусом (слегка сладковатый, напоминает сахарную пудру)

## Метаболический цикл

- **Всасывание:** активный натрий-зависимый транспорт (B⁰AT1, SLC6A19; SN2, SLC38A5) в тонкой кишке. Наиболее активно — в тощей кишке. Cmax через 30–45 мин. До 70–80% абсорбированного глутамина метаболизируется в энтероцитах.
- **Метаболизм:** энтероциты: глутамин → глутамат (глутаминаза) → α-кетоглутарат → цикл Кребса (энергия). Печень: глутамин → синтез мочевины. Почки: глутамин → аммоний (регуляция pH). Иммунные клетки: субстрат для пролиферации.
- **Распределение:** самая распространённая свободная аминокислота в крови (500–700 мкМ). 60% в скелетных мышцах (главное депо). Транспорт через ГЭБ — через систему L (LAT1).
- **Выведение:** почечная экскреция (канальцевая реабсорбция — практически полная, порог ~600 мкМ). При распаде мышц — увеличивается экскреция.
- **Особенность:** при стрессе (травма, сепсис, интенсивные тренировки) потребность возрастает в 3–5 раз. Для ЖКТ — предпочтителен приём натощак (эффект на энтероциты). Для мышц — после тренировки.

## Механизмы действия

- **Топливо для энтероцитов** — основное питательное вещество для клеток слизистой кишечника
- **Субстрат синтеза глутатиона** — главного антиоксиданта организма
- **Участвует в аммониогенезе в почках** — выведение кислоты при ацидозе
- **Субстрат для синтеза мочевины в печени** — отведение аммиака
- **Укрепляет межклеточные контакты** — уменьшает кишечную проницаемость (leaky gut)
- **Предшественник ГАМК** — через глутамат (при нарушении баланса глутамат-ГАМК → кошмары, гиперактивность)

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Повышенная кишечная проницаемость | Высокая | Укрепляет плотные контакты |
| Стресс | Хорошая | Синтез глутатиона, защита от окислительного стресса |

`# Глицин (Glycine)

**Категория:** БАД / Аминокислота  
**Тип:** Протеиногенная аминокислота  
**Основное действующее вещество:** Аминоуксусная кислота (Glycine)  
**Синонимы:** Glycine, аминоуксусная кислота, гликокол  

## Что это такое

Глицин — простейшая протеиногенная аминокислота. Играет множественные роли в организме: конъюгация жёлчных кислот (образует гликохолевую кислоту), синтез глутатиона, нейромедиатор (ГАМК-ергический и NMDA-рецепторный сигналинг), участие во II фазе детоксикации печени (конъюгация с глицином), синтез гемоглобина и метаболизм головного мозга.

## Внешний вид

Белый кристаллический порошок, сладковатый на вкус (в 0.8 раз слаще сахара), хорошо растворим в воде

## Метаболический цикл

- **Всасывание:** натрий-зависимые транспортеры глицина (GlyT1, SLC6A9; IMINO, SLC6A20) в тонкой кишке. Cmax через 30–60 мин. Всасывание — быстрое и полное.
- **Метаболизм:** три основных пути: (1) синтез глутатиона (γ-глутамилцистеин → GSH) — ключевой антиоксидант; (2) синтез гема (δ-аминолевулиновая кислота); (3) синтез креатина (глицин + аргинин → гуанидиноацетат). Катаболизм: глицин → серин → пируват (глицин-расщепляющая система).
- **Распределение:** глицин — нейротрансмиттер (спинной мозг, ствол мозга). Транспорт через ГЭБ — через глициновые транспортеры (GlyT1). В плазме — 200–400 мкМ.
- **Выведение:** T½ глицина 0.5–2 ч. Почечная экскреция (канальцевая реабсорбция — пороговое значение). Избыток — окисление до CO₂ + H₂O.
- **Особенность:** для ЖКТ — действие через синтез глутатиона + коллагена. Для сна — агонист NMDA-глицинового сайта спинного мозга (миорелаксация). Доза для сна 3 г перед сном.

## Механизмы действия

- **Конъюгация жёлчных кислот** — образование гликохолевой кислоты (вторичные жёлчные кислоты)
- **Детоксикация II фаза** — конъюгация с глицином → выведение бензойной кислоты и её производных
- **Предшественник глутатиона** — субстрат для синтеза GSH
- **ГАМК-ергическое** — активирует процессы торможения в ЦНС, седативный эффект
- **NMDA-модуляция** — ко-агонист NMDA-рецепторов (в паре с глутаматом)
- **Синтез гемоглобина** — входит в состав гема
- **Регуляция сна** — снижение температуры тела, улучшение засыпания
- **Метаболизм оксалатов** — глицин — один из предшественников синтеза оксалатов
- **Коллагенообразование** — каждая 3-я аминокислота коллагена

## Показания (ЖКТ + детокс + нервная система)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Застой желчи (улучшение реологии) | 1B | Конъюгация + таурин/глицин |
| Детоксикация (II фаза, бензойная кислота) | 2A | Конъюгация с глицином |
| Стресс / тревожность | 1B | Седативный эффект |
| Бессонница | 1B | Улучшение засыпания |
| Сниженный ферритин | 2B | Синтез гема |
| Умственная сфера / когниции | 2B | Метаболизм мозга |
| Высокий гомоцистеин (как донор) | 2B | Метилирование |
| Метаболический синдром | 2B | Чувствительность к инсулину |

## Особенности приёма

- **Стандартная дозировка:** 1000–3000 мг на ночь
- **Форма:** сублингвальные таблетки (100–300 мг), порошок, капсулы
- **Приём:** сублингвально (лучшая биодоступность, быстрый седативный эффект)
- **Важный нюанс:** у части людей глицин может не успокаивать, а бодрить — это связано с NMDA-рецепторами (глицин + глутамат открывают Na/Ca-каналы). Возможные причины возбуждающей реакции:
  - Нейровоспаление (после COVID)
  - Дефицит магния (Mg — антагонист Ca) → избыток Ca в клетке
  - Избыток натрия / дефицит калия
  - Избыток глутамата в пище (синдром китайского ресторана)
- **При возбуждающей реакции:** перенести на первую половину дня или отменить
- **Противопоказан при склонности к оксалатным камням** (оксалаты синтезируются из глицина, глюкозы и аскорбиновой кислоты)

## Форма приема и порядок

Сублингвальные таблетки (100–300 мг), порошок (1000–3000 мг на ночь). На ночь — сублингвально (седация). При возбуждающей реакции — перенести на утро. Курс: 4–8 недель

## Противопоказания

- Оксалатные камни в почках
- Нейровоспаление с гипервозбудимостью
- Беременность, лактация (безопасность не установлена)


## Топ-5 продуктов, в которых содержится

Костный бульон (желатин — глицин составляет 1/3 аминокислот), кожа курицы, свиная шкурка (холодец), коллагеновые продукты (желе, мармелад — на желатине), бобовые (нут, фасоль, чечевица), тыквенные семечки

> 💤 **Глицин — универсальный помощник для желчи и сна.** Работает на двух фронтах: жёлчные кислоты (гликохолевая) + седативный (ГАМК). Стандартная схема — 1000–3000 мг на ночь сублингвально. Если бодрит — проверьте глутамат в пище и магний (дефицит Mg — частая причина возбуждения). Важно: не назначать при оксалатных камнях (глицин — предшественник оксалатов).

`# Лецитин (Lecithin / Phosphatidylcholine)

**Категория:** БАД / Фосфолипиды  
**Тип:** Эссенциальные фосфолипиды  
**Основное действующее вещество:** Фосфатидилхолин (60%), фосфатидилэтаноламин, фосфатидилинозитол  
**Синонимы:** Lecithin, фосфатидилхолин, PC, E322, соевый/подсолнечный/яичный лецитин  

## Что это такое

Лецитин — смесь фосфолипидов, природный эмульгатор. Основной компонент — фосфатидилхолин (ФХ), составляющий ~60% клеточных мембран гепатоцитов и ~30% ткани головного мозга. Ключевой компонент желчи — улучшает её текучесть, предотвращает выпадение холестерина в осадок и расслоение желчи. Основной пищевой источник холина — предшественника ацетилхолина.

## Внешний вид

Воскообразная масса/жидкость от жёлтого до коричневого цвета. Подсолнечный — золотисто-жёлтый; соевый — коричневатый; яичный — кремовый. Гранулы — тёмно-жёлтые

## Метаболический цикл

- **Всасывание:** фосфатидилхолин (главный компонент лецитина) эмульгируется желчными кислотами, гидролизуется панкреатической фосфолипазой A2 в двенадцатиперстной кишке до лизофосфатидилхолина + жирных кислот. Всасывание — микробный транспорт в энтероциты.
- **Метаболизм:** ресинтез фосфатидилхолина в энтероцитах → включение в хиломикроны. Печень: фосфатидилхолин → синтез VLDL, жёлчных кислот. Мозг: CDP-холиновый путь → синтез ацетилхолина (нейротрансмиттер).
- **Распределение:** фосфатидилхолин — компонент всех клеточных мембран (10–20% липидов). Высокая концентрация в печени, мозге. Транспорт через ГЭБ — специфические транспортеры холина (CHT1, SLC5A7).
- **Выведение:** холин — почечная экскреция (10–15% фильтрованного). Метаболизм в печени — включение в жёлчные кислоты. T½ 4–8 ч.
- **Особенность:** для ЖКТ — эмульгирование жиров (желчегонное), мембранная защита гепатоцитов. Для мозга — предшественник ацетилхолина (улучшение памяти). Соевый лецитин — 20–30% фосфатидилхолина. Солнечный лецитин — 95%+.

## Механизмы действия

- **Улучшение реологии желчи** — делает желчь более текучей, контролирует концентрацию
- **Профилактика камней** — предотвращает выпадение холестерина в осадок
- **Гепатопротекторное** — восстановление мембран гепатоцитов (60% внешнего строя)
- **Текучесть мембран** — восстановление клеток печени (даже при 80% разрушении)
- **Нейропротекторное** — синтез миелина, передача нервного сигнала (ацетилхолин)
- **Снижение тревожности** — более высокий уровень холина → ниже тревога
- **Улучшение памяти и когниции** — предшественник ацетилхолина
- **Синтез миелина** — защита нервных волокон (рассеянный склероз)
- **Метилирование** — окисление холина до бетаина → донор метильных групп

## Показания (ЖКТ + неврология)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Застой желчи / улучшение реологии | 1B | Улучшение текучести, нет противопоказаний при камнях |
| Неалкогольная жировая болезнь печени | 1B | Восстановление мембран, снижение стеатоза |
| Желчнокаменная болезнь (профилактика) | 2A | Превентивная мера |
| Синдром повышенной кишечной проницаемости | 2B | Влияние на текучесть мембран |
| Умственная сфера / память | 1B | Улучшение когнитивных функций |
| Бессонница / тревожность | 2A | Успокаивающий эффект |
| Высокий гомоцистеин | 2B | Донор метильных групп (холин → бетаин) |
| Рассеянный склероз (поддержка) | 2B | Синтез миелина |
| Синдром хронической усталости | 2B | Энергетический метаболизм |

## Формы лецитина

| Форма | Источник | Особенности |
|-------|----------|-------------|
| Подсолнечный | Helianthus annuus | Богат омега-6; риск перекоса омега-6/омега-3; риск контаминации глифосатом* |
| Соевый | Glycine max | Может влиять на метаболизм эстрогенов; мужчинам при гиперэстрогении — нежелательно |
| Яичный | Желток куриного яйца | Золотой стандарт: нет противопоказаний, минимальный риск; высокая цена |

*Ситуация с подсолнечным лецитином: Украина — основной поставщик подсолнечника, поля в плачевном состоянии; сырье часто с глифосатом и пестицидами.

## Особенности приёма

- **Профилактическая дозировка:** 3 г/день
- **Курс:** 4–12 недель
- **Приём:** с едой (можно растворять в тёплой пище, но не нагревать выше 40°C)
- **Форма:** капсулы (жидкий лецитин), порошок, гранулы
- **Важно:** микрофлора кишечника преобразует лецитин в триметиламиноксид (ТМАО) — фактор риска сердечно-сосудистых заболеваний при высоких дозах
- **Не перегревать** — лецитин разрушается

## Форма приема и порядок

Гранулы (1 ст.л. = ~3 г), капсулы (1200 мг), жидкий (амбер-цвет). Растворять в тёплой пище/напитке, не нагревать выше 40°C. Принимать с едой. Профилактическая доза: 3 г/день. Курс: 4–12 недель. При высоких дозах — контроль ТМАО

## Противопоказания

- Индивидуальная непереносимость
- Аллергия на сою (соевый лецитин)
- Тяжёлая почечная недостаточность (ограничение фосфора)


## Топ-5 продуктов, в которых содержится

Яичный желток (самый богатый источник), соевые бобы (соевый лецитин), подсолнечник (подсолнечный лецитин), печень говяжья, зародыши пшеницы, арахис

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Таурин | Синергия реологии желчи (таурин + лецитин) |
| +++ | Силимарин | Синергия гепатопротекции (мембраны + антиоксидант) |
| ++ | Пантотеновая кислота (B5) | Трансформация фосфатидилхолина в ацетилхолин |
| ++ | Метилфолат + метилкобаламин | Синергия метилирования (бетаин + фолаты) |
| ++ | Омега-3 | Дополнение мембранной терапии |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |

| ++ | Алкоголь | Повреждает мембраны — конкуренция за фосфолипиды |
| ++ | Высокая температура (> 60°C) | Разрушение лецитина |
| + | Оксалаты | Связывание холина |
| + | Антибиотики (длительно) | Дисбиоз → повышение ТМАО |

## Научные факты

- РКИ (2018): лецитин (3 г/день) улучшает реологию желчи и снижает литогенность у пациентов с билиарным сладжем.

> 🥚 **Лецитин — «текучесть» для печени и мозга.** Не является желчегонным — просто улучшает реологию желчи, поэтому безопасен даже при камнях. Предпочтительная форма — яичный лецитин (нет риска ГМО, пестицидов, влияния на эстрогены). Подсолнечный — риск глифосата, соевый — осторожно при эстрогендоминировании. Дозировка ~3 г/день, не нагревать. Для когнитивных жалоб — отличный выбор.
