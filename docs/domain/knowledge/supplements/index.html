`# Мастиковая смола (Mastic gum, Pistacia lentiscus)

**Категория:** Растительное средство  
**Тип:** Нутрицевтик / Природный антибиотик  
**Основное действующее вещество:** Мастиковая кислота, эфирные масла  
**Синонимы:** Mastic gum, Chios mastic, мастика хиосская  

## Что это такое

Мастиковая смола — смола дерева Pistacia lentiscus (фисташка мастичная), произрастающего на о. Хиос (Греция). Традиционно используется как природный антибиотик, антисептик и гастропротектор.

## Внешний вид

Смола (мастика) — прозрачные или полупрозрачные капли янтарно-жёлтого цвета, хрупкие, при жевании становятся мягкими и белыми

## Метаболический цикл

- **Всасывание:** мастичная смола (50–60% политерпены, 20–30% смоляные кислоты) не всасывается системно в значимых количествах. Действует преимущественно локально в просвете ЖКТ — обволакивающий эффект, антимикробный (H. pylori).
- **Метаболизм:** частичная эмульгация в тонкой кишке под действием жёлчных кислот. Мастичная кислота — активное соединение (20–25% смолы). Деметилирование и гидроксилирование в печени (CYP2C9, CYP3A4).
- **Распределение:** минимальное системное — <3% от принятой дозы. Локально — обволакивание слизистой желудка и двенадцатиперстной кишки (пищевод — натощак).
- **Выведение:** преимущественно с калом (>90% в неизменённом виде).
- **Особенность:** жевательная форма (мастика) обеспечивает лучшее покрытие слизистой желудка, чем капсулы. Курс — 2–4 недели для антихеликобактерного эффекта.

## Механизмы действия

- **Природный антибиотик** — подавляет H. pylori, другие патогенные бактерии
- **Противовоспалительное действие** — уменьшает воспаление при ВЗК
- **Создаёт защитную плёнку** в желудке — обволакивает и защищает слизистую
- **Заживляет язвы** двенадцатиперстной кишки
- **Антисептик** — для всего ЖКТ

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| H. pylori | Умеренная | В комплексной терапии |
| Язва ДПК | Хорошая | Заживляющий эффект |
| Болезнь Крона | Умеренная | Снижение воспаления |
| Воспалительные заболевания ЖКТ | Хорошая | Антисептик + плёнка |

## Особенности приёма

- **Начинать с минимальных доз** — подсушивает слизистую, не всем комфортно
- **Курс:** 4–8 недель
- При воспалительном процессе и нарушении целостности слизистой — один из предпочтительных вариантов

## Форма приема и порядок

Смола (жевательная, 100–500 мг × 2–3 р/день), капсулы/таблетки (500 мг), порошок, настойка. Принимать натощак или через 1 ч после еды. Курс: 4–8 недель. Жевательная форма — для санации полости рта и H. pylori

## Побочные эффекты

- **Подсушивает слизистую** — дискомфорт у некоторых пациентов
- **Аллергия** — возможна индивидуальная реакция

## Противопоказания

- Индивидуальная непереносимость
- Аллергия на фисташки/кедровые орехи (возможна перекрёстная реакция)
- Беременность, лактация (недостаточно данных)


## Топ-5 продуктов, в которых содержится

Мастиковая смола (Mastiha) — жевательная смола с о. Хиос; мастика в составе ликёров (мастиха), мастика в кондитерских изделиях (мороженое, десерты), мастиковая жвачка, мастиковый чай (отвар)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Солодка DGL | Синергия при H. pylori (антимикробное + слизеобразование) |
| +++ | Пробиотики (S. boulardii) | Синергия эрадикации H. pylori + защита микробиома |
| ++ | Берберин | Усиление антимикробного действия (разные механизмы) |
| ++ | Цинк-L-карнозин | Защита слизистой + антибактериальное (H. pylori) |
| + | Омега-3 | Противовоспалительное дополнение при гастрите |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антибиотики (кларитромицин, амоксициллин) | Снижение эффективности (мастика — антагонист некоторых антибиотиков) |
| + | ИПП (омепразол) | Снижение pH-зависимой активности мастики (теоретически) |

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Мастиковая смола — природная альтернатива антибиотикам при хеликобактере.** Создаёт защитную плёнку в желудке. Внимание: подсушивает слизистую — если дискомфорт, начните с меньшей дозы или сочетайте с алоэ вера.

## Ссылки

1. Huwez FU, et al. Mastic gum kills Helicobacter pylori. N Engl J Med. 1998;339(26):1946.
2. Dabos KJ, et al. The effect of mastic gum on Helicobacter pylori: a randomized pilot study. Dig Dis Sci. 2010;55(3):755-760.

`# N-ацетилцистеин (N-Acetylcysteine, NAC)

**Категория:** БАД / Аминокислота / Детокс  
**Тип:** Тиольный антиоксидант, предшественник глутатиона  
**Основное действующее вещество:** N-ацетил-L-цистеин  
**Синонимы:** NAC, АЦЦ, флуимуцил, N-ацетилцистеин  

## Что это такое

N-ацетилцистеин (NAC) — производное аминокислоты L-цистеина. Наиболее важное свойство — предшественник глутатиона (главного внутриклеточного антиоксиданта). NAC широко применяется как муколитик (при кашле, бронхите), а также для поддержки печени, антиоксидантной защиты и коррекции оксидативного стресса при многих состояниях.

## Внешний вид

Белый кристаллический порошок; шипучие таблетки — белые с кислым лимонным вкусом; капсулы — с белым порошком; характерный сернистый запах

## Метаболический цикл

- **Всасывание:** быстрое и полное в тонкой кишке (PEPT1-транспортер, SLC15A1). Cmax через 30–60 мин. Биодоступность <10% (интенсивный пресистемный метаболизм — деацетилирование в энтероцитах).
- **Метаболизм:** деацетилирование → L-цистеин (фермент ацилаза). Цистеин → синтез глутатиона в печени (γ-глутамилцистеинлигаза — лимитирующая стадия). Альтернативный путь: сульфатация → таурин, сероводород. Тиольная группа — восстановление других антиоксидантов.
- **Распределение:** NAC — 30% связывание с белками плазмы. Глутатион — внутриклеточно (0.5–10 мМ). Cmax 30–60 мин. Транспорт через ГЭБ — минимальный (<5% от плазменного).
- **Выведение:** T½ NAC 2–6 ч (двухфазная). Преимущественно почками (30–40% как цистеин/метаболиты). Дыхание (CO₂ из окисления цистеина) — до 20%.
- **Особенность:** NAC — пролекарство для глутатиона. Эффект на печень — системный (независимо от пути приёма). Для прямого действия на ЖКТ — местное (защита слизистой).

## Механизмы действия (ЖКТ + детокс)

- **Предшественник глутатиона** — субстрат для синтеза GSH (лимитирующая стадия)
- **Муколитическое** — разрывает дисульфидные связи в слизи → разжижение
- **Антиоксидантное** — прямая нейтрализация свободных радикалов (тиольная группа SH)
- **Хелатирование тяжёлых металлов** — связывает ртуть, свинец, кадмий
- **Детоксикация печени** — поддержка 2 фазы (конъюгация с глутатионом)
- **Противовоспалительное** — снижение NF-κB, TNF-α, IL-6
- **Защита слизистой ЖКТ** — снижение окислительного стресса при гастрите
- **Модуляция микробиома** — снижение аэробных патогенов (через оксидативный стресс)

## Показания (ЖКТ + детокс в фокусе)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Токсические поражения печени (парацетамол) | 1А | Стандарт терапии (антидот) |
| НАЖБП | 1B | Снижение стеатоза, трансаминаз |
| Хронический гепатит | 2A | Дополнение к терапии |
| Эрадикация H. pylori | 1B | Увеличивает эффективность (NAC + антибиотики) |
| Гельминтозы (в комплексной терапии) | 2B | Снижает оксидативный стресс |
| Мукоцилиарный клиренс (синусит, бронхит) | 1А | Муколитик |
| Тяжёлые металлы (детокс) | 2B | Хелатор (только под контролем) |
| Хроническое воспаление слизистых | 1B | Антиоксидантная поддержка |

## Особенности приёма

- **Стандартная дозировка:** 600–1200 мг/день (в 1–2 приёма)
- **Максимальная:** до 3000 мг/день (под наблюдением врача)
- **Курс:** 4–12 недель (для печени — до 24 недель)
- **Форма:** капсулы, порошок, шипучие таблетки, ингаляции
- **Приём:** натощак или с едой (натощак — лучше всасывание, но может раздражать желудок)
- **Витамин С** — усиливает действие NAC (синергия антиоксидантов)

## Форма приема и порядок

Капсулы (600–1200 мг/день), порошок (растворить в воде), шипучие таблетки. Принимать натощак или с едой (натощак — лучше всасывание). Курс: 4–12 недель (для печени — до 24). Не сочетать с активированным углём. При астме — с осторожностью

## Противопоказания

- Язвенная болезнь (обострение)
- Бронхиальная астма (NAC может вызывать бронхоспазм у астматиков)
- Тяжёлая печёночная/почечная недостаточность (высокие дозы)
- Беременность (I триместр — с осторожностью)


## Топ-5 продуктов, в которых содержится

Не содержится в значимых количествах в продуктах питания (производное цистеина). Эндогенный синтез из цистеина (источники цистеина: курица, индейка, яйца, молочные продукты, бобовые, овёс, чеснок, лук)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин C | Синергия антиоксидантной защиты (рециклинг глутатиона) |
| +++ | Селен (селенометионин) | Кофактор глутатионпероксидазы — усиление детокса |
| +++ | Альфа-липоевая кислота | Рециклинг глутатиона + регенерация витаминов C и E |
| ++ | Силимарин | Синергия гепатопротекции (разные механизмы) |
| ++ | Цинк | Кофактор Cu/Zn-супероксиддисмутазы |
| + | Расторопша | Дополнительная гепатопротекция |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Активированный уголь | Связывает NAC — не сочетать |
| ++ | Антикоагулянты | Потенцирование (теоретически — NAC снижает агрегацию тромбоцитов) |
| +++ | Нитроглицерин | Усиление вазодилатации и риск гипотензии |
| ++ | Алкоголь (острое отравление) | NAC — антидот при отравлении, но снижает эффективность при хроническом |

## Научные факты

- NAC — стандартный антидот при отравлении парацетамолом (снижает летальность до <1% при раннем введении).
- Мета-анализ (2019): NAC достоверно снижает АЛТ и АСТ при НАЖБП (SMD −0.42 и −0.38).
- РКИ (2020): NAC улучшает эрадикацию H. pylori на 17% в комбинации с антибиотиками.
- Исследование (2018): NAC снижает маркеры оксидативного стресса у рабочих с хронической экспозицией тяжёлых металлов.

## Лайфхак для пользователя (Nutrition Tip)

> 🧪 **NAC — «бустер» глутатиона и детокс-мастер.** Нет ни одного достоверного источника, который бы утверждал, что NAC — безопасное вещество для самолечения. Работает для печени, лёгких, защиты от токсинов. Курс 4–12 недель, 600–1200 мг/день. Классическая комбинация: NAC + Витамин С + Селен. Не совмещать с углём (активированным) и разносить с муколитиками.

## Ссылки

1. Smilkstein MJ, et al. Efficacy of oral N-acetylcysteine in the treatment of acetaminophen overdose. N Engl J Med. 1988;319(24):1557-1562.
2. Khoshbaten M, et al. N-acetylcysteine improves the efficacy of H. pylori eradication: a randomized controlled trial. Eur J Gastroenterol Hepatol. 2010;22(9):1077-1081.
3. Mato JM, et al. N-acetylcysteine for nonalcoholic fatty liver disease: a systematic review and meta-analysis. Liver Int. 2019;39(9):1652-1662.
4. Samuni Y, et al. The chemistry and biological activities of N-acetylcysteine. Biochim Biophys Acta. 2013;1830(8):4117-4129.
5. Rushworth GF, Megson IL. Existing and potential therapeutic uses for N-acetylcysteine: the need for conversion to intracellular glutathione. Antioxid Redox Signal. 2014;20(15):2414-2441.

`# Омега-3 жирные кислоты (Omega-3, n-3 PUFA)

**Категория:** ПНЖК (полиненасыщенные жирные кислоты)  
**Тип:** Витаминоподобное вещество (не синтезируется в организме)  
**Основные формы:** ЭПК (EPA), ДГК (DHA), АЛК (ALA)  
**Суточная норма (РФ):** 0.8–1.6 г/сут (сумма ЭПК+ДГК)  
**Суточная норма (международная):** 250–500 мг/сут EPA+DHA (профилактика), 1–4 г/сут (терапия)  
**Лекарственный аналог:** Омакор (этиловые эфиры n-3 ПНЖК)

## Что это такое

Омега-3 — группа полиненасыщенных жирных кислот с первой двойной связью в третьем положении от метильного конца. Незаменимые (эссенциальные), так как не синтезируются в организме человека. Путь получения — только экзогенный (пища или добавки).

## Внешний вид

Прозрачная маслянистая жидкость от светло-жёлтого до золотистого цвета (рыбий жир), с характерным рыбным запахом

## Метаболический цикл

- **Всасывание:** эмульгирование желчью, гидролиз панкреатической липазой в двенадцатиперстной кишке. Мицеллярный транспорт в энтероциты. Cmax EPA и DHA через 4–6 ч (этиловые эфиры — медленнее, на 30–40%, чем триглицериды).
- **Распределение:** реэтерификация в энтероцитах → хиломикроны → лимфа → системный кровоток. Включение в мембраны клеток (лейкоциты, эритроциты, кардиомиоциты). Индекс Omega-3 (O3I) — % EPA+DHA в эритроцитах (норма >8%).
- **Метаболизм:** β-окисление (митохондрии) для энергии. Синтез специализированных про-резолвирующих медиаторов (SPM): резольвины, протектины, марезины — ключевые для разрешения воспаления.
- **Выведение:** T½ EPA 4–6 дней, DHA 14–21 день (медленнее — большее депо в мозге). Окисление до CO₂ + H₂O. Минимально — почки (<1%).
- **Особенность:** форма имеет значение — триглицеридная усваивается на 80%, этиловые эфиры на 60%. Пить во время еды (жирной — на 30% выше всасывание). Витамин E (токоферолы) — защита от перекисного окисления.

## Механизмы действия

- **Ингибирует активность лейкотриенов** — ключевых факторов воспаления
- **Стимулирует гидроксилирование эстрогенов** — улучшает выведение метаболитов
- **Снижает триглицериды** — балансирует липидный профиль
- **Повышает ЛПВП** — защищает сердечно-сосудистую систему
- **Противовоспалительное действие** — через резольвины и протектины

## Важный нюанс

Омега-3 быстро окисляется. При остром воспалении в организме связки жирных кислот легко ломаются, и омега-3 может превратиться из полезной в омега-6, усугубляя воспаление. **При активном воспалении добавки омеги-3 противопоказаны.**

Организму омега-3 более ценна, чем омега-6. При одновременном поступлении гидроксилирование идёт по пути омега-3.

## Показания

| Показание | Эффективность |
|-----------|---------------|
| Эстрогендоминирование | Хорошая (стимулирует гидроксилирование эстрогенов) |
| Нарушение липидного профиля | Высокая (снижает ТГ, ЛПНП, повышает ЛПВП) |
| Сердечно-сосудистые заболевания | Высокая |
| Воспалительные процессы (не острые) | Хорошая |
| Дефицит жиров в рационе | Профилактическая |

## Особенности приёма

- **Дозировка:** 1–3 г/сут (профилактика), до 4 г/сут (терапия)
- **Форма:** рыбий жир, масло криля, этиловые эфиры, триглицеридная форма
- **Принимать с едой** (содержащей жиры для лучшего усвоения)
- **Не принимать при остром воспалении** (риск окисления → провоспалительный эффект)
- **Хранить в холодильнике** — омега-3 быстро окисляется на свету и при тепле

## Форма приема и порядок

Капсулы (желатиновые, 500–2000 мг), жидкий рыбий жир (во флаконах). Формы: триглицеридная (натуральная, лучше всасывается), этиловые эфиры. Принимать с едой (жирной). Хранить в холодильнике, защищать от света и окисления

## Противопоказания

- Острый воспалительный процесс
- Низкие тромбоциты
- Приём антикоагулянтов (требуется коррекция дозы с врачом)
- Индивидуальная непереносимость рыбы / аллергия на рыбу


## Топ-5 продуктов, в которых содержится

Жирная рыба (лосось, скумбрия, сардины, сельдь, анчоусы), печень трески, льняное семя (ALA), семена чиа (ALA), грецкие орехи (ALA)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин E | Предотвращает окисление омега-3 в организме |
| ++ | Льняное масло (ALA) | Дополнительный источник ALA → частичная конверсия в EPA |
| ++ | Куркумин | Синергия противовоспалительного (специализированные про-резолвирующие медиаторы) |
| ++ | Витамин D | Синергия иммуномодуляции |
| + | Магний | Кофактор дельта-6-десатуразы (превращение ALA в EPA/DHA) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Острые воспаления | Омега-3 окисляется в острой фазе → может ухудшить состояние |
| ++ | Антикоагулянты (варфарин) | Потенцирует — требуется контроль МНО (высокие дозы > 3 г/день) |
| ++ | Омега-6 избыток | Конкуренция за десатуразы → снижение продукции EPA/DHA из ALA |
| + | Алкоголь | Окислительный стресс → разрушение омега-3 |

## Лайфхак для пользователя (Nutrition Tip)

> 🐟 **Не пейте омега-3 при остром воспалении!** В острой фазе омега-3 окисляется и может ухудшить состояние. Дождитесь стихания процесса. Для баланса омега-6 к омега-3 — добавляйте в рацион льняное масло (ALA) и жирную рыбу 2 раза в неделю.

## Ссылки

1. Calder PC. Omega-3 fatty acids and inflammatory processes: from molecules to man. Biochem Soc Trans. 2017;45(5):1105-1115.
2. Rangel-Huerta OD, et al. Omega-3 long-chain polyunsaturated fatty acids supplementation on inflammatory biomarkers: a systematic review. Br J Nutr. 2012;107(Suppl 2):S159-S170.

`# PEA — Пальмитоилэтаноламид (Palmitoylethanolamide)

**Категория:** Жирная кислота / Эндогенный медиатор  
**Тип:** Нутрицевтик / Противовоспалительное / Нейропротектор  
**Основное действующее вещество:** Пальмитоилэтаноламид  
**Синонимы:** PEA, Palmitoylethanolamide  

## Что это такое

PEA — эндогенный медиатор, синтезируемый в организме из пальмитиновой кислоты. Относится к семейству ацетилэтаноламидов (NAEs). Используется как мягкое и безопасное средство для уменьшения воспаления, особенно нейровоспаления и активации микроглии.

## Внешний вид

Белый кристаллический порошок (PEA) без запаха, со сладковатым вкусом

## Метаболический цикл

- **Всасывание:** липофильная молекула — пассивная диффузия в тонкой кишке. Частичное гидролизование ферментом FAAH в энтероцитах. Мицеллярная/липосомальная форма повышает биодоступность в 3–4 раза.
- **Метаболизм:** PEA — субстрат NAAA (N-ацилэтаноламин-гидролизующая кислая амидаза) → расщепление до этаноламина + пальмитиновой кислоты. Альтернативный путь — включение в мембранный пул (депо). PEA действует через PPAR-α и каналы TRPV1.
- **Распределение:** Vd — ограничен. Накопление в мембранах клеток (мозг, ЖКТ, кожа). Проникновение через ГЭБ — 5–10% (часть гидролизуется до входа).
- **Выведение:** T½ PEA 2–4 ч. Метаболиты — включение в β-окисление. Выведение — минимально (полностью метаболизируется).
- **Особенность:** для GI — местное действие на TRPV1 (висцеральная гиперчувствительность). Микронизированная/ультрамикронизированная форма — в 3–5 раз эффективнее стандартной (PeaPure, Normast).

## Механизмы действия

- **Активирует PPAR-α** — ядерный рецептор, регулирующий воспалительный ответ
- **Снижает активацию микроглии** — ключевой механизм при нейровоспалении
- **Укрепляет гематоэнцефалический барьер** (ГЭБ)
- **Модулирует тучные клетки** — снижает высвобождение провоспалительных медиаторов
- **Поддерживающая терапия аутоиммунных состояний**

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Нейровоспаление (постковид, ЧМТ) | Высокая | Укрепляет ГЭБ |
| Болезнь Альцгеймера | Поддерживающая | Снижает прогрессирование |
| Болезнь Паркинсона | Поддерживающая | Защита дофаминовых нейронов |
| Рассеянный склероз | Умеренная | Нейропротекция |
| Аутоиммунные заболевания | Поддерживающая | Безопасное противовоспалительное |
| Хроническая боль | Хорошая | Модуляция болевых сигналов |

## Особенности приёма

- **Действует медленно** — эффект через ~2 недели после начала приёма
- **Безопасный профиль** — практически нет побочных эффектов
- **Начинать с малых доз** для оценки переносимости

## Форма приема и порядок

Капсулы/таблетки (200–400 мг), порошок (сублингвально/орально). Формы: микронизированный PEA (лучшая биодоступность), PEA с лютеолином, ультрамикронизированный PEA. Принимать натощак или с едой. Курс: 8–12 недель

## Противопоказания

- Индивидуальная непереносимость (крайне редко)


## Топ-5 продуктов, в которых содержится

Соя (лецитин — следовые количества PEA), яичный желток (следы), не является диетическим компонентом; синтезируется эндогенно — не содержится в значимых количествах в продуктах питания

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Омега-3 (EPA/DHA) | Синергия разрешения воспаления (SPMs + PEA) |
| ++ | Куркумин | Усиление противовоспалительного (разные рецепторы) |
| ++ | Лютеолин/кверцетин | Синергия стабилизации тучных клеток |
| + | Магний | Синергия при нейропатической боли |
| + | Витамин B12 | Дополнение при нейропатии |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| + | Иммуносупрессоры | Теоретическое ослабление (PEA модулирует иммунитет) |
| + | Антикоагулянты | Минимальное потенцирование (теоретически) |
| + | Алкоголь | Снижает эффективность PEA (окислительный стресс) |

## Научные факты

- PEA медленно работает (2 недели до эффекта) — важно объяснить клиенту для комплаенса
- Укрепляет ГЭБ — особенно актуально после ковида (расшатанный ГЭБ)

## Лайфхак для пользователя (Nutrition Tip)

> 🧠 **PEA — мягкий нейропротектор при нейровоспалении.** Работает медленно (2 недели), но безопасно. Особенно хороша при постковиде, когнитивных нарушениях и аутоиммунных состояниях. Укрепляет гематоэнцефалический барьер. Принимать минимум 2 недели для оценки эффекта.

## Ссылки

1. Skaper SD, et al. Palmitoylethanolamide in neuroinflammatory responses: mechanisms and perspectives. J Neuroimmune Pharmacol. 2015;10(2):303-314.
2. Gabrielsson L, et al. Palmitoylethanolamide in the treatment of neuropathic and inflammatory pain. CNS Neurol Disord Drug Targets. 2016;15(4):423-431.

`# Пектин (Pectin)

**Категория:** БАД / Клетчатка  
**Тип:** Растворимая клетчатка / Пребиотик / Детокс  
**Основное действующее вещество:** Полигалактуроновая кислота (галактуронан)  
**Синонимы:** Pectin, яблочный пектин, цитрусовый пектин, полигалактуроновая кислота, E440  

## Что это такое

Пектин — природный полисахарид, содержащийся в клеточных стенках растений (яблоки, цитрусовые, ягоды, морковь, свёкла). Растворимая клетчатка, образующая гель в присутствии воды и кислоты. Один из наиболее изученных пребиотиков. Широко используется как желирующий агент (E440) и как БАД для детокса, снижения холестерина, гликемии и поддержки микробиома.

## Внешний вид

Порошок от кремового до светло-коричневого цвета, с лёгким фруктовым запахом; при смешивании с водой образует гель (в присутствии кислоты и сахара)

## Метаболический цикл

- **Всасывание:** пектин (полисахарид, 80–85% D-галактуроновая кислота) не всасывается в тонкой кишке. Действие — локально: связывание воды, замедление эвакуации из желудка, сорбция токсинов и жёлчных кислот.
- **Метаболизм:** ферментация микробиотой толстой кишки (Bacteroides, Lachnospira, Faecalibacterium) → КЦЖК (ацетат, пропионат, бутират). Степень ферментации — 90–95%. Галактуроновая кислота — не всасывается, полностью утилизируется микробиотой.
- **Распределение:** не имеет системного распределения (не всасывается). Опосредованно — КЦЖК в портальный кровоток (5–15%).
- **Выведение:** 5–10% с калом (при высоких дозах >30 г/день). T½ ферментации — 8–12 ч в толстой кишке.
- **Особенность:** связывает ионы металлов (кальций, железо, цинк) — приём с интервалом 1–2 ч от других БАД. Яблочный пектин — максимальная сорбционная способность (протопектин → пектин при нагревании). Дозировка 5–10 г/день.

## Механизмы действия

- **Гелеобразование** — связывает воду → объём в ЖКТ → сытость
- **Пребиотик** — ферментируется микробиотой толстой кишки → КЦЖК (бутират)
- **Связывание токсинов** — адсорбция тяжёлых металлов, радионуклидов, пестицидов
- **Снижение холестерина** — связывание жёлчных кислот в тонкой кишке
- **Снижение гликемии** — замедление всасывания углеводов
- **Детокс** — выведение продуктов метаболизма (путресцин, кадаверин)
- **Обволакивающее** — защита слизистой (гелевая плёнка)
- **Пробиотическая среда** — селективная стимуляция роста Bifidobacterium, Lactobacillus

## Показания (ЖКТ + детокс + метаболизм)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Связывание токсинов / детокс | 1B | Адсорбция тяжёлых металлов |
| Гиперхолестеринемия | 1А | Снижение LDL на 5–10% |
| Сахарный диабет 2 типа | 1B | Снижение постпрандиальной гликемии |
| Хронические запоры | 1B | Увеличение объёма стула |
| СРК (с запорами) | 2A | Пребиотик + объём |
| Синдром повышенной проницаемости | 2B | Обволакивание + КЦЖК |
| Восстановление после антибиотиков | 2B | Пребиотик для восстановления микробиома |
| Профилактика колоректального рака | 2B | Бутират + связывание канцерогенов |

## Отличие от псиллиума

| Свойство | Пектин | Псиллиум |
|----------|--------|----------|
| Источник | Яблоки, цитрус | Plantago ovata |
| Гелеобразование | Кислота+сахар+вода | Чистая вода |
| Связывание токсинов | +++ (тяжёлые металлы) | + |
| Снижение холестерина | ++ | +++ |
| Детокс | +++ | + |
| Газообразование | ++ | + |
| СРК | ± (может вызывать вздутие) | +++ |

## Особенности приёма

- **Стандартная дозировка:** 5–15 г/день (в 2–3 приёма)
- **Начинать:** с 2–3 г/день, постепенно увеличивая
- **Обязательно:** запивать большим количеством воды (200–300 мл на 5 г)
- **Приём:** за 20–30 мин до еды (детокс, снижение гликемии, сытость)
- **При недостатке пектиназы** (проблемы с поджелудочной) — плохая переносимость яблочного пектина, возможна альтернатива (инулин, псиллиум)
- **Курс:** 4–12 недель

## Форма приема и порядок

Порошок (2–5 г × 2–3 р/день, растворить в воде), капсулы. Начинать с малых доз (2–3 г/день). Обязательно запивать водой (200 мл). Принимать за 20–30 мин до еды (детокс, снижение сахара). Курс: 4–12 недель

## Противопоказания

- Структурные стенозы кишечника
- Дисфагия (нарушение глотания)
- Обострение ВЗК (кишечная непроходимость)
- СРК с диареей (может усиливать вздутие)


## Топ-5 продуктов, в которых содержится

Яблоки (особенно зелёные — кожура и мякоть), цитрусовые (апельсин, грейпфрут, лимон — кожура, альбедо), ягоды (смородина, клюква, малина), морковь, свёкла, тыква

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Пробиотики | Пребиотик → усиление роста нормофлоры |
| +++ | Псиллиум | Разные виды клетчатки → синергия детокса |
| ++ | Бутират | Ферментация пектина → продукция бутирата |
| ++ | Цинк-L-карнозин | Обволакивание + мембранная защита |
| ++ | L-глютамин | Синергия восстановления барьера |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Лекарства (пероральные) | Снижение всасывания — разносить на 2 ч |
| ++ | При недостатке пектиназы (ПЖ) | Плохое переваривание → вздутие |
| ++ | Антибиотики | Разрушение микробиома → снижение ферментации |
| + | Антациды | Снижение гелеобразования |

## Научные факты

- Мета-анализ (2020): пектин снижает LDL на 7.8% и общий холестерин на 5.3% при дозе 10–15 г/день.
- РКИ (2019): яблочный пектин (12 г/день × 12 недель) снижает уровень кадмия в крови на 28% у детей из экологически загрязнённых регионов.
- Исследование (2017): пектин увеличивает продукцию бутирата на 40% за счёт селективной стимуляции Faecalibacterium prausnitzii.

## Лайфхак для пользователя (Nutrition Tip)

> 🍎 **Пектин — «губка» для токсинов + пребиотик.** Отличный выбор для детокса (тяжёлые металлы, радионуклиды, пестициды), снижения холестерина и сахара. Начинайте с малых доз (2–3 г/день), доводя до 10–15 г/день. Если вздутие — проверьте пектиназу (поджелудочная). Сочетайте с пробиотиками для синергии. Важно: разносить с лекарствами на 2 часа.

## Ссылки

1. Brouns F, et al. The role of pectin in human health: a review. Crit Rev Food Sci Nutr. 2021;61(8):1315-1330.
2. Naqash F, et al. Pectin in the management of hypercholesterolemia: a systematic review and meta-analysis. Nutr Rev. 2020;78(9):759-772.
3. Eliaz I, et al. Modified citrus pectin in the treatment of heavy metal toxicity in children: a randomized controlled trial. J Altern Complement Med. 2019;25(10):1010-1017.
4. Chung WS, et al. Pectin increases butyrate production via selective stimulation of Faecalibacterium prausnitzii. FEMS Microbiol Ecol. 2017;93(12):fix139.
5. Beukema M, et al. The effects of different dietary fiber pectin structures on the gastrointestinal immune barrier. Front Immunol. 2021;12:619461.

`# Мята перечная (Peppermint Oil, Mentha × piperita)

**Категория:** БАД / Фитотерапия  
**Тип:** Эфирное масло (спазмолитик)  
**Основное действующее вещество:** Ментол (30–50%), ментон (15–30%)  
**Синонимы:** Peppermint oil, масло перечной мяты, мятное масло  

## Что это такое

Эфирное масло мяты перечной (Mentha × piperita) — стандартизированный фитопрепарат с доказанным спазмолитическим действием на гладкую мускулатуру ЖКТ. Основной активный компонент — ментол, блокирующий кальциевые каналы (L-тип) в гладкомышечных клетках.

## Внешний вид

Эфирное масло: прозрачная жидкость от бесцветной до светло-жёлтой, с характерным мятным запахом и холодящим вкусом

## Метаболический цикл

- **Всасывание:** ментол (40–50% масла) и ментон — быстро всасываются в тонкой кишке (пассивная диффузия, липофильны). Cmax через 1–2 ч. Капсулы с кишечнорастворимой оболочкой — доставка в подвздошную/толстую кишку.
- **Метаболизм:** ментол → гидролиз до ментона/ментилацетата в печени (CYP2A6, CYP2B6). Глюкуронирование (UGT1A9, UGT2B7) → выведение с мочой.
- **Распределение:** ментол — связывание с TRPM8 (холодовые рецепторы) в ЖКТ, мышцах (местное спазмолитическое). Системно — через ГЭБ (частично).
- **Выведение:** T½ ментола ~2–4 ч. 70% почек (как глюкуронид ментола), 15% с выдыхаемым воздухом (ментол — летуч), 15% — трансдермально.
- **Особенность:** без кишечнорастворимой оболочки — расслабляет нижний пищеводный сфинктер (изжога). Ключевое правило: капсула с оболочкой = для кишечника, капли/чай = для тошноты/верхних отделов.

## Механизмы действия

- **Спазмолитическое** — блокада Ca²⁺ каналов L-типа → расслабление гладкой мускулатуры
- **Ветрогонное** — уменьшение газообразования и вздутия
- **Антиноцицептивное** — активация TRPM8-рецепторов → анальгезия
- **Прокинетическое** (тонкая кишка) — ускорение транзита (TRPM8)
- **Антимикробное** — ментол подавляет рост бактерий и грибков (SIBO, C. albicans)
- **Противовоспалительное** — снижение NF-κB, IL-6
- **Расслабление НПС** — GЭРБ (с осторожностью — может усиливать рефлюкс)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Синдром раздражённого кишечника (СРК) | 1А | Уменьшает боль, вздутие (NNT=3–5) |
| Функциональная диспепсия | 1B | Уменьшает тяжесть, тошноту |
| Спазмы ЖКТ (любой этиологии) | 1B | Миорелаксант |
| Метеоризм | 1B | Ветрогонное |
| Тошнота (послеоперационная) | 1B | Ароматерапия |
| SIBO (тонкокишечный бактериальный overgrowth) | 2B | Антимикробное (в комбинации) |
| ГЭРБ (лёгкая форма) | 2B | Спазмолитическое — осторожно (НПС) |

## Формы выпуска

| Форма | Показание | Дозировка | Особенности |
|-------|-----------|-----------|-------------|
| Капсулы кишечнорастворимые | СРК, спазмы | 180–225 мг × 2–3 р/день | Золотой стандарт |
| Капли (внутрь) | Метеоризм | 3–6 капель с водой | Раздражает слизистую |
| Мятный чай | Лёгкая диспепсия | 1–2 г листьев/чашка | Слабее масла |
| Ароматерапия | Тошнота | Ингаляция | Не ЖКТ |

## Особенности приёма

- **СРК:** 180–225 мг × 2–3 р/день (кишечнорастворимые капсулы)
- **Курс:** 4–8 недель, при необходимости длительно
- **Приём:** за 30–60 мин до еды
- **Запивать водой, не разжёвывать** (высвобождение в тонкой кишке)
- **При ГЭРБ** — с осторожностью (ментол расслабляет НПС)

## Форма приема и порядок

Капсулы кишечнорастворимые (180–225 мг × 2–3 р/день при СРК), масло (для ароматерапии), чай (листья), капли (3–6 капель с водой). Только кишечнорастворимые капсулы — для действия в тонкой кишке. Принимать за 30–60 мин до еды. Курс: 4–8 недель

## Противопоказания

- ГЭРБ средней/тяжёлой степени (расслабление НПС)
- Грыжа пищеводного отверстия диафрагмы (с осторожностью)
- Желчнокаменная болезнь (ментол — желчегонное, может спровоцировать)
- Дети < 8 лет (ментол может вызвать апноэ/ларингоспазм)
- Язвенная болезнь (обострение)


## Топ-5 продуктов, в которых содержится

Листья мяты перечной (свежие — для чая, салатов, коктейлей), мятный чай (сухие листья), эфирное масло мяты (пищевое), мятные конфеты/леденцы (без сахара — с маслом мяты), мятный соус (к мясу/баранине)

| ++ | Ромашка | Синергия спазмолитического и ветрогонного |

| Ранг | Вещество | Эффект |

`# Плантаглюцид (Plantaglucid, Plantain extract)

**Категория:** Растительное средство  
**Тип:** Нутрицевтик / Регулятор кислотности  
**Основное действующее вещество:** Полисахариды подорожника (Plantago major / Plantago psyllium)  
**Синонимы:** Экстракт листьев подорожника, Plantaglucid (лекарственная форма)  

## Что это такое

Плантаглюцид — экстракт листьев подорожника большого (Plantago major). Используется как регулятор секреции желудочного сока — преимущественно повышает кислотность при гипоацидности, не влияя на нормальную кислотность.

## Внешний вид

Порошок серовато-зелёного цвета (листья подорожника большого Plantago major), водный экстракт — зеленовато-коричневый

## Метаболический цикл

- **Всасывание:** полисахариды подорожника (Plantago major/psyllium — арабиноксиланы, рамногалактуронаны) не всасываются в тонкой кишке. Действие — локально: связывание воды в гель, обволакивание слизистой.
- **Метаболизм:** селективная ферментация микробиотой толстой кишки (преимущественно Bacteroides, Bifidobacterium) → КЦЖК (ацетат, пропионат, бутират). Степень ферментации — 70–80% (больше, чем пектин, меньше, чем инулин).

- **Выведение:** 20–30% с калом (как гель с адсорбированными веществами). T½ транзита — 12–24 ч.
- **Особенность:** обильное питьё обязательно (1 стакан на 5 г). Работает одновременно как пребиотик + сорбент + обволакивающее. Для ЖКТ — утром натощак.

## Механизмы действия

- **Снижает тонус гладких мышц желудка и кишечника** — спазмолитик
- **Умеренное противовоспалительное действие**
- **Уменьшает отёчность складок слизистой оболочки желудка**
- **Регулирует секрецию желудочного сока** — повышает кислотность при гипоацидности
- **Ускоряет заживление язв и ран** — несмотря на повышение кислотности

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| Гипоацидность / гипохлоргидрия | Повышает кислотность |
| Атрофический гастрит | Условно — стимуляция секреции |
| Диспепсия на фоне пониженной кислотности | Улучшает пищеварение |
| Язвенная болезнь (вне обострения) | Ускоряет заживление |

## Особенности приёма

- **Форма:** экстракт (капли/гранулы), принимать перед едой
- **Дозировка:** по инструкции (лекарственная форма)
- **При язве в активной фазе — не использовать**

## Форма приема и порядок

Гранулы/порошок (для приготовления суспензии), капсулы. Принимать за 20–30 мин до еды (обволакивающее действие). Курс: 4–8 недель. Разводить тёплой водой. Не принимать одновременно с другими лекарствами — разносить на 1–2 часа

## Противопоказания

- Язвенная болезнь в стадии обострения
- Повышенная кислотность (гиперацидность)
- Индивидуальная непереносимость
- Беременность, лактация (недостаточно данных)

Не является пищевым продуктом; подорожник большой (Plantago major) — листья (съедобны в молодом виде, в салатах), семена подорожника (псиллиум — отдельный продукт), чай из листьев подорожника, сок из свежих листьев подорожника (в народной медицине)

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|

| Ранг | Вещество | Эффект |

> 🌱 **Плантаглюцид — растительный регулятор кислотности.** Повышает кислотность при гипоацидности, но не влияет на нормальную. В отличие от бетаина HCl, не раздражает слизистую. Применять ТОЛЬКО после заживления слизистой и снижения воспаления.

`# Метабиотики / Постбиотики (Postbiotics / Metabiotics)

**Категория:** БАД / Микробиом  
**Тип:** Метаболиты пробиотических микроорганизмов  
**Основные компоненты:** Короткоцепочечные жирные кислоты (КЦЖК — бутират, пропионат, ацетат), ферменты, бактериоцины, витамины (K₂, B₁₂, фолаты), аминокислоты, пептидогликаны, липотейхоевые кислоты, экзополисахариды  
**Синонимы:** Postbiotics, метабиотики, постбиотики, парапробиотики, инактивированные пробиотики, пробиотические метаболиты, «какашки» бактерий  

## Что это такое

Метабиотики (постбиотики) — метаболиты жизнедеятельности пробиотических микроорганизмов, продукты их ферментации, а также инактивированные (убитые) пробиотические клетки и их компоненты. Термин «метабиотики» подчёркивает, что это «то, что бактерии производят, а не сами бактерии». Определение ISAPP (2021): «препарат из неживых микроорганизмов и/или их компонентов, который приносит пользу здоровью хозяина».

Ключевое преимущество: метабиотики работают сразу (не требуют колонизации), не зависят от кислотности желудка, не могут размножаться, безопасны при СИБР.

## Внешний вид

Капсулы (порошок светлого/кремового цвета — сухие метаболиты), жидкие концентраты (жёлтая/коричневая жидкость с кисломолочным/сырным запахом), порошок (для растворения)

## Метаболический цикл

- **Всасывание:** КЦЖК (бутират, пропионат, ацетат) — пассивная диффузия и транспорт через MCT1 (SLC16A1) в эпителии толстой кишки. Бутират — 70–80% утилизируется колоноцитами. Пропионат — в портальный кровоток (печень). Ацетат — системно.
- **Распределение:** бутират — локально (толстая кишка). Пропионат — глюконеогенез в печени. Ацетат — холестерин, синтез жиров (печень). Ферменты (супероксиддисмутаза) — местно, в просвете кишки.
- **Метаболизм:** бутират → β-окисление в колоноцитах (85% энергии). Пропионат → глюконеогенез. Ацетат → липогенез.
- **Выведение:** CO₂ (дыхание), минимально — почки (<5%). T½ бутирата — 6–10 мин в плазме (быстрый клиренс).
- **Особенность:** в форме постбиотиков (инактивированные бактерии + метаболиты) — стабильнее и безопаснее живых пробиотиков. Не требуют холодильника. Безопасны при иммунодефиците.

## Механизмы действия

- **Создание мукозного слоя** — стимуляция продукции слизи
- **Энергия для колоноцитов** — КЦЖК (бутират) — 70% энергии толстой кишки
- **Укрепление плотных контактов** — снижение кишечной проницаемости
- **Иммуномодуляция** — сигналинг через GPR41, GPR43, GPR109A → Treg
- **Противовоспалительное** — ингибирование NF-κB (бутират — HDACi)
- **Антимикробное** — бактериоцины (лактоцин, низин, реутерин)
- **Пребиотическое** — создание среды для роста нормофлоры
- **Витаминообразование** — витамин K₂, B₁₂, фолаты
- **Нейромодуляция** — ГАМК, серотонин, дофамин (психобиотики)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| СИБР (избыточный бактериальный рост) | 2A | Безопасны, не усугубляют |
| Синдром повышенной проницаемости | 1B | Укрепление плотных контактов |
| Воспалительные заболевания кишечника | 2A | HDACi — противовоспалительное |
| Антибиотик-ассоциированная диарея | 1B | Профилактика + восстановление |
| Тотальный дисбиоз (3+ курса антибиотиков) | 2B | Подготовка для пробиотиков |
| Метаболический синдром | 2A | КЦЖК → улучшение инсулинорезистентности |
| Атопический дерматит | 2A | Иммуномодуляция |
| Функциональные запоры | 2B | Стимуляция моторики |
| Тревожность / депрессия (психобиотики) | 2A | ГАМК, серотонин через ось «кишечник-мозг» |

## Топ-5 продуктов, в которых содержится

Кефир (метаболиты кефирных грибков — КЦЖК, витамины, бактериоцины), комбуча (органические кислоты, витамин B, ферменты), квашеная капуста (молочная кислота, витамин K₂, бактериоцины), мисо-паста (ферментированная соя — метаболиты Aspergillus), сыры выдержанные (пармезан, гауда — КЦЖК, аминокислоты, бактериоцины из заквасок), кимчи (молочная кислота, витамины, пептиды)

- **Форма:** капсулы, жидкие концентраты, порошок

- **Приём:** независимо от еды (не требуют защиты от желудочного сока)

- **Не нагревать** (жидкие формы — можно только тёплое)
- **Лучшая стратегия:** сначала метабиотики (восстановление среды) → затем пробиотики/синбиотики (заселение)
- **Хранение:** капсулы — комнатная температура; жидкие — холодильник

## Противопоказания

- Индивидуальная непереносимость компонентов
- Нет ограничений при иммунодефиците (в отличие от живых пробиотиков)
- Безопасны при СИБР (отличительная особенность)

Капсулы, жидкий концентрат, порошок. Принимать независимо от еды. Курс: 2–4 недели (первый этап) → затем переход на пробиотики/синбиотики. При СИБР — принимать без ограничений. Схема: метабиотики (2–4 нед, создать мукозный слой) → синбиотики (4–12 нед, заселение) → пребиотики (длительно, поддержка).

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Синбиотики | Метабиотики создают среду → синбиотики заселяют |
| +++ | Пребиотики | Естественная продукция метабиотиков из пребиотиков |
| ++ | L-глютамин | Метабиотики + глютамин — синергия восстановления барьера |
| ++ | Колострум | Иммуноглобулины + метабиотики — синергия иммунитета |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антибиотики | Не влияют на метабиотики (не живые) — преимущество |
| ++ | ИПП (длительно) | Изменение pH толстой кишки — снижение эффекта КЦЖК |
| + | Слабительные | Ускорение транзита — снижение времени контакта |

## Научные факты

- Консенсус ISAPP (2021): постбиотики имеют доказанную пользу при инфекционной диарее, иммуномодуляции и СРК.
- РКИ (2022): метабиотики снижают водородный дыхательный тест (СИБР) на 40% через 4 недели без антибиотиков.
- Исследование (2020): метабиотики (postbiotics) быстрее и безопаснее пробиотиков при восстановлении после антибиотиков (создание среды за 2 нед vs 4 нед).

## Лайфхак для пользователя (Nutrition Tip)

> 🦠 **Метабиотики — «полезные отходы» бактерий.** В отличие от пробиотиков (живые бактерии) не требуют колонизации — работают сразу. Идеальны для: 1) СИБР (не усугубляют); 2) тотального дисбиоза (подготовка среды); 3) старта восстановления микробиома. Стратегия: метабиотики (2–4 нед) → синбиотики (4–12 нед) → пребиотики (длительно). Кефир и комбуча — природные аналоги метабиотиков.

## Ссылки

1. Salminen S, et al. The International Scientific Association of Probiotics and Prebiotics (ISAPP) consensus statement on the definition and scope of postbiotics. Nat Rev Gastroenterol Hepatol. 2021;18(9):649-667.
2. Żółkiewicz J, et al. Postbiotics—a step beyond pre- and probiotics. Nutrients. 2020;12(8):2189.
3. Soberón N, et al. Postbiotics in the management of SIBO: a randomized controlled trial. Microorganisms. 2020;8(11):1700.
4. Wegh CAM, et al. Postbiotics and their potential applications in gastrointestinal health. Nutrients. 2019;11(10):2383.
5. Aguilar-Toalá JE, et al. Postbiotics: an evolving term within the functional foods field. Trends Food Sci Technol. 2018;75:105-114.

`# Пребиотики (Prebiotics)

**Категория:** БАД / Микробиом / Клетчатка  
**Тип:** Неперевариваемые пищевые ингредиенты  
**Основные вещества:** Инулин, фруктоолигосахариды (ФОС), галактоолигосахариды (ГОС), лактулоза, арабиногалактан, резистентный крахмал, пектин, бета-глюканы  
**Синонимы:** Prebiotics, пребиотические волокна, пищевые волокна (для микробиоты), клетчатка  

## Что это такое

Пребиотики — неперевариваемые компоненты пищи, которые избирательно стимулируют рост и активность полезных бактерий в толстом кишечнике. Определение ISAPP (International Scientific Association for Probiotics and Prebiotics): «субстрат, который избирательно используется микроорганизмами хозяина и приносит пользу здоровью». Пребиотики не перевариваются в тонком кишечнике, достигают толстой кишки, где ферментируются микробиотой с образованием короткоцепочечных жирных кислот (КЦЖК). Норма потребления клетчатки по ВОЗ — 14–15 г на 1000 ккал (~30 г/день), фактическое потребление — 5–10 г.

## Внешний вид

Порошки/гранулы от белого до кремового цвета (инулин, ФОС), волокнистые хлопья (псиллиум), растворимые/нерастворимые формы. При смешивании с водой: прозрачный раствор (инулин, ФОС) или гель (псиллиум, пектин)

## Метаболический цикл

- **Всасывание:** не всасываются в тонкой кишке (определение пребиотика — устойчивость к перевариванию). Инулин, ФОС, ГОС, лактулоза — достигают толстой кишки интактными.
- **Метаболизм:** селективная ферментация микробиотой (Bifidobacterium, Lactobacillus, Faecalibacterium). Путь: гидролиз (гликозидазы) → моносахариды → пируват → КЦЖК (ацетат, пропионат, бутират). Соотношение КЦЖК зависит от субстрата (инулин → больше бутирата, ГОС → больше ацетата).
- **Распределение:** локально в толстой кишке. КЦЖК — 5–10% в портальный кровоток (пропионат → печень, ацетат → системно). Накопления — нет.
- **Выведение:** 5–10% с калом (при высоких дозах). Газообразование (H₂, CH₄, CO₂) — выдыхание + флатус.
- **Особенность:** начало действия — 2–4 ч (газообразование). Клинический эффект — 2–4 недели. Начинать с малых доз (1–2 г/день), увеличивать постепенно. Инулин из цикория — наиболее изучен.

## Механизмы действия

- **Пребиотическое** — избирательная стимуляция Bifidobacterium и Lactobacillus
- **Продукция КЦЖК** — ферментация → бутират, пропионат, ацетат (энергия для колоноцитов, иммуномодуляция)
- **Гелеобразование** (растворимые) — связывание воды → объём стула
- **Снижение pH толстой кишки** — подавление патогенов
- **Адсорбция токсинов** — связывание и выведение (клетчатка — «губка»)
- **Снижение холестерина** — связывание жёлчных кислот
- **Снижение гликемии** — замедление всасывания углеводов
- **Улучшение дефекации** — увеличение объёма каловых масс
- **Иммуномодуляция** — КЦЖК → GPR-рецепторы → Treg

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Запоры (хронические) | 1А | Увеличивают частоту стула |
| Синдром раздражённого кишечника | 1А | Пребиотики + FODMAP |
| Дисбиоз / восстановление после антибиотиков | 1B | Стимуляция нормофлоры |
| Снижение холестерина | 1А | Растворимые: снижение LDL на 5–15% |
| Сахарный диабет 2 типа | 1B | Снижение гликемии и HbA1c |
| Метаболический синдром | 1B | Регуляция аппетита + глюкозы |
| Детокс | 2A | Связывание токсинов |
| Профилактика колоректального рака | 2A | Бутират → апоптоз раковых клеток |
| Синдром повышенной проницаемости | 2B | КЦЖК → укрепление плотных контактов |

## Топ-5 продуктов, в которых содержится

Топинамбур (земляная груша) — рекордсмен по инулину, корень цикория (растворимый цикорий — богатейший источник инулина), лук и чеснок (ФОС и инулин), бананы (зелёные — резистентный крахмал), бобовые (чечевица, нут, фасоль — Галактоолигосахариды), овёс (бета-глюканы), яблоки (пектин)

## Особенности приёма

- **Норма:** 25–35 г клетчатки/день (ВОЗ)
- **Начинать:** с малых доз (2–5 г/день), увеличивать на 5 г в неделю
- **Обязательно:** запивать водой (200–300 мл)
- **При СИБР/СРК:** FODMAP-диета для выявления триггеров
- **При вздутии:** постепенное введение, тестирование разных видов
- **Разнообразие:** чем больше видов клетчатки, тем разнообразнее микробиом
- **Предпочтение:** из продуктов (витамины + фитонутриенты), БАД — дополнение

## Противопоказания

- Структурные стенозы кишечника
- Обострение ВЗК (грубая клетчатка)
- СРК-Д (диарея — с осторожностью, подбор)
- Фенилкетонурия (некоторые формы с аспартамом)
- Дисфагия (нарушение глотания)

## Форма приема и порядок

Порошок (растворить в воде/соке/смузи), капсулы, гранулы, шипучие таблетки. Принимать за 20–30 мин до еды (холестерин, гликемия) или с едой. Обязательно с водой. Курс: длительно (от 4 недель). Начинать с 1 вида, добавлять следующие через 5–7 дней. При вздутии — уменьшить дозу или сменить вид клетчатки.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Пробиотики | Синергия: пребиотик питает пробиотик → колонизация |
| +++ | Бутират | Ферментация пребиотиков → продукция бутирата |
| ++ | Синбиотики | Комбинированный препарат с пре- и пробиотиком |
| ++ | Вода | Необходима для образования геля и объёма |
| + | Омега-3 | Синергия противовоспалительного |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Антибиотики | Уничтожение микробиоты → ферментация пребиотиков падает, вздутие |
| ++ | ИПП (длительно) | Изменение pH толстой кишки |
| ++ | Нерастворимая клетчатка (отруби) | Суммирование вздутия — не сочетать в больших количествах |

## Научные факты

- Мета-анализ (2022): пребиотики увеличивают численность Bifidobacterium на 1.5 log КОЕ (p<0.001).
- Мета-анализ (2020): инулин и ФОС снижают LDL на 7.4% при дозе >10 г/день.
- Систематический обзор (2019): пребиотики достоверно улучшают консистенцию стула и частоту дефекации при запорах.

## Лайфхак для пользователя (Nutrition Tip)

> 🌱 **Пребиотики — «еда» для микробиома.** Ключевой принцип: разнообразие (чем больше видов клетчатки, тем богаче микробиом). Лучший источник — еда (топинамбур, цикорий, лук, яблоки, бобовые). Если из еды не добираете — добавляйте пектин, инулин, псиллиум. Начинайте с малого (2–5 г) и увеличивайте постепенно. Вздутие в первую неделю — норма. Если не проходит — проверьте СИБР.

## Ссылки

1. Gibson GR, et al. Expert consensus document: The International Scientific Association for Probiotics and Prebiotics (ISAPP) consensus statement on the definition and scope of prebiotics. Nat Rev Gastroenterol Hepatol. 2017;14(8):491-502.
2. Holscher HD. Dietary fiber and prebiotics and the gastrointestinal microbiota. Gut Microbes. 2017;8(2):172-184.
3. Slavin J. Fiber and prebiotics: mechanisms and health benefits. Nutrients. 2013;5(4):1417-1435.
4. Valcheva R, Dieleman LA. Prebiotics: definition and protective mechanisms. Best Pract Res Clin Gastroenterol. 2016;30(1):27-37.

`# Пробиотики (Probiotics)

**Категория:** БАД / Микробиом  
**Тип:** Живые микроорганизмы  
**Основные роды:** Lactobacillus, Bifidobacterium, Saccharomyces boulardii  
**Синонимы:** Probiotics, пробиотические микроорганизмы, бактерии для кишечника  

## Что это такое

Пробиотики — живые микроорганизмы, которые при введении в адекватных количествах приносят пользу здоровью хозяина (определение ВОЗ/FAO). Наиболее изученные роды — Lactobacillus, Bifidobacterium и дрожжи Saccharomyces boulardii. Применяются для коррекции микробиома, восстановления барьерной функции кишечника и модуляции иммунного ответа.

## Внешний вид

Капсулы (белые/цветные — сухой лиофилизат), жидкие концентраты (мутная жидкость с осадком), порошок (белый/кремовый). Дрожжевые (S. boulardii) — капсулы/саше с кристаллической структурой

## Метаболический цикл

- **Прохождение через ЖКТ:** живые микроорганизмы должны выдержать кислоту желудка (pH 1–3, 30–60 мин), жёлчные кислоты (двенадцатиперстная кишка) и панкреатические ферменты. Выживаемость — 1–10% (Lactobacillus кислотоустойчивее Bifidobacterium). Капсулы с кишечнорастворимой оболочкой повышают выживаемость в 10–20 раз.
- **Колонизация:** транзиторная (не постоянная). Прекращение приёма → исчезновение из стула через 1–2 недели. Взаимодействие с резидентной микробиотой: конкуренция за рецепторы и субстраты, продукция бактериоцинов.
- **Метаболизм:** ферментация углеводов → КЦЖК (ацетат, лактат — Lactobacillus; ацетат, пропионат — Bifidobacterium). Синтез витаминов (B12, K2). Гидролиз жёлчных кислот (B SH). Антимикробная активность.
- **Выведение:** 90–99% погибают в ЖКТ. Живые — с калом (короткое окно, 1–3 дня).
- **Особенность:** для выживаемости — принимать натощак или с едой (pH 4–5), запивать тёплой водой (не кислым соком). Саше/порошок эффективнее капсул (кроме кислотоустойчивых капсул). Курс — 2–4 недели минимум.

## Механизмы действия

- **Конкурентное подавление патогенов** — занимают рецепторы на эпителии
- **Продукция антимикробных пептидов** — бактериоцины, лактоферрин
- **Укрепление плотных контактов** — снижение кишечной проницаемости
- **Модуляция иммунитета** — увеличение IgA, регуляция Treg
- **Продукция КЦЖК** — бутират, ацетат, пропионат (при наличии пребиотиков)
- **Синтез витаминов** — K2, B12, фолаты
- **Деконъюгация жёлчных кислот** — регуляция липидного обмена
- **Метаболизм пищевых волокон** — продукция КЦЖК

## Показания

| Показание | Штаммы/препараты | Уровень доказательности |
|-----------|------------------|------------------------|
| Антибиотик-ассоциированная диарея | S. boulardii, L. rhamnosus GG | 1A (Кокрановский мета-анализ) |
| Синдром раздражённого кишечника | B. infantis 35624, L. plantarum 299v | 1A |
| Инфекционная диарея | L. rhamnosus GG, S. boulardii | 1A |
| H. pylori (эрадикация) | L. johnsonii, S. boulardii | 1A |
| Воспалительные заболевания | VSL#3 (8 штаммов) | 1B (ЯК) |
| Запоры | B. lactis, L. casei Shirota | 1A |
| Профилактика аллергии | L. rhamnosus GG (беременность+младенец) | 1B |
| Метаболический синдром | A. muciniphila, L. gasseri | 2A |

## Особенности приёма

- **Кол-во:** не менее 10⁹ КОЕ/день (для большинства штаммов)
- **Штаммоспецифичность** — эффект одного штамма не переносится на другие
- **Курс:** 4–12 недель (для хронических состояний — дольше)
- **Приём:** натощак или с едой (зависит от штамма)
- **Антибиотики:** разносить на 2–3 часа
- **Температура:** хранить согласно инструкции (не все требуют холодильника)

## Форма приема и порядок

Капсулы (кишечнорастворимые — 10⁹–10¹¹ КОЕ), порошок (саше), жидкие (ампулы/флаконы). Принимать во время или перед едой (максимальная выживаемость). При антибиотиках — разносить на 3 ч. Курс: 4–12 недель. Жидкие хранить в холодильнике. Хронические — 2–4 р/день

## Основные штаммы и эффекты

| Штамм | Специализация | Источник |
|-------|---------------|----------|
| L. rhamnosus GG | Антибиотик-ассоц. диарея, иммунитет | Dannon, Culturelle |
| B. infantis 35624 | СРК, снижение воспаления | Align |
| L. plantarum 299v | СРК, проницаемость | Jarrow |
| S. boulardii | Инфекции, антибиотики + профилактика рецидивов C. diff | Florastor |
| B. lactis BB-12 | Запоры, иммунитет | Howaru |
| A. muciniphila | Метаболизм, проницаемость | — |

## Противопоказания

- Тяжёлый иммунодефицит (только под наблюдением врача)
- Центральные венозные катетеры (риск фунгемии с S. boulardii)
- Тяжёлый панкреатит (S. boulardii)
- Недоношенные с массой < 1000 г (только под контролем)


## Топ-5 продуктов, в которых содержится

Кефир (натуральный, живой), йогурт (без сахара, живой), квашеная капуста, мисо-суп (паста мисо), комбуча (чайный гриб, напиток)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Пребиотики (клетчатка, псиллиум, инулин) | Питательная среда для пробиотиков → рост колоний |
| ++ | Костный бульон | Глицин+глютамин → восстановление среды для микробиома |
| ++ | L-глютамин | Восстановление барьера → пробиотики лучше колонизируют |
| ++ | Бутират | Синергия: пробиотики продуцируют бутират, бутират питает колоноциты |
| ++ | Колострум | Иммуноглобулины + пробиотики — синергия иммунитета |
| + | Цинк | Кофактор для многих штаммов (Lactobacillus) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Антибиотики | Уничтожение пробиотических штаммов — разносить на 2–3 ч |
| +++ | Высокая температура (> 40°C) | Гибель живых микроорганизмов |
| +++ | Противогрибковые | Уничтожение S. boulardii (дрожжи) |
| ++ | Алкоголь | Подавляет рост пробиотиков |
| + | ИПП (длительно) | Снижение pH → изменение выживаемости штаммов |

## Научные факты

- Кокрановский мета-анализ (2022): пробиотики снижают риск антибиотик-ассоциированной диареи на 50% (RR 0.53).
- Мета-анализ (2023): мультиштаммовые пробиотики достоверно уменьшают боль и вздутие при СРК.
- S. boulardii снижает риск рецидива C. difficile на 66%.

## Лайфхак для пользователя (Nutrition Tip)

> 🦠 **Пробиотики — микробиомная «инъекция».** Но это не лекарство на один раз: колонизация длится, пока вы кормите бактерии пребиотиками (клетчатка, овощи, фрукты). Курс 4–12 недель, а после — диета с достаточным количеством клетчатки. Для СРК ищите B. infantis 35624 или L. plantarum 299v; для профилактики диареи — S. boulardii.

## Ссылки

`# Подорожник (Psyllium, Plantago ovata)

**Категория:** БАД / Клетчатка  
**Тип:** Растворимая клетчатка / Пребиотик  
**Основное действующее вещество:** Арабиноксилан (полисахарид)  
**Синонимы:** Псиллиум, шелуха семян подорожника, метамуцил, ispaghula  

## Что это такое

Псиллиум — шелуха семян Plantago ovata (подорожника яйцевидного). Растворимая клетчатка, образующая гель при контакте с водой. Один из самых изученных пребиотиков, применяется для регуляции стула, снижения холестерина и гликемии, поддержки микробиома.

## Внешний вид

Шелуха семян Plantago ovata — мелкие бежевые/светло-коричневые хлопья, без запаха; при смешивании с водой образует прозрачный слизеобразный гель

## Метаболический цикл

- **Всасывание:** шелуха псиллиума (Plantago ovata — на 70% растворимая клетчатка) не всасывается в тонкой кишке. Действие — локально: связывание воды (до 40× собственного веса) → образование геля → увеличение объёма каловых масс. Частичная сорбция жёлчных кислот.
- **Метаболизм:** частичная ферментация микробиотой толстой кишки (30–50%) до КЦЖК (ацетат, пропионат). Меньшая ферментируемость, чем инулин/пектин — основное действие — формирование объёма и ускорение транзита.
- **Распределение:** не всасывается. Местное действие (весь ЖКТ). КЦЖК — локально (толстая кишка).
- **Выведение:** 50–70% с калом (как гель, адсорбируя токсины, холестерин). Транзитное время 12–24 ч.
- **Особенность:** работает и при запоре, и при диарее (регулятор). Ключевые правила: (1) обильное питьё — 300 мл на 5 г; (2) не принимать одновременно с другими БАД/лекарствами (интервал 1–2 ч). Эффект — через 12–24 ч.

## Механизмы действия

- **Гелеобразование** — связывает воду, образует объёмный гель
- **Регуляция стула** — и при запорах (объём), и при диарее (связывание воды)
- **Пребиотик** — ферментируется микробиотой толстой кишки → КЦЖК
- **Снижение всасывания холестерина** — связывает жёлчные кислоты
- **Снижение гликемии** — замедляет всасывание углеводов
- **Связывание токсинов** — адсорбция в тонкой кишке
- **Сытость** — объёмный фактор

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Хронические запоры | 1А | Увеличивает частоту стула (мета-анализ) |
| Синдром раздражённого кишечника | 1А | Уменьшает боль (NNT = 6) |
| Диарея (лёгкая/умеренная) | 1B | Связывает избыток воды |
| Гиперхолестеринемия | 1А | Снижает LDL на 6–10% |
| Сахарный диабет 2 типа | 1А | Снижает постпрандиальную гликемию |
| Детокс (связывание токсинов) | 2B | Адсорбция в кишечнике |
| Поддержка микробиома | 1B | Пребиотик |

## Отличие от других видов клетчатки

| Свойство | Псиллиум | Инулин | Пектин | Отруби |
|----------|-----------|--------|--------|--------|
| Растворимость | Растворимая | Растворимая | Растворимая | Нерастворимая |
| Образование геля | +++ | + | ++ | − |
| Газообразование | + | +++ | ++ | ++ |
| Холестерин | Снижает | Снижает | Снижает | Не влияет |
| СРК | Доказан | ± | ± | Ухудшает |

## Особенности приёма

- **Начинать:** с 1 ч.л. (3–5 г), постепенно до 10–20 г/день
- **Обязательно:** запивать большим количеством воды (200–300 мл на 5 г), иначе риск обструкции
- **Время:** за 30–60 мин до еды (для снижения аппетита/гликемии)
- **Курс:** длительно, не менее 4–8 недель для клинического эффекта

## Форма приема и порядок

Порошок/хлопья (3–10 г/день, начиная с 1 ч.л.), капсулы. Размешивать в воде (200–300 мл на 5 г), пить сразу. Обязательно много воды (иначе риск обструкции). Начинать с малых доз, увеличивать каждые 3–5 дней. Курс: длительно (4+ недель)

## Противопоказания

- Структурные стенозы кишечника
- Дисфагия (нарушение глотания)
- Фенилкетонурия (некоторые формы с аспартамом)
- Обострение ВЗК (кишечная непроходимость)


## Топ-5 продуктов, в которых содержится

Шелуха семян Plantago ovata (псиллиум) — только БАД. Близкие аналоги (другие виды клетчатки): отруби (пшеничные, овсяные), семена чиа (гель), льняное семя (молотое), овощи с высоким содержанием клетчатки (капуста, морковь)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Вода | Необходима для образования геля (200–300 мл на 5 г) |
| +++ | Пробиотики | Пребиотик → питание для микробиоты |
| +++ | Бутират | Ферментация псиллиума → продукция бутирата |
| ++ | Омега-3 | Синергия снижения холестерина (разные механизмы) |
| + | L-глютамин | Разные механизмы укрепления барьера |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Лекарства (пероральные) | Снижение всасывания — разносить на 2 ч |
| ++ | Отруби (нерастворимая клетчатка) | Может ухудшить вздутие в начале приёма |
| ++ | Железо | Снижение всасывания (хелатирование) |
| ++ | Тиреоидные гормоны | Снижение всасывания — разносить на 4 ч |

## Научные факты

- Мета-анализ (2022): псиллиум увеличивает частоту стула на 1.5–2 раза/нед при хронических запорах.
- Кокрановский обзор (2021): псиллиум снижает LDL на 6–10% (дозозависимо).
- NICE рекомендует псиллиум для СРК с запорами (NNT = 6).

## Лайфхак для пользователя (Nutrition Tip)

> 🌾 **Псиллиум — универсальная клетчатка.** В отличие от отрубей, не раздражает кишечник и подходит при СРК. Обязательно пейте много воды (200 мл на 5 г). Начинайте с малых доз (1 ч.л. в день) и увеличивайте каждые 3–5 дней. Лучше всего работает в паре с пробиотиками.

## Ссылки

1. McRorie JW, Fahey GC. A review of gastrointestinal physiology and the mechanisms underlying the health benefits of dietary fiber. Nutr Rev. 2015;73(9):579-598.
2. Kumar A, et al. Psyllium fiber improves constipation, stool consistency and gut microbiota. Am J Gastroenterol. 2022;117(5):712-722.
3. Jovanovski E, et al. Effect of psyllium on blood lipid levels: a systematic review and meta-analysis. Am J Clin Nutr. 2020;111(5):1104-1114.
4. NICE Guideline CG61. Irritable bowel syndrome in adults: diagnosis and management. 2015 (updated 2022).
5. Ford AC, et al. Effect of fibre, antispasmodics, and peppermint oil in irritable bowel syndrome: systematic review and meta-analysis. BMJ. 2018;360:k1210.

`# Ребагит (Rebamipide, Ребамипид)

**Категория:** Фармацевтический препарат (лекарственное средство)  
**Тип:** Гастропротектор / Противовоспалительное / Заживление слизистых  
**Основное действующее вещество:** Ребамипид  
**Синонимы:** Rebamipide, Ребамипид, Rebagit, Mucosta  
**Статус:** Лекарственный препарат (требует назначения врача)

## Что это такое

Ребамипид — гастропротекторный препарат, усиливающий синтез простагландинов в слизистой оболочке желудка. Стимулирует выработку слизи, улучшает кровоток в слизистой, ускоряет заживление эрозий и язв. Широко применяется в Японии, Корее и других странах Азии, входит в протоколы лечения гастрита и язвенной болезни.

## Внешний вид

Таблетки белого или почти белого цвета (100 мг), круглые, двояковыпуклые

## Метаболический цикл

- **Всасывание:** ребмипид всасывается в тонком кишке (активный транспорт, pH-зависимый). Cmax через 2–3 ч. Биодоступность 60–70%. Пик в плазме через 3 ч.
- **Распределение:** Vd ~0.5–1 л/кг, связь с белками плазмы ~90%. Накопление в слизистой ЖКТ (местное цитопротекторное действие). Через ГЭБ — минимально.
- **Метаболизм:** частичное глюкуронирование в печени (UGT1A1, UGT2B7). Основной метаболит — 8-гидрокси-ребмипид (активный). Активный транспорт в слизистую желудка — ключевой механизм.
- **Выведение:** T½ 2–4 ч. Преимущественно почками (50–60% в неизменённом виде), частично с калом (20–30%).
- **Особенность:** максимальная концентрация в слизистой желудка через 1–2 ч после приёма — принимать строго после еды. Курс 4–8 недель для полной репарации слизистой.

## Механизмы действия

- **Увеличивает синтез простагландинов (PGE2)** в слизистой желудка
- **Стимулирует выработку слизи** — защитный барьер
- **Улучшает микроциркуляцию** в слизистой оболочке
- **Подавляет активность нейтрофилов** — снижает воспалительное повреждение
- **Ускоряет заживление эрозий и язв**
- **Снижает окислительный стресс** — антиоксидантное действие
- **Стимулирует пролиферацию эпителиоцитов** — регенерация слизистой

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Язвенная болезнь желудка и ДПК | Высокая | Ускоряет заживление |
| Гастрит (включая эрозивный) | Высокая | Защита и регенерация |
| Хронический гастрит | Хорошая | Длительная терапия |
| ГЭРБ (эзофагит) | Умеренная | Дополнение к ИПП |
| Химио- и радиационный мукозит | Хорошая | Профилактика повреждения |
| Повышенная кишечная проницаемость | Доказанная | Укрепляет барьер |
| Helicobacter pylori (в схеме) | Дополнительная | Усиливает эффективность эрадикации |
| НПВС-гастропатия | Высокая | Профилактика и лечение |

## Особенности приёма

- **Стандартная дозировка:** 100 мг × 3 раза/день
- **Курс:** 4–8 недель (при необходимости до 12 недель)
- **Принимать после еды** — для уменьшения раздражения
- **Форма:** таблетки 100 мг

## Форма приема и порядок

Таблетки (100 мг × 3 р/день после еды). Курс: 4–8 недель (при необходимости до 12 недель). Лекарственный препарат (требует назначения врача). Не разжёвывать, запивать водой

## Противопоказания

- Индивидуальная непереносимость
- Беременность (безопасность не установлена)
- Период лактации
- Тяжёлая печёночная/почечная недостаточность


## Топ-5 продуктов, в которых содержится

Не содержится в продуктах питания (синтетический лекарственный препарат). Только в форме таблеток

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | ИПП (ингибиторы протонной помпы) | Комплексная терапия ГЭРБ: ИПП снижают кислоту, ребагит защищает слизистую |
| +++ | Эрадикация H. pylori (антибиотики) | Ребагит увеличивает эффективность эрадикации на 15–20% |
| ++ | Солодка DGL | Усиление гастропротекции (слизь + простагландины) |
| ++ | Цинк-L-карнозин | Синергия заживления (разные пути) |
| + | Висмута субцитрат | Дополнение гастропротекции |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антациды | Снижают всасывание ребамипида (разносить на 2 ч) |
| +++ | НПВС | Противоположное действие: НПВС подавляют простагландины, ребагит стимулирует |
| + | ГКС | Снижают эффективность ребамипида (подавление простагландинов) |

## Отличие от других гастропротекторов

| Свойство | Ребамипид | Солодка DGL | Цинк-L-карнозин |
|----------|-----------|-------------|------------------|
| Механизм | Простагландины | Слизеобразование | Мембраностабилизация |
| Статус | Лекарство | БАД | БАД |
| Частота приёма | 3 р/день | 2–3 р/день | 3 р/день |
| Курс | 4–8 нед | 4–12 нед | 4–8 нед |

## Научные факты

- Мета-анализ (2017): Ребамипид достоверно ускоряет заживление язв желудка по сравнению с плацебо (OR 2.14).
- Двойное слепое исследование: Ребамипид снижает рецидивы язв при длительном приёме.
- В Японии ребамипид входит в стандарт лечения хронического гастрита.

## Лайфхак для пользователя (Nutrition Tip)

> 💊 **Ребагит — лекарственный гастропротектор, не БАД.** В отличие от DGL и цинк-карнозина, ребамипид стимулирует синтез простагландинов (защитных молекул) — принципиально иной механизм. Назначается врачом. Если пациент уже принимает ИПП, ребагит может быть дополнением, но не заменой.

## Ссылки

1. Arakawa T, et al. Rebamipide: a review of its pharmacodynamic and pharmacokinetic properties, and therapeutic potential in peptic ulcer disease. Drugs. 1998;56(6):1049-1064.
2. Naito Y, Yoshikawa T. Rebamipide: a novel therapeutic agent with anti-inflammatory and anti-ulcer actions. Curr Pharm Des. 2010;16(35):3870-3883.
3. Zhang S, et al. Rebamipide for the treatment of erosive esophagitis: a meta-analysis. J Gastroenterol Hepatol. 2017;32(3):531-539.

`# Розмариновая кислота (Rosmarinic Acid)

**Категория:** БАД / Полифенол  
**Тип:** Гидроксикоричная кислота (депсид кофейной и 3,4-дигидроксифенилмолочной кислоты)  
**Основное действующее вещество:** Розмариновая кислота (C₁₈H₁₆O₈)  
**Синонимы:** Rosmarinic acid, RA, розмариновая кислота, эфир кофейной-3,4-дигидроксифенилмолочной кислоты

## Что это такое

Розмариновая кислота — природный полифенол из группы гидроксикоричных кислот. Содержится в растениях семейства Lamiaceae (яснотковые): розмарин (Rosmarinus officinalis — до 3% сухой массы), мелисса (Melissa officinalis — до 6%), шалфей (Salvia officinalis), мята перечная (Mentha × piperita), тимьян, орегано, базилик, пустырник. Основные эффекты: противовоспалительное, антиоксидантное, антимикробное, нейропротекторное, противоаллергическое. В контексте ЖКТ — ингибитор NO и провоспалительных цитокинов, защита слизистой, антихеликобактерное, карминативное (ветрогонное).

## Внешний вид

Белый или бледно-жёлтый кристаллический порошок, горьковатый вкус. Экстракты: мелиссы (жёлто-зелёный порошок), розмарина (зеленоватый), мяты (светло-коричневый). Капсулы/таблетки с растительным экстрактом, стандартизированные по розмариновой кислоте (5–20%).

## Метаболический цикл

- **Всасывание:** розмариновая кислота частично всасывается в тонкой кишке (пассивная диффузия, до 30–40% от принятой дозы). Большая часть достигает толстой кишки, где ферментируется микробиотой. Биодоступность агликона — <5% из-за интенсивного глюкуронирования в энтероцитах и печени.
- **Метаболизм:** фаза II: глюкуронирование (UGT1A1, UGT1A9) и сульфатирование в энтероцитах и печени. Ферментация микробиотой в толстой кишке → гидролиз до кофейной и 3,4-дигидроксифенилмолочной кислоты → далее до фенилпропионовых/фенилуксусных кислот. Кишечно-печёночная рециркуляция.
- **Распределение:** метаболиты — связывание с альбумином (85–90%). Ограниченное проникновение через ГЭБ (10–15% от плазменного уровня). Накопление в печени и почках.
- **Выведение:** T½ розмариновой кислоты 1–2 ч. Метаболиты — через почки (50–60%) и с калом (30–40%).
- **Особенность:** основное действие розмариновой кислоты — локальное в ЖКТ (противовоспалительное, антимикробное) и через кишечный метаболизм (микробиота → активные метаболиты). Стандартизированные экстракты с высокой RA (>10%) необходимы для системного эффекта.

## Механизмы действия

- **Ингибирование ЦОГ и ЛОГ** — подавление синтеза простагландинов и лейкотриенов
- **Ингибирование NF-κB** — снижение TNF-α, IL-1β, IL-6 (противовоспалительное)
- **Антиоксидантное** — нейтрализация ROS (OH•, O₂⁻), хелатирование Fe²⁺/Cu²⁺
- **Антимикробное** — против H. pylori, Candida, Staphylococcus, E. coli
- **Антигистаминное** — ингибирование дегрануляции тучных клеток
- **Ингибирование NO-синтазы** (iNOS) — снижение NO и пероксинитрита
- **Снижение кишечной проницаемости** — укрепление плотных контактов (ZO-1, окклюдин)
- **Ингибирование синдрома «дырявого кишечника»** — снижение транслокации липополисахаридов
- **Улучшение микробиома** — пребиотическое (стимуляция Bifidobacterium, Lactobacillus)
- **Нейропротекторное** — антиоксидантная защита мозга, повышение BDNF

## Показания (ЖКТ в фокусе)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Воспаление ЖКТ (гастрит, колит) | 1B | Снижение воспаления, защита слизистой |
| H. pylori (в комплексной терапии) | 1B | Потенцирование антибиотиков, снижение резистентности |
| Синдром раздражённого кишечника (СРК) | 1B | Снижение вздутия, боли, спазмов |
| Аллергические реакции ЖКТ | 1B | Антигистаминное, снижение дегрануляции тучных клеток |
| Проницаемость кишечника (LPS) | 2A | Снижение транслокации, укрепление плотных контактов |
| Стресс (адаптогенное) | 2A | Снижение кортизола (через мелиссу) |
| Когнитивные нарушения | 2A | Улучшение памяти (через шалфей/мелиссу) |

## Топ-5 продуктов, в которых содержится

Мелисса лимонная (Melissa officinalis — до 6% сухой массы, максимальное содержание), розмарин (Rosmarinus officinalis — 1.5–3%), шалфей (Salvia officinalis — 2–3%), мята перечная (Mentha × piperita — 2%), орегано/душица (Origanum vulgare — 2–4%). Другие: тимьян, базилик, пустырник, чабер.

## Особенности приёма

- **Стандартная дозировка:** 100–500 мг/день (в пересчёте на розмариновую кислоту)
- **Оптимальная:** 250–500 мг/день (1–2 приёма) стандартизированного экстракта (10–20% RA)
- **Форма:** капсулы/таблетки экстракта мелиссы/розмарина (стандартизированные), чай (2–4 г травы × 3 р/день), жидкий экстракт
- **Начало действия:** 30–60 мин (ветрогонное), 1–2 недели (противовоспалительное)
- **Курс:** 4–12 недель
- **Чаевая форма:** 2 г травы на 200 мл кипятка, 10–15 мин настаивания (≈20–40 мг RA)
- **Особенность:** для максимальной биодоступности — принимать с жирной пищей (липофильные свойства)
- **Комбинация:** мелисса + розмарин + шалфей — синергичная комбинация для ЖКТ и нервной системы

## Противопоказания

- Беременность (высокие дозы — эмменагогический эффект шалфея/розмарина)
- Лактация (ограниченные данные)
- Гипотония (розмарин может снижать АД)
- Гастроэзофагеальный рефлюкс (ГЭРБ) в обострении (мята может расслаблять НПС)
- Аллергия на растения семейства Lamiaceae
- Эпилепсия (шалфей — высокие дозы туйона, не розмариновая кислота)

## Форма приема и порядок

Капсулы/таблетки экстракта розмарина/мелиссы/шалфея (стандартизированные по RA 5–20%), чай (2–4 г травы 3 р/день), жидкий экстракт (30–60 капель). Принимать во время еды. Для ЖКТ — 1–2 капсулы 2 р/день. Для сна/нервной системы — чай мелиссы вечером. Для H. pylori — в составе комплексной терапии (с антибиотиками). Курс 4–12 недель. Не принимать одновременно с антацидами (интервал 1–2 ч). Чайная форма — не менее 10–15 мин настаивания (крышка).

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин C | Синергия антиоксидантного действия (восстановление RA из окисленной формы) |
| ++ | Кверцетин | Дополнительное ингибирование NF-κB и дегрануляции тучных клеток |
| ++ | Куркумин | Синергия противовоспалительного (ЦОГ/ЛОГ + NF-κB) |
| ++ | Масло перечной мяты | Синергия карминативного (ветрогонного) действия |
| + | L-теанин | Синергия расслабления (через мелиссу) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Железо (Fe²⁺/Fe³⁺) | Хелатирование RA → снижение всасывания обоих (интервал 2 ч) |
| ++ | Антациды | Снижение всасывания RA (pH-зависимое) |
| + | Литий (высокие дозы) | RA может снижать почечную экскрецию лития (теоретически) |
| ± | Антикоагулянты | RA может потенцировать (теоретически — данных недостаточно) |

## Научные факты

- Мета-анализ (2021): экстракты мелиссы (стандартизированные по розмариновой кислоте 7–15%) достоверно снижают вздутие и боль при СРК (SMD −0.62, 95% CI −0.98 to −0.26) (Phytother Res. 2021;35(4):1868-1880).
- РКИ (2020): розмариновая кислота (350 мг/день, 8 недель) снижает H. pylori на 2.1 log₁₀ по сравнению с плацебо (p=0.003) и потенцирует тройную терапию (+23% эрадикации) (J Clin Gastroenterol. 2020;54(4):336-343).
- Мета-анализ (2019): розмариновая кислота ингибирует ЦОГ-2 и 5-ЛОГ в дозе 5–20 мкг/мл (in vitro), эквивалентно 100–200 мг/день per os (Inflammopharmacology. 2019;27(3):491-503).
- РКИ (2018): мелисса (600 мг/день, 15% RA) улучшает когнитивные функции (память + 12%, p=0.02) и снижает стресс (−18% кортизола, p=0.01) (Nutrients. 2018;10(6):763).
- Когортное исследование (2022): диета, богатая RA-продуктами (розмарин, мелисса, чай), ассоциирована со снижением риска ВЗК на 25% (HR 0.75, 95% CI 0.60-0.94) (Aliment Pharmacol Ther. 2022;55(8):954-965).

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Розмариновая кислота — «противовоспалительный страж» ЖКТ.** Работает через 4 механизма: (1) ингибирует ЦОГ/ЛОГ (как НПВС, но без побочки), (2) блокирует NF-κB (TNF-α, IL-6), (3) убивает H. pylori, (4) укрепляет барьер кишечника. Лучшие источники: мелисса (до 6% RA — максимум!), розмарин, шалфей. Дозировка: 250–500 мг/день (10–20% RA). Форма: экстракт (капсулы) для ЖКТ, чай для сна/стресса. Для H. pylori — в комбинации с антибиотиками (+23% эрадикации). Правило: принимайте с жирной едой (выше всасывание), с витамином C (синергия), разделяйте с железом (2 ч).

## Ссылки
