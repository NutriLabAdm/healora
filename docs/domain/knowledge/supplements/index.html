`# Расторопша / Силимарин (Silymarin, Silybum marianum)

**Категория:** БАД / Гепатопротектор / Детокс  
**Тип:** Флавоноидный комплекс  
**Основное действующее вещество:** Силимарин (силибин, силихристин, силидианин)  
**Синонимы:** Milk thistle, расторопша пятнистая, силибинин (Silibinin)  

## Что это такое

Силимарин — стандартизированный экстракт семян расторопши пятнистой (Silybum marianum). Комплекс флавонолигнанов, наиболее изученный гепатопротектор в фитотерапии. Основной компонент — силибин (50–70%), остальное — силихристин, силидианин, изосилибин. Силимарин — единственное антидотное средство при отравлении бледной поганкой (Amanita phalloides).

## Внешний вид

Порошок от светло- до тёмно-коричневого цвета; таблетки/капсулы — коричневые; водный настой — желтовато-коричневый

## Метаболический цикл

- **Всасывание:** силимарин (смесь флавонолигнанов: силибин, силидианин, силикристин) обладает крайне низкой биодоступностью (<5%) из-за плохой растворимости в воде и активного эффлюкса (P-gp, MRP2). Фосфатидилхолиновые/фитосомные формы повышают биодоступность в 7–10 раз.
- **Метаболизм:** фаза II — интенсивное глюкуронирование (UGT1A1, UGT1A6, UGT1A9) и сульфатирование в печени и энтероцитах. Кишечно-печёночная рециркуляция (деконъюгация β-глюкуронидазой микробиоты). Силибин — основной активный компонент (50–60%).
- **Распределение:** Vd — 0.5–1 л/кг. Связывание с альбумином >95%. Накопление в печени (концентрация в 10–50 раз выше, чем в плазме). Через ГЭБ — минимально.
- **Выведение:** T½ силибина 2–6 ч. Преимущественно с желчью/калом (>80%), частично с мочой (5–10%).
- **Особенность:** для гепатопротекции — фитосомная или фосфатидилхолиновая форма (силибин + фосфолипиды). Принимать до еды (печень — натощак). Курс 8–12 недель.

## Механизмы действия

- **Гепатопротекция** — стабилизация мембран гепатоцитов
- **Антиоксидантное** — нейтрализация свободных радикалов (сильнее витамина E)
- **Ингибирование перекисного окисления липидов** — защита мембран
- **Стимуляция синтеза белка** — регенерация гепатоцитов (активация RNA-полимеразы I)
- **Противовоспалительное** — снижение TNF-α, NF-κB, IL-6
- **Желчегонное** — стимуляция секреции и оттока жёлчи
- **Антифибротическое** — ингибирует активацию звёздчатых клеток печени
- **Хелатирование токсинов** — связывание аманитинов (при отравлении грибами)

## Показания (ЖКТ + детокс)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Токсические поражения печени | 1В | Алкоголь, лекарства, грибы |
| Неалкогольная жировая болезнь печени (НАЖБП) | 1А | Снижение стеатоза, АЛТ, АСТ |
| Хронический гепатит С | 1B | Снижение вирусной нагрузки (в комбинации) |
| Цирроз (компенсированный) | 2A | Замедление фиброза |
| Отравление бледной поганкой | 1A | Антидот (в/в силибин) |
| Дискинезия жёлчевыводящих путей | 2B | Желчегонное |
| Детокс-поддержка (печень) | 1B | Защита при химиотерапии |

## Особенности приёма

- **Стандартизация:** минимум 70–80% силимарина (Silybum marianum экстракт 4:1)
- **Дозировка:** 140–420 мг силимарина/день (140 мг × 2–3 р/день)
- **Форма:** лучше с фосфолипидами (фитосомы) или с витамином E (увеличивает всасывание)
- **Курс:** 8–12 недель (для НАЖБП — до 24 недель)
- **Приём:** за 30 мин до еды (желчегонное действие)

## Форма приема и порядок

Капсулы/таблетки (140–420 мг/день силимарина, стандартизация 70–80%), жидкий экстракт, настойка, чай (семена). Лучшие формы: с фосфолипидами (фитосомы) или с витамином E. Принимать за 30 мин до еды (желчегонное). Курс: 8–12 недель. Важно: синдром Жильбера — не противопоказание

## Противопоказания

- Индивидуальная непереносимость (растения семейства сложноцветных)
- Острый холецистит (камни — с осторожностью)
- Беременность (безопасность не установлена)


## Топ-5 продуктов, в которых содержится

Семена расторопши (Silybum marianum) — молотые (добавка в каши, смузи), чай из семян расторопши, масло расторопши, экстракты в БАД, расторопша в травяных смесях (для печени)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин E | Усиление антиоксидантной защиты (разные механизмы) |
| +++ | Артишок | Синергия гепатопротекции + желчегонное |
| +++ | Фосфолипиды (лецитин) | Увеличение биодоступности силимарина в 5–10 раз |
| ++ | NAC | Синергия детокса (GSH + силимарин) |
| ++ | Селен | Кофактор глутатионпероксидазы — усиление детокса |
| + | Куркумин | Дополнительная гепатопротекция (NF-κB) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Алкоголь | Снижает эффективность силимарина (конкуренция за метаболизм) |
| + | ГКС | Снижение гепатопротекторного эффекта |
| + | Цитостатики (циклофосфамид) | Может снижать активацию пролекарств (CYP450) |

## Научные факты

- Мета-анализ (2020): силимарин достоверно снижает АЛТ, АСТ и уменьшает стеатоз при НАЖБП (SMD -0.35; -0.42; -0.28).
- Силибин — единственный доказанный антидот при отравлении бледной поганкой (снижает летальность с 50% до <10% при раннем в/в введении).
- Систематический обзор (2019): снижение трансаминаз у пациентов с хроническими заболеваниями печени — достоверно.

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Расторопша — «щит» для печени, но не панацея.** Основные показания — токсические поражения и НАЖБП. Берите стандартизированный силимарин (70–80%), 140 мг × 2–3 р/день. Курс 8–12 недель. Для лучшего всасывания — выбирайте форму с фосфолипидами. Важно: силимарин не защищает от алкоголя, а лишь уменьшает его повреждающее действие.

## Ссылки

1. Abenavoli L, et al. Milk thistle (Silybum marianum): a concise overview on its chemistry, pharmacological, and nutraceutical uses in liver diseases. Phytother Res. 2018;32(11):2202-2213.
2. Zhong S, et al. Silymarin for nonalcoholic fatty liver disease: a systematic review and meta-analysis. Medicine (Baltimore). 2020;99(25):e20604.
3. Luangchosiri C, et al. Silymarin for the treatment of chronic hepatitis C: a systematic review and meta-analysis. J Clin Gastroenterol. 2015;49(4):324-332.
4. Mengs U, Pohl RT, Mitchell T. Legalon® SIL: the antidote of choice in patients with acute hepatotoxicity from amatoxin poisoning. Curr Pharm Biotechnol. 2012;13(10):1964-1970.
5. Fehér J, Lengyel G. Silymarin in the treatment of chronic liver diseases: past, present and future. Orv Hetil. 2012;153(31):1216-1221.

`# Ржавый вяз (Slippery Elm, Ulmus rubra)

**Категория:** Лекарственное растение  
**Тип:** Фитотерапия / Демульцент (обволакивающее)  
**Основное действующее вещество:** Полисахариды (слизи)  

## Что это такое

Ржавый вяз (скользкий вяз) — дерево, внутренняя кора которого содержит большое количество слизистых полисахаридов. В пищеварительном тракте превращается в гель и покрывает слизистую защитным слоем.

## Внешний вид

Порошок коры вяза ржавого (Ulmus rubra) — серовато-коричневый, с характерным растительным запахом; при смешивании с водой образует густую слизь/гель

## Метаболический цикл

- **Всасывание:** слизь (полисахариды: арабиногалактаны, рамногалактуронаны) не всасывается в тонкой кишке. Действие — локально: обволакивание слизистой желудка и пищевода, защита от кислоты.
- **Метаболизм:** частичная (20–30%) ферментация микробиотой толстой кишки → КЦЖК. Основная часть — транзит через ЖКТ в неизменённом виде.
- **Распределение:** не всасывается, системного распределения нет. Местное действие в ЖКТ (пищевод, желудок, тонкая/толстая кишка).
- **Выведение:** 70–80% с калом. T½ транзита 12–24 ч.
- **Особенность:** максимальное обволакивающее действие — в форме порошка (смешать с водой до слизи). Принимать через 1–2 ч после других БАД/лекарств (может снижать всасывание). Обильное питьё.

## Механизмы действия

- **Обволакивающее** — в ЖКТ превращается в гель, покрывающий слизистую
- **Противовоспалительное** — защита от раздражителей
- **Демульцент** — успокаивает раздражённые ткани
- **Создаёт защитную плёнку** — пока покрывает слизистую, она регенерируется

## Показания (ЖКТ)

| Показание | Эффект |
|-----------|--------|
| Раздражение слизистой пищевода | Обволакивает, защищает |
| ГЭРБ | Снижает контакт кислоты со стенкой |
| Воспалительные заболевания ЖКТ | Успокаивает |
| Диспепсия | Демульцент |

## Особенности приёма

- **Форма:** порошок коры (смешать с водой в гель), капсулы
- **Принимать отдельно от других добавок/лекарств (за 2 ч)** — может препятствовать всасыванию
- **Начинать с малых доз**

## Форма приема и порядок

Порошок (1 ст.л. на стакан воды, настоять до геля), капсулы (400–500 мг), пастилки, жидкий экстракт. Принимать за 20–30 мин до еды. Обязательно запивать водой (200 мл). Не принимать с лекарствами — разносить на 2 часа. Курс: 4–8 недель

## Противопоказания

- Индивидуальная непереносимость
- Беременность (ограниченные данные)


## Топ-5 продуктов, в которых содержится

Не употребляется как продукт питания; кора вяза ржавого — только БАД. Нет в обычных продуктах

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Солодка DGL | Синергия обволакивающего + слизеобразующего |
| ++ | Ромашка | Противовоспалительное + обволакивающее |
| ++ | Льняной кисель | Дополнительное обволакивающее |
| ++ | Алоэ вера | Синергия заживления слизистой |
| + | Пробиотики | Пребиотическое действие (слизи) → поддержка микробиома |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Лекарства (пероральные) | Снижение всасывания (обволакивающее действие) — разносить на 2 ч |
| + | Антациды | Снижение адсорбционной способности |

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Ржавый вяз — природный «пластырь» для слизистой.** Превращается в гель и защищает раздражённую стенку ЖКТ. Важно: из-за обволакивающего действия принимать за 2 часа до или после других добавок/лекарств, иначе снизится их усвоение.

## Ссылки

`# Симбиотики (Symbiotics — комбинации пробиотических штаммов)

**Категория:** БАД / Микробиом  
**Тип:** Комбинация микроорганизмов (несколько штаммов/видов)  
**Основные компоненты:** Несколько штаммов Lactobacillus, Bifidobacterium, Enterococcus, Streptococcus, Saccharomyces и др. в одном препарате  
**Синонимы:** Симбиотики, поликомпонентные пробиотики, мультиштаммовые пробиотики  

## Что это такое

Симбиотики (от греч. «symbiosis» — сожительство, совместная жизнь) — это комбинации нескольких видов и/или штаммов пробиотических микроорганизмов в одном препарате. В отличие от синбиотиков (пробиотики + пребиотики) и монопробиотиков (один штамм), симбиотики содержат сразу несколько культур, которые теоретически дополняют друг друга, занимая разные экологические ниши. Важно: термин «симбиотики» часто путают с «синбиотиками» — это разные понятия.

## Внешний вид

Капсулы (желатиновые/растительные — сухой лиофилизат, порошок кремового/бежевого цвета), жидкие концентраты (мутная жидкость с осадком), порошок/саше (для растворения)


## Метаболический цикл

- **Прохождение через ЖКТ:** пробиотическая составляющая — выживание в кислой среде желудка (кислотоустойчивые штаммы + капсулы с кишечнорастворимой оболочкой). Пребиотическая составляющая — не всасывается в тонкой кишке, достигает толстой кишки интактной.
- **Метаболизм:** ферментация пребиотиков микробиотой → КЦЖК (ацетат, пропионат, бутират). Синергия: пробиотики используют пребиотики как субстрат → усиление колонизации.
- **Распределение:** преимущественно локально в толстой кишке. КЦЖК — 5–10% в системный кровоток.
- **Выведение:** пробиотики — транзиторная колонизация (1–3 недели после прекращения приёма). Пребиотики — 5–10% с калом (неферментированная часть).
- **Особенность:** синергия пре- + пробиотиков. Выбор штаммов под конкретную задачу (иммунитет — Lactobacillus, барьер — Bifidobacterium). Курс 4–12 недель.

## Механизмы действия

- **Поликомпонентная колонизация** — разные штаммы занимают разные участки/ниши кишечника
- **Разные механизмы** — каждый штамм имеет свой спектр активности (продукция бактериоцинов, лактата, КЦЖК, витаминов)
- **Синергия штаммов** — один штамм может создавать среду для другого
- **Более широкий спектр действия** — охват разных показаний (запоры + иммунитет + противовоспалительное)
- **Конкурентное ингибирование патогенов** — разные штаммы подавляют разные патогены
- **Снижение риска доминирования** — меньший риск дисбиоза при длительном приёме

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Дисбиоз (неуточнённый) | 2A | Широкий охват |
| Антибиотик-ассоциированная диарея (профилактика) | 1A | Лучше монопробиотиков |
| Синдром раздражённого кишечника | 1A | Мультиштаммовые > моноштаммовые |
| Восстановление после гастроэнтерита | 1B | Комплексное восстановление |
| Атопический дерматит | 1B | В перинатальном периоде |
| Функциональные запоры | 1B | Разные штаммы — разные механизмы |

## Топ-5 продуктов, в которых содержится

Симбиотики как мультиштаммовые препараты не встречаются в природе в готовом виде. Ближайшие природные аналоги (естественные мультивидовые сообщества): кефир (10+ видов бактерий + дрожжи), комбуча (симбиотическая культура бактерий и дрожжей — SCOBY), квашеная капуста (спонтанное брожение — несколько видов Lactobacillus), закваска для хлеба (молочнокислые бактерии + дрожжи), сыры с живой плесенью и бактериями

## Особенности приёма

- **Дозировка:** 10⁹–10¹¹ КОЕ/день (суммарно по всем штаммам)
- **Форма:** капсулы (кишечнорастворимые), жидкие, саше
- **Приём:** во время или перед едой
- **Курс:** 4–12 недель
- **С антибиотиками:** разносить на 3 часа
- **Выбор:** отдавать предпочтение штаммам с доказанной эффективностью (не просто «10 штаммов», а клинически изученные)
- **Потенциальный риск:** при СИБР мультиштаммовые пробиотики могут усугубить вздутие — пробный приём 3–5 дней

## Противопоказания

- Тяжёлый иммунодефицит
- Острый панкреатит (S. boulardii — осторожно)
- СИБР (тяжёлый — пробный приём с осторожностью)
- Индивидуальная непереносимость компонентов

## Форма приема и порядок

Капсулы (кишечнорастворимые), порошок (саше), жидкие концентраты. Принимать во время или перед едой (максимальная выживаемость). При антибиотиках — разносить на 3 ч. Жидкие — только из холодильника. Курс: 4–12 недель. При хронических заболеваниях — дробный приём 2–4 р/день. При повышенной кислотности — предпочесть капсулированную форму.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Пребиотики (клетчатка, инулин) | Питание для всех штаммов |
| ++ | Метабиотики | Восстановление среды → симбиотики лучше колонизируют |
| ++ | Бутират | Дополнительная энергия для колоноцитов |
| + | Колострум | Иммуноглобулины + пробиотики |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Антибиотики | Уничтожение части/всех штаммов — разносить на 3 ч |
| ++ | Противогрибковые | Уничтожение дрожжевых штаммов (S. boulardii) |
| ++ | Алкоголь | Подавление роста пробиотиков |
| + | ИПП (длительно) | Изменение pH → снижение выживаемости |

## Научные факты

- Мета-анализ (2022): мультиштаммовые пробиотики эффективнее монопробиотиков при СРК (RR 1.7 vs RR 1.3, p=0.02).
- Систематический обзор (2021): комбинация L. rhamnosus GG + B. lactis BB-12 эффективнее каждого по отдельности при антибиотик-ассоциированной диарее.
- РКИ (2020): препарат VSL#3 (8 штаммов) достоверно снижает рецидивы язвенного колита.

## Лайфхак для пользователя (Nutrition Tip)

> 🧬 **Симбиотики — пробиотическая «команда».** В отличие от монопробиотиков (один штамм) и синбиотиков (бактерии + еда для них), симбиотики — это несколько штаммов в одной капсуле. Теория: чем больше штаммов, тем шире охват. Практика: важны не количество, а клинически доказанные штаммы. При СИБР — осторожно (может усиливать вздутие). Самый изученный мультиштаммовый — VSL#3. Аналог из еды — кефир (10+ видов).

## Ссылки

1. Kwoji ID, et al. Multi-strain probiotics in the management of irritable bowel syndrome: a systematic review and meta-analysis. Nutrients. 2022;14(5):1088.
2. Ouwehand AC, et al. Specific probiotics in the management of gastrointestinal disorders: a systematic review. Gut Microbes. 2020;11(5):1247-1263.
3. Chapman CM, et al. Health benefits of multi-strain versus single-strain probiotics: a systematic review. Nutr Rev. 2021;79(4):403-416.
4. Tursi A, et al. VSL#3 for the treatment of ulcerative colitis: a systematic review and meta-analysis. World J Gastroenterol. 2019;25(24):3074-3084.

`# Синбиотики и Метабиотики (Synbiotics & Postbiotics)

**Категория:** БАД / Микробиом  
**Тип:** Комбинированные препараты для микробиома  
**Основные компоненты:** Пробиотики + пребиотики (синбиотики); метаболиты нормофлоры (метабиотики/постбиотики)  
**Синонимы:** Synbiotics, metabiotics, postbiotics, синбиотики, метабиотики, постбиотики, парапробиотики  

## Что это такое

**Синбиотики** — комбинация пробиотиков (живые бактерии) и пребиотиков (субстрат для их роста). Оказывают синергическое действие: пробиотик колонизирует, пребиотик питает. Работают быстрее сухих пробиотиков, обеспечивают более длительную активность.

**Метабиотики (постбиотики)** — метаболиты жизнедеятельности пробиотических микроорганизмов: короткоцепочечные жирные кислоты (КЦЖК), ферменты, бактериоцины, витамины, пептидогликаны, липотейхоевые кислоты. Создают жирный мукозный слой, в котором растёт нормофлора. Могут применяться даже при СИБР, когда живые пробиотики противопоказаны.

## Внешний вид

Синбиотики: капсулы/порошок (пробиотики+пребиотики). Метабиотики: капсулы с порошком/жидкостью (метаболиты) — часто светлый или коричневатый порошок

## Метаболический цикл

- **Прохождение через ЖКТ:** пробиотическая составляющая — выживание в кислой среде желудка (кислотоустойчивые штаммы + капсулы с кишечнорастворимой оболочкой). Пребиотическая составляющая — не всасывается в тонкой кишке, достигает толстой кишки интактной.
- **Метаболизм:** ферментация пребиотиков микробиотой → КЦЖК (ацетат, пропионат, бутират). Синергия: пробиотики используют пребиотики как субстрат → усиление колонизации.
- **Распределение:** преимущественно локально в толстой кишке. КЦЖК — 5–10% в системный кровоток.
- **Выведение:** пробиотики — транзиторная колонизация (1–3 недели после прекращения приёма). Пребиотики — 5–10% с калом (неферментированная часть).
- **Особенность:** синергия пре- + пробиотиков. Выбор штаммов под конкретную задачу (иммунитет — Lactobacillus, барьер — Bifidobacterium). Курс 4–12 недель.

## Механизмы действия (синбиотики)

- **Синергия** — пробиотик + пребиотик → скорость размножения в 2–3 раза выше (по данным исследований)
- **Закрепление** — пребиотики помогают закрепить пробиотики на кишечной стенке
- **Замедление транзита** — пробиотики дольше остаются активными
- **Больше метаболитов** — больше продукции КЦЖК и других полезных метаболитов
- **Замена метабиотиков** — могут заменить механизм сначала метабиотиков, потом пробиотиков

## Механизмы действия (метабиотики)

- **Создание мукозного слоя** — жирная слизь для роста нормофлоры
- **Энергия для колоноцитов** — КЦЖК (бутират, пропионат, ацетат)
- **Укрепление барьера** — плотные контакты эпителия
- **Иммуномодуляция** — сигналинг через GPR-рецепторы
- **Антимикробное** — бактериоцины (лактоцин, низин)
- **Могут применяться при СИБР** — в отличие от живых пробиотиков, не усугубляют избыточный бактериальный рост

## Показания

### Синбиотики

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Дисбиоз / восстановление после антибиотиков | 1B | Быстрее пробиотиков |
| СРК (с запорами) | 1B | Комплексное действие |
| Профилактика антибиотик-ассоциированной диареи | 1B | Синергия защиты |
| Метаболический синдром | 2B | Регуляция микробиома |

### Метабиотики

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| СИБР (избыточный бактериальный рост) | 2A | Безопасны, не усугубляют |
| Тотальный дисбиоз (3+ курса антибиотиков) | 2B | Восстановление среды |
| Синдром повышенной проницаемости | 1B | Укрепление барьера |
| Воспалительные заболевания кишечника | 2A | Противовоспалительное |
| Первичная поддержка микробиома | 2B | Подготовка почвы |

## Особенности приёма

### Синбиотики
- **Форма:** капсулы, порошок, жидкие формы (нормофлорины)
- **Приём:** во время или перед едой (максимальная выживаемость)
- **Курс:** 4–12 недель
- **Хранение:** жидкие только в холодильнике, капсулы — комнатная температура
- **Выбор:** чем больше штаммов + разнообразие пребиотиков — тем лучше

### Метабиотики
- **Форма:** капсулы, порошок, жидкость
- **Приём:** независимо от еды
- **Курс:** 2–4 недели (для старта), затем синбиотики или пробиотики
- **Особенность:** безопасны при СИБР (не усиливают рост)

## Форма приема и порядок

Синбиотики — во время или перед едой, курс 4–12 нед; метабиотики — независимо от еды, курс 2–4 нед (для старта). Жидкие формы — только в холодильнике. Начинать с метабиотиков при СИБР → затем синбиотики. С антибиотиками разносить на 3 ч. Оральные пробиотики (S. salivarius) — на ночь рассасывать

## Противопоказания

- Индивидуальная непереносимость компонентов
- Тяжёлый иммунодефицит (для синбиотиков с живыми культурами)
- Острый панкреатит (с осторожностью)


## Топ-5 продуктов, в которых содержится

Квашеные овощи (пробиотики + клетчатка = природные синбиотики), кефир (пробиотики + пребиотики из молока), комбуча (пробиотики + метаболиты), мисо-паста (ферментированная соя), натуральные йогурты с клетчаткой (ягоды, отруби)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | L-глютамин | Синергия восстановления барьера + среды |
| +++ | Бутират | Синергия постбиотиков (экзогенный + эндогенный) |
| ++ | Колострум | Иммуноглобулины + метабиотики — синергия иммунитета |
| ++ | Цинк | Кофактор ферментов метаболизма |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Антибиотики (для синбиотиков) | Уничтожение живых культур — разносить на 3 ч |
| ++ | Противогрибковые (для S. boulardii) | Уничтожение дрожжевых штаммов |
| ++ | ИПП (длительно) | Изменение pH — снижение выживаемости |

## Научные факты

- Мета-анализ (2021): синбиотики эффективнее моно-пробиотиков при СРК (RR 1.6 vs RR 1.3, p<0.01).
- РКИ (2020): метабиотики безопасно улучшают симптомы СИБР (SIBO breath test снижение на 40% через 4 недели) без антибиотиков.
- Исследование (2019): метабиотики восстанавливают мукозный слой и плотные контакты за 2 недели до введения пробиотиков.

## Лайфхак для пользователя (Nutrition Tip)

> 🦠 **Синбиотики — «пакет» пробиотик+пребиотик. Метабиотики — «какашки» полезных бактерий.** Синбиотики работают быстрее и дольше, чем пробиотики (закрепление + питание). Метабиотики — отличный старт при СИБР, тотальном дисбиозе или когда живые пробиотики не работают. Стратегия: метабиотики (2–4 нед) → синбиотики (4–12 нед). Выбирайте поликомпонентные формы.

## Ссылки

1. Markowiak P, Śliżewska K. Effects of probiotics, prebiotics, and synbiotics on human health. Nutrients. 2017;9(9):1021.
2. Vallianou N, et al. Synbiotics in the management of irritable bowel syndrome: a systematic review and meta-analysis. J Clin Med. 2021;10(19):4510.
3. Żółkiewicz J, et al. Postbiotics—a step beyond pre- and probiotics. Nutrients. 2020;12(8):2189.
4. Soberón N, et al. Postbiotics in the management of SIBO: a randomized controlled trial. Microorganisms. 2020;8(11):1700.
5. Salminen S, et al. The International Scientific Association of Probiotics and Prebiotics (ISAPP) consensus statement on postbiotics. Nat Rev Gastroenterol Hepatol. 2021;18(9):649-667.

`# Таурин (Taurine)

**Категория:** БАД / Аминокислота  
**Тип:** Сульфоаминокислота (условно незаменимая)  
**Основное действующее вещество:** 2-аминоэтансульфоновая кислота  
**Синонимы:** Taurine, аминоэтансульфоновая кислота, L-таурин  

## Что это такое

Таурин — сульфоаминокислота, не входящая в состав белков, но играющая ключевую роль в конъюгации жёлчных кислот (образует таурохолевую кислоту), антиоксидантной защите, осморегуляции и модуляции кальциевого обмена. Синтезируется в печени из цистеина в присутствии витамина B6. Условно незаменима при метаболическом синдроме, сердечно-сосудистых заболеваниях и нарушениях желчеоттока.

## Внешний вид

Белый кристаллический порошок без запаха, слегка кисловатый на вкус; хорошо растворим в воде

## Метаболический цикл

- **Всасывание:** активный транспорт через β-аминокислотный транспортер (TauT, SLC6A6) в тонкой кишке. Всасывание — быстрое и полное. Cmax через 30–60 мин. Биодоступность 90–100%.
- **Распределение:** свободная аминокислота в цитозоле (миллимолярные концентрации). Высокая концентрация в сердце, сетчатке, мышцах, мозге. Транспорт через ГЭБ — через TauT (активный, натрий-зависимый).
- **Метаболизм:** таурин не метаболизируется (не включается в белки). Участвует в конъюгации жёлчных кислот (таурохолевая, тауродезоксихолевая кислоты). Частично используется в синтезе глутатиона.
- **Выведение:** T½ ~1–2 ч. Почки — фильтрация + канальцевая реабсорбция (95%). Экскреция таурина регулируется диетой (высокое потребление → увеличение экскреции).
- **Особенность:** для ЖКТ — конъюгация жёлчных кислот. Для печени — гепатопротекторное (антиоксидантное). Принимать с жирной пищей (стимуляция жёлчеотделения). Курс 4–12 недель.

## Механизмы действия

- **Конъюгация жёлчных кислот** — образование таурохолевой кислоты → улучшение реологии желчи
- **Желчегонное** — стимуляция оттока молодой желчи по внутрипечёночным протокам
- **Гепатопротекторное** — защита гепатоцитов от жирового гепатоза и свободных радикалов
- **Повышение чувствительности к инсулину** — улучшение утилизации глюкозы
- **Вазодилатация** — снижение повышенного давления
- **Защита β-клеток поджелудочной железы** — способствует выработке инсулина
- **Антиоксидантное** — нейтрализация гипохлорит-аниона (HOCl)
- **Кардиопротекторное** — стабилизация сарколеммы, регуляция Ca²⁺
- **Осморегуляция** — поддержание объёма клеток
- **Модуляция нейротрансмиссии** — ГАМК-ергическое действие

`# Вентрамин — пептиды желудка (Stomach peptides)

**Категория:** Пептидный биорегулятор  
**Тип:** Нутрицевтик / Органоспецифический пептид  
**Основное действующее вещество:** Пептидный комплекс желудка (КСБЖФ/KSBJF)  
**Синонимы:** Ventramin, желудочные пептиды  

## Что это такое

Вентрамин — пептидный биорегулятор, полученный из слизистой оболочки желудка молодых животных (крупного рогатого скота). Содержит комплекс аминокислот и пептидов, специфичных для ткани желудка. Относится к группе цитомединов — органоспецифических пептидов.

## Внешний вид

Желатиновые капсулы (кремовые/белые) с порошком кремово-бежевого цвета; специфический запах пептидов

## Метаболический цикл

- **Всасывание:** пептиды вентрамина — частичный протеолиз в желудке и тонкой кишке до олигопептидов и аминокислот. Всасывание через PEPT1 (SLC15A1) в двенадцатиперстной кишке и тощей кишке. Cmax фрагментов — через 30–60 мин. Биодоступность олигопептидов — 5–15%.
- **Распределение:** олигопептиды и аминокислоты — портальный кровоток → печень. Органоспецифичность — за счёт гомологии с тканями желудка (цитомедины). Частичное накопление в слизистой желудка. Через ГЭБ — минимально.
- **Метаболизм:** гидролиз пептидазами плазмы и печени до аминокислот. Часть аминокислот → синтез собственных белков (в т.ч. регуляторных). Цитомедины — модуляция экспрессии генов в клетках-мишенях.
- **Выведение:** T½ 2–4 ч. Почки — аминокислоты и малые пептиды (клубочковая фильтрация, частичная реабсорбция).
- **Особенность:** органоспецифический пептид, не предназначен для длительного приёма (2–4 недели, адаптация рецепторов). Принимать за 20–30 мин до еды (натощак — максимальное всасывание).

## Механизмы действия

- **Стимулирует регенерацию клеток слизистой желудка**
- **Нормализует секреторную функцию**
- **Улучшает трофику слизистой оболочки**
- **Обладает органоспецифичностью** — действует преимущественно на ткань желудка
- **Противовоспалительное действие** — снижает воспаление в слизистой желудка

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Атрофический гастрит | Высокая | Стимулирует регенерацию |
| Аутоиммунный гастрит | Умеренная | Облегчение симптомов |
| Метаплазия / дисплазия желудка | Поддерживающая | В комплексной терапии |
| Состояние после резекции желудка | Восстановительная | Ускоряет адаптацию |
| Хронический гастрит | Хорошая | Снижение воспаления |

## Особенности приёма

- **Курс:** 2–4 недели (максимум 1 месяц)
- **Не предназначен для длительного приёма**
- Начинать после снижения острого воспаления

## Форма приема и порядок

Капсулы (0.1–0.2 г × 2–4 р/день). Принимать за 20–30 мин до еды. Курс: 2–4 недели (максимум 1 месяц). Не предназначен для длительного приёма. Начинать после стихания острого воспаления

## Пептиды и аутоиммунные заболевания

Вопрос применения при аутоиммунных заболеваниях:

- **Системные пептиды** (на весь организм) — не рекомендуется при аутоиммунных (могут избыточно нагрузить организм)
- **Органоспецифические пептиды** (желудка, поджелудочной и т.д.) — исследований о риске повышения аутоиммунной активности нет. При уже имеющемся аутоиммунном заболевании органный пептид может быть полезен

## Противопоказания

- Индивидуальная непереносимость (аллергия на животный белок)
- Обострение воспалительных заболеваний
- Беременность, лактация (недостаточно данных)
- Для системных пептидов — аутоиммунные заболевания (для органных — вопрос остаётся открытым)


## Топ-5 продуктов, в которых содержится

Не содержится в продуктах питания (пептидный биорегулятор животного происхождения). Источник компонентов: слизистая оболочка желудка КРС

| Ранг | Вещество | Эффект |

| +++ | Цинк-L-карнозин | Синергия регенерации (разные пептидные механизмы) |

| + | Бутират | Синергия эпителиальной регенерации (толстая кишка) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| + | Иммуносупрессоры | Теоретическое ослабление регуляторных пептидов |
| + | Антибиотики (длительно) | Нарушение пула аминокислот для синтеза пептидов |

## Лайфхак для пользователя (Nutrition Tip)

> 🧬 **Вентрамин — регенератор слизистой желудка при атрофии.** Курс 2–4 недели, не дольше (адаптация рецепторов). При аутоиммунном гастрите — разрешён (органоспецифический пептид). Системные пептиды при аутоиммунных — не рекомендуется. Не путать с пептидными комплексами.

`# Витамин A (Ретинол) для слизистых ЖКТ

**Категория:** Жирорастворимый витамин  
**Тип:** Витамин  
**Суточная норма (РФ, взрослые):** 900 мкг (мужчины), 700 мкг (женщины)  
**Суточная норма (США, RDA):** 900 мкг (мужчины 19+), 700 мкг (женщины 19+)  
**Верхний допустимый уровень (UL):** 3000 мкг/сут (9000 МЕ)  

## Что это такое

Витамин A (ретинол) — жирорастворимый витамин, критически важный для здоровья слизистых оболочек, включая ЖКТ. Ретинол и его производные (ретиноевая кислота) регулируют дифференцировку эпителиальных клеток и секрецию слизи.

## Метаболический цикл

- **Всасывание:** жирорастворимый — всасывание в тонкой кишке (мицеллярный транспорт, зависимость от жёлчных кислот и панкреатической липазы). Cmax через 4–8 ч. Дефицит жиров в диете → снижение всасывания на 50–70%.

- **Выведение:** T½ витамина A — 12–24 ч (ретинол). Преимущественно с калом (жёлчь), частично с мочой.
- **Особенность:** для GI — поддержка слизистой (дифференциация эпителия, барьерная функция). Принимать с жирной пищей. Курс 4–8 недель (не превышать дозу).

## Механизмы действия в контексте ЖКТ

- **Улучшает текучесть мембран** — делает клетки слизистой эластичными, предотвращает шелушение

- **Поддерживает целостность эпителиального барьера**
- **Участвует в регенерации слизистой** — необходим для быстрого обновления клеток
- **Симптомы дефицита на слизистых**: сухость, шелушение (что видно на губах — то же происходит в кишке)

## Показания для ЖКТ

| Показание | Эффект |
|-----------|--------|
| Атрофические изменения слизистой | Восстановление |
| Снижение sIgA (секреторного Ig A) | Повышение местного иммунитета |
| Частые инфекции ЖКТ | Укрепление барьера |
| Эрозивные изменения | Поддержка регенерации |

## Особенности приёма

- **Жирорастворимый** — принимать с жирной пищей
- **Провить осторожность с дозировками** — кумулятивное действие, гипервитаминоз A опасен
- **При дефиците железа** — усвоение витамина A снижается (и наоборот)
- **Мониторинг при длительном приёме** — уровень ретинола в сыворотке

Капсулы (ретинол — 5000–10000 МЕ/день, бета-каротин — 5000–25000 МЕ/день), жидкий (капли), драже. Принимать с жирной пищей. Курс: 4–8 недель. Не превышать дозировку (гипервитаминоз A — риск ретиноловой интоксикации)

## Противопоказания

- Гипервитаминоз A
- Беременность (высокие дозы >3000 мкг/сут тератогенны)
- Тяжёлые заболевания печени
- Гипотиреоз (нарушение конверсии каротина в ретинол)

Печень (говяжья, куриная — рекордное количество), морковь (бета-каротин), сладкий картофель (батат), тыква, шпинат и тёмно-зелёные листовые овощи, яичный желток, сливочное масло, рыбий жир

`# Витамин D (Холекальциферол) для ЖКТ

**Категория:** Жирорастворимый витамин  
**Тип:** Витамин / Гормоноподобное вещество  
**Суточная норма (РФ):** 600–800 МЕ (15–20 мкг)

Витамин D — жирорастворимый витамин с гормоноподобным действием. Помимо классической роли в кальциевом обмене, играет ключевую роль в иммунной регуляции и поддержке здоровья ЖКТ.

## Механизмы действия в контексте ЖКТ

- **Снижает уровень воспаления** — модулирует врождённый и адаптивный иммунитет
- **Изменяет состав микробиома** — в сторону противовоспалительных штаммов
- **Улучшает целостность эпителиального барьера кишечника**
- **Повышает местный иммунитет** — стимулирует продукцию антимикробных пептидов (кателицидин)

Жирная рыба (лосось, скумбрия, сардины), рыбий жир (печень трески), яичный желток, печень говяжья, грибы (шиитаке, лисички — под UV-светом), обогащённые продукты (молоко, злаки)

`# Цинк-L-карнозин (Zinc-L-carnosine)

**Категория:** Хелатный комплекс  
**Тип:** Нутрицевтик / Гастропротектор  
**Основное действующее вещество:** Цинк-L-карнозин (хелат цинка с L-карнозином)  
**Синонимы:** Zn-Carnosine, Polaprezinc (лекарственная форма, Япония)  
**Лекарственный аналог:** Гастропротекторы (Cytotec, ребагит)

## Что это такое

Цинк-L-карнозин — хелатный комплекс цинка и аминокислоты карнозина. Карнозин известен антиэйдж-эффектом, а в комбинации с цинком даёт тройное усиление гастропротекторного действия по сравнению с компонентами по отдельности. Широко применяется в Японии как лекарственное средство (Polaprezinc).

## Внешний вид

Белый кристаллический порошок; капсулы — белые желатиновые с кремовым содержимым


## Метаболический цикл

- **Диссоциация:** комплекс цинк-карнозин устойчив к кислой среде желудка (pH 1–3) — минимальная диссоциация в желудке. Основная диссоциация — в двенадцатиперстной кишке (pH 6–7) под действием панкреатических ферментов.
- **Всасывание:** цинк — через ZIP4 (SLC39A4) в двенадцатиперстной кишке и тощей кишке. Карнозин — через PEPT1 (SLC15A1). Хелатная форма цинк-карнозин обеспечивает более стабильное всасывание, чем сульфат/оксид цинка (на 30–40% выше).
- **Распределение:** цинк — связывание с металлотионеином, альбумином (60%). Накопление в слизистой желудка (местное действие). Карнозин — системно (через PEPT1, частично через PEPT2 в ЦНС). Через ГЭБ карнозин — ограниченно.
- **Выведение:** T½ 4–8 ч. Цинк — с калом (60–70%), почками (20–30%). Карнозин — гидролиз карнозиназой до β-аланина + гистидина → почечная экскреция.
- **Особенность:** ключевое преимущество — избирательное накопление цинка в слизистой желудка (в 2–3 раза выше, чем обычный цинк). Принимать за 30–60 мин до еды. Для ЖКТ — натощак (максимальное покрытие слизистой). Курс 8–12 недель.

## Механизмы действия

- **Нормализует кислотность** — не повышает и не снижает, а стабилизирует
- **Стабилизирует клеточные мембраны** — защищает эпителий ЖКТ
- **Снижает воспаление** и ускоряет заживление эрозий и язв
- **Усиливает регенерацию** — ускоряет восстановление слизистой
- **Противо-Helicobacter активность** — высокая эффективность при хеликобактерном гастрите
- **Снижает повышенную кишечную проницаемость** (leaky gut)

## Показания

| Показание | Эффективность | Примечание |
|-----------|---------------|-----------|
| Гиперацидность (повышенная кислотность) | Высокая | Альтернатива ингибиторам протонной помпы |
| Гастрит (включая хеликобактерный) | Высокая | Усиливает регенерацию |
| Язвенная болезнь желудка и ДПК | Высокая | Заживляет эрозии и язвы |
| ГЭРБ, рефлюкс-эзофагит | Хорошая | Защита и заживление слизистой |
| Повышенная кишечная проницаемость | Хорошая | Укрепляет барьер |
| Воспалительные заболевания ЖКТ | Хорошая | Заживление на всём протяжении ЖКТ |

## Особенности приёма

- **Средняя дозировка:** 75 мг действующего вещества × 3 раза/день
- **Принимать с едой** (во избежание тошноты — обычный цинк натощак раздражает)
- **Курс:** 4–8 недель, при необходимости дольше
- **Баланс цинк–медь:** если суммарный приём цинка >50 мг/сут, добавлять 1–2 мг меди

## Форма приема и порядок

Капсулы (75 мг × 2 р/день), жевательные таблетки. Принимать натощак или между приёмами пищи. Курс: 4–8 недель. Не сочетать с кофе, чаем, фитиновой кислотой (злаки, бобовые) — разносить на 2 часа

## Противопоказания

- Передозировка цинком
- Дефицит меди (добавка цинка может ухудшить состояние — цинк подавляет всасывание Cu)
- Индивидуальная непереносимость


## Топ-5 продуктов, в которых содержится

Не содержится в продуктах питания в виде комплекса (цинк-L-карнозин синтезируется). Источники компонентов: цинк (устрицы, тыквенные семечки, говядина) + карнозин (говядина, курица — содержится в мышцах животных)

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | L-глютамин | Синергия: мембраностабилизация (ZnC) + метаболизм (Gln) |
| ++ | Солодка DGL | Синергия заживления: слизь + мембранный барьер |
| ++ | Кверцетин | Синергия стабилизации тучных клеток и противовоспалительное |
| + | Пробиотики (L. rhamnosus GG) | Синергия укрепления барьера |
| + | Витамин C | Усиление всасывания цинка |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Фитиновая кислота (зерновые, бобовые) | Снижает всасывание цинка (хелатирование) |
| ++ | Кальций (высокие дозы) | Конкуренция за всасывание |
| ++ | Антибиотики (тетрациклины, хинолоны) | Хелатирование — снижение всасывания антибиотика |
| + | Железо | Конкуренция за всасывание (разносить на 2 ч) |
| + | Медь | Конкуренция за всасывание (длительный приём) |

## Если нет возможности приобрести цинк-L-карнозин

Можно заменить на другую форму цинка (пиколинат, цитрат, сульфат), но:
- Цинк натощак тошнит — принимать с едой
- Простая форма цинка может обладать раздражающими свойствами
- Комбинация цинк + карнозин в 3 раза эффективнее, чем раздельное применение

## Научные факты

- Сочетание цинка и карнозина в 3 раза эффективнее при заживлении слизистой, чем они по отдельности (доказано клинически).
- Polaprezinc (Zn-карнозин) — рецептурный препарат в Японии для лечения язвенной болезни.
- Цинк-L-карнозин нормализует кислотность, не снижая и не повышая её (отличие от ИПП/антацидов).

## Лайфхак для пользователя (Nutrition Tip)

> 💊 **Цинк-L-карнозин — альтернатива Омепразолу без подавления кислотности.** В отличие от блокаторов протонной помпы, не выключает кислотность, а нормализует её. Заживляет эрозии и язвы по всему ЖКТ. Принимайте по 75 мг × 3/день с едой. Если принимаете >50 мг/сут цинка — обязательно добавьте 1–2 мг меди.

## Ссылки

1. Suzuki H, et al. Effect of polaprezinc on healing of acetic acid-induced gastric ulcers in rats. J Clin Gastroenterol. 2002;34(4):408-412.
2. Tanigawa T, et al. Zinc carnosine protects against mucosal injury in experimental esophagitis. Dig Dis Sci. 2013;58(7):1918-1925.
3. Mahmood A, et al. Zinc carnosine and intestinal permeability. Aliment Pharmacol Ther. 2007;25(12):1463-1470.

`# Шлемник байкальский (Baikal Skullcap, Scutellaria baicalensis)

**Категория:** БАД / Фитотерапия  
**Тип:** Седативное / Анксиолитическое / Противовоспалительное  
**Основное действующее вещество:** Байкалин, байкалеин, вогонин, вогонозид (флавоны)  
**Синонимы:** Scutellaria baicalensis, Baikal skullcap, Huang Qin, шлемник, байкальский шлемник

## Что это такое

Шлемник байкальский — классическое растение традиционной китайской медицины (Huang Qin), используемое более 2000 лет. Обладает комплексным действием: седативное (через GABA-A рецепторы), анксиолитическое, противовоспалительное, антиоксидантное и гепатопротективное. В отличие от синтетических анксиолитиков, не вызывает выраженной седации днём и привыкания. Применяется при тревожности, стрессе, нарушениях сна, воспалительных заболеваниях, аллергии.

## Внешний вид

Корень шлемника — желтовато-коричневые куски корневища с продольными морщинами, без сильного запаха. Сухой экстракт — жёлто-коричневый порошок (флавоны придают жёлтый цвет). Настойка — янтарного цвета жидкость.

## Метаболический цикл

- **Всасывание:** байкалин гидролизуется кишечной микрофлорой до байкалеина (агликон), который всасывается в тонком кишечнике. Вогонин — Cmax через 1–2 ч.
- **Метаболизм:** байкалеин — глюкуронирование и сульфатирование в печени (UGT1A1, UGT1A9) обратно в байкалин. Вогонин — метаболизм через CYP1A2, CYP2E1.
- **Распределение:** флавоны проходят ГЭБ (байкалеин до 30% — нейропротекция). Связь с альбумином >90%.
- **Выведение:** T½ байкалеина 1–4 ч (двухфазное). Преимущественно с калом (60%) и мочой (30%).
- **Особенность:** необходима интактная кишечная микробиота для гидролиза гликозидов (байкалин → байкалеин). Эффект нарастает к 7–14 дню регулярного приёма.

## Механизмы действия

- **Агонист GABA-A рецепторов** — байкалин и вогонин: положительные аллостерические модуляторы бензодиазепинового сайта
- **Ингибирование COX-2, 5-LOX, NF-κB** — байкалеин: мощное противовоспалительное (снижение IL-6, TNFα, PGE2)
- **Антиоксидантное** — байкалеин: хелатирование Fe²⁺, нейтрализация свободных радикалов, защита нейронов
- **Ингибирование дегрануляции тучных клеток** — противоаллергическое (снижение гистамина)
- **Адаптогенное** — модуляция HPA-оси, снижение кортизола при стрессе
- **Гепатопротективное** — индукция Nrf2-ARE, антиапоптотическое в гепатоцитах

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Тревожность (лёгкая/умеренная) | 1B | Анксиолитический эффект (GABA) |
| Нарушения сна (латентность) | 1B | Улучшение засыпания, качества сна |
| Воспалительные заболевания | 2A | Снижение COX-2, NF-κB |
| Аллергические реакции | 2B | Антигистаминное действие |
| Стресс / адаптация | 2B | Снижение реактивности HPA-оси |

## Топ-5 продуктов, в которых содержится

Сухой корень шлемника (для отвара/чая), стандартизированный экстракт шлемника (капсулы 250–500 мг, 10–20% байкалина), настойка шлемника (2–4 мл × 3 р/день), ТКМ сборы с Huang Qin (в комбинации с другими травами), противовоспалительные комплексы с шлемником (в составах с куркумином, кверцетином)

## Особенности приёма

- **Капсулы (экстракт):** 250–500 мг (10–20% байкалина) × 1–3 р/день
- **Настойка (1:5):** 2–4 мл (40–80 капель) × 3 р/день

- **Курс:** 4–8 недель (хорошо переносится длительно)
- **Время:** при тревожности — днём (не вызывает сонливости); при бессоннице — за 30–60 мин до сна
- **Стандартизация:** качество экстракта критически важно (содержание байкалина и вогонина)

## Противопоказания

- Индивидуальная непереносимость (редко)
- Беременность и лактация (недостаточно данных)
- Холодный синдром по ТКМ («дефицит холода» — может усугубить)
- Тяжёлые заболевания печени (осторожно — теоретический риск)

Стандартизированный экстракт (250–500 мг, 10–20% байкалина) × 1–3 р/день или настойка (2–4 мл × 3 р/день). При тревожности — принимать днём. При нарушениях сна — за 30–60 мин до сна. Курс 4–8 недель. Для максимальной биодоступности принимать с небольшим количеством жира (флавоны — жирорастворимые). При приёме антикоагулянтов — консультация врача.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Магний глицинат | Синергия GABA (разные механизмы) — усиление анксиолитического эффекта |
| ++ | L-теанин | Дополнительная релаксация + улучшение когнитивного фокуса |
| ++ | Куркумин | Синергия противовоспалительного действия (COX-2 + NF-κB) |
| + | Ашваганда | Адаптогенная синергия (снижение кортизола + GABA) |

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Бензодиазепины | Потенцирование седации — риск избыточного угнетения ЦНС |
| ++ | Алкоголь | Аддитивное торможение ЦНС |
| ++ | Антикоагулянты (варфарин) | Байкалеин — теоретический антиагрегантный эффект (контроль МНО) |

- Байкалин — положительный аллостерический модулятор GABA-A рецепторов (сродство к бензодиазепиновому сайту), что объясняет анксиолитический и седативный эффекты растения (Wang F, et al. Pharmacol Biochem Behav. 2022;213:173339).

> 🌿 **Шлемник байкальский — дневной анксиолитик без сонливости.** В отличие от валерианы, шлемник можно принимать днём при тревожности (байкалин и вогонин — мягкие модуляторы GABA без избыточной седации). На ночь — работает как мягкое снотворное. Для синергии: шлемник + L-теанин (утро/день), шлемник + магний глицинат (вечер). Курс 4–8 недель. Важно: стандартизация экстракта (10–20% байкалина).

`# Пассифлора (Passiflora incarnata, Passion Flower)

**Категория:** БАД / Фитотерапия  
**Тип:** Седативное / Анксиолитическое / Спазмолитическое  
**Основное действующее вещество:** Флавоноиды (витексин, изовитексин, апигенин), алкалоиды (гарман, гармин), кумарины  
**Синонимы:** Passiflora incarnata, passion flower, страстоцвет, пассифлора, маракуйя (плод), maypop

## Что это такое

Пассифлора (Passiflora incarnata) — многолетняя лиана семейства Passifloraceae. Одно из наиболее изученных седативных растений (монография ESCOP, ВОЗ, Комиссия E). Надземные части используются как мягкое седативное и анксиолитическое средство, особенно в комбинации с валерианой. Основное отличие — дополнительный GABA-ергический эффект через алкалоиды (гарман — ингибитор MAO-A). Эффективна при тревожности, бессоннице (особенно при пробуждениях), нервном возбуждении, ПМС, предоперационной тревоге.

## Внешний вид

Трава пассифлоры — измельчённые стебли (светло-зелёные), листья (тёмно-зелёные) и цветки (фиолетовые/белые с характерным корончатым венчиком). Имеет слабый травянистый запах, горьковатый вкус. Экстракт — коричневато-зелёный порошок. Капсулы/таблетки — стандартизированный экстракт (флавоноиды 2–4%, витексин).

## Метаболический цикл

- **Всасывание:** флавоноиды (витексин, изовитексин) — гликозиды с низкой биодоступностью (<5%) из-за глюкуронирования в энтероцитах (UGT1A1, UGT1A9). Алкалоиды (гарман, гармин) — всасываются в тонкой кишке (пассивная диффузия), Cmax через 1–2 ч, биодоступность 30–50%.
- **Метаболизм:** витексин — гидролиз β-глюкозидазой микробиоты до агликона (апигенин) → глюкуронирование/сульфатирование в печени. Гарман — метаболизм через CYP1A2, CYP2D6 → гармалин и другие β-карболины.
- **Распределение:** витексин — связывание с альбумином 85%, Vd — 1–2 л/кг. Гарман — через ГЭБ (30–50% от плазменной концентрации), связывание с белками 70%.
- **Выведение:** T½ витексина 2–4 ч, гармана 4–6 ч. Преимущественно с мочой (60–70% как конъюгаты), с калом (20–30%).
- **Особенность:** алкалоиды гармана (ингибиторы MAO-A) обеспечивают уникальное действие — повышение доступности серотонина и норадреналина в синапсах (дополнительно к GABA-ергическому).

## Механизмы действия

- **Агонист GABA-A рецептора** — флавоноиды (апигенин) связываются с бензодиазепиновым сайтом
- **Ингибитор MAO-A** — алкалоиды (гарман, гармин) — повышение серотонина, норадреналина, дофамина
- **Снижение кортизола** — модуляция HPA-оси
- **Спазмолитическое** — расслабление гладкой мускулатуры (через холинолитический механизм)
- **Улучшение засыпания** — сокращение латентного периода сна
- **Снижение ночных пробуждений** — стабилизация архитектуры сна

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Бессонница (лёгкая/умеренная) | 1A | Улучшение засыпания, снижение пробуждений |
| Тревожность (лёгкая/умеренная) | 1A | Снижение тревоги (HAM-A −3.8 балла) |
| Нервное возбуждение | 1A | Седация без снотворного эффекта |
| ПМС (бессонница, тревога) | 1B | Снижение раздражительности, улучшение сна |
| Предоперационная тревога | 1B | Снижение на 50% (сравнимо с мидазоламом) |
| СРК (спастический) | 2A | Снижение боли, спазмов |

## Топ-5 продуктов, в которых содержится

Пассифлора (Passiflora incarnata) — трава, чай, экстракт. Плод пассифлоры (маракуйя/Passiflora edulis) — другие соединения (не стандартизирован). Чай с пассифлорой (моно или в сборах). Коммерческие комбинации: Нервофлукс, Novo-Passit (пассифлора + валериана + мелисса), Passiflora compositum.

## Особенности приёма

- **Стандартная дозировка:** 500–1500 мг/день (экстракт 2–4% флавоноидов), 2–6 г/день (трава, чай)
- **Оптимальная:** 500–800 мг экстракта × 1–2 р/день или 2–3 чашки чая
- **Форма:** чай (2–4 г травы на 200 мл, 10–15 мин, 2–3 р/день), капсулы (экстракт), настойка (1:5, 30–60 капель 2–3 р/день)
- **Курс:** 4–8 недель, перерыв 1–2 недели
- **Для сна:** 500–800 мг за 30–60 мин до сна (лучше с валерианой)
- **Для тревоги:** 500 мг × 2 р/день (утро + вечер)
- **Предоперационная:** 500–800 мг за 60–90 мин до процедуры

## Противопоказания

- Беременность (алкалоиды — утеротонический эффект in vitro)
- Лактация (ограниченные данные)
- Гипотония (пассифлора может снижать АД)
- Седативные/снотворные/антидепрессанты (суммация)
- Операции под общей анестезией (за 2 недели)
- MAO-ингибиторы

## Форма приема и порядок

Чай (2–4 г травы на 200 мл, 10–15 мин, 2–3 р/день), капсулы (300–500 мг экстракта, 1–2 р/день), настойка (30–60 капель 2–3 р/день). Для сна — за 30–60 мин до сна. Для тревоги — утром и вечером. Курс 4–8 недель. Комбинация с валерианой — золотой стандарт фитотерапии сна.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Валериана | Синергия GABA: разные сайты связывания |
| +++ | Мелисса | Синергия анксиолитического + седативного |
| ++ | Магний глицинат | Синергия расслабления (GABA + NMDA) |
| ++ | 5-HTP | Синергия серотонинового пути (MAO-A + серотонин) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Алкоголь | Суммация седации — риск угнетения ЦНС |
| ++ | Бензодиазепины | Суммация — риск избыточной седации |
| ++ | СИОЗС/СИОЗСН | Теоретическая суммация серотонина (MAO-A) |
| + | Кофеин | Снижение седативного эффекта |

## Научные факты

- Мета-анализ (2020): пассифлора (500–1500 мг/день, 4–8 недель) снижает тревогу по HAM-A на 3.8 балла (SMD −0.67, 95% CI −1.08 to −0.26), сравнима с бензодиазепинами, но без побочных эффектов (Phytomedicine. 2020;79:153336).
- РКИ (2019): пассифлора (800 мг/день, 4 недели) улучшает засыпание на 35% и снижает ночные пробуждения на 28% — сравнимо с золпидемом 10 мг (J Clin Sleep Med. 2019;15(6):857-864).
- РКИ (2018): пассифлора (500 мг, однократно) снижает предоперационную тревогу на 50% — сравнима с мидазоламом 7.5 мг (Anesth Analg. 2018;127(3):674-681).
- Мета-анализ (2017): пассифлора + валериана: засыпание (SMD −0.82) и качество сна (SMD −0.71) в 7 РКИ (Sleep Med Rev. 2017;35:34-45).

## Лайфхак для пользователя (Nutrition Tip)

> 🌸 **Пассифлора — «экзотическое успокоение» с двойным механизмом.** Работает одновременно через GABA (как валериана) И ингибирование MAO-A (повышение серотонина). Лучше всего работает КУРСОМ (2–4 недели), а не разово. Комбинация с валерианой — золотой стандарт. Дозировка: 500–800 мг экстракта. Перед операцией — 500 мг за 60 мин (безопаснее мидазолама). Не сочетать с алкоголем и СИОЗС.

## Ссылки

1. Miyasaka LS, et al. Passiflora incarnata for anxiety: a systematic review and meta-analysis. Phytomedicine. 2020;79:153336.
2. Ngan A, et al. A double-blind, placebo-controlled investigation of Passiflora incarnata on sleep in adults with insomnia. J Clin Sleep Med. 2019;15(6):857-864.
3. Dantas LP, et al. Passiflora incarnata for preoperative anxiety: a randomized, double-blind, controlled trial. Anesth Analg. 2018;127(3):674-681.
4. Sarris J, et al. Herbal medicine for insomnia: a systematic review of valerian and passionflower. Sleep Med Rev. 2017;35:34-45.
5. Miroddi M, et al. Passiflora incarnata L.: ethnopharmacology, clinical application, safety and efficacy. J Ethnopharmacol. 2013;150(3):791-804.

`# Валериана (Valerian, Valeriana officinalis)

**Категория:** БАД / Фитотерапия  
**Тип:** Седативное / Снотворное / Спазмолитическое  
**Основное действующее вещество:** Валепотриаты, сесквитерпены (валереновая кислота), алкалоиды  
**Синонимы:** Valerian, валериана лекарственная, маун, кошачий корень  

## Что это такое

Валериана — одно из старейших седативных растений. Мягкое успокаивающее средство, улучшающее засыпание и качество сна. В отличие от синтетических снотворных, не вызывает привыкания и не нарушает структуру сна. Лучше всего работает в форме чая или водного настоя (таблетированные формы спорны по эффективности). Используется при тревожности, стрессе, бессоннице, панических атаках.

## Внешний вид

Корень валерианы — светло-коричневые/жёлтые кусочки корневища с тонкими корешками, с характерным сильным запахом (валереновая кислота). Сухой экстракт — серовато-коричневый порошок. Настойка — коричневая жидкость.

## Метаболический цикл

- **Всасывание:** валепотриаты и сесквитерпены всасываются в тонком кишечнике. Валереновая кислота — Cmax через 1–2 ч. Биодоступность валепотриатов <10% (быстрый метаболизм).
- **Метаболизм:** валепотриаты — гидролиз до валтрата и производных в энтероцитах и печени (CYP3A4). Валереновая кислота — глюкуронирование (UGT1A1). Активные метаболиты — балдринальные производные.
- **Распределение:** валереновая кислота — связывание с альбумином 80%, через ГЭБ — частично (до 15%).
- **Выведение:** T½ валереновой кислоты 1–2 ч. Преимущественно с мочой (60–70%) и калом (20–30%).
- **Особенность:** чайная форма предпочтительнее таблеток (лучшая экстракция активных соединений). Эффект развивается через 2–4 недели регулярного приёма.

## Механизмы действия

- **Агонист GABA-A рецепторов** — валереновая кислота связывается с бензодиазепиновым сайтом
- **Модуляция аденозиновых рецепторов** — седативный эффект
- **Снижение распада ГАМК** — ингибирование ГАМК-трансаминазы
- **Спазмолитическое** — расслабление гладкой мускулатуры
- **Улучшение засыпания** — сокращение латентного периода сна
- **Увеличение медленноволнового сна** — глубокие стадии сна

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Бессонница (лёгкая/умеренная) | 1A | Улучшение засыпания, качества сна |
| Тревожность (лёгкая) | 1B | Мягкое anxiolytic действие |
| Стресс | 1B | Снижение реактивности на стресс |
| Спазмы ЖКТ / менструальные боли | 2A | Спазмолитическое |
| Симптомы менопаузы | 2B | Седативный + вегетостабилизирующий |

## Топ-5 продуктов, в которых содержится

Корень валерианы (сушёный — для чая/отвара), настойка валерианы (спиртовая), сухой экстракт (таблетки/капсулы — спорная форма), чай «Успокаивающий сбор» (с пустырником, мятой), травяные сборы с валерианой для ванн

## Особенности приёма

- **Чай/отвар:** 1–2 ч.л. корня на чашку кипятка, настоять 10–15 мин
- **Настойка (1:5):** 2–5 мл (40–100 капель) × 2–3 р/день
- **Таблетки/капсулы:** 300–600 мг (стандартизированный экстракт 0.5–0.8% валереновой кислоты)
- **Курс:** 2–4 недели (не дольше — риск снижения эффекта)
- **Время:** за 30–60 мин до сна (или × 2–3 р/день при тревожности)
- **Форма чая предпочтительнее таблеток** (лучшая биодоступность)

## Противопоказания

- Индивидуальная непереносимость
- Тяжёлые заболевания печени (валепотриаты гепатотоксичны в высоких дозах)
- Беременность (I триместр — осторожно)
- Дети до 3 лет
- Депрессия (с осторожностью — может усиливать)

## Форма приема и порядок

Чай (1–2 ч.л. корня на чашку, настоять 10–15 мин), настойка (40–100 капель × 2–3 р/день), капсулы (300–600 мг/день). Предпочтительна жидкая форма (чай/настойка). Принимать за 30–60 мин до сна. Курс 2–4 недели. После 4 недель — перерыв 1–2 недели.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Мелатонин | Синергия засыпания (валериана — GABA, мелатонин — циркадный) |
| ++ | Магний глицинат | Усиление седативного эффекта (Mg + GABA) |
| ++ | L-теанин | Дополнительное расслабление + улучшение качества сна |
| + | Пассифлора | Синергия GABA (разные сайты рецептора) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Алкоголь | Потенцирование седации — риск угнетения ЦНС |
| ++ | Бензодиазепины | Суммирование — консультация врача |
| ++ | Барбитураты | Усиление — риск угнетения дыхания |
| + | Антигистаминные | Потенцирование седативного эффекта |

## Научные факты

- Мета-анализ (2020): валериана достоверно улучшает субъективное качество сна (PSQI −1.5 балла) и сокращает время засыпания на 10 мин (p<0.05).
- Систематический обзор (2019): валериана эффективна при лёгкой/умеренной бессоннице, но уступает синтетическим снотворным.
- РКИ (2018): комбинация валерианы + мелатонина эффективнее монотерапии при инсомнии.

## Лайфхак для пользователя (Nutrition Tip)

> 🌿 **Валериана — классика, но в чае, а не в таблетках.** Таблетированные формы валерианы спорны (низкая биодоступность). Лучший вариант — чай из корня (настоять 10–15 мин). При тревожности — 2–3 чашки/день. При бессоннице — за 30–60 мин до сна. Курс — не дольше 2–4 недель (риск толерантности). Сочетать с мелатонином или магнием глицинатом для синергии.

1. Bent S, et al. Valerian for sleep: a systematic review and meta-analysis. Am J Med. 2006;119(12):1005-1012.
2. Fernández-San-Martín MI, et al. Efficacy and safety of valerian for the treatment of insomnia: a systematic review and meta-analysis. Sleep Med Rev. 2020;54:101351.
3. Taavoni S, et al. Valerian/lemon balm combination for sleep in postmenopausal women: a randomized placebo-controlled trial. Menopause. 2013;20(12):1274-1280.
4. Wheatley D. Medicinal plants for insomnia: valerian, hops, passion flower, and lemon balm. Sleep Med Rev. 2005;9(1):39-49.

`# Эхинацея (Echinacea purpurea / Echinacea angustifolia)

**Категория:** БАД / Иммуностимулятор  
**Тип:** Стимулирующий иммуностимулятор  
**Основное действующее вещество:** Алкамиды, цикориевая кислота, полисахариды, гликопротеины, эхинакозиды  
**Синонимы:** Echinacea, эхинацея пурпурная, эхинацея узколистная, пурпурный конусник, корень эхинацеи

## Что это такое

Эхинацея — один из наиболее изученных иммуностимуляторов растительного происхождения. Наиболее активны два вида: Echinacea purpurea (эхинацея пурпурная) и Echinacea angustifolia (эхинацея узколистная). Основные действующие вещества — алкамиды (алкиламиды), цикориевая кислота, полисахариды и гликопротеины. Эхинацея стимулирует врождённый иммунитет: повышает активность NK-клеток, макрофагов и продукцию цитокинов (IL-1, TNF-α, IFN-γ). Предназначена для краткосрочного применения при острых инфекциях — не для длительной иммуностимуляции. В отличие от адаптогенов, не модулирует ГГН-ось, а оказывает прямое иммунотропное действие.

## Внешний вид

Корень эхинацеи — конусовидный, твёрдый, снаружи серовато-бурый (E. angustifolia) или буровато-жёлтый (E. purpurea), на изломе беловатый. Цветки и листья чаще используются в сборах и настойках. Порошок корня — светло-серый/бежевый. Настойка (1:5) — зеленовато-коричневая жидкость. Капсулы — стандартизированный экстракт (обычно 4% эхинакозидов).

## Метаболический цикл

- **Всасывание:** алкамиды быстро всасываются в ротовой полости и тонком кишечнике; Cmax через 30–60 мин после приёма. Цикориевая кислота всасывается хуже (<10%) и быстро конъюгируется.
- **Метаболизм:** алкамиды гидролизуются и конъюгируются в печени (глюкуронирование); частично метаболизируются кишечной микробиотой. Цикориевая кислота подвергается метилированию и сульфатированию в печени и кишечнике.
- **Распределение:** алкамиды активно связываются с белками плазмы (до 90%), легко проникают в ткани и клетки иммунной системы (лимфоузлы, селезёнку, костный мозг). Цикориевая кислота быстро выводится с мочой.
- **Выведение:** преимущественно почками (60–70% в виде метаболитов), частично с желчью (15–20%).
- **Особенность:** биодоступность алкамидов резко снижается при приёме с жирной пищей. Для максимальной абсорбции принимать натощак. Эффект на иммунную систему наступает уже через 1–2 дня, курс не должен превышать 10–14 дней.

## Механизмы действия

- **Активация макрофагов** — фагоцитоз, продукция IL-1, IL-6, TNF-α
- **Стимуляция NK-клеток** — повышение цитотоксической активности
- **Индукция IFN-γ** — усиление Th1-иммунного ответа
- **Пролиферация B-лимфоцитов** — усиление гуморального иммунитета
- **Повышение фагоцитарной активности нейтрофилов**
- **Антиоксидантное действие** — цикориевая кислота, флавоноиды
- **Противовоспалительное** — алкамиды ингибируют COX-1, COX-2, 5-LOX
- **Гиалуронидазная активность** — алкамиды блокируют гиалуронидазу бактерий
- **Антибактериальное и противогрибковое** — эфирные масла, алкамиды

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Профилактика респираторных инфекций | 1A | Снижение риска на 35% (мета-анализ) |
| Лечение ОРВИ (раннее начало) | 1A | Сокращение длительности на 1–2 дня |
| Ургентная поддержка иммунитета | 1B | Активация NK-клеток, макрофагов |
| Герпетические инфекции (рецидивы) | 2A | Снижение частоты рецидивов |
| Воспаления верхних дыхательных путей | 2A | Уменьшение отёка и экссудации |
| Вялотекущие инфекции (ЛОР-органы) | 2B | Как адъювант к основной терапии |

## Топ-5 продуктов, в которых содержится

Корень Echinacea purpurea/angustifolia (сушёный, нарезанный), настойка эхинацеи (спиртовая 1:5 на 45–50% этиловом спирте), чай с эхинацеей (листья + цветки + корень), капсулы стандартизированного экстракта (4% эхинакозидов), экстракт эхинацеи в составе иммуностимулирующих сборов и сиропов

## Особенности приёма

- **Стандартизированный экстракт (4% эхинакозидов):** 300–500 мг × 3 р/день
- **Настойка (1:5, 1:10):** 1–2 мл (20–40 капель) × 3 р/день
- **Чай:** 1 ч. ложка сухого сырья на стакан кипятка, 10–15 мин × 3 р/день
- **Курс:** при острых состояниях 7–14 дней, не более 14 дней непрерывно
- **Начало приёма:** при первых симптомах ОРВИ — эффект максимален при раннем старте
- **Время:** не имеет значения, но предпочтительно в первой половине дня
- **Важно:** только краткосрочное применение; длительное использование снижает эффект (тахифилаксия)

## Противопоказания

- Аутоиммунные заболевания (активная фаза) — ревматоидный артрит, СКВ, рассеянный склероз
- Аллергия на растения семейства Астровых (Asteraceae) — амброзия, хризантемы, бархатцы, ромашка
- Прогрессирующие системные заболевания — туберкулёз, лейкоз, коллагенозы
- Беременность и лактация (недостаточно данных)
- Дети до 12 лет (ограниченные данные по безопасности)
- ВИЧ/СПИД и другие иммунодефициты (теоретический риск ускорения прогрессирования)
- Приём иммуносупрессоров (трансплантация, аутоиммунные)

## Форма приема и порядок

Наиболее эффективная форма — стандартизированный экстракт эхинацеи (300–500 мг × 3 р/день, 4% эхинакозидов). Альтернатива — спиртовая настойка (1–2 мл × 3 р/день, разводить в воде). Начинать приём при первых симптомах заболевания. Принимать за 30–40 мин до еды для лучшей абсорбции алкамидов. Курс — не более 14 дней. При необходимости повторного курса — перерыв минимум 1–2 недели. Длительное применение снижает выраженность иммунного ответа.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Витамин C | Синергия иммуностимуляции |
| ++ | Цинк | Потенцирование фагоцитоза и NK-активности |
| + | Прополис | Адъювант антимикробного действия |
| + | Бузина | Усиление противовирусного действия |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Иммуносупрессоры (циклоспорин, такролимус) | Антагонизм — ослабление иммуносупрессии |
| ++ | Кортикостероиды | Взаимоослабление эффектов |
| + | Антикоагулянты (варфарин) | Потенциальное усиление (теоретический риск) |
| + | Ингибиторы CYP3A4 (кетоконазол) | Возможно увеличение концентрации алкамидов |

## Научные факты

- Мета-анализ 14 РКИ (2014, Cochrane): эхинацея снижает риск рецидивирующих респираторных инфекций на 35% (RR 0.65, 95% CI 0.51–0.86) и сокращает длительность ОРВИ в среднем на 1.4 дня при раннем начале приёма.
- РКИ (2012): Echinacea purpurea (стандартизированный экстракт, 2400 мг/день) повышает активность NK-клеток на 40% (p<0.01) и продукцию IFN-γ в 1.8 раза через 7 дней приёма у здоровых добровольцев.

## Лайфхак для пользователя (Nutrition Tip)

> 🌱 **Эхинацея — короткий, но мощный удар по простуде, а не «травка на каждый день».** Принимать только при первых симптомах ОРВИ или коротким курсом 7–10 дней для профилактики в сезон. Дольше 14 дней — неэффективно (тахифилаксия). Алкамиды работают лучше натощак. Не сочетать с иммуносупрессорами. При аллергии на амброзию, ромашку или бархатцы — эхинацея противопоказана. Искать стандартизированный экстракт с содержанием эхинакозидов не менее 4%.

`# Элеутерококк (Eleutherococcus senticosus)

**Категория:** БАД / Адаптоген  
**Тип:** Стимулирующий адаптоген  
**Основное действующее вещество:** Элеутерозиды (A, B, C, D, E)

## Что это такое

Элеутерококк — мощный стимулирующий адаптоген из семейства аралиевых (как и женьшень). Традиционное название — «сибирский женьшень». Биологически несовместим с женьшенем: там, где растёт женьшень, не растёт элеутерококк и наоборот. Механизм действия сходен с женьшенем: стимуляция ЦНС, повышение двигательной активности, физической и умственной работоспособности. Действует за счёт элеутерозидов (лигнаны, кумарины, полисахариды). Снижает усталость, повышает основной обмен, умеренно снижает давление и холестерин.

## Внешний вид

Корневище и корни — куски твёрдые, желтовато-коричневые снаружи, белые/жёлтые внутри. Жидкий экстракт — коричневая жидкость (1:1 на 40% спирте). Таблетки/капсулы — сухой экстракт. Порошок — от светло- до тёмно-коричневого

## Метаболический цикл

- **Всасывание:** элеутерозиды (лигнаны, кумарины) всасываются в тонком кишечнике. Биодоступность ограничена (<10%) из-за активного эффлюкса (P-gp). Cmax через 1–2 ч.

- **Выведение:** преимущественно через желчь с калом (>65%), частично почками (20–25%).
- **Особенность:** курсовой эффект (2–4 недели) обязателен. В отличие от женьшеня, умеренно снижает АД (подходит гипертоникам с осторожностью).

## Механизмы действия

- **Стимуляция ЦНС** — повышение возбудимости, активация коры
- **Повышение двигательной активности** — тонизирование
- **Увеличение условно-рефлекторной деятельности** — когнитивная стимуляция
- **Повышение основного обмена** — вовлечение жиров в метаболизм
- **Умеренное снижение АД** — в отличие от женьшеня
- **Снижение холестерина** — липидный обмен
- **Усиление остроты зрения** — аккомодация глаза
- **Улучшение физической работоспособности**

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Умственное/физическое утомление | 1A | Повышение работоспособности |
| Астения, упадок сил | 1A | Тонизация |
| Низкое АД (гипотония) | 1B | Нормализация |
| Хронический стресс (низкий кортизол) | 1B | Стимуляция ГГН-оси |
| Снижение иммунитета (профилактика ОРВИ) | 2A | Иммуномодуляция |
| Постковидный синдром (астения) | 2A | Восстановление энергии |

## Топ-5 продуктов, в которых содержится

Не содержится в продуктах питания. Корень элеутерококка — основной источник. Настойка/жидкий экстракт элеутерококка (спиртовая 1:1), сухой экстракт (таблетки, капсулы), элеутерококк в тонизирующих сборах и бальзамах, тонизирующие чаи с элеутерококком

- Артериальная гипертензия (высокое АД)
- Тиреотоксикоз
- Бессонница

- Эпилепсия (судорожная готовность)
- Инфаркт миокарда в анамнезе

Жидкий экстракт (20–40 капель × 2–3 р/день), капсулы/таблетки (200–400 мг/день), отвар корня. Только утром и в первой половине дня (до 14:00). Начинать с минимальной дозы. Курс 4–8 недель, перерыв 2–4 недели. При сердечно-сосудистых — с осторожностью, контроль давления.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Лимонник китайский | Синергия стимуляции |

| + | Магний | Баланс возбуждения/торможения |

| Ранг | Вещество | Эффект |
|------|----------|--------|

> 🌿 **Элеутерококк — младший брат женьшеня, но со своим характером.** От женьшеня отличается: (1) умеренно снижает давление (женьшень — повышает), (2) мягче действует. Приём только утром, курс до 8 недель. Отлично подходит для профилактики ОРВИ в сезон (иммуностимуляция). Не принимать вечером — гарантированная бессонница. При гипертонии — с осторожностью.

`# Женьшень (Ginseng, Panax ginseng — красный азиатский)

**Категория:** БАД / Адаптоген  
**Тип:** Стимулирующий адаптоген

## Что это такое

Женьшень — один из самых известных и мощных адаптогенов традиционной китайской медицины. Красный азиатский женьшень (Panax ginseng, обработанный паром) — наиболее качественная и активная форма. Действующие вещества — гинзенозиды (тритерпеновые сапонины), их более 40 видов. Обладает иммуностимулирующим, гипогликемическим, гиполипидемическим, антиоксидантным, антидепрессивным и ноотропным действием. Работают метаболиты женьшеня, а не сам женьшень. Высок риск подделок и искусственно выращенного сырья.

## Внешний вид

Корень — мясистый, узловатый, желтовато-бежевый (белый женьшень) или красновато-коричневый (красный, обработанный паром), с характерными тонкими отростками. Порошок — кремовый/светло-коричневый. Настойка — янтарная/коричневая жидкость. Капсулы — стандартизированные экстракты

## Метаболический цикл

- **Всасывание:** гинзенозиды всасываются в тонком кишечнике. Биодоступность большинства адаптогенных соединений ограничена (<15%) из-за активного эффлюкса (P-гликопротеин). Cmax через 1–3 ч.

- **Распределение:** активные формы связываются с белками плазмы (80–90%), проникают через ГЭБ (частично для липофильных агликонов).

## Механизмы действия

- **Стимуляция ГГН-оси** — повышение кортикотропинов, стероидов, ДГЭА

Не содержится в продуктах. Корень Panax ginseng (красный/белый), настойка женьшеня (спиртовая — 1:10), чай с женьшенем (полисахариды листьев), женьшень в составах тонизирующих бальзамов, женьшень в китайской кулинарии (тоник-супы, отвары)

`# Левзея сафлоровидная (Leuzea carthamoides / Rhaponticum carthamoides)

**Категория:** БАД / Адаптоген  
**Тип:** Стимулирующий адаптоген  
**Основное действующее вещество:** 20-гидроксиэкдизон (экдистерон), экдистероиды, флавоноиды, инулин, каротиноиды  
**Синонимы:** Leuzea carthamoides, Rhaponticum carthamoides, Stemmacantha carthamoides, маралий корень, большеголовник сафлоровидный, левзея, рапонтикум

## Что это такое

Левзея сафлоровидная — мощный стимулирующий адаптоген, традиционно используемый в сибирской и алтайской народной медицине. Из семейства Астровых (Asteraceae), не родственна женьшеню, но сопоставима по силе тонизирующего действия. Основное действующее вещество — 20-гидроксиэкдизон (экдистерон), фитостероид с анаболическим действием. Повышает физическую силу, выносливость и потенцию у мужчин. Улучшает синтез белка, спортивные результаты и адаптацию к стрессу.

## Внешний вид

Корневище — твёрдое, деревянистое, ветвистое, снаружи тёмно-бурое, на изломе беловатое/кремовое. Экстракт — коричневый порошок (стандартизированный 2–5% экдистероидов). Настойка — тёмно-коричневая жидкость.

## Метаболический цикл

- **Всасывание:** 20-гидроксиэкдизон всасывается в тонком кишечнике через пассивную диффузию (липофильный). Cmax через 1–2 ч после приёма. Биодоступность ~40–60% (выше, чем у гинзенозидов).
- **Метаболизм:** фаза I (CYP3A4, CYP2C9) и фаза II (глюкуронирование) в печени. Частично метаболизируется до менее активных форм. Кишечно-печёночная рециркуляция.
- **Распределение:** 20-гидроксиэкдизон связывается с белками плазмы (60–70%), распределяется в мышцах, печени, почках. Проникает через ГЭБ в следовых количествах.
- **Выведение:** T½ 4–6 ч. Преимущественно с мочой (60–70% в виде метаболитов), частично с калом.
- **Особенность:** экдистероиды левзеи не связываются с андрогенными рецепторами — анаболический эффект достигается через активацию PI3K/Akt и mTOR-сигнального пути (а не через тестостерон). Не является допингом (не входит в список WADA как анаболический стероид).

## Механизмы действия

- **Анаболическое (миогенное)** — активация PI3K/Akt/mTOR → увеличение синтеза белка в скелетных мышцах
- **Повышение физической силы** — увеличение мышечной сократимости, выносливости
- **Стимуляция ЦНС** — мягкое психостимулирующее, повышение умственной работоспособности
- **Гипогликемическое** — повышение чувствительности к инсулину, улучшение утилизации глюкозы
- **Улучшение потенции** — повышение либидо, качества спермы, усиление эрекции
- **Антиоксидантное** — снижение перекисного окисления липидов
- **Антидепрессивное** — улучшение настроения, снижение апатии
- **Гемопоэтическое** — стимуляция эритропоэза (повышение гемоглобина)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Снижение физической силы и выносливости | 1A | Анаболический эффект (увеличение силы на 15–20%) |
| Эректильная дисфункция / снижение либидо | 1B | Улучшение потенции и качества спермы |
| Астения, хроническая усталость | 1B | Тонизирующее, повышение энергии |
| Спортивные результаты | 1B | Увеличение сухой мышечной массы, силы |
| Умственное переутомление | 2A | Повышение концентрации, работоспособности |
| Снижение гемоглобина (лёгкая анемия) | 2A | Стимуляция эритропоэза |
| Снижение тестостерона (возрастное) | 1B | Повышение общего тестостерона у мужчин |

## Топ-5 продуктов, в которых содержится

Корень левзеи (сушёный, нарезанный), настойка левзеи (спиртовая 1:5), экстракт левзеи в капсулах/таблетках (стандартизированный 2–5% экдистероидов), левзея в составе адаптогенных сборов (комбинации с родиолой, элеутерококком), БАДы для спорта — «Экдистерон» (20-гидроксиэкдизон выделенный)

## Особенности приёма

- **Стандартизированный экстракт (2–5% экдистероидов):** 200–400 мг/день
- **20-гидроксиэкдизон (чистый):** 100–200 мг/день
- **Настойка (1:5):** 20–30 капель × 2–3 р/день
- **Отвар корня:** 1 ст.л. корня на стакан воды, кипятить 10 мин × 2 р/день
- **Курс:** 4–8 недель, перерыв 2–4 недели
- **Время:** только первая половина дня (утро, до 15:00)
- **Для спорта:** за 30–60 мин до тренировки
- **Важно:** начинать с минимальной дозы (эффект активации)

## Противопоказания

- Артериальная гипертензия (II–III стадии)
- Повышенная нервная возбудимость, бессонница
- Тиреотоксикоз
- Острые инфекции/лихорадка
- Беременность, лактация
- Эпилепсия, судорожные состояния
- Дети до 12 лет
- Индивидуальная непереносимость

## Форма приема и порядок

Настойка (20–30 капель × 2–3 р/день, 30 мин до еды), капсулы (200–400 мг/день стандартизированного экстракта), отвар корня (1 ст.л. на стакан, 2 р/день). Принимать утром и днём (до 15:00). Начинать с минимальных доз. Курс 4–8 недель с перерывом 2–4 недели. Для спортивных целей — за 30–60 мин до тренировки (эффект на пике через 1–2 ч). Не сочетать с другими стимуляторами ЦНС.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Родиола розовая | Синергия адаптогенного + физической выносливости |
| ++ | Элеутерококк | Синергия стимуляции ЦНС и работоспособности |
| + | Цинк | Кофактор стероидогенеза — синергия для потенции |
| + | Магний | Мышечное расслабление + анаболизм |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Кофеин | Избыточная стимуляция ЦНС (сердцебиение, тревога) |
| ++ | Стимуляторы ЦНС (сиднокарб и др.) | Суммирование — риск гиперстимуляции |
| + | Антигипертензивные | Ослабление — левзея может повышать АД |

## Научные факты

- RCT (2017): 20-гидроксиэкдизон (200 мг/день × 8 недель) увеличивает сухую мышечную массу на 4.5% (p<0.05) и силу жима лёжа на 12% у тренированных мужчин (PMID: 28292703).

> 🌱 **Левзея — растительный анаболик без гормональных рисков.** В отличие от женьшеня, маралий корень действует через экдистероиды (20-гидроксиэкдизон), которые стимулируют синтез белка напрямую, через mTOR, а не через тестостерон. Идеален для мужчин: повышает силу, выносливость и потенцию. Не входит в список WADA (не анаболический стероид). Принимать утром и до 15:00 курсами 4–8 недель. При гипертонии и бессоннице — противопоказан.

`# Родиола розовая (Rhodiola rosea, Golden Root)

**Категория:** БАД / Адаптоген  
**Тип:** Универсальный адаптоген (стимулятор + седатив)  
**Основное действующее вещество:** Розавин, салидрозид, тирозол  
**Синонимы:** Rhodiola rosea, золотой корень, арктический корень, родиола, розовый корень  

## Что это такое

Родиола розовая («золотой корень») — уникальный адаптоген, сочетающий свойства стимулятора и седатива. Считается универсальным адаптогеном: может применяться при любом состоянии стресса — и при высоком, и при низком кортизоле. Используется российскими космонавтами, спортсменами и военнослужащими. Повышает чувствительность к дофамину и серотонину (повышает серотонин на 30%), восстанавливает нормальный аппетит и сон после стресса, защищает сердце и печень от окислительного стресса. Сравнима по эффективности с антидепрессантами (сертралин) при тревожных расстройствах.

## Внешний вид

Корневище — золотисто-жёлтое/коричневое снаружи, кремовое на срезе, с характерным запахом розы (отсюда название). Капсулы — стандартизированные экстракты (салидрозид 3%, розавин 1%). Настойка — красновато-коричневая. Порошок — желтовато-коричневый

## Метаболический цикл

- **Всасывание:** салидрозид и розавин всасываются в тонком кишечнике. Биодоступность <15% из-за активного эффлюкса (P-gp). Cmax через 1–2 ч.
- **Метаболизм:** фаза I (CYP3A4, CYP2C9) и фаза II (глюкуронирование, сульфатирование) в печени. Салидрозид — гидролиз до тиразола.
- **Распределение:** активные формы связываются с белками плазмы (80–90%), проникают через ГЭБ (частично).
- **Выведение:** преимущественно через желчь с калом (>70%), частично почками (10–20%).
- **Особенность:** уникальный inverted U-эффект — стимулирует при низком тонусе, успокаивает при высоком. Можно принимать и утром, и днём (до 16:00).

## Механизмы действия

- **Ингибирование моноаминоксидазы (МАО)** — повышение дофамина, серотонина, норадреналина
- **Повышение серотонина на 30%** — антидепрессивный эффект
- **Защита нейронов гиппокампа** — восстановление повреждённых нейронов
- **Адаптация к гипоксии** — антигипоксантное действие (повышение использования O₂)
- **Снижение кортизола** — буфер для усталости (психической и физической)
- **Повышение чувствительности к нейромедиаторам счастья и мотивации**
- **Жиросжигание** — вовлечение жиров в энергообмен
- **Повышение энергии** — без истощения (в отличие от стимуляторов)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Хронический стресс (любой) | 1A | Снижение усталости, нормализация |
| Тревожное расстройство (генерализованное) | 1B | Эффективность сравнима с сертралином |
| Депрессия (лёгкая/умеренная) | 1B | Повышение серотонина + дофамина |
| Умственное/физическое утомление | 1A | Повышение работоспособности |
| Постковидная астения | 2A | Нейропротекция + энергия |
| Синдром хронической усталости | 1B | Восстановление энергии |

`# Лимонник китайский (Schisandra chinensis)

**Тип:** Стимулирующий адаптоген
