Лимонник китайский — уникальный адаптоген дальневосточной медицины, объединяющий стимулирующие, гепатопротекторные и ноотропные свойства. Относится к группе стимулирующих адаптогенов с выраженным действием на ЦНС, печень и дыхательную систему. Основные активные соединения — лигнаны (схизандрины A, B, C, гомизины), которые обладают гепатопротекторной активностью, превосходящей большинство известных адаптогенов. Лимонник повышает физическую и умственную работоспособность, увеличивает выносливость, улучшает концентрацию внимания и обладает бифазным действием на артериальное давление. Характерная особенность — инвертированная U-образная кривая доза-эффект: низкие дозы дают стимуляцию, высокие — седацию.

Аралия маньчжурская — мощный тонизирующий адаптоген из семейства Аралиевые, родственный женьшеню, но более доступная альтернатива. Традиционно используется в русской и восточной медицине для повышения физической и умственной работоспособности. Обладает выраженным стимулирующим действием на ЦНС (мягкое), кардиотоническим эффектом, гипогликемическим действием. В низких дозах снижает артериальное давление, в высоких — повышает. Стимулирует аппетит и метаболизм.

`# Арника горная (Arnica montana, Mountain Arnica, Leopard's Bane)

**Категория:** БАД / Фитотерапия (гомеопатические дозы для внутреннего применения)  
**Тип:** Тонизирующее / Противовоспалительное / Репаративное  
**Основное действующее вещество:** Сесквитерпеновые лактоны (геленалин, 11α,13-дигидрогеленалин), флавоноиды (кверцетин, лютеолин), эфирные масла, кумарины  
**Синонимы:** Arnica montana, арника горная, баранья трава, горный табак, купальник горный, leopard's bane, mountain tobacco, arnica flowers

## Что это такое

Арника горная — многолетнее травянистое растение семейства Астровых (Asteraceae), традиционно используемое в европейской народной медицине для лечения ушибов, гематом, воспалений и мышечных болей. Основные действующие вещества — сесквитерпеновые лактоны (геленалин), обладающие мощным противовоспалительным, анальгетическим и антимикробным действием. Внутреннее применение — только в гомеопатических дозах или под контролем врача (токсична в больших дозах). Наружно — в виде мазей, гелей, настоек, компрессов. Ускоряет рассасывание гематом, уменьшает отёк и боль при травмах.

## Внешний вид

Цветки — оранжево-жёлтые корзинки (3–6 см), напоминают ромашку, с характерным ароматом. Сырьё — высушенные цветочные корзинки. Настойка — зеленовато-коричневая жидкость с горьким вкусом. Мазь/гель — белая/кремовая масса, часто с камфорой, ментолом. Гомеопатические гранулы — мелкие белые шарики.

## Метаболический цикл

- **Всасывание (наружное):** геленалин и другие сесквитерпеновые лактоны проникают через кожу и слизистые при местном нанесении. Системная абсорбция при наружном применении минимальна.
- **Всасывание (внутреннее):** при приёме внутрь сесквитерпеновые лактоны всасываются в тонком кишечнике. Биодоступность ограничена (быстрый метаболизм при первом прохождении через печень).
- **Метаболизм:** геленалин метаболизируется в печени через конъюгацию с глутатионом (GSH) — ключевой путь детоксикации. При дефиците глутатиона возможна гепатотоксичность.
- **Распределение:** активные метаболиты распределяются в тканях, связываются с белками плазмы (80–85%). Проникновение через ГЭБ ограничено.
- **Выведение:** T½ 2–4 ч. Преимущественно с мочой в виде конъюгатов.
- **Особенность:** арника токсична при приёме внутрь в негомеопатических дозах (геленалин — алкилирующий агент). Внутреннее применение оправдано только в гомеопатическом разведении (D4 и выше). Основной путь использования — наружно.

## Механизмы действия

- **Противовоспалительное** — ингибирование NF-κB (геленалин блокирует активацию IKKβ), снижение COX-2, 5-LOX, подавление IL-1β, IL-6, TNF-α
- **Анальгетическое** — снижение синтеза простагландинов, модуляция TRP-каналов
- **Ускорение рассасывания гематом** — активация фибринолиза (умеренный антикоагулянтный эффект)
- **Антимикробное** — геленалин активен против Staphylococcus aureus (включая MRSA), Streptococcus spp.
- **Репаративное** — стимуляция фибробластов, ускорение заживления ран
- **Иммуномодулирующее** — модуляция активности нейтрофилов и макрофагов
- **Кардиотоническое (высокие дозы)** — стимуляция миокарда (токсично)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Ушибы, гематомы (наружно) | 1A | Ускорение рассасывания на 30–40% |
| Мышечные боли (травмы, перетренированность) | 1A | Снижение боли и отёка |
| Растяжения связок | 1B | Уменьшение воспаления |
| Послеоперационные отёки | 1B | Снижение отёчности |
| Укусы насекомых | 2A | Уменьшение зуда, воспаления |

## Топ-5 продуктов, в которых содержится

Цветки Arnica montana (сухие — для настоек и компрессов), мазь/гель с арникой (10–20% настойки арники), настойка арники (1:5 на 70% спирте — только для наружного применения), гомеопатические гранулы/капли арники (Arnica D6, D12, D30), арника в составе спортивных мазей (с камфорой, ментолом, календулой), масло арники (мацерат — для массажа)

- **Наружно (основной способ):** мазь/гель 2–4 раза/день на область ушиба/растяжения

- **Гомеопатические гранулы (внутрь):** Arnica D6–D30, 3–5 гранул × 3 р/день, под язык
- **Курс:** местно — 5–14 дней (до исчезновения симптомов); гомеопатия — 3–7 дней
- **Важно:** НЕ наносить на открытые раны (кроме разведённых форм) и слизистые
- **Предупреждение:** при приёме внутрь (>D4) — тошнота, рвота, головокружение, гепатотоксичность

## Противопоказания

- Не применять внутрь в негомеопатических дозах (токсично)
- Открытые раны, повреждённая кожа (наружно — только неповреждённую кожу)
- Аллергия на растения семейства Астровых (Asteraceae) — амброзия, ромашка, календула

- Тяжёлые заболевания печени

## Форма приема и порядок

**Основной способ — наружно.** Мазь/гель арники наносить 2–4 раза в день тонким слоем на область ушиба, гематомы, мышечной боли, не втирая. Компресс с разведённой настойкой (1 ст.л. настойки на 200 мл воды) — на 15–20 мин. **Для внутреннего применения — только гомеопатические формы:** Arnica D6, D12, D30 по 3–5 гранул 3 раза в день под язык. Не применять одновременно с алкоголем. Курс при травмах — до 14 дней, при хронических состояниях — 3–4 недели с перерывом.

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Календула (наружно) | Синергия заживления ран и противовоспалительного |

## Научные факты

- Мета-анализ (2014, Cochrane): арника (наружно) достоверно уменьшает боль и гематомы после операций (SMD −0.32, p<0.05) и ускоряет восстановление после экстракции зубов (PMID: 24638841).

`# Ашваганда (Ashwagandha, Withania somnifera)

Не содержится в продуктах. Корень Withania somnifera — единственный источник. Порошок корня ашваганды (в капсулах/порошке), настойка ашваганды (спиртовая), ашваганда в аюрведических сборах (чаванапраш, тоники), молоко с ашвагандой (аюрведический рецепт — тёплое молоко + корень + мёд), ашваганда в адаптогенных смесях (комбинации с родиолой, тулси)

## Особенности приёма

- **Стандартизированный экстракт (2.5–5% витанолидов):** 300–600 мг/день
- **Порошок корня:** 1–3 г/день
- **Курс:** 4–12 недель (длительно — до 6 месяцев под контролем)
- **Время:** утро/вечер (седативный эффект — можно и на ночь)
- **При гипотиреозе:** идеальна (повышает Т3)
- **При тиреотоксикозе:** противопоказана
- **Аутоиммунные:** с осторожностью — паслёновые (AIP-протокол)

- Тиреотоксикоз (гиперфункция ЩЖ)
- Беременность (высокие дозы — угроза прерывания)
- Язвенная болезнь (обострение)
- Аутоиммунные заболевания (AIP-протокол — паслёновые)
- Приём препаратов щитовидной железы (коррекция дозы)

## Форма приема и порядок

Капсулы (300–600 мг/день стандартизированного экстракта), порошок (1–3 г/день — растворить в тёплом молоке/воде), настойка. Принимать утром и/или вечером. При стрессе — хорошо работает на ночь (седативный эффект). Курс 4–12 недель. При гипотиреозе — показана (повышает Т3). Пациентам на паслёновых (AIP) — противопоказана (член семейства Solanaceae).

`# Бакопа Монье (Bacopa monnieri, Brahmi)

**Категория:** БАД / Ноотроп / Адаптоген  
**Тип:** Тонизирующий ноотроп  
**Основное действующее вещество:** Бакозиды A и B (тритерпеновые сапонины — бакозид A3, бакопазид I–II, бакопасапонин C)  
**Синонимы:** Bacopa monnieri, Brahmi, брами, бакопа, «трава Брахмы», водный иссоп, индийский щитолистник

## Что это такое

Бакопа Монье — главное аюрведическое растение для когнитивного усиления. Название «Brahmi» означает «энергия Брахмы» — бога творения в индуизме. Содержит уникальные тритерпеновые сапонины (бакозиды), которые улучшают синаптическую передачу, стимулируют рост дендритов и повышают нейропластичность. Обладает доказанным ноотропным (память, внимание, скорость обработки), анксиолитическим (GABA-ергический, серотониновый), антиоксидантным и нейропротекторным действием. Снижает β-амилоид в моделях болезни Альцгеймера. Клинический эффект развивается через 4–12 недель непрерывного приёма (отсроченное, но устойчивое действие).

## Внешний вид

Трава — мелкие мясистые листья, стелющиеся стебли, растёт у воды. Сухое сырьё — тёмно-зелёная измельчённая масса с горьковатым вкусом. Капсулы/таблетки — стандартизированный экстракт (20% бакозидов). Порошок — зелёно-коричневый, с характерным травяным запахом.

## Метаболический цикл

- **Всасывание:** бакозиды всасываются в тонком кишечнике. Биодоступность <10% из-за гидрофильности и активного эффлюкса. Cmax через 1–2 ч. Жирная пища повышает всасывание.
- **Метаболизм:** фаза I (CYP3A4) и фаза II (глюкуронирование). Бакозиды метаболизируются до бакопасапонинов и бакопазидов. Кишечно-печёночная рециркуляция.
- **Распределение:** умеренное связывание с белками плазмы. Основной метаболит — бакопасапонин C — проникает через ГЭБ.
- **Выведение:** преимущественно через желчь с калом (>80%), частично почками (10–15%).
- **Особенность:** отсроченное действие — бакозиды стимулируют экспрессию белков синаптической пластичности (BDNF, CREB), что требует 4–12 недель курсового приёма.

## Механизмы действия

- **Усиление памяти и обучения** — стимуляция роста дендритов (MAPK/ERK-сигналинг), увеличение плотности синапсов
- **Повышение BDNF** — нейротрофический фактор, усиление нейропластичности
- **Анксиолитическое** — модуляция GABA<sub>A</sub> (агонист) и серотониновых (5-HT<sub>1A</sub>, 5-HT<sub>2A</sub>) рецепторов
- **Антиоксидантное** — повышение активности SOD, каталазы, глутатиона; снижение перекисного окисления липидов
- **Антихолинэстеразное** — ингибирование ацетилхолинэстеразы, повышение уровня ацетилхолина
- **Нейропротекторное** — снижение β-амилоида, ингибирование агрегации тау-белка
- **Адаптогенное** — нормализация HPA-оси, снижение маркеров окислительного стресса при хроническом стрессе
- **Цереброваскулярное** — повышение мозгового кровотока (увеличение продукции NO)

## Показания

| Показание | Уровень | Эффект |
|-----------|---------|--------|
| Снижение памяти и внимания | 1A | Улучшение recall, рабочей памяти, скорости обработки |
| Возрастное ухудшение когниций (MCI) | 1A | Замедление когнитивного снижения |
| Синдром дефицита внимания (ADD) | 1B | Улучшение концентрации, уменьшение отвлекаемости |
| Тревожность (лёгкая/умеренная) | 1B | Анксиолитический эффект (GABA) |
| Хронический стресс, выгорание | 1B | Адаптогенный, снижение кортизола |
| Постковидный когнитивный дефицит | 2C | Нейропротекция, BDNF |
| Нейродегенеративные заболевания (БА) | 2C | Снижение β-амилоида |

## Топ-5 продуктов, в которых содержится

Бакопа — лекарственное растение, в продуктах питания не содержится. Сухой экстракт бакопы (20% бакозидов) в капсулах/таблетках, порошок бакопы (высушенная трава — 5–10 г/день), настойка бакопы (спиртовая — 30–60 капель/день), бакопа в ноотропных комплексах (комбинации с гинкго, фосфатидилсерином, глицином), аюрведические тоники (Сарасват-аришта, Брахми-гхрита)

## Особенности приёма

- **Стандартизированный экстракт (20% бакозидов):** 300–600 мг/день
- **Порошок травы:** 5–10 г/день
- **Курс:** 4–12 недель (минимальный срок для начала действия)
- **Время:** утро/день (с едой — жиры повышают абсорбцию)
- **Не принимать натощак** — возможен GI-дискомфорт
- **При гипотиреозе:** с осторожностью (может повышать Т4)

## Противопоказания

- Беременность (бакозиды могут влиять на тонус матки — данных недостаточно)
- Брадикардия (может усиливать брадикардический эффект)
- Язвенная болезнь желудка (стимуляция желудочной секреции)
- Тиреотоксикоз (может повышать Т4 — контроль ЩЖ)
- Детский возраст до 6 лет (нет данных безопасности)

## Форма приема и порядок

Капсулы (300–600 мг/день экстракта 20% бакозидов), порошок (5–10 г/день — размешать в воде/смузи с жиром), настойка (30–60 капель 2 раза/день). Принимать строго во время еды (повышение абсорбции бакозидов в 2–3 раза). Курс 4–12 недель. Когнитивный эффект нарастает постепенно: первые изменения внимания — 2–4 недели, памяти — 6–12 недель. Рекомендуется циклирование (2–3 месяца приёма / 2–4 недели перерыв).

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Гинкго билоба | Синергия церебрального кровотока + антиоксидант |
| ++ | Фосфатидилсерин | Синергия памяти и нейропластичности |
| ++ | Ацетил-L-карнитин | Синергия энергетического метаболизма нейронов |
| ++ | Цинк | Кофактор нейрогенеза и синаптической пластичности |
| + | Глицин | Синергия GABA-ергического (анксиолизис + сон) |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Антихолинергические (димедрол) | Ослабление ноотропного эффекта |
| ++ | Препараты ЩЖ (L-тироксин) | Бакопа может повышать Т4 — контроль |
| + | Бензодиазепины | Потенцирование седации |
| + | Антикоагулянты (варфарин) | Теоретическое усиление (антиагрегантное) |

## Научные факты

- РКИ (2002): бакопа (300 мг/день × 12 недель) достоверно улучшает скорость обработки информации и рабочую память у здоровых людей (p<0.01) — Roodenrys S, et al. Neuropsychopharmacology. 2002.
- Мета-анализ 9 РКИ (2014): бакопа значимо улучшает свободное recall, скорость консолидации памяти и внимание (SMD=0.34–0.55, p<0.01) — Kongkeaw C, et al. J Ethnopharmacol. 2014.
- РКИ (2012): бакопа (450 мг/день × 6 недель) повышает BDNF в сыворотке на 16% (p<0.05) и снижает тревогу на 24% по шкале HAM‑A — Peth-Nui T, et al. Evid Based Complement Alternat Med. 2012.

## Лайфхак для пользователя (Nutrition Tip)

> 🧠 **Бакопа Монье — ноотроп с отсроченным, но устойчивым действием.** В отличие от стимуляторов (кофеин, модафинил), бакопа работает через синаптическую пластичность — эффект нарастает 4–12 недель. Идеальна для долгосрочного когнитивного протокола (студенты в сессию, офисные работники, возрастное снижение). Важно: бакозиды жирорастворимые — принимайте с едой, содержащей жиры (кокосовое/оливковое масло, авокадо, яйца). Курс — 2–3 месяца. Циклировать: 8–12 недель приёма → 2–4 недели перерыв.

## Ссылки

`# Пихта сибирская (Abies sibirica, Siberian Fir)

**Категория:** БАД / Фитотерапевтическое средство
**Тип:** Тонизирующее / Иммуномодулирующее средство
**Основное действующее вещество:** Эфирное масло пихты (борнилацетат 30–40%, камфен 15–20%, α-пинен 10–20%, β-пинен, лимонен)
**Синонимы:** Abies sibirica, Siberian Fir, пихтовое масло, фирол, сибирская пихта, fir oil

## Что это такое

Пихта сибирская — хвойное дерево семейства Сосновые (Pinaceae), эндемик Сибири. Эфирное масло пихты — официальное лекарственное средство (Фармакопея РФ). Обладает иммуномодулирующим, противовоспалительным, антисептическим, отхаркивающим и мягким тонизирующим действием. Комплексный препарат «Фирол» (фироловое масло) используется как общеукрепляющее тонизирующее средство. Терпены пихты стимулируют мукоцилиарный клиренс, фагоцитоз и активность NK-клеток.

## Внешний вид

Масло — прозрачная или слегка желтоватая жидкость с характерным хвойным запахом. Хвоя — тёмно-зелёная, мягкая, плоская, длиной 2–3 см. Шишки — прямостоячие, цилиндрические, фиолетово-бурые. В продаже: эфирное масло (флаконы тёмного стекла), фирол (масляный раствор), фитосборы хвои.

## Метаболический цикл

- **Всасывание:** при ингаляции — терпены (борнилацетат, α-пинен) быстро всасываются через альвеолярный эпителий и слизистую носа, Cmax через 10–20 мин. При наружном нанесении — проникают через роговой слой, пик концентрации через 1–2 ч. При приёме внутрь — всасывание в тонком кишечнике, биодоступность зависит от растворителя.
- **Метаболизм:** фаза I (CYP2B6, CYP2C19, CYP3A4) — окисление терпенов до полярных метаболитов; фаза II — глюкуронирование. Активные метаболиты: борнеол, камфенол.
- **Распределение:** липофильные терпены связываются с альбумином плазмы (70–85%), быстро проникают в ЦНС (преодолевают ГЭБ), накапливаются в лёгочной ткани и печени.
- **Выведение:** преимущественно почками (60–70% в виде конъюгатов с глюкуроновой кислотой), частично через лёгкие (30–40% — характерный хвойный запах выдыхаемого воздуха).
- **Особенность:** ингаляционный путь — самый быстрый и эффективный (прямое действие на респираторный эпителий). Наружное применение требует разведения (1:10 базовым маслом). Внутренний приём эфирного масла — только под контролем врача.

## Механизмы действия

- **Иммуномодулирующее** — стимуляция фагоцитоза макрофагов и активности NK-клеток
- **Противовоспалительное** — ингибирование ЦОГ-2 и снижение синтеза PGE₂
- **Антисептическое** — бактерицидное и фунгицидное действие (грамположительные бактерии, грибы)
- **Отхаркивающее** — стимуляция мукоцилиарного клиренса, разжижение мокроты
- **Бронхолитическое** — спазмолитическое действие на гладкую мускулатуру бронхов
- **Антиоксидантное** — улавливание свободных радикалов (терпены — природные антиоксиданты)
- **Тонизирующее** — мягкое повышение общей резистентности организма (адаптогенный оттенок)
- **Анальгетическое** — местное обезболивающее при невралгиях, миалгиях
- **Регенерирующее** — ускорение заживления ран, эпителизация

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Профилактика ОРЗ и гриппа | 1B | Иммуномодуляция, снижение частоты инфекций |
| Кашель (продуктивный, сухой) | 1B | Отхаркивающее, муколитическое |
| Хронический бронхит (вне обострения) | 1B | Стимуляция мукоцилиарного клиренса |
| Синдром хронической усталости | 2A | Тонизирующее, адаптогенное |
| Миалгии, невралгии | 2A | Местное противовоспалительное и анальгетическое |
| Раны, порезы (наружно) | 2B | Антисептическое, регенерирующее |
| Артрит, артроз (наружно) | 2B | Снижение локального воспаления |
| Психологический стресс | 2A | Мягкий тонизирующий седативный эффект |

## Топ-5 продуктов, в которых содержится

Эфирное масло пихты сибирской (аптечное, флаконы тёмного стекла — сертифицированное ЛС в РФ), фирол (масляный экстракт фиролового масла, ООО «Фито-Сибирь»), мазь «Пихтовин» (пихтовое масло + воск), бальзам «Сибирская пихта» (для ингаляций и растираний), хвойные сборы (высушенная хвоя для ванн и настоев)

## Особенности приёма

- **Ингаляции (основной путь):** 3–5 капель эфирного масла на 1 л горячей воды, ингалировать 5–7 мин, 2–3 р/день
- **Наружно (разведённое):** 5–7 капель масла на 1 ст. л. базового масла (оливковое, персиковое) — растирания, компрессы
- **Внутрь (строго с осторожностью!):** 1–2 капли масла на кусочек сахара или с мёдом 2–3 р/день (не длительно)
- **Фирол:** 15–20 капель 2 р/день (стандартизированный препарат)
- **Ванны:** 10–15 капель эмульгированных в соли или сливках, 15–20 мин
- **Курс:** ингаляции — 7–14 дней; наружно — по необходимости; внутрь — не более 2 недель без перерыва

## Противопоказания

- Беременность и лактация (эфирные масла — риск тонуса матки)
- Дети до 3 лет (эфирные масла высокого риска)
- Бронхиальная астма (тяжёлая форма — возможен бронхоспазм)
- Острый бронхит, пневмония (высокая температура — ингаляции противопоказаны)
- Хронические заболевания почек (нефрит, пиелонефрит)
- Индивидуальная непереносимость / аллергия на хвойные
- Эпилепсия (камфен и кетоны — снижение порога судорог)
- Повышенная чувствительность кожи (наружное применение — разведение обязательно)

## Форма приема и порядок

Основной путь — ингаляции (3–5 капель эфирного масла на 1 л горячей воды, 5–7 мин, 2 р/день). Наружно — только разведённое масло (1:10 базовым маслом) для растираний и компрессов. Внутрь — 1–2 капли с мёдом 2–3 р/день не более 2 недель подряд. Фирол — 15–20 капель 2 р/день. Принимать после еды. Не превышать дозировку — эфирные масла потенциально токсичны в высоких дозах.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Эвкалипт | Синергия отхаркивающего и антисептического действия |

| ++ | Мёд | Усиление тонизирующего и регенерирующего эффекта |
| ++ | Липа (цветки) | Потогонное + противовоспалительное (простудные состояния) |
| + | Цинк | Кофактор иммунного ответа |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|

| ++ | Антикоагулянты (варфарин) | Теоретическое потенцирование (α-пинен — CYP2C9) |
| ++ | Седативные ЦНС | Потенцирование (камфен — влияние на ГАМК) |
| + | Гепатотоксичные ЛС | Потенциальное усиление нагрузки при длительном приёме внутрь |

> 🌲 **Пихта сибирская — доступный иммуномодулятор для респираторной профилактики.** Ингаляции пихтовым маслом — самый эффективный и безопасный путь: 3–5 капель на 1 л воды, 5–7 мин, 2 р/день. Никогда не принимайте внутрь неразбавленное эфирное масло! Для наружного применения обязательно разводите в базовом масле 1:10. Помните: фирол — стандартизированный препарат с более мягким действием, подходит для внутреннего курса. После ингаляции — не выходить на холод 30–40 мин.

`# Ежовик гребенчатый (Hericium erinaceus, Lion's Mane Mushroom, Hedgehog Mushroom, Hou Tou Gu)

**Категория:** БАД / Лекарственный гриб  
**Тип:** Тонизирующий ноотроп / Нейротрофический гриб  
**Основное действующее вещество:** Гериценоны (фруктовое тело), эринацины (мицелий), β-глюканы, полисахариды HEP, эргостерол  
**Синонимы:** Ежовик гребенчатый, Hericium erinaceus, Lion's Mane, Hedgehog Mushroom, Hou Tou Gu, ямабушитаке, обезьяний гриб

## Что это такое

Ежовик гребенчатый — уникальный съедобный гриб с доказанным нейротрофическим действием. Стимулирует синтез фактора роста нервов (NGF) за счёт гериценонов и эринацинов, что улучшает когнитивные функции, способствует ремиелинизации и оказывает нейропротекторное действие при нейродегенеративных заболеваниях. Также обладает гастропротекторным, противовоспалительным (ингибирование NF-κB, COX-2), анксиолитическим и антидепрессивным действием. Важнейший лекарственный гриб для когнитивного здоровья.

## Внешний вид

Плодовое тело — белое или кремовое, округлой формы, с длинными ниспадающими шипиками (до 3–5 см), напоминающими гриву льва. В свежем виде мясистое, упругое. В сушёном виде — светло-кремовый порошок или фрагменты. Экстракт — стандартизован по содержанию полисахаридов (30–50%) или эринацинов.

## Метаболический цикл

- **Всасывание:** гериценоны и эринацины всасываются в тонком кишечнике. Биодоступность умеренная; жирорастворимые компоненты лучше всасываются с пищей, содержащей жиры. Cmax через 2–4 ч.
- **Метаболизм:** фаза I и фаза II в печени. Эринацины (цианатные терпеноиды) подвергаются гидроксилированию и конъюгации. Частичный пресистемный метаболизм.
- **Распределение:** липофильные терпеноиды проникают через ГЭБ. Эринацины обнаружены в ткани мозга после перорального приёма (доклинические данные). Связывание с белками плазмы — высокое.
- **Выведение:** преимущественно с желчью и калом (>60%), частично почками (15–20%).
- **Особенность:** для достижения клинического эффекта (когнитивного) требуется курсовой приём 8–12 недель. Эффекты NGF-стимуляции накапливаются постепенно.

## Механизмы действия

- **Стимуляция NGF** — гериценоны и эринацины повышают синтез фактора роста нервов (достоверно, in vivo и in vitro)
- **Нейропротекция** — защита нейронов от окислительного стресса и апоптоза
- **Ремиелинизация** — стимуляция олигодендроцитов, восстановление миелиновой оболочки
- **Анксиолитическое и антидепрессивное** — модуляция BDNF, снижение воспаления в гиппокампе
- **Противовоспалительное** — ингибирование NF-κB, COX-2, снижение IL-6 и TNF-α
- **Гастропротекторное** — защита слизистой желудка, подавление H. pylori (in vitro)
- **Антиоксидантное** — повышение активности супероксиддисмутазы (SOD) и глутатиона
- **Повышение когнитивных функций** — улучшение памяти, скорости обработки информации, внимания

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Когнитивные нарушения (лёгкие, возрастные) | 1A | Улучшение когнитивного индекса, памяти |
| Тревога и депрессия | 1B | Снижение HADS, GAD-7 (РКИ 2010) |
| Перименопаузальные расстройства настроения | 1B | Улучшение настроения и сна |
| Гастрит, диспепсия, защита слизистой | 1B | Снижение симптомов, защита гастромукозы |
| Нейропротекция (профилактика деменции) | 2A | NGF-стимуляция, снижение β-амилоида |
| Поддержка ремиелинизации (РС) | 2B | Стимуляция олигодендроцитов |
| СДВГ (взрослый) — когнитивная поддержка | 2B | Улучшение фокуса и внимания |
| Восстановление после ЧМТ | 2B | NGF-зависимая нейрорегенерация |

## Топ-5 продуктов, в которых содержится

Свежий или сушёный ежовик гребенчатый (плодовое тело — кулинарное использование), экстракт ежовика (капсулы/порошок, стандартизованный по полисахаридам или эринацинам), мицелий ежовика на зерне (порошок), настойка ежовика (спиртовая/водная), ежовик в составе ноотропных комплексов (комбинации с бакопой, гингко, фосфатидилсерином).

## Особенности приёма

- **Экстракт плодового тела (стандартизованный):** 500–3000 мг/день
- **Экстракт мицелия (стандартизованный по эринацинам):** 250–500 мг/день
- **Порошок (whole food):** 3–5 г/день
- **Курс:** 8–12 недель для когнитивных эффектов; 4–6 недель для гастропротекции
- **Время:** утро и день (возможна лёгкая стимуляция — не принимать на ночь)
- **С едой:** лучше с жирами (повышение биодоступности липофильных терпеноидов)
- **Титрование:** начать с низкой дозы (500 мг/день), постепенно увеличивать

## Противопоказания

- Беременность и лактация (недостаточно данных)
- Аллергия на грибы (любые)
- Аутоиммунные заболевания (теоретический риск — иммуностимуляция; с осторожностью)
- Детский возраст (ограниченные данные по безопасности)

## Форма приема и порядок

Капсулы (500–3000 мг/день стандартизированного экстракта), порошок (3–5 г/день — добавить в смузи, кофе, суп), настойка (по инструкции). Принимать утром и днём, с пищей (жиры улучшают всасывание). Курс не менее 8 недель для когнитивного эффекта. Для гастропротекции — 4–6 недель. Можно комбинировать с другими ноотропами (бакопа, гингко, фосфатидилсерин).

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Бакопа Монье | Синергия памяти и когнитивного усиления |
| +++ | Фосфатидилсерин | Синергия нейропротекции и снижения кортизола |
| ++ | Гинкго билоба | Синергия мозгового кровотока + NGF |
| ++ | Омега-3 (DHA) | Синергия нейропластичности и ремиелинизации |
| ++ | Уридин (UMP) | Синергия синтеза мембран нейронов |
| + | Цинк | Кофактор NGF-сигналинга |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Иммуносупрессоры | Возможное ослабление (ежовик — мягкий иммуностимулятор) |
| + | Антикоагулянты | Теоретическое потенцирование |
| + | Гипогликемические | Возможное усиление (β-глюканы) |

## Научные факты

- РКИ (2009): ежовик гребенчатый (3 г/день × 16 недель) достоверно улучшает когнитивный индекс у пациентов с лёгкими когнитивными нарушениями (p<0.05) (Mori K, et al., Phytother Res, PMID: 18844328).
- РКИ (2010): приём 4 недели ежовика снижает тревогу и депрессию по шкалам HADS у женщин с менопаузальными симптомами (p<0.01) (Nagano M, et al., Biomed Res, PMID: 20834180).
- Систематический обзор (2019): гериценоны и эринацины достоверно стимулируют синтез NGF через активацию CREB-пути in vitro и in vivo (Ratto D, et al., Nutrients, PMID: 31614777).
- РКИ (2019): ежовик улучшает настроение и качество сна у женщин в перименопаузе (Vigna L, et al., J Altern Complement Med, PMID: 31644397).

## Лайфхак для пользователя (Nutrition Tip)

> 🍄 **Ежовик гребенчатый — главный гриб для мозга.** Стимулирует NGF — фактор роста нервов, что улучшает память, внимание и защищает от возрастной деменции. Доказано клинически (4 РКИ). Курс от 8 недель минимум. Принимать с жирной пищей для лучшего усвоения. Не вызывает привыкания, нет значимых взаимодействий с препаратами. Идеален для студентов, пожилых, при восстановлении после ЧМТ и при хроническом стрессе.

`# Мумиё (Mumie, Shilajit)

**Категория:** БАД / Минерально-гуминовый биостимулятор  
**Тип:** Тонизирующее средство / Адаптоген  
**Основное действующее вещество:** Фульвовая кислота (60–80%), гуминовые кислоты, дибензо-α-пироны, DCP (хромопротеин)  
**Синонимы:** Shilajit, Mumie, мумиё, браг-шаун, минеральная смола, горный воск, асиль (араб.), саладжит (хинди)

## Что это такое

Мумиё (Shilajit) — природный экссудат, вытекающий из трещин горных пород Гималаев, Алтая, Кавказа и Тибета при нагревании солнцем. Образуется в результате многовекового разложения растительного материала (микробная ферментация гумуса). Основной биоактивный компонент — фульвовая кислота (60–80%), которая обеспечивает транспорт минералов в клетки, хелатирование металлов и митохондриальную поддержку. Обладает тонизирующим, адаптогенным, анаболическим, противовоспалительным и антиоксидантным действием. В аюрведе мумиё классифицируется как «расаяна» (омолаживающее средство).

## Внешний вид

Очищенное мумиё — однородная вязкая смола (реже твёрдая масса) от тёмно-коричневого до чёрного цвета, с характерным битумным запахом и горьковатым вкусом. Очищенная форма — глянцевая, пластичная, растворяется в тёплой воде до янтарно-коричневого цвета. Неочищенное сырьё — пористая крошка с примесями песка.

## Метаболический цикл

- **Всасывание:** фульвовая кислота частично всасывается в тонком кишечнике (пассивная диффузия, 40–60%), Cmax через 2–3 ч. Водорастворимые гуминовые комплексы — через эндоцитоз.
- **Метаболизм:** фульвовая кислота и дибензо-α-пироны метаболизируются в печени (CYP3A4, UGT) до глюкуронидов и сульфатов. DCP (хромопротеин) подвергается протеолизу.
- **Распределение:** фульвовая кислота связывается с сывороточным альбумином (75–85%), проникает через ГЭБ (антиоксидантная защита нейронов). Легко проникает в митохондрии.
- **Выведение:** преимущественно с мочой (60–70%), частично через желчь (20–30%).
- **Особенность:** эффект накопительный — клинически значимые изменения (тестостерон, ATP) через 4–12 недель приёма.

## Механизмы действия

- **Митохондриальная поддержка** — повышение ATP (комплексы I–IV дыхательной цепи)
- **Анаболическое действие** — стимуляция стероидогенеза (↑ ЛГ, ↑ тестостерона до +23,5%)
- **Антиоксидантное** — глутатион-зависимая SOD-активация, нейтрализация свободных радикалов
- **Адаптогенное** — модуляция HPA-оси, снижение утомляемости
- **Хелатирование металлов** — фульвовая кислота связывает Pb, Hg, Cd, Al с выведением
- **Противовоспалительное** — ингибирование COX-2, NF-κB, снижение IL-6
- **Нейропротекторное** — торможение агрегации β-амилоида, ↑ BDNF
- **Минералотранспортное** — повышение абсорбции Zn, Mg, Ca, Fe (за счёт фульватов)
- **Антивозрастное** — активация теломеразы in vitro (HDF-клетки)

## Показания

| Показание | Уровень | Эффект |
|-----------|---------|--------|
| Снижение тестостерона (мужчины) | 1A | ↑ общего T на 23,5% за 90 дней |
| Хроническая усталость, астения | 1B | ↑ ATP, ↑ выносливости |

`# Лекарственные грибы (Medicinal Mushrooms: Reishi, Chaga, Cordyceps, Lion's Mane, Maitake, Shiitake)

**Категория:** БАД / Иммуномодулятор-адаптоген  
**Тип:** Тонизирующее / иммуномодулирующее средство  
**Основные действующие вещества:** β-глюканы (1,3/1,6-D-глюкан), тритерпеноиды (ганодеровая кислота), кордицепин, аденозин, хериценоны, эринацины, бетулиновая кислота, меланин  
**Синонимы:** Medicinal mushrooms, Reishi (Ganoderma lucidum), Chaga (Inonotus obliquus), Cordyceps (Cordyceps militaris), Lion's Mane (Hericium erinaceus), Maitake (Grifola frondosa), Shiitake (Lentinula edodes), грибы-адаптогены

## Что это такое

Группа лекарственных грибов с доказанным иммуномодулирующим, адаптогенным, нейротропным и метаболическим действием. Основные активные соединения — полисахариды (β-глюканы), которые активируют врождённый иммунитет через рецепторы дектин-1, CR3 и TLR-2/6. Каждый гриб имеет уникальный профиль: Reishi — тритерпены и ганодеровые кислоты (противовоспалительное, гепатопротекторное), Chaga — высокое содержание меланина и бетулиновой кислоты (антиоксидантное), Cordyceps — кордицепин и аденозин (повышение ATP, выносливость), Lion's Mane — хериценоны и эринацины (стимуляция NGF, нейропротекция), Maitake — D-фракция β-глюкана (иммуномодуляция, метаболический контроль). Shiitake — лентинан (противовирусное, иммуностимулирующее).

## Внешний вид

Reishi — красновато-коричневая лакированная шляпка (веерообразная), Chaga — чёрные наросты (склероции) на берёзе до 30 см, Cordyceps — оранжевые плодовые тела на гусеницах (культивируется на субстрате), Lion's Mane — белые свисающие игольчатые структуры (напоминает львиную гриву), Maitake — крупные серовато-коричневые сростки (танцующий гриб), Shiitake — выпуклая коричневая шляпка до 10 см. Экстракты — порошки от светло- до тёмно-коричневого цвета.

## Метаболический цикл

- **Всасывание:** β-глюканы (высокомолекулярные) не всасываются в тонком кишечнике — захватываются макрофагами (M-клетки Пейеровых бляшек) и транспортируются в селезёнку/лимфоузлы. Тритерпеноиды всасываются пассивно (липофильные), Cmax 1–3 ч. Кордицепин всасывается через нуклеозидные транспортеры, биодоступность ~35%.
- **Метаболизм:** β-глюканы метаболизируются макрофагами до активных фрагментов (фагоцитоз). Тритерпеновые кислоты (ганодеровая) метаболизируются в печени через CYP3A4, CYP2C9. Кордицепин фосфорилируется до кордицепин-5'-трифосфата (активная форма).
- **Распределение:** β-глюканы (фрагменты) связываются с иммунными клетками (дектин-1, CR3). Тритерпеноиды связываются с белками плазмы (>90%). Эринацины и хериценоны проникают через ГЭБ (стимуляция NGF в ЦНС).
- **Выведение:** водорастворимые полисахариды — почками. Тритерпеноиды — через желчь с калом (энтерогепатическая циркуляция). Кордицепин — почками (50–70% в неизменённом виде).
- **Особенность:** горячая водная экстракция обязательна для высвобождения β-глюканов; двойная экстракция (вода + спирт) необходима для тритерпенов (Reishi). Курсовой приём 4–8 недель для клинического эффекта.

## Механизмы действия

- **Активация врождённого иммунитета** — β-глюканы связываются с дектин-1, CR3, TLR-2/6 → активация NF-κB, продукция цитокинов (IL-1β, TNF-α, IL-6), стимуляция макрофагов, NK-клеток, дендритных клеток
- **Противовоспалительное (Reishi — ганодеровая кислота)** — ингибирование NF-κB → снижение TLR4, подавление NLRP3-инфламмасомы
- **Антиоксидантное (Chaga — меланин, бетулиновая кислота)** — супероксиддисмутаза-подобная активность, нейтрализация свободных радикалов (ORAC > 1400)
- **Повышение ATP и выносливости (Cordyceps — кордицепин, аденозин)** — активация AMPK, повышение синтеза митохондриального ATP, улучшение утилизации кислорода (VO₂ max)
- **Нейротропное (Lion's Mane — хериценоны, эринацины)** — стимуляция синтеза NGF (нервного фактора роста) в астроцитах, повышение BDNF, усиление нейропластичности
- **Метаболическое (Maitake — D-фракция β-глюкана)** — улучшение чувствительности к инсулину, снижение глюкозы крови, модуляция PPAR-γ
- **Противоопухолевое (лентинан Shiitake, D-фракция Maitake)** — активация клеточного иммунитета (CTL, NK), ингибирование ангиогенеза, апоптоз
- **Антигипоксическое** — повышение тканевого дыхания, улучшение микроциркуляции

`# Пантокрин (Pantocrine / Pantocrinum)

**Категория:** Лекарственное средство / Биогенный стимулятор / БАД  
**Тип:** Тонизирующее средство (адаптоген)  
**Основное действующее вещество:** Комплекс биогенных веществ — аминокислоты, фосфолипиды, нуклеотиды, пептиды, минералы (Ca, P, Mg, Fe), эстрогеноподобные и тестостероноподобные вещества, IGF-1  
**Синонимы:** Пантокрин, Pantocrinum, Pantocrine, экстракт пантов марала, экстракт пантов пятнистого оленя, пантовый экстракт, Pantocrinum liquidum

## Что это такое

Пантокрин — биогенный стимулятор, получаемый из неокостеневших рогов (пантов) марала, пятнистого оленя или изюбра. Зарегистрирован в Российской Федерации как лекарственное средство (Фармакопея РФ, ФС.2.5.0043.15). Обладает тонизирующим, адаптогенным, кардиотоническим, гипотензивным (мягким) и анаболическим действием. Повышает физическую и умственную работоспособность, улучшает микроциркуляцию, ускоряет репаративные процессы. В отличие от синтетических стимуляторов, действует мягко, без истощения ЦНС.

## Внешний вид

Прозрачная жидкость от светло-жёлтого до красновато-коричневого цвета (спиртовой экстракт 1:1). Таблетки — двояковыпуклые, тёмно-коричневые, со специфическим запахом (белок/гем). Возможен осадок (допустимо — взбалтывать перед приёмом).
## Метаболический цикл

- **Всасывание:** полипептиды и аминокислоты всасываются в тонком кишечнике; низкомолекулярные фракции — через пептидные транспортеры PepT1. Cmax биологически активных пептидов — через 1–2 ч.
- **Метаболизм:** гидролиз пептидов до аминокислот в ЖКТ; в печени — дезаминирование и трансаминирование. Кишечно-печёночная рециркуляция минимальна.
- **Распределение:** аминокислоты и мелкие пептиды связываются с белками плазмы (альбумин); IGF-1 и стероидоподобные компоненты частично проникают через ГЭБ.
- **Выведение:** конечные продукты азотистого обмена — почками (мочевина, креатинин) и с калом (неабсорбированные фракции).
- **Особенность:** максимальный клинический эффект развивается на 2–3-й неделе курса. Вечерний приём (после 17:00) не рекомендуется — возможны нарушения сна.
## Механизмы действия

- **Тонизирующее ЦНС** — стимуляция ретикулярной формации и коры (улучшение когнитивных функций, внимания)
- **Кардиотоническое** — повышение сократимости миокарда (инотропный эффект) без значительного увеличения ЧСС
- **Гипотензивное (мягкое)** — улучшение микроциркуляции, снижение периферического сосудистого сопротивления
- **Анаболическое** — стимуляция синтеза белка (активация mTOR, влияние на IGF-1)
- **Адаптогенное** — повышение устойчивости к стрессу (модуляция HPA-оси)
- **Антигипоксическое** — улучшение утилизации кислорода тканями
- **Кроветворное** — стимуляция эритропоэза (ретикулоцитоз, повышение гемоглобина)
- **Иммуномодулирующее** — повышение фагоцитарной активности макрофагов
- **Репаративное** — ускорение заживления тканей (активация фибробластов, усиление коллагенообразования)
## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Неврастения (астенический синдром) | Тонизирующее ЦНС | 1A (РКИ) |
| Умственное и физическое переутомление | Повышение работоспособности | 1A |
| Артериальная гипотензия (лабильная) | Мягкое повышение АД | 1B |
| Гипотония миокарда (миокардиодистрофия) | Улучшение сократимости | 1B |
| Периоды реконвалесценции (после инфекций) | Ускорение восстановления | 1B |
| Гипоацидный гастрит | Усиление секреции желёз | 2A |
| Функциональные расстройства ЦНС (астения) | Улучшение когнитивных функций | 1B |
| Снижение либидо при астении | Тонизирование половых функций | 2A |
## Топ-5 продуктов, в которых содержится

Пантокрин — оригинальный лекарственный препарат (экстракт пантов). В продуктах питания не содержится. Настойка спиртовая (1:1) — флаконы 30/50/100 мл, таблетки, тонизирующие бальзамы, пантогематоген, косметика с экстрактом пантов.
## Особенности приёма

- **Настойка (1:1):** 25–40 капель 2–3 раза в день за 30 минут до еды
- **Таблетки:** 1–2 таблетки 2–3 раза в день
- **Курс:** 3–4 недели, после 10–14-дневного перерыва возможно повторение
- **Время:** утро и ранний день (не позднее 17:00) — тонизирующий эффект может нарушить сон
- **Приём:** капли развести в ¼ стакана воды. Курс 2–3 раза в год (осень, весна)
- **Хранение:** в прохладном, защищённом от света месте; возможен осадок — взбалтывать
## Противопоказания

- Артериальная гипертензия (тяжёлая, II–III стадии)
- Выраженный атеросклероз
- Стенокардия напряжения (III–IV ФК)
- Хроническая сердечная недостаточность (IIБ–III стадии)
- Острый нефрит, нефроз (активная фаза)
- Диарея (любого генеза)
- Злокачественные новообразования (активные)
- Эпилепсия и судорожные состояния
- Беременность и лактация
- Индивидуальная непереносимость компонентов
## Форма приема и порядок

Настойка пантокрина (спиртовая 1:1) — 25–40 капель на ¼ стакана воды, 2–3 раза в день, за 30 минут до еды. Таблетки — 1–2 таблетки 2–3 раза в день. Курс 3–4 недели. Перерыв между курсами 10–14 дней. Не принимать после 17:00 (возможна бессонница). При гипотонии — хорошо сочетается с кофеином в малых дозах (ограниченно). В составе комплексной терапии — под контролем АД.
## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Элеутерококк | Синергия адаптогенного и тонизирующего действия |
| ++ | Лимонник китайский | Усиление тонуса ЦНС, когнитивного эффекта |
| ++ | Магний (цитрат/глицинат) | Профилактика тонизирующего перевозбуждения ЦНС |
| ++ | Коэнзим Q10 | Синергия кардиотонического эффекта |
| + | Витамины группы B | Кофакторы энергетического метаболизма |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Гипотензивные средства (β-блокаторы, диуретики) | Потенцирование гипотензивного эффекта (коррекция дозы) |
| ++ | Сердечные гликозиды | Возможна суммация инотропного действия — ЭКГ-контроль |
| ++ | Седативные (барбитураты, бензодиазепины) | Ослабление тонизирующего эффекта |
| ++ | Диуретики (тиазидные) | Потенцирование гипотензии |
| + | Антикоагулянты | Теоретическое усиление (содержит витамин K? — минимальный риск) |
## Научные факты

- Доклиническое исследование (2021) показало, что пантокрин увеличивает выживаемость нейронов в условиях гипоксии на 34% (p<0.05) и повышает экспрессию белков теплового шока HSP70 в 1.8 раза (Pavlov et al., 2021, *Bull Exp Biol Med*).
- РКИ (2019) у пациентов с астеническим синдромом: пантокрин (25 кап × 3 р/д, 4 недели) достоверно повысил умственную работоспособность на 28% (субтесты Шульте, ТУД), снизил утомляемость (FAS −18%, p<0.01) (Крылов и соавт., 2019, *Клиническая фармакология и терапия*).
- Мета-анализ фармакологических свойств пантовых экстрактов (2023) подтверждает IGF-1-опосредованный анаболический эффект: прирост мышечной силы (15–20%) у пациентов с саркопенией на фоне 4-недельного курса (Lee et al., 2023, *J Ethnopharmacol*).
## Лайфхак

> 🦌 **Пантокрин — природный «бустер» энергии без кофеина.** Работает не через стимуляцию ЦНС (как кофеин), а через оптимизацию метаболизма и микроциркуляции. Идеален для пациентов с гипотонией и астенией. Ключевое правило: утро — день, НО НЕ вечер. После 17:00 исключить (гипервозбуждение, бессонница). Курс 3–4 недели, 2–3 раза в год. Сочетать с магнием для мягкости воздействия.

2. Крылов В.И., и др. Эффективность пантокрина при астеническом синдроме: рандомизированное контролируемое исследование. Клиническая фармакология и терапия. 2019;28(4):45-51.
3. Lee JW, et al. Pharmacology of deer antler extracts: a systematic review of preclinical and clinical evidence. J Ethnopharmacol. 2023;308:116258.

`# Маточное молочко (Royal Jelly, Apis mellifera)

**Категория:** БАД / Биостимулятор  
**Тип:** Тонизирующее средство / Адаптогеноподобное  
**Основное действующее вещество:** Royalactin (MRJP1), 10-HDA (10-гидрокси-2-деценовая кислота), комплекс MRJP (Major Royal Jelly Proteins)  
**Синонимы:** Royal Jelly, маточное молочко пчёл, пчелиное маточное молочко, апилак, пчелиное желе

## Что это такое

Маточное молочко — секрет гипофарингеальных желёз рабочих пчёл (Apis mellifera), которым вскармливается матка на протяжении всей жизни. Состав: royalactin (MRJP1) — белок дифференцировки матки; 10-HDA — жирная кислота, не встречающаяся больше нигде в природе; витамины B (B5, B6), ацетилхолин, тестостерон (следы), минералы (Zn, Fe, Ca, Mg). Обладает тонизирующим, иммуномодулирующим, противовоспалительным, антимикробным, гиполипидемическим, эстрогеноподобным (умеренным), антиоксидантным и ранозаживляющим действием.

## Внешний вид

Густая кремообразная масса желтовато-белого цвета, опалесцирующая, с кисловатым запахом и жгуче-кислым вкусом. Лиофилизированное — порошок/гранулы кремового цвета. В капсулах — стандартизированный лиофилизат (10-HDA 3–6%, MRJP). В смесях с мёдом (10–15%) — более мягкий вкус.

## Метаболический цикл

- **Всасывание:** 10-HDA и MRJP всасываются через слизистую рта (сублингвально — минуя печень) и в тонком кишечнике. Сублингвальный путь предпочтителен. Cmax через 30–60 мин.
- **Метаболизм:** 10-HDA подвергается β-окислению. MRJP расщепляются пепсином/трипсином до пептидов и аминокислот. Ферменты ЖКТ разрушают royalactin (потеря активности при пероральном приёме — желательно сублингвально).
- **Распределение:** 10-HDA связывается с альбумином плазмы (75–85%). Ацетилхолин быстро метаболизируется холинэстеразой. Пептиды MRJP обнаруживаются в крови в течение 1–2 ч после приёма.
- **Выведение:** 10-HDA выводится почками (60–70%) в виде метаболитов, частично с желчью.
- **Особенность:** термолабильно — хранение только при +2…+8 °C. Сублингвальный приём в 2–3 раза эффективнее проглатывания. Лучше принимать натощак.

## Механизмы действия

- **Тонизирующее** — стимуляция ЦНС (ацетилхолин, улучшение когнитивной функции и устойчивости к утомлению)
- **Иммуномодулирующее** — активация макрофагов, повышение IgA, стимуляция пролиферации Т-лимфоцитов (MRJP)
- **Противовоспалительное** — ингибирование COX-2 и NF-κB (10-HDA)
- **Антимикробное** — бактерицидное против грамположительных бактерий (10-HDA, MRJP1)
- **Гиполипидемическое** — снижение общего холестерина, ЛПНП и триглицеридов
- **Эстрогеноподобное (умеренное)** — связывание с ERβ, влияние на менструальный цикл и гормональный фон
- **Антиоксидантное** — нейтрализация свободных радикалов, повышение активности супероксиддисмутазы (СОД)
- **Ранозаживляющее** — стимуляция фибробластов и коллагеногенеза
- **Гематопоэтическое** — стимуляция эритро- и лейкопоэза (витамины B, железо)

## Показания

| Показание | Уровень доказательности | Примечание |
|-----------|------------------------|------------|
| Физическое и умственное переутомление | 1B | Тонизирующий эффект, повышение работоспособности |
| Синдром хронической усталости (астения) | 1B | Улучшение энергии и качества жизни |
| Дислипидемия (повышение холестерина) | 1B | Снижение ХС, ЛПНП, ТГ |
| Постменопаузальные симптомы | 1B | Уменьшение приливов (эстрогеноподобное) |
| Снижение иммунитета (частые ОРВИ) | 1B | Повышение IgA, снижение заболеваемости |
| Раны и язвы кожи (местно) | 1B | Ускорение заживления |
| Кандидоз полости рта (местно/перорально) | 2A | Антимикробное |
| Климактерический синдром | 1B | Модуляция вегетативных симптомов |

## Топ-5 продуктов, в которых содержится

Нативное маточное молочко (пчеловодческие хозяйства — свежее, замороженное), лиофилизированное маточное молочко (порошок/гранулы/капсулы), мёд с маточным молочком (10–20%, пчеловодческие смеси), апилак (таблетки/свечи — лиофилизат маточного молочка), комплексные БАДы (комбинации с прополисом, пергой, пыльцой)

## Особенности приёма

- **Свежее (нативное) маточное молочко:** 0.5–1 г/день (утром натощак, сублингвально)
- **Лиофилизированное (порошок/капсулы):** 200–1000 мг/день (200–500 мг — профилактика, 500–1000 мг — терапевтические дозы)
- **Апилак (таблетки):** 10–20 мг/день сублингвально (1 таб 10 мг × 2–3 р/день)
- **Мёд с маточным молочком (10–15%):** 1–2 чайные ложки/день (утром, рассасывать)
- **Курс:** 4–8 недель, перерыв 2–4 недели
- **Сублингвально** (держать под языком 3–5 мин) — предпочтительный путь. Хранение: +2…+8 °C в герметичной таре. Время: утро (тонизирует), не принимать на ночь

## Противопоказания
- Аллергия на продукты пчеловодства (мёд, прополис, «жало»)
- Бронхиальная астма (высокий риск аллергической реакции)
- Гормон-чувствительные опухоли (рак молочной железы, рак яичников, рак простаты — теоретический риск)
- Беременность и лактация (осторожно — эстрогеноподобное действие)
- Артериальная гипотензия (может снижать АД)
- Одновременный приём варфарина (теоретический антагонизм — витамин K)

## Форма приема и порядок
Сублингвальное рассасывание — оптимальный путь: 0.5–1 г свежего маточного молочка или 200–500 мг лиофилизата утром натощак, держать под языком 3–5 мин. При непереносимости вкуса — смешивать с мёдом (1:1) или в капсулах. Местно — аппликации на кожу/раны (смесь с мёдом). Курс 4–8 недель. Не нагревать (>40 °C — разрушение royalactin и 10-HDA). Хранение только в холодильнике.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Мёд (натуральный) | Синергия антимикробная и тонизирующая + вкус |
| ++ | Прополис | Синергия иммуномодуляции и антимикробного |
| ++ | Перга (пчелиная обножка) | Синергия тонизирующая и витаминная |
| ++ | Женьшень | Синергия тонизирующего и адаптогенного |
| + | Цинк (пиколинат) | Кофактор антиоксидантных ферментов (СОД) |

### Антагонисты / Меры предосторожности

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Варфарин | Теоретический антагонизм (витамин K в составе) |
| ++ | Гормональные контрацептивы | Умеренное эстрогеноподобное — возможно потенцирование |
| ++ | Антигипертензивные | Потенцирование снижения АД |
| + | Иммуносупрессоры | Теоретическое ослабление (иммуностимуляция) |

- 10-HDA (10-гидрокси-2-деценовая кислота) — уникальная жирная кислота, обнаруженная исключительно в маточном молочке. Обладает подтверждённой in vitro и in vivo антибактериальной активностью против Staphylococcus aureus и Candida albicans (Moutsatsou P, et al., Nutrients. 2018).

`# Янтарная кислота (Succinic Acid, Butanedioic Acid)

**Категория:** БАД / Метаболическое средство  
**Тип:** Тонизирующее / Антигипоксант / Энергометаболик  
**Основное действующее вещество:** Янтарная кислота (бутандиовая кислота, сукцинат)  
**Синонимы:** Succinic acid, бутандиовая кислота, сукцинат, янтарка, E363 (пищевая добавка), соли янтарной кислоты (сукцинаты: натрия сукцинат, магния сукцинат)

## Что это такое

Янтарная кислота — эндогенный метаболит, ключевой промежуточный продукт цикла Кребса (цикла трикарбоновых кислот). Участвует в клеточном дыхании и синтезе АТФ через сукцинатдегидрогеназу (комплекс II электрон-транспортной цепи). Обладает антигипоксическим, антиоксидантным, адаптогенным и тонизирующим действием. Широко применяется в российской медицине и спортивной фармакологии как энергометаболик и средство для повышения физической и умственной работоспособности. В пищевой промышленности известна как добавка E363.

## Внешний вид

Белый кристаллический порошок без запаха, кислый на вкус. Хорошо растворима в воде (1 г/13 мл при 25°C), хуже — в спирте. Таблетки — белого/кремового цвета. Раствор — прозрачная бесцветная жидкость. В природе содержится в янтаре (до 8%), ревене, крыжовнике, недозрелых ягодах, квашеной капусте, сыре.

## Метаболический цикл

- **Всасывание:** быстро всасывается в желудке и тонком кишечнике (пассивная диффузия). Cmax через 20–30 мин. Биодоступность >90% (малая молекула, высокая растворимость).
- **Метаболизм:** янтарная кислота — естественный субстрат цикла Кребса. Окисляется в митохондриях до фумарата (сукцинатдегидрогеназа → комплекс II ЭТЦ). В цитозоле может конвертироваться в другие метаболиты.
- **Распределение:** распределяется по всем тканям (водорастворимая). Проникает через ГЭБ (до 30% от плазменной концентрации). Накопление в митохондриях.
- **Выведение:** T½ 30–45 мин. Преимущественно включается в метаболические пути. Частично выводится с мочой в неизменённом виде (5–15%) и в виде конъюгатов.
- **Особенность:** эффект зависит от исходного энергетического статуса клетки — при гипоксии/астении действие максимально. Не кумулируется (избыток быстро выводится). Период полувыведения короткий — требуется дробный приём.

## Механизмы действия

- **Активация митохондриального дыхания** — субстрат сукцинатдегидрогеназы (КДГ), ускорение потока электронов в ЭТЦ, повышение синтеза АТФ
- **Антигипоксическое** — улучшение утилизации кислорода тканями, снижение лактата
- **Антиоксидантное** — прямое связывание АФК, активация антиоксидантных ферментов (СОД, каталаза, глутатионпероксидаза)
- **Сигнальная (сукцинатный рецептор)** — активация SUCNR1/GPR91 → модуляция воспаления, ангиогенеза, метаболизма
- **Адаптогенное** — повышение резистентности к гипоксии, холоду, физическим нагрузкам
- **Гепатопротекторное** — снижение цитолиза, улучшение детоксикации
- **Детоксикационное** — связывание и выведение ксенобиотиков через конъюгацию
- **Стимуляция инсулиновой секреции** — SUCNR1 на β-клетках поджелудочной

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Астения, хроническая усталость | 1A | Повышение энергии, снижение утомляемости |
| Гипоксические состояния | 1A | Антигипоксический эффект |
| Физическое/умственное переутомление | 1B | Улучшение работоспособности |
| Постинфекционная астения | 1B | Ускорение восстановления |
| Похмельный синдром | 1B | Ускорение метаболизма этанола |
| Спортивные нагрузки (восстановление) | 2A | Снижение лактата, ускорение регенерации |
| Синдром хронической гипоксии (ХОБЛ, ИБС) | 2A | Улучшение тканевого дыхания |
| Интоксикации (в комплексной терапии) | 2A | Ускорение детоксикации |

## Топ-5 продуктов, в которых содержится

Янтарь (натуральный — до 8% янтарной кислоты), ревень (стебли), крыжовник (недозрелый), квашеная капуста (ферментированная), выдержанный сыр (пармезан, гауда), пиво (брожение), вино (выдержка), свёкла, брокколи

## Особенности приёма

- **Таблетки янтарной кислоты (обычно 100–250 мг/таб):** 200–500 мг/день, разделить на 2–3 приёма
- **Курс:** 2–4 недели, перерыв 1–2 недели
- **Время:** утро и день (не позднее 17:00 — тонизирующий эффект)
- **Способ:** после еды (натощак может раздражать желудок)
- **Усиление эффекта:** сочетать с витаминами группы B, L-карнитином, коэнзимом Q10
- **Спортивные цели:** за 30–40 мин до тренировки или сразу после

## Противопоказания

- Язвенная болезнь желудка и ДПК (обострение)
- Гиперацидный гастрит (стимулирует секрецию HCl)
- Глаукома (теоретический риск повышения ВГД — стимуляция метаболизма)
- Тяжёлая артериальная гипертензия (тонизирующий эффект)
- Беременность и лактация (ограниченные данные по безопасности высоких доз)
- Мочекаменная болезнь (оксалатные камни — янтарная кислота может влиять на pH мочи)
- Индивидуальная непереносимость

## Форма приема и порядок

Таблетки (100–250 мг × 2–3 р/день после еды), порошок (растворить в воде), капсулы, раствор для инъекций (в условиях стационара — натрия сукцинат, «Реамберин»). Принимать в первой половине дня (тонизирующий эффект). Курс 2–4 недели. Для быстрого эффекта (похмелье, переутомление) — разовый приём 200–300 мг. Для курсового восстановления — 200–500 мг/день дробно.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | L-карнитин | Синергия транспорта жирных кислот + активация Кребса |
| ++ | Коэнзим Q10 | Синергия митохондриального дыхания (электрон-транспортная цепь) |
| ++ | Витамины B1, B2, B3, B5 | Кофакторы цикла Кребса (тиамин, рибофлавин, ниацин, пантотеновая кислота) |
| ++ | Магний | Кофактор АТФ-синтазы, синергия энергопродукции |
| + | Глицин | Синергия антигипоксического и детоксикационного действия |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | Алюминий-содержащие антациды | Снижение всасывания (хелатирование) |
| + | НПВС (аспирин, ибупрофен) | Суммация риска раздражения слизистой ЖКТ |
| + | Седативные/снотворные | Ослабление тонизирующего эффекта |

## Научные факты

- РКИ (2019): янтарная кислота (300 мг/день × 14 дней) у пациентов с астеническим синдромом достоверно снижает утомляемость по шкале MFI-20 на 28% (p<0.01) и повышает физическую активность (Новости медицины и фармации, 2019).
- Исследование (2021): сукцинат натрия (Реамберин) в комплексной терапии ХОБЛ улучшает кислородный статус (SaO₂ +4.2%, p<0.05) и снижает лактат крови на 18% (Клиническая фармакология и терапия, 2021).
- Экспериментальное исследование (2018): янтарная кислота повышает выживаемость клеток при гипоксии на 35% in vitro через активацию HIF-1α и сукцинатного рецептора SUCNR1 (Molecular Cell, 2018).

## Лайфхак для пользователя (Nutrition Tip)

> ⚡ **Янтарная кислота — «внутренняя батарейка», но работает только когда нужно.** Лучше всего действует при усталости, гипоксии, после нагрузок — в покое эффект малозаметен. Сукцинат быстро включается в цикл Кребса и повышает АТФ. Принимать только в первой половине дня (иначе — бессонница). Курс 2–4 недели. Идеально сочетать с L-карнитином и Q10 для митохондриальной поддержки. При язве желудка — противопоказана. Пищевые источники: квашеная капуста, ревень, выдержанный сыр, янтарь (сувенирные бусы не есть!).

`# Тулси (Tulsi, Ocimum sanctum / Ocimum tenuiflorum)

**Категория:** БАД / Адаптоген  
**Тип:** Тонизирующий адаптоген  
**Основное действующее вещество:** Эвгенол (60–70%), урсоловая кислота, розмариновая кислота, олеаноловая кислота, β-кариофиллен, лютеолин, апигенин  
**Синонимы:** Tulsi, Holy Basil, Ocimum sanctum, Ocimum tenuiflorum, базилик священный, тулси, «королева трав» (Ayurveda)

## Что это такое

Тулси (базилик священный) — одно из наиболее почитаемых растений в аюрведе («Эликсир жизни», «Королева трав»). Культивируется в Индии и Юго-Восточной Азии более 3000 лет. Три основных сорта: Rama tulsi (зелёные листья), Krishna tulsi (фиолетовые листья), Vana tulsi (дикий, зелёный). Главный адаптоген аюрведы наряду с ашвагандой — нормализует стрессовый ответ, обладает анксиолитическим, антиоксидантным, противовоспалительным, противомикробным, иммуномодулирующим и метаболическим действием.

## Внешний вид

Листья — зелёные (Rama) или фиолетовые (Krishna), овальные, с зазубренным краем, с характерным пряным ароматом (эвгенол). Порошок — зелёный, с сильным запахом. Капсулы/таблетки — стандартизированный экстракт (урсоловая кислота 2–5%, эвгенол 10–20%). Чай — зелёный (листья), с пряным вкусом.

## Метаболический цикл

- **Всасывание:** эвгенол и урсоловая кислота всасываются в тонкой кишке (пассивная диффузия, липофильны). Cmax эвгенола через 1–2 ч. Биодоступность эвгенола 50–60% (высокая для фитосоединения). Урсоловая кислота — <5% (интенсивное глюкуронирование).
- **Метаболизм:** эвгенол — гидролиз в печени (CYP2C9, CYP2C19, CYP2A6) → конъюгация с глюкуронидом/сульфатом. Урсоловая кислота — фаза II (глюкуронирование, UGT1A1, UGT1A9). β-кариофиллен — активация CB2 рецепторов через метаболит β-кариофилленоксид. Розмариновая кислота — ферментация микробиотой до кофейной кислоты.
- **Распределение:** эвгенол — Vd ~2–3 л/кг, связь с альбумином 90%. Урсоловая кислота — накопление в печени и мышцах. Розмариновая кислота и её метаболиты — связывание с альбумином (85%). Проникновение через ГЭБ — эвгенол частично (10–15%).
- **Выведение:** T½ эвгенола 2–6 ч. Преимущественно почками (60–70% как конъюгаты), с калом (20–30%). Урсоловая кислота — T½ 12–24 ч, с калом (>70%).
- **Особенность:** трипольза растения — чай (водорастворимые полисахариды/флавоноиды), капсулы (адаптогены/тритерпены), свежие листья (эфирные масла). Работает и системно, и местно в ЖКТ.

## Механизмы действия

- **Адаптогенное** — модуляция HPA-оси, снижение кортизола, нормализация стрессового ответа
- **Анксиолитическое** — GABA-ергическое (через эвгенол), модуляция серотониновых рецепторов
- **Антиоксидантное** — нейтрализация ROS, повышение супероксиддисмутазы, каталазы, глутатиона
- **Противовоспалительное** — ингибирование NF-κB, ЦОГ-2, снижение TNF-α, IL-6
- **Антимикробное** — эвгенол → против H. pylori, Candida, E. coli, Staphylococcus, Streptococcus
- **Иммуномодулирующее** — повышение IgA, IgM, IgG, активация NK-клеток и макрофагов
- **Метаболическое** — улучшение чувствительности к инсулину, снижение глюкозы, липидов
- **Гепатопротекторное** — защита печени (через урсоловую кислоту и антиоксиданты)
- **Ноотропное** — улучшение памяти, фокуса (через розмариновую кислоту и карнозоловую кислоту)
- **Радиопротекторное** — защита от ионизирующего излучения (уникальное свойство тулси)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Стресс (хронический) | 1A | Нормализация кортизола, субъективного стресса |
| Тревожность (лёгкая/умеренная) | 1A | Снижение тревоги (без седации) |
| Утомляемость (надпочечниковая) | 1B | Повышение энергии, выносливости |
| Иммунитет (профилактика) | 1B | Повышение IgA, NK-клеток, снижение заболеваемости |
| Синдром раздражённого кишечника | 1B | Снижение боли, вздутия |

| Воспаление ЖКТ | 2A | Противовоспалительное (эвгенол + урсоловая к-та) |
| Когнитивные нарушения | 2A | Улучшение памяти, фокуса |

## Топ-5 продуктов, в которых содержится

Тулси (Ocimum tenuiflorum) — основной источник. Другие виды базилика (сладкий базилик/Ocimum basilicum — содержит меньше эвгенола, больше линалоола). Может входить в состав аюрведических чаёв и смесей (Tulsi tea). Аналогичные соединения: розмарин (розмариновая кислота, карнозоловая кислота), гвоздика (эвгенол).

## Особенности приёма

- **Стандартная дозировка:** 300–1500 мг/день (экстракт 5:1), 2–5 г/день (порошок листьев)
- **Оптимальная:** 500–1000 мг/день (стандартизированный экстракт 2–5% урсоловой кислоты)
- **Форма:** капсулы (экстракт), чай (листья, 2–4 г × 3 р/день), настойка (1:5, 30–60 капель), свежие листья (5–10 листьев/день)
- **Чай:** 2 г сухих листьев на 200 мл, 10–15 мин, 2–3 чашки/день
- **Начало действия:** 30–60 мин (субъективно), 2–4 недели (адаптогенное)
- **Курс:** 8–12 недель, перерыв 1–2 недели
- **Безопасность:** один из самых безопасных адаптогенов. Можно длительно

## Противопоказания

- Беременность (эвгенол в высоких дозах — утеротонический эффект, чайные дозы безопасны)
- Лактация (ограниченные данные)
- Гемофилия (эвгенол — антиагрегант, может усиливать кровоточивость)
- Эпилепсия (высокие дозы эвгенола — риск судорог)
- Перед операцией (за 2 недели — антиагрегантный эффект)
- Аллергия на растения семейства Lamiaceae

## Форма приема и порядок

`# Зимозан (Zymosan)

**Категория:** БАД / Иммуномодулятор  
**Тип:** Иммуномодулирующий тоник / бета-глюкановый биостимулятор  
**Основное действующее вещество:** бета-1,3-глюкан (~50%), бета-1,6-глюкан, маннан, маннопротеины, хитин  
**Синонимы:** Zymosan, зимозан, дрожжевой бета-глюкан (Saccharomyces cerevisiae), зимозан A, нерастворимый бета-глюкан

## Что это такое

Зимозан — нерастворимый полисахаридный экстракт клеточных стенок пекарских дрожжей Saccharomyces cerevisiae. Представляет собой смесь бета-1,3/1,6-глюканов, маннана, маннопротеинов и хитина. Является мощным агонистом рецепторов врождённого иммунитета (TLR-2 и дектин-1), активирует макрофаги, нейтрофилы, NK-клетки и дендритные клетки. В экспериментальной иммунологии используется как стандартный индуктор стерильного воспаления.

## Внешний вид

Белый или кремовый аморфный порошок без запаха, слабогигроскопичный. Нерастворим в воде, этаноле, органических растворителях — образует опалесцирующую взвесь. В капсулах — стандартизированный порошок (содержание бета-глюканов 60–80%).

## Метаболический цикл

- **Всасывание:** зимозан не всасывается в неизменённом виде. Частицы распознаются M-клетками Пейеровых бляшек и дендритными клетками в тонком кишечнике. Негидролизованная фракция фагоцитируется макрофагами кишечной стенки.
- **Метаболизм:** ферментативный гидролиз под действием лизоцима и макрофагальных гликозидаз в лизосомах с высвобождением олигосахаридных фрагментов.
- **Распределение:** активированные рецепторно-опосредованным эндоцитозом дендритные клетки мигрируют в регионарные лимфоузлы, опосредуя системный иммунный ответ.
- **Выведение:** непереваренные полисахаридные каркасы выводятся через кишечник с калом (>95%).
- **Особенность:** действие реализуется через активацию врождённого иммунитета без прямой абсорбции в системный кровоток. Курсовое применение (5 дней приёма / 2 дня перерыва) предотвращает истощение фагоцитарного звена.

## Механизмы действия

- **Активация TLR-2** — запуск сигнального каскада MyD88 → NF-κB → продукция провоспалительных цитокинов (IL-6, TNF-α, IL-1β)
- **Агонизм дектин-1** — рекрутирование Syk-киназы через ITAM-подобный мотив (эндосомальный сигналинг)
- **Стимуляция фагоцитоза** — усиление активности макрофагов и нейтрофилов (опсонин-независимый путь)
- **Активация NK-клеток** — повыжение цитотоксичности и продукции IFN-γ (через IL-12 от дендритных клеток)
- **Продукция активных форм кислорода (АФК)** — респираторный взрыв в фагоцитах (антимикробная активность)
- **Активация комплемента** — альтернативный путь фиксации C3-фракции на поверхности частиц зимозана

## Показания

| Показание | Уровень | Примечание |
|-----------|---------|------------|
| Рецидивирующие инфекции (ЛОР, бронхолёгочные) | 1B | Профилактика и адъювант к антибиотикам |
| Хронические грибковые инфекции | 2A | Стимуляция Th1-иммунитета |
| Восстановление после хирургических операций | 2B | Снижение риска послеоперационных осложнений |
| Иммунодефицитные состояния (IgA, фагоцитоз) | 2B | Модуляция врождённого звена |
| Реабилитация после химиотерапии (нейтропения) | 2A | Стимуляция гранулоцитопоэза |
| Хроническая усталость (иммунно-воспалительный компонент) | 2C | Требуются РКИ |

## Топ-5 продуктов, в которых содержится

Зимозан не содержится в пищевых продуктах в чистом виде. Источники: капсулы зимозана (монопрепарат, Россия и ЕС), зимозан в композитных иммунных формулах (комбинация с лактоферрином, экстрактами грибов, цинком), дрожжевой бета-глюкан (продукты из пекарских дрожжей — незимозановый ряд, но близкий по составу), дрожжевые экстракты с фракцией глюканов (например, Wellmune WGP — бета-1,3/1,6-глюкан), зимозан A (очищенная фракция для исследовательских целей)

## Особенности приёма

- **Дозировка:** 100–500 мг/день (в зависимости от степени иммунной нагрузки)
- **Курсовой режим:** 5/2 (5 дней приёма, 2 дня перерыва) или 3/1 (3 дня приёма, 1 день перерыва)
- **Максимальная длительность:** 3–4 недели непрерывного применения; затем перерыв 2–4 недели
- **Время приёма:** утро (за 30 мин до еды или натощак)
- **Не рекомендуется:** длительный непрерывный приём (риск избыточного воспаления)
- **Детям:** с осторожностью (только по назначению врача)

## Противопоказания

- Аутоиммунные заболевания в активной фазе (РА, СКВ, болезнь Крона, язвенный колит, тиреоидит)
- Аллергия к дрожжевым продуктам (S. cerevisiae)
- Беременность и лактация (недостаточно данных)
- Острые воспалительные заболевания с синдромом системного воспаления (SIRS, сепсис)
- Тяжёлая нейтропения (риск синдрома активации макрофагов)
- Гиперчувствительность к компонентам

## Форма приема и порядок

Капсулы 100–500 мг/день (стандартизированный бета-глюкановый комплекс 60–80%). Принимать утром натощак, запивая водой. Курс 3–4 недели с режимом 5/2. При рецидивирующих инфекциях — адъювант к основной терапии. При аутоиммунных заболеваниях — полное исключение. Рекомендуется EGCG (зелёный чай) для модуляции избыточного воспалительного сигнала.

## Взаимодействие

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | Витамин C (липосомальный) | Синергия фагоцитоза (АФК-зависимый клиренс) |
| ++ | Цинк (глицинат/пиколинат) | Кофактор NADPH-оксидазы, стимуляция гранулоцитов |
| ++ | Селен (L-селенометионин) | Модуляция окислительного стресса, поддержка селенопротеинов |
| ++ | Лактоферрин | Синергия врождённого иммунитета |
| + | Экстракт эхинацеи | Комплементарная TLR-модуляция |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |

| +++ | Иммуносупрессоры (преднизолон, метотрексат, такролимус) | Полный антагонизм — снижение иммуностимуляции |
| ++ | Глюкокортикостероиды | Теоретическое подавление зимозан-индуцированного воспаления |
| ++ | Антигистаминные (H1) | Ослабление гистамин-опосредованной реакции |
| + | Антациды (снижение pH желудка) | Возможное снижение доступности частиц |

## Научные факты

- Di Carlo FJ, Fiore JV (1958): выделение зимозана из S. cerevisiae как фракции, активирующей альтернативный путь комплемента — описан ретикулоэндотелиальный стимулирующий эффект. J Allergy. 1958;29(1):55-64.
- Brown GD, et al. (2001): клонирование рецептора дектин-1 как паттерн-распознающего рецептора для бета-глюканов зимозана. Nat Rev Immunol. 2001;1(1):69-73. PMID: 11905831.

> ⚡ **Зимозан — мощный активатор врождённого иммунитета для острых схем.** Принципиальное отличие от грибных бета-глюканов: зимозан действует быстрее (часы, а не дни), но не предназначен для длительного приёма. Оптимальный сценарий: начало ОРВИ/восстановление после инфекции — курс зимозана 5–7 дней по 250 мг утром натощак. Не сочетать с иммуносупрессорами. При аутоиммунных заболеваниях — строгое противопоказание. Режим 5/2 предотвращает толерантность фагоцитов.

`# Адаптогены (Adaptogens) — Энергия и концентрация

**Категория:** БАД / Адаптогены  
**Тип:** Растительные и природные вещества, повышающие неспецифическую резистентность  
**Основные представители:** Родиола розовая, женьшень (Panax ginseng), элеутерококк, ашваганда, лимонник, аралия, левзея, тулси, рейши, маточное молочко, мумие, кордицепс  
**Синонимы:** Adaptogens, адаптогенные растения, природные антистресс-средства, «вакцины от стресса»

## Что это такое

Адаптогены — природные вещества, повышающие неспецифическую резистентность организма к стрессовым факторам любой природы (физическим, химическим, биологическим, психоэмоциональным). Термин введён Н.В. Лазаревым в 1947 году. Ключевое отличие от стимуляторов (кофеин, эфедрин): адаптогены не истощают ресурсы организма и демонстрируют «inverted U-эффект» — стимулируют при низком тонусе и успокаивают при высоком. Основное действие: нормализация гипоталамо-гипофизарно-надпочечниковой оси (ГГН-ось), балансировка кортизола, повышение устойчивости к стрессу и улучшение когнитивных функций.

## Внешний вид

Разнообразен: сухие корни/корневища (женьшень, родиола, элеутерококк), капсулы/таблетки (стандартизированные экстракты), настойки/жидкие экстракты (спиртовые/водные), порошки (грибы рейши, кордицепс), капли

## Метаболический цикл

- **Всасывание:** активные соединения (салидрозиды, гинзенозиды, элеутерозиды, витанолиды) всасываются в тонком кишечнике. Биодоступность большинства адаптогенов 5–20% из-за активного эффлюкса (P-gp, BCRP) и интенсивного пресистемного метаболизма. Cmax через 1–3 ч. Спиртовые/жидкие формы — выше биодоступность.
- **Метаболизм:** фаза I (CYP3A4, CYP2C9, CYP2D6) — гидроксилирование, деметилирование. Фаза II — глюкуронирование (UGT1A1, UGT1A9) и сульфатирование. Значительная часть метаболизируется ещё в энтероцитах. Кишечно-печёночная рециркуляция. Большинство метаболитов теряют адаптогенную активность.
- **Распределение:** связывание с белками плазмы 80–95%. Липофильные агликоны проникают через ГЭБ (10–30%). Накопление в тканях с высоким метаболизмом (печень, мозг, мышцы).
- **Выведение:** T½ 2–12 ч (зависит от соединения). Преимущественно с калом (>60%) и с мочой (20–30%).
- **Особенность:** курсовой эффект обязателен — 2–4 недели для накопления клинически значимой концентрации. Эффект длится 2–4 недели после отмены.

## Механизмы действия

- **Модуляция ГГН-оси** — регуляция кортизола, АКТГ, ДГЭА (баланс, не подавление)
- **Активация Nrf2/ARE** — повышение антиоксидантных ферментов (глутатион, супероксиддисмутаза)
- **Повышение HSP70** — защита белков от стресс-повреждения
- **Активация AMPK** — улучшение энергетического метаболизма (митохондриальный биогенез)
- **Повышение BDNF** — нейропластичность, нейрогенез гиппокампа
- **Модуляция катехоламинов** — баланс дофамина, норадреналина (без истощения)
- **Улучшение утилизации кислорода** — повышение эритроцитов, гемоглобина (элеутерококк, родиола)
- **Повышение АТФ** — митохондриальный биогенез, улучшение энергетического обмена
- **Inverted U-эффект** — стимуляция при низком тонусе/седация при высоком
- **Адаптация к гипоксии** — улучшение работы в условиях кислородного дефицита

## Классификация адаптогенов

| Тип | Действие | Представители | Энергия | Концентрация | Когда выбирать |
|-----|----------|---------------|---------|--------------|----------------|
| **Стимулирующие** | Возбуждают ЦНС, тонизируют | Женьшень, элеутерококк, аралия, левзея, лимонник, кордицепс | ⬆⬆⬆ | ⬆⬆ | Низкий кортизол, упадок сил, апатия, гипотония |
| **Универсальные** | Баланс + тонизирование | Родиола розовая, ашваганда, тулси | ⬆⬆ | ⬆⬆⬆ | Хронический стресс, утомляемость, когнитивные жалобы |
| **Тонизирующие** | Мягко тонизируют, восстанавливают | Рейши, маточное молочко, мумие | ⬆ | ⬆ | Истощение, восстановление после болезни |
| **Седативные** | Расслабляют, успокаивают | Валериана, пассифлора, хмель | ⬇ | ⬇ | Высокий кортизол, тревога, бессонница |

## Показания (Энергия + Концентрация)

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Хроническая усталость/астения | 1A | Повышение энергии, снижение утомляемости |

Адаптогены не содержатся в продуктах питания в терапевтических дозах. Основные источники: корень женьшеня (Panax ginseng — экстракт 3–8% гинзенозидов), корень родиолы розовой (Rhodiola rosea — «золотой корень», экстракт 3% салидрозида/1% розавина), корень ашваганды (Withania somnifera — экстракт 5% витанолидов), корень элеутерококка (Eleutherococcus senticosus — «сибирский женьшень», экстракт 0.3% элеутерозидов), гриб кордицепс (Cordyceps militaris — экстракт 7% кордицепина).

## Особенности приёма

- **Энергия + концентрация (утро/день):** родиола (универсально), женьшень, элеутерококк, лимонник, кордицепс

- **Начало действия:** 30–60 мин (родиола), 3–7 дней (женьшень), 2–4 недели (ашваганда)
- **Курс:** 6–8 недель, перерыв 2–4 недели
- **Активационная терапия:** ротация дозировок (1→3→10 капель) для предотвращения привыкания
- **Форма:** жидкие настойки (быстрее), капсулы (удобнее, стабильнее дозировка)
- **Комбинации:** родиола + женьшень для энергии; родиола + ашваганда для баланса
- **Важно:** НЕ принимать стимулирующие адаптогены после 14:00 (риск бессонницы)

## Противопоказания

- Артериальная гипертензия (стимулирующие — под контролем)
- Тиреотоксикоз (стимулирующие противопоказаны)
- Беременность, лактация (большинство — ограниченные данные)
- Аутоиммунные заболевания в активной фазе (стимулирующие — с осторожностью)
- Бессонница (стимулирующие — только в первой половине дня)
- Биполярное расстройство (маниакальная фаза — стимулирующие противопоказаны)

## Форма приема и порядок

Настойки/капли (20–60 капель × 2–3 р/день), капсулы/таблетки (200–600 мг экстракта × 1–2 р/день), чаи/отвары (корни, 2–4 г × 2 р/день), порошки (2–5 г × 2 р/день). Для энергии — утром/днём. Для концентрации — родиола 200 мг × 2 р/день (утро + день). Для физической выносливости — кордицепс/элеутерококк перед тренировкой. Курс 6–8 недель. Перерыв 2–4 недели. Ротация адаптогенов каждые 2 недели для предотвращения толерантности.

`# Рыбный коллаген (Fish collagen, Marine collagen Type I)

**Категория:** БАД / Структурный белок  
**Тип:** Тонизирующий (кожа, суставы, кости, связки)  
**Основное действующее вещество:** Коллаген типа I (гидролизованный пептидный коллаген) с высоким содержанием глицина, пролина, гидроксипролина  
**Синонимы:** Marine collagen, fish collagen, рыбный коллаген, гидролизованный коллаген, морской коллаген, коллаген типа I  

## Что это такое

Рыбный коллаген — гидролизованный коллаген типа I, полученный из кожи и чешуи морских рыб (треска, лосось, тилапия). Молекулярная масса пептидов — 2–5 кДа (в 10 раз меньше, чем у говяжьего коллагена), что обеспечивает высокую биодоступность и всасывание. Коллаген — основной структурный белок соединительной ткани (кожа, кости, сухожилия, связки, хрящи). С возрастом синтез коллагена снижается (~1% в год после 25 лет), что приводит к морщинам, снижению плотности костей и дегенерации суставов. Приём гидролизованного коллагена стимулирует фибробласты к синтезу собственного коллагена и накоплению его в дерме.

## Внешний вид

Белый или кремовый мелкодисперсный порошок без запаха или со слабым рыбным запахом (зависит от степени очистки). В воде растворяется почти полностью (pH 3–7). Капсулы — желатиновые/растительные, наполненные порошком. Жидкие формы — коллагеновые напитки с добавлением витамина C и гиалуроновой кислоты.

## Метаболический цикл

- **Всасывание:** гидролизованные пептиды (Gly-Pro-Hyp и др.) всасываются в тонком кишечнике через пептидные транспортеры (PepT1, PepT2). Биодоступность >90% (в 10 раз выше, чем у нативного коллагена). Cmax через 1–2 ч.
- **Метаболизм:** частично гидролизуется в ЖКТ. Пептиды и аминокислоты поступают в кровоток, достигают соединительной ткани. Пролин и гидроксипролин действуют как сигнальные молекулы для фибробластов.
- **Распределение:** дипептиды (особенно Pro-Hyp, Hyp-Gly) накапливаются в коже, хрящах и костях через 2–4 ч после приёма (доказано радиоизотопными методами).
- **Выведение:** избыток аминокислот — через почки (мочевина).
- **Особенность:** для эффективного синтеза коллагена необходим кофактор — витамин C (активатор гидроксилирования пролина и лизина). Без витамина C усвоение коллагена резко снижается.

## Механизмы действия

- **Стимуляция фибробластов** — пептиды (Pro-Hyp) активируют синтез коллагена в дерме
- **Накопление в дерме** — повышение плотности и увлажнения кожи
- **Улучшение эластичности** — снижение глубины морщин
- **Поддержка хряща** — стимуляция хондроцитов, замедление дегенерации
- **Укрепление костей** — повышение минеральной плотности (BMD)
- **Укрепление ногтей и волос** — увеличение скорости роста, снижение ломкости
- **Противовоспалительное** — снижение IL-6, CRP (через модуляцию иммунных клеток)
