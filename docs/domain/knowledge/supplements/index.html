Мартиния душистая (Harpagophytum procumbens) — многолетнее растение семейства Pedaliaceae, произрастающее в Южной Африке (Калахари, Намибия, Ботсвана). Вторичные клубневидные корни используются в фитотерапии как мощное противовоспалительное и анальгетическое средство при заболеваниях опорно-двигательного аппарата. Основной активный компонент — гарпагозид (ирндоидный гликозид), который обладает доказанной противовоспалительной активностью, сравнимой с НПВП (диклофенак), но без ульцерогенного действия. Механизм — ингибирование циклооксигеназы-2 (COX-2) и липоксигеназы (LOX), подавление синтеза провоспалительных цитокинов (TNF-α, IL-1β). Экстракт также обладает мягким хондропротекторным действием.

## Внешний вид

Корни — серо-коричневые, морщинистые, с продольными бороздками, на разрезе — желтовато-бурые. Сухой экстракт — гигроскопичный порошок тёмно-коричневого цвета. Капсулы/таблетки — стандартизированные по гарпагозиду (1.5–3%). Настойка — красно-коричневая жидкость. Чай из корня — горький, терпкий.

## Метаболический цикл

- **Всасывание:** ирндоидные гликозиды (гарпагозид) всасываются в тонком кишечнике. Абсолютная биодоступность низкая (<10%) из-за гидролиза кишечными бактериями. Гидролизованный гарпагенин — более липофилен и лучше всасывается. Cmax через 1–2 ч.
- **Метаболизм:** фаза I (CYP3A4) — ограниченное участие. Гарпагозид метаболизируется преимущественно ферментами микробиоты кишечника (гидролиз гликозидов до гарпагенина + глюкоза). ЖКТ-рекрулируется повторно.
- **Распределение:** активные метаболиты связываются с белками плазмы (70–80%). Проникают в синовиальную жидкость (доказано для суставов).
- **Выведение:** преимущественно с калом (>80%) в неизменённом виде, частично почками (5–15%).
- **Особенность:** требуется курсовой приём (2–4 недели). Кишечный метаболизм — значительный (индивидуальные различия зависят от состава микробиоты). Маскирует горький вкус (энтеросолюбильные капсулы).

## Механизмы действия

- **Подавление COX-2** — без ингибирования COX-1 (нет ульцерогенного эффекта)
- **Ингибирование 5-LOX** — снижение лейкотриенов
- **Снижение TNF-α, IL-1β, IL-6** — подавление провоспалительных цитокинов
- **Анальгетическое** — снижение болевой чувствительности (центрально и периферически)
- **Хондропротекторное** — подавление MMP-1, MMP-3 (защита хряща)
- **Снижение отёка** — антиэкссудативное действие
- **Спазмолитическое** — лёгкое расслабление гладкой мускулатуры

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Остеоартрит (коленный, тазобедренный) | 1A | Снижение боли (WOMAC −2.7 балла) |
| Люмбаго / боль в нижней части спины | 1A | Снижение боли (VAS −2.1 балла) |
| Воспалительные артриты (РА, реактивный) | 2B | Адъювант к НПВП |
| Тендиниты, бурситы | 2B | Снижение воспаления |
| Мигрень (напряжения) | 2B | Спазмолитическое действие |
| Желчекаменная болезнь (лёгкие формы) | 3 | Слабое желчегонное |
| Диспепсия, отсутствие аппетита | 3 | Стимуляция желчеотделения |

## Топ-5 продуктов, в которых содержится

Вторичные клубни Harpagophytum procumbens (дикий сбор — Калахари, Намибия), стандартизированный экстракт в капсулах (2–3% гарпагозида — Doctor's Best, Now Foods, Nature's Way), настойка гарпагофитума (спиртовая 1:5), чай из корня (Harpagophytum tea, аптечные сборы), комплексные хондропротекторы (глюкозамин + гарпагофитум + MSM)

## Особенности приёма

- **Стандартизированный экстракт (2–3% гарпагозида):** 500–1500 мг/день (в 2–3 приёма)
- **Содержание гарпагозида:** не менее 50–60 мг/день (для анальгезии)
- **Курс:** 4–12 недель (при остеоартрите — до 6 месяцев)
- **Время:** во время еды (снижает раздражение ЖКТ)
- **При остеоартрите:** может использоваться как альтернатива НПВП при гастропротекции
- **Горький вкус:** энтеросолюбильные капсулы или маскировка (сок, мёд)
- **Усиливается** с ивой белой (салицин) — синергия анальгезии

## Противопоказания

- Язва желудка и двенадцатиперстной кишки (обострение)
- Гастрит с повышенной кислотностью (обострение)
- Желчекаменная болезнь (камни >1 см — риск колики)
- Беременность (тонус матки — стимуляция)
- Лактация (недостаточно данных)
- Дети до 12 лет (недостаточно данных)
- Аллергия на Pedaliaceae (кунжутные)

## Форма приема и порядок

Капсулы (500–1500 мг/день, стандартизированные до 2–3% гарпагозида — разделить на 2–3 приёма), настойка (30–60 капель × 3 р/день), чай из корня (1–2 ч. л. на чашку, настаивать 10 мин). Принимать во время еды. Курс 4–12 недель. Для хронической боли — длительно (до 6 месяцев с перерывами 1–2 недели). Не рекомендуется на голодный желудок. При остеоартрите — комбинировать с MSM (2 г/день) и глюкозамином (1500 мг/день).

### Комплименты (синергисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| +++ | MSM (метилсульфонилметан) | Синергия анальгезии и противовоспаления |

| + | Омега-3 (EPA/DHA) | Синергия противовоспаления |

### Ингибиторы (антагонисты)

| Ранг | Вещество | Эффект |
|------|----------|--------|
| ++ | НПВП (диклофенак, ибупрофен) | Аддитивный эффект (коррекция дозы — НПВП ↓ на 30–50%) |

| + | Диуретики | Снижение их эффективности (теоретически) |

## Научные факты

- РКИ (2021, 83 пациента с остеоартритом колена): 1000 мг/день экстракта (2% гарпагозида) × 12 недель — снижение WOMAC на −31.2% (p<0.001), сравнимо с диклофенаком 100 мг/день.
- РКИ (2016, 122 пациента с люмбаго): 600 мг/день гарпагофитума × 4 недели — снижение VAS на −2.1 балла (p<0.01) vs плацебо (−0.5).
- Мета-анализ (2019, 9 РКИ, n=1093): гарпагофитум достоверно снижает боль при остеоартрите (SMD=0.58) и боль в спине (SMD=0.67).
- Систематический обзор (2018): гарпагофитум — один из наиболее изученных фитопрепаратов для суставов (уровень 1A для остеоартрита).
- РКИ (2013): гарпагофитум (1000 мг/день) снижает потребность в НПВП на 49% (p<0.01) у пациентов с остеоартритом.

## Лайфхак для пользователя (Nutrition Tip)

`# Метилсульфонилметан (MSM, Methylsulfonylmethane)

**Категория:** БАД / Органическая сера  
**Тип:** Тонизирующий (суставы, соединительная ткань, детокс)  
**Основное действующее вещество:** Диметилсульфон (CH₃–SO₂–CH₃, 34% серы)  
**Синонимы:** MSM, метилсульфонилметан, диметилсульфон, органическая сера, кристаллическая сера, сера для суставов  

## Что это такое

MSM (метилсульфонилметан) — органическое серосодержащее соединение, естественный компонент многих продуктов (фрукты, овощи, мясо, рыба, молоко). Сера — четвёртый по распространённости макроэлемент в организме, входит в состав аминокислот (метионин, цистеин, таурин), коллагена, кератина, хондроитина, сульфатированных гликозаминогликанов. MSM обеспечивает серу для синтеза соединительной ткани (хрящи, связки, кожа, волосы, ногти). Доказано: MSM снижает боль при остеоартрите на 30–60%, подавляет провоспалительные цитокины (TNF-α, IL-6), улучшает проницаемость клеточных мембран, обладает антиоксидантным действием (донор SH-групп). Легко проникает через гематоэнцефалический барьер.

## Внешний вид

Белые кристаллические гранулы, похожие на сахар или соль. Запах — нейтральный, слабый серный оттенок. Капсулы/таблетки — белый порошок в растительных капсулах. Кристаллы MSM хорошо растворимы в воде (1 г/мл), имеют сладковатый вкус. Косметические формы — MSM в кремах и мазях.

## Метаболический цикл

- **Всасывание:** MSM быстро и полностью всасывается в тонком кишечнике (биодоступность >90%). Сmax в плазме через 1–2 ч. Не требует кислоты желудка для абсорбции.
- **Метаболизм:** не метаболизируется CYP-ферментами. Частично восстанавливается метилирование → диметилсульфид (DMS, сернистый запах). Распределяется по всем тканям, включая мозг и синовиальную жидкость (связь с ПЭБ и ГЭБ).
- **Распределение:** характерно равномерное распределение по организму. Период полувыведения — 12–16 ч. Хорошо проникает в хрящ, синовиальную жидкость, кожу, волосы, ногти.
- **Выведение:** большая часть выводится почками в неизменённом виде (60–80%), 5–15% — через кожу и лёгкие (с потом и выдыхаемым воздухом, возможен сернистый запах у 2–5% пациентов).
- **Особенность:** обладает высокой биодоступностью и тканевым сродством. Необходим приём не менее 4–8 недель для максимального эффекта. Синергист витамина C.

## Механизмы действия

- **Синтез коллагена** — донор серы для дисульфидных мостиков (структура коллагена)
- **Противовоспалительное** — подавление NF-κB, снижение TNF-α, IL-1β, IL-6
- **Ингибирование MMP** — подавление матриксных металлопротеиназ (защита хряща)
- **Хондропротекция** — стимуляция синтеза протеогликанов и хондроитинсульфата
- **Анальгетическое** — снижение возбудимости С-волокон (центральная модуляция)
- **Антиоксидантное** — донор SH-групп, нейтрализация свободных радикалов
- **Антиаллергическое** — снижение IgE, стабилизация тучных клеток
- **Ускорение заживления** — стимуляция кератиноцитов, образование грануляционной ткани

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Остеоартрит (коленный, тазобедренный) | 1A | Снижение боли (WOMAC −2.5 балла, VAS −30–60%) |
| Люмбаго / боль в спине | 1B | Снижение VAS −2.3 балла |
| Артралгия (спортивные травмы, менопауза) | 1B | Снижение боли, отёка |
| Аллергия (сезонный ринит) | 1A | Снижение заложенности и чихания (с 2.6 до 1.1 балла) |
| Воспалительные заболевания кожи (розацеа) | 1B | Снижение покраснения, акне |
| Фибромиалгия | 2B | Снижение боли, улучшение сна |
| Рост волос и ногтей | 2B | Утолщение волосяного стержня |
| Восстановление после тренировок (мышцы) | 2A | Снижение крепатуры (DOMS −35%) |

## Топ-5 продуктов, в которых содержится

Коровье молоко (0.3–1.5 мг/100 мл), кофе (0.5–2 мг/100 мл), помидоры (0.2–0.5 мг/100 г), чай (0.3–1 мг/100 мл), капуста (0.1–0.3 мг/100 г). Однако пищевое поступление MSM <5 мг/день, в то время как терапевтическая доза — 1–6 г/день. Пищевые источники не покрывают потребность при остеоартрите.

## Особенности приёма

- **Дозировка:** 1–3 г/день (поддерживающая), 3–6 г/день (терапевтическая при остеоартрите)
- **Курс:** 8–12 недель до полного эффекта (при остеоартрите — до 6 месяцев)
- **Время:** утром и вечером (разделить на 2 приёма)
- **Синовиальная жидкость:** MSM проникает лучше при регулярном приёме (48 ч насыщения)
- **Синергия:** с витамином C (500 мг) — доставка серы в хрящ; с глюкозамином (1500 мг) — синергия синтеза гликозаминогликанов
- **Побочные:** возможно вздутие (первые 3–5 дней), сернистый запах кожи/дыхания (<2%)

## Противопоказания

- Почечная недостаточность (ХБП 4–5 стадии — снижение выведения)
- Тяжёлые заболевания печени (метаболизм серы)
- Беременность (недостаточно данных в высоких дозах)
- Лактация (недостаточно данных)
- Гемофилия / склонность к кровотечениям (теоретический риск)

## Форма приема и порядок

Кристаллы/порошок (1–6 г/день: растворить в воде/соке — слегка сладковатый вкус, принимать утром и вечером), капсулы (500–1000 мг × 2–3 р/день). Принимать во время еды (снижает вздутие). Начать с 1 г/день, увеличивать на 1 г каждые 3 дня до целевой дозы. При остеоартрите — 3 г/день + глюкозамин 1500 мг + хондроитин 800 мг + коллаген 10 г. Курс 8–12 недель. При фибромиалгии — 3–6 г/день (разделить на 3 приёма).

## Научные факты

- РКИ (2016, 50 пациентов с остеоартритом колена): 3.4 г/день MSM × 12 недель — снижение WOMAC на −36% (p<0.01), VAS на −31.6% (p<0.001).

## Лайфхак для пользователя (Nutrition Tip)

> MSM — органическая сера для суставов, коллагена и детокса. 34% серы в каждой молекуле — донор для синтеза хряща, кожи, связок. Доза: 1–3 г/день (поддержка), 3–6 г/день (остеоартрит). Лучшая комбинация: MSM (3 г) + глюкозамин (1500 мг) + витамин C (500 мг) = −54% WOMAC (p<0.001). Эффект через 4–8 недель. Курс 12 недель. При аллергии — 2.6 г/день × 4 недели (−52% симптомов). Возможен сернистый запах (редко). Запивать водой.

`# Гарпагозид (Harpagoside)

**Категория:** БАД / Ирндоидный гликозид (изолированное соединение)  
**Тип:** Тонизирующий (противовоспалительный, анальгетический, хондропротекторный)  
**Основное действующее вещество:** Гарпагозид (C₂₄H₃₀O₁₁, ирндоидный гликозид)  
**Синонимы:** Harpagoside, гарпагозид, HTS (harpagoside), ирндоидный гликозид, активный компонент когтя дьявола  

## Что это такое

Гарпагозид — основной ирндоидный гликозид корней Harpagophytum procumbens (мартиния душистая, коготь дьявола). Является стандартизированным маркером качества экстрактов гарпагофитума (содержание 0.5–3%). В чистом виде гарпагозид обладает доказанной противовоспалительной активностью, сопоставимой с НПВП (диклофенак, индометацин), но без ингибирования COX-1. Механизм — селективное подавление COX-2 и 5-LOX, ингибирование TNF-α и NF-κB, подавление MMP-1, MMP-3 (защита хряща). Гарпагозид также проявляет антиоксидантную активность (нейтрализация супероксид-аниона). В отличие от сырого экстракта корня, изолированный гарпагозид стандартизирован по содержанию активного компонента, что снижает вариабельность ответа.

## Внешний вид

Кристаллический порошок или аморфное вещество (белого или кремового цвета). Растворим в диметилсульфоксиде (DMSO), этаноле, ограниченно — в воде. На вкус — горький (характерно для ирндоидов). Капсулы — стандартизированные по содержанию гарпагозида (98%, 50%, 20% — в составе растительного комплекса).

## Метаболический цикл

- **Всасывание:** в тонком кишечнике (плохо — биодоступность <10% в нативном виде). Гидролиз кишечными β-глюкозидазами до гарпагенина (агликон, C₂₃H₂₈O₁₀) — липофильнее, лучше всасывается. Cmax через 1–2 ч после приёма. Энтеросолюбильные капсулы повышают биодоступность.
- **Метаболизм:** CYP-ферменты — минимальное участие. Метаболизируется ферментами микробиоты кишечника (гидролиз гликозидной связи). Гарпагенин — основная активная форма в плазме.
- **Распределение:** активные метаболиты проникают в синовиальную жидкость и хрящ (доказано на животных). Связывание с белками плазмы — 50–60%.
- **Выведение:** преимущественно с калом (70–80%) в виде неизменённого гарпагозида и гарпагенина, частично — почками (5–10%).
- **Особенность:** высокая межиндивидуальная вариабельность (зависит от β-глюкозидазной активности микробиоты). Эффект нарастает в течение 2–4 недель. Необходимо дробное дозирование (2–3 приёма/день) для поддержания концентрации.

## Механизмы действия

- **Селективное ингибирование COX-2** — без подавления COX-1 (нет ульцерогенного эффекта)
- **Ингибирование 5-LOX** — снижение лейкотриенов LTB₄, LTC₄
- **Подавление NF-κB** — снижение транскрипции провоспалительных цитокинов
- **Снижение TNF-α, IL-1β, IL-6** — модуляция воспалительного каскада
- **Ингибирование MMP-1, MMP-3** — подавление деградации хряща
- **Антиоксидантное** — нейтрализация супероксид-аниона (O₂·⁻)
- **Спазмолитическое** — снижение тонуса гладкой мускулатуры (энтероциты, сосуды)

## Показания

| Показание | Эффект | Уровень |
|-----------|--------|---------|
| Остеоартрит (коленный, тазобедренный) | 1A | Снижение боли WOMAC −2.7 балла (50–60 мг/день) |
| Люмбаго / боль в спине | 1A | Снижение VAS −2.3 балла |
| Воспалительные артриты (адъювант) | 2B | Снижение отёка (−35% в РКИ на животных) |
| Тендиниты, эпикондилит (локоть теннисиста) | 2B | Снижение боли + улучшение функции |
| Послеоперационное воспаление (отёк) | 2B | Снижение отёка на 30–40% (в исследованиях) |
| Спортивные травмы (острая боль) | 2B | Снижение боли, ускорение восстановления |

## Топ-5 продуктов, в которых содержится

Корни Harpagophytum procumbens (дикий сбор), стандартизированный экстракт гарпагофитума (2–3% гарпагозида), изолированный гарпагозид (98% — исследовательский стандарт), комплексные хондропротекторы с гарпагозидом (глюкозамин + хондроитин + гарпагозид), настойка гарпагофитума с установленным титром гарпагозида

## Особенности приёма

- **Терапевтическая доза гарпагозида:** 50–100 мг/день (чистого гарпагозида)
- **Эквивалент экстракта корня:** 500–1500 мг/день (2–3% гарпагозида)
- **Курс:** 4–12 недель (при остеоартрите — до 6 месяцев)
- **Время:** во время еды (2–3 приёма/день)
- **Энтеросолюбильные капсулы:** предпочтительны (повышение биодоступности)
- **Старт:** 2–4 недели до клинического эффекта (накопление в синовиальной жидкости)
- **Синергия:** с MSM (2 г/день) и салицином (ива белая)

## Противопоказания

- Язва желудка и ДПК (обострение)
- Гастрит с эрозиями (обострение)
- Беременность (тонус матки — стимуляция гладкой мускулатуры)
- Желчекаменная болезнь (камни >1 см — риск колики)
- Индивидуальная непереносимость компонентов
- Дети до 12 лет (недостаточно данных)

## Форма приема и порядок

Чистый гарпагозид (50–100 мг/день — стандартизированный порошок 98%, разделить на 2 приёма по 25–50 мг), экстракт корня мартинии (500–1500 мг/день — 2–3% гарпагозида), капсулы. Принимать во время еды (снижает раздражение ЖКТ). Курс 4–12 недель. При хронической боли — длительно (до 6 месяцев). Не принимать натощак. Избегать разжёвывания капсул (горький вкус, раздражение слизистой). Запивать 200 мл воды.

| + | Алкоголь (высокие дозы) | Снижение эффективности (окислительный стресс) |

## Научные факты

- РКИ (2016, 83 пациента с остеоартритом колена): 50 мг/день гарпагозида (стандартизированный экстракт) × 12 недель — WOMAC −31.2% (p<0.001), снижение потребности в диклофенаке на 49%.

- In vivo (крысы, 2020): гарпагозид (50 мг/кг) подавляет отёк лапы на 57% (каппа-карагинановая модель), действие сопоставимо с индометацином (5 мг/кг).
- Фармакокинетика (2021): гарпагозид определяется в синовиальной жидкости через 4 ч после приёма, накапливается в хряще через 7 дней регулярного приёма.
- Систематический обзор (2022): гарпагозид — наиболее изученный ирндоидный гликозид с противовоспалительной активностью (уровень доказательности 1A для остеоартрита).

## Лайфхак для пользователя (Nutrition Tip)

> Гарпагозид — активное вещество мартинии душистой (коготь дьявола). Блокирует COX-2 и 5-LOX (как НПВП, без гастротоксичности). Доза: 50–100 мг/день чистого гарпагозида или 500–1500 мг/день экстракта (2–3% гарпагозида). Эффект через 2–4 недели. Синергия с MSM (2 г) и куркумином. При остеоартрите — может заменить НПВП на 40–50%. Противопоказан при язве, беременности, ЖКБ (камни). Энтеросолюбильные капсулы — предпочтительны. Горький вкус — не разжёвывать.

function highlight(text,query){

  const q=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  .replace(/\(?DOI:\s*(10\.\S+?)\)?(?=[,;.\s)])/g,'(<a href="https://doi.org/$1" target="_blank" rel="noopener">DOI: $1</a>)');
function openDetail(item){
  const wrap=document.getElementById("detail-wrap"),inner=document.getElementById("detail-inner"),gw=document.getElementById("grid-wrap"),dt=document.getElementById("dt-title");
  const md=mdContents[item.i];
  document.querySelectorAll(".card.selected").forEach(c=>c.classList.remove("selected"));
  const cards=document.querySelectorAll(".card"); for(let i=0;i<cards.length;i++){ if(cards[i].dataset.title===item.n){ cards[i].classList.add("selected"); break; } }
  if(!md){ inner.innerHTML='<p style="color:#d63031;">Ошибка: контент не найден</p>'; wrap.classList.add("open"); gw.classList.add("with-detail"); dt.textContent=item.n; return; }
  dt.textContent=item.n; inner.innerHTML=marked.parse(linkify(md));
  inner.querySelectorAll('a[href]').forEach(a=>{ if(a.getAttribute('href').startsWith('http')) a.target='_blank'; });
  wrap.classList.add("open"); gw.classList.add("with-detail"); inner.scrollTop=0;
}
function closeDetail(){ document.querySelectorAll(".card.selected").forEach(c=>c.classList.remove("selected")); document.getElementById("detail-wrap").classList.remove("open"); document.getElementById("grid-wrap").classList.remove("with-detail"); }
function render(){
  const grid=document.getElementById("grid");
  const bc={stim:"#fdcb6e",ton:"#00b894",sed:"#6c5ce7",energy:"#e17055",sleep:"#a29bfe",gi:"#55efc4"};
  for(const item of data){
    const card=document.createElement("div"); card.className="card";
    card.dataset.title=item.n; card.dataset.cat=item.c; card.dataset.type=item.t; card.dataset.folder=item.f;
    const scs=getItemScenarios(item); card.dataset.scenario=scs.join(",");
    const fc=folderColors[item.f]||"gi"; card.style.borderLeftColor=bc[fc]||"#dfe6e9";
    card.innerHTML='<div class="card-title">'+escapeHtml(item.n)+'</div><div class="card-meta"><strong>'+escapeHtml(item.c||'')+'</strong> · '+escapeHtml(item.t||'')+'</div><span class="card-folder folder-'+fc+'">'+(folderLabels[item.f]||'')+'</span>';
    card.onclick=function(){openDetail(item);}; grid.appendChild(card);
  }
  document.getElementById("total-count").textContent=""+data.length; filter();
}
initFilters(); render();
</script>
</body>
